apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-{{ .Values.saName }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-{{ .Values.saName }}
rules:
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list]
  - apiGroups: [""]
    resources: [pods/exec]
    # `create` for kubectl-style POST exec; `get` for the kubernetes Python
    # client's connect_get_namespaced_pod_exec (GET websocket) used by klib.
    verbs: [get, create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-{{ .Values.saName }}
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-{{ .Values.saName }}
    # namespace is REQUIRED for a ServiceAccount subject: without it the binding
    # does not match system:serviceaccount:<ns>:<sa> and grants nothing.
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ .Release.Name }}-{{ .Values.saName }}
  apiGroup: rbac.authorization.k8s.io
