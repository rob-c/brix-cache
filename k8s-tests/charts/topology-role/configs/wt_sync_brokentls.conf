worker_processes 1;
error_log /var/log/brix/error.log info;
pid       /var/log/brix/nginx.pid;

thread_pool default threads=2 max_queue=65536;
events { worker_connections 16; }

stream {
    server {
        listen {{ (index .Values.role.ports 0).port }};
        brix_root on;
        brix_storage_backend posix:{{ .Values.role.data.root }};
        brix_auth          none;
        brix_allow_write   on;
        brix_write_through on;
        brix_wt_mode       sync;
        # Point at a dead port — roots:// origin unreachable, flush must fail
        brix_wt_origin     roots://127.0.0.1:19998;
    }
}
