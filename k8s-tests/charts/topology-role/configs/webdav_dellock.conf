worker_processes 1;
error_log /var/log/brix/error.log info;

thread_pool default threads=2 max_queue=4096;
events { worker_connections 64; }

# Dedicated WRITABLE HTTP WebDAV server for
# tests/test_webdav_delete_lock_security.py (DELETE/LOCK/UNLOCK/MKCOL
# conformance + CRLF header-injection hardening). Pre-started by
# manage_test_servers.sh start-all so the test never spawns its own instance;
# auth none (no CA store) + brix_allow_write on, isolated data root
# data-webdav-dellock. The test and this server share the local filesystem, so
# the fixture seeds files into the data root and reads the server's writes back.
http {
    client_body_temp_path /tmp/client_body;
    default_type          application/octet-stream;

    server {
        listen {{ (index .Values.role.ports 0).port }};
        location / {
            brix_webdav             on;
            brix_storage_backend posix:{{ .Values.role.data.root }};
            brix_webdav_auth        none;
            brix_allow_write on;
        }
    }
}
