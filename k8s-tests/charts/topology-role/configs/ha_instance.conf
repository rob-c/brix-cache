# HA load-balanced nginx instance.
# start_ha_nginx passes DATA_DIR = global shared data root so both
# ha-nginx1 and ha-nginx2 serve the same files as the main instance.

worker_processes 1;
error_log /var/log/brix/error.log warn;
pid       /var/log/brix/nginx.pid;

events { worker_connections 256; }

stream {
    server {
        listen {{ (index .Values.role.ports 0).port }};
        xrootd on;
        brix_storage_backend posix:{{ .Values.role.data.root }};
        brix_auth none;
        brix_allow_write on;
    }
}
