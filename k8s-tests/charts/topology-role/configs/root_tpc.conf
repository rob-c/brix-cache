worker_processes 1;
error_log /var/log/brix/error.log debug;

thread_pool default threads=4 max_queue=65536;
events { worker_connections 64; }

stream {
    server {
        listen {{ (index .Values.role.ports 0).port }};
        brix_root on;
        brix_storage_backend posix:{{ .Values.role.data.root }};
        brix_auth none;
        brix_allow_write on;
        # Same-host tests use root://localhost (see test_tpc_ssrf_policy defaults elsewhere).
        brix_tpc_allow_local on;
        brix_access_log /var/log/brix/brix_access.log;
    }
}
