worker_processes 1;
error_log /var/log/brix/error.log info;

thread_pool default threads=4 max_queue=65536;
events { worker_connections 128; }

# Dedicated WRITABLE stream xrootd server for tests/test_open_flags_lifecycle.py
# (open-flag semantics: new/delete/apnd/mkpath/retstat + POSC + handle exhaustion).
# Pre-started by manage_test_servers.sh start-all so the test never spawns its own
# instance; anon auth + brix_allow_write on, isolated data root data-open-flags-lifecycle.
stream {
    server {
        listen {{ (index .Values.role.ports 0).port }};
        brix_root on;
        brix_storage_backend posix:{{ .Values.role.data.root }};
        brix_auth none;
        brix_allow_write on;
        brix_access_log /var/log/brix/brix_access.log;
    }
}
