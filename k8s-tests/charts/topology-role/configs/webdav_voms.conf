worker_processes 1;
error_log /var/log/brix/error.log info;

events { worker_connections 64; }

http {
    access_log off;
    client_max_body_size 16m;
    client_body_buffer_size 4k;
    client_body_in_file_only clean;
    client_body_temp_path /tmp;
    proxy_temp_path       /tmp;
    fastcgi_temp_path     /tmp;
    uwsgi_temp_path       /tmp;
    scgi_temp_path        /tmp;

    # HTTPS WebDAV with vomsdir configured — Section 2.2 tests.
    # The test PKI produces standard proxy certs without VOMS attributes, so
    # brix_extract_voms_info() returns NGX_DECLINED on every request.
    # Tests verify: (a) GSI auth still succeeds when VOMS extraction is skipped,
    # (b) the server starts cleanly with vomsdir configured, and
    # (c) an untrusted/self-signed cert is still rejected (no auth bypass).
    server {
        listen {{ (index .Values.role.ports 0).port }} ssl;
        server_name localhost;

        ssl_certificate        /etc/grid-security/hostcert.pem;
        ssl_certificate_key    /etc/grid-security/hostkey.pem;
        ssl_client_certificate /etc/grid-security/certificates/ca.pem;
        ssl_verify_client      on;
        ssl_verify_depth       10;

        brix_webdav_proxy_certs on;

        location / {
            brix_webdav              on;
            brix_webdav_storage_backend posix:{{ .Values.role.data.root }};
            brix_webdav_cafile       /etc/grid-security/certificates/ca.pem;
            brix_webdav_auth         required;
            brix_webdav_vomsdir      /etc/grid-security/vomsdir;
            brix_webdav_voms_cert_dir /etc/grid-security/certificates;
        }
    }
}
