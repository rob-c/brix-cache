worker_processes 1;
error_log /var/log/brix/error.log info;
pid       /var/log/brix/nginx.pid;
events { worker_connections 128; }

# GridFTP gateway role (k8s-tests/remote-suite/tests/test_gridftp_interop.py).
#
# Two stream listeners over the SAME posix export so the interop matrix can hit
# both channel-security legs against one data tree:
#   * ports[0] "gsiftp" — RFC 2228 GSI control channel (globus-url-copy
#     gsiftp://, PROT C or PROT P selectable by the client per transfer).
#   * ports[1] "ftp"    — cleartext control channel (ftplib / MODE-S probes,
#     and the active-vs-passive data-channel matrix without a GSSAPI handshake).
#
# Backend note: the gateway is posix-export only today (brix_gridftp_export is a
# realpath'd tree; ftp_vfs_ctx binds the posix VFS). The pblock/s3 axis of the
# planned matrix is future work — it needs the gateway to honour
# brix_storage_backend, which it does not yet — so this role serves posix and
# the driver marks the other backends xfail/skip.
stream {
    server {
        listen {{ (index .Values.role.ports 0).port }};
        brix_gridftp on;
        brix_gridftp_export      {{ .Values.role.data.root }};
        brix_gridftp_allow_write {{ .Values.role.gridftp.allowWrite | default "on" }};
        brix_gridftp_gsi         on;
        brix_gridftp_certificate     /etc/grid-security/hostcert.pem;
        brix_gridftp_certificate_key /etc/grid-security/hostkey.pem;
        brix_gridftp_trusted_ca      /etc/grid-security/certificates;
        brix_access_log /var/log/brix/gridftp_gsi_access.log;
    }

    server {
        listen {{ (index .Values.role.ports 1).port }};
        brix_gridftp on;
        brix_gridftp_export      {{ .Values.role.data.root }};
        brix_gridftp_allow_write {{ .Values.role.gridftp.allowWrite | default "on" }};
        brix_access_log /var/log/brix/gridftp_plain_access.log;
    }
}
