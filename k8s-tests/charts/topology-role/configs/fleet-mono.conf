worker_processes auto;
error_log /var/log/brix/error.log info;
thread_pool default threads=4 max_queue=65536;
events { worker_connections 1024; }

stream {
  # anon root://
  server {
    listen 11094;
    brix_root on;
    brix_storage_backend posix:{{ .Values.role.data.root }};
    brix_auth none;
    brix_allow_write on;
  }
  # GSI / x509
  server {
    listen 11095;
    brix_root on;
    brix_storage_backend posix:{{ .Values.role.data.root }};
    brix_auth gsi;
    brix_allow_write on;
    brix_certificate     /etc/grid-security/hostcert.pem;
    brix_certificate_key /etc/grid-security/hostkey.pem;
    brix_trusted_ca      /etc/grid-security/certificates/ca.pem;
  }
  # GSI + in-protocol TLS
  server {
    listen 11096;
    brix_root on;
    brix_storage_backend posix:{{ .Values.role.data.root }};
    brix_auth gsi;
    brix_tls on;
    brix_allow_write on;
    brix_certificate     /etc/grid-security/hostcert.pem;
    brix_certificate_key /etc/grid-security/hostkey.pem;
    brix_trusted_ca      /etc/grid-security/certificates/ca.pem;
  }
  # Token (JWT / WLCG)
  server {
    listen 11097;
    brix_root on;
    brix_storage_backend posix:{{ .Values.role.data.root }};
    brix_auth token;
    brix_allow_write on;
    brix_token_jwks     /etc/brix/jwks/jwks.json;
    brix_token_issuer   "https://test.example.com";
    brix_token_audience "nginx-xrootd";
    brix_token_jwks_refresh_interval 5s;
  }
}

http {
  server {
    listen 9100;
    location /metrics { brix_metrics on; }
  }
}
