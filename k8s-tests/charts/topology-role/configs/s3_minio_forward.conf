worker_processes 1;
error_log /var/log/brix/error.log info;
pid       /var/log/brix/nginx.pid;
thread_pool default threads=2;

events { worker_connections 128; }

# S3 credential-forwarding role (tests/test_minio_s3_forward.py, s3fwd profile):
# a WebDAV front whose storage plane is an UPSTREAM S3 endpoint (the s3-forward
# chart's MinIO Deployment).  brix signs every upstream request (SigV4) with the
# static brix_credential below — reads are forwarded range-GETs, writes are
# staged whole-object PUTs (sd_remote driver).  The bucket is created by the
# test itself with a direct signed request, so this role has no init ordering
# dependency on MinIO beyond DNS.
http {
    client_body_temp_path /tmp;
    proxy_temp_path        /tmp;
    fastcgi_temp_path      /tmp;
    uwsgi_temp_path        /tmp;
    scgi_temp_path         /tmp;

    brix_credential minio {
        s3_access_key {{ .Values.role.backend.accessKey }};
        s3_secret_key {{ .Values.role.backend.secretKey }};
        s3_region     {{ .Values.role.backend.region }};
    }

    server {
        listen {{ (index .Values.role.ports 0).port }};
        client_max_body_size 64m;
        access_log /var/log/brix/http_webdav_access.log;

        location / {
            dav_methods PUT DELETE;
            brix_webdav             on;
            brix_webdav_auth        none;
            brix_export             {{ .Values.role.data.root }};
            brix_storage_backend    s3://{{ .Values.role.backend.host | default (printf "%s-minio" .Release.Name) }}:{{ .Values.role.backend.port }}/{{ .Values.role.backend.bucket }};
            brix_storage_credential minio;
            brix_allow_write        on;
        }
    }
}
