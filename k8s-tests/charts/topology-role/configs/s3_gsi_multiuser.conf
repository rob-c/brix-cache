worker_processes 1;
error_log /var/log/brix/error.log info;
pid       /var/log/brix/nginx.pid;
thread_pool default threads=4 max_queue=65536;

events { worker_connections 256; }

# s3-gsi multi-user role (charts/s3-gsi, tests/test_s3gsi_multiuser.py):
# a root://+GSI front whose storage plane is an UPSTREAM MinIO S3 bucket.
#
#  - Per-user authz: brix_authdb (default-deny; per-DN rules generated by the
#    chart's pki-bootstrap job from the actual proxy DNs).
#  - Per-VO backend credentials: brix_storage_credential_dir holds
#    <x5h-hash>.s3 files (bob/alice -> atlas MinIO keys, tom/jane -> cms
#    keys); the static 'svc' credential is the fallback / service identity.
#  - Two lanes over the same backend: port[0] = fallback ALLOW (missing user
#    cred silently uses svc), port[1] = fallback DENY (missing user cred ->
#    kXR_NotAuthorized).
stream {
    brix_credential svc {
        s3_access_key {{ .Values.role.backend.accessKey }};
        s3_secret_key {{ .Values.role.backend.secretKey }};
        s3_region     {{ .Values.role.backend.region }};
    }

    server {
        listen {{ (index .Values.role.ports 0).port }};
        brix_root on;
        brix_auth gsi;
        brix_allow_write on;
        brix_certificate     /etc/grid-security/hostcert.pem;
        brix_certificate_key /etc/grid-security/hostkey.pem;
        brix_trusted_ca      /etc/grid-security/certificates/ca.pem;
        # upload_resume stages writes in a LOCAL .part + rename — that
        # engine bypasses the VFS staged path to the s3 backend entirely
        # (commit EIO, bytes never reach MinIO).  Direct write posture routes
        # writes through sd_remote's staged multipart PUT.
        brix_upload_resume   off;
        brix_authdb          /etc/brix/extra/authdb;
        # Explicit export root: WITHOUT it the s3 plane resolves request paths
        # as "/"+wire ("//atlas/...") while authdb rules canonicalize to
        # "/atlas/..." — nothing ever matches (all ops 3010).  A real local
        # dir as export root makes both sides resolve identically.
        brix_export          {{ .Values.role.data.root }};
        brix_storage_backend s3://{{ .Values.role.backend.host | default (printf "%s-minio" .Release.Name) }}:{{ .Values.role.backend.port }}/{{ .Values.role.backend.bucket }};
        # NOTE deliberately NO brix_storage_credential: the stream worker-init
        # credential replay (process_server_init.c) clobbers the parse-time
        # s3_access_key/secret with empty strings (bug found by this lab), so a
        # static service credential is UNUSABLE on the stream plane — anonymous
        # + per-user .s3 open_cred is the only working posture.
        brix_storage_credential_dir      /etc/brix/extra;
        brix_storage_credential_fallback allow;
        brix_access_log /var/log/brix/brix_access.log;
    }

    server {
        listen {{ (index .Values.role.ports 1).port }};
        brix_root on;
        brix_auth gsi;
        brix_allow_write on;
        brix_certificate     /etc/grid-security/hostcert.pem;
        brix_certificate_key /etc/grid-security/hostkey.pem;
        brix_trusted_ca      /etc/grid-security/certificates/ca.pem;
        brix_upload_resume   off;
        brix_authdb          /etc/brix/extra/authdb;
        brix_export          {{ .Values.role.data.root }};
        brix_storage_backend s3://{{ .Values.role.backend.host | default (printf "%s-minio" .Release.Name) }}:{{ .Values.role.backend.port }}/{{ .Values.role.backend.bucket }};
        brix_storage_credential_dir      /etc/brix/extra;
        brix_storage_credential_fallback deny;
        brix_access_log /var/log/brix/brix_access_deny.log;
    }
}
