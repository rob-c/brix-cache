worker_processes 1;
error_log /var/log/brix/error_wt_async.log info;

thread_pool default threads=4 max_queue=65536;
events { worker_connections 64; }

stream {

    server {
        listen {{ (index .Values.role.ports 0).port }};
        brix_root on;
        brix_storage_backend posix:{{ .Values.role.data.root }};
        brix_auth      none;
        brix_allow_write on;

        brix_write_through    on;
        brix_wt_mode          async;
        brix_wt_origin        localhost:11094;
    }
}
