# Dedicated nginx configuration for authdb tests (AUTHDB_PORT).
#
# GSI authentication with brix_authdb enforcing user/VO/group/CIDR rules.
# VOMSdir and VOMS cert dir required for VO membership validation.

worker_processes 1;
error_log /var/log/brix/error.log info;
pid       /var/log/brix/nginx.pid;

events { worker_connections 64; }

stream {
    server {
        listen {{ (index .Values.role.ports 0).port }};
        brix_root on;
        brix_storage_backend posix:{{ .Values.role.data.root }};
        brix_auth gsi;
        brix_allow_write on;
        brix_certificate     /etc/grid-security/hostcert.pem;
        brix_certificate_key /etc/grid-security/hostkey.pem;
        brix_trusted_ca      /etc/grid-security/certificates/ca.pem;
        brix_vomsdir         /etc/grid-security/vomsdir;
        brix_voms_cert_dir   /etc/grid-security/certificates;
        brix_authdb          {{ .Values.role.data.root }}/authdb;
    }
}
