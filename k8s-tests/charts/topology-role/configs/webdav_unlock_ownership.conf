worker_processes 1;
error_log /var/log/brix/error.log info;

events { worker_connections 64; }

# Dedicated WRITABLE WebDAV HTTP server for tests/test_webdav_unlock_ownership.py
# (LOCK/UNLOCK ownership boundary: the CRYPTO_memcmp lock-token comparison in
# src/protocols/webdav/lock.c that stops one client stealing another's lock).
# Pre-started by manage_test_servers.sh start-all so the test never spawns its
# own instance; cleartext http, auth none + brix_webdav_allow_write on,
# isolated data root data-webdav-unlock-ownership.  Locks are stored in user
# xattrs, so the data root must support them (the test probes for this).
http {
    access_log off;
    client_body_temp_path /tmp;
    proxy_temp_path       /tmp;
    fastcgi_temp_path     /tmp;
    uwsgi_temp_path       /tmp;
    scgi_temp_path        /tmp;

    server {
        listen 127.0.0.1:{{ (index .Values.role.ports 0).port }};
        server_name localhost;

        location / {
            brix_webdav             on;
            brix_webdav_storage_backend posix:{{ .Values.role.data.root }};
            brix_webdav_auth        none;
            brix_webdav_allow_write on;
        }
    }
}
