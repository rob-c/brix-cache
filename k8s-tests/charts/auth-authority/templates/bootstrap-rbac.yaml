{{/*
The bootstrap Job runs as a pre-install/pre-upgrade hook, so its RBAC must be
created *before* it — hence these are also hooks, with a lower (earlier) weight.
A persisting delete policy keeps the ServiceAccount around for the KDC pod.
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-bootstrap
  labels:
    {{- include "brix-common.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-bootstrap
  labels:
    {{- include "brix-common.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
rules:
  - apiGroups: [""]
    resources: [secrets, configmaps]
    verbs: [create, update, patch, get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-bootstrap
  labels:
    {{- include "brix-common.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-bootstrap
roleRef:
  kind: Role
  name: {{ .Release.Name }}-bootstrap
  apiGroup: rbac.authorization.k8s.io
