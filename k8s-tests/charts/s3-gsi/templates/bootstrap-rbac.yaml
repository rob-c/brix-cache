{{/*
RBAC for the PKI bootstrap Job (pre-install hook, so RBAC is an earlier hook).
Same pattern as auth-authority/templates/bootstrap-rbac.yaml.
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-pki-bootstrap
  labels:
    {{- include "brix-common.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-pki-bootstrap
  labels:
    {{- include "brix-common.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
rules:
  - apiGroups: [""]
    resources: [secrets, configmaps]
    verbs: [create, update, patch, get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-pki-bootstrap
  labels:
    {{- include "brix-common.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-pki-bootstrap
roleRef:
  kind: Role
  name: {{ .Release.Name }}-pki-bootstrap
  apiGroup: rbac.authorization.k8s.io
