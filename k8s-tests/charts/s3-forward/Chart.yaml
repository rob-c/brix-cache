apiVersion: v2
name: s3-forward
description: MinIO S3 backend + a brix role forwarding SigV4 credentials to it (upstream-S3 storage plane)
type: application
version: 0.1.0
appVersion: "0.1.0"
dependencies:
  - name: brix-common
    version: 0.1.0
    repository: file://../brix-common
  - name: topology-role
    version: 0.1.0
    repository: file://../topology-role
    alias: s3fwd
    condition: s3fwd.enabled
