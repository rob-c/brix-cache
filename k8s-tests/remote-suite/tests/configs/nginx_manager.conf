worker_processes 1;
error_log {LOG_DIR}/error.log info;

events { worker_connections 128; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_manager_map /maps {MAP_A_HOST}:{MAP_A_PORT};
        brix_manager_map /maps/prefix {MAP_B_HOST}:{MAP_B_PORT};
    }
}
