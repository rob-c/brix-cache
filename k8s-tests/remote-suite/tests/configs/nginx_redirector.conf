# Dedicated nginx configuration for redirector (manager_mode) in cluster tests.
#
# Acts as a CMS server accepting data-server registrations and also serves
# XRootD traffic on the main port. Used as the top-tier redirector in
# two-tier, three-tier, multi-token, multi-server, CMS parent, registry-full,
# and kYR_gone tests.

worker_processes 1;
error_log {LOG_DIR}/error.log debug;
pid       {LOG_DIR}/nginx.pid;

events { worker_connections 128; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_auth none;
        brix_manager_mode on;
    }
    server {
        listen {BIND_HOST}:{CMS_PORT};
        brix_cms_server on;
    }
}
