# Dedicated nginx configuration for CMS manager heartbeat tests.
#
# Single standalone server with brix_cms_manager pointing to a CMS listener
# on a separate port. No auth, anonymous mode only.

worker_processes 1;
error_log {LOG_DIR}/error.log debug;
pid       {LOG_DIR}/nginx.pid;
thread_pool default threads=4 max_queue=65536;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        brix_cms_manager {BIND_HOST}:{CMS_PORT};
        brix_cms_paths /data;
        brix_cms_interval 5;
    }
}
