# HA load-balanced nginx instance.
# start_ha_nginx passes DATA_DIR = global shared data root so both
# ha-nginx1 and ha-nginx2 serve the same files as the main instance.

worker_processes 1;
error_log {LOG_DIR}/error.log warn;
pid       {LOG_DIR}/nginx.pid;

events { worker_connections 256; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        xrootd on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
    }
}
