# nginx_ipv6_mgr.conf — phase-36 §7 IPv6 CMS-redirect / admin-API test instance.
#
# ONE dedicated instance, three IPv6 ([::1]) listeners:
#
#   1. stream  listen [::1]:{PORT}      (= IPV6_MGR_PORT, 11241)  manager mode —
#      kXR_locate / kXR_open consult the cluster registry and emit a kXR_redirect
#      whose host field is bracket-formatted on emit (response/control.c:71 +
#      manager/registry.c via brix_format_host[_port]).  This is the surface the
#      GATING tests in test_ipv6_cms_redirect.py drive over a RAW socket to ::1
#      (the PyXRootD client mishandles root://[::1] literals in this env).
#
#   2. stream  listen [::1]:11242       (= IPV6_MGR_CMS_PORT, fixed)  CMS server —
#      accepts data-server LOGIN registration; present so the manager has a CMS
#      parent face even though the IPv6 tests register data servers via the
#      admin API rather than a live cmsd handshake.
#
#   3. http    listen [::1]:11247       (= IPV6_MGR_HTTP_PORT, fixed)
#        /brix/         dashboard + REST admin write API.  The admin API is
#                         authorized by a ::1/128 CIDR allowlist (every test
#                         request originates from ::1); admin writes register /
#                         drain / remove IPv6 data servers whose host segment is
#                         sent bracketed in the URI ("[::1]") and stripped by
#                         dashboard/api_admin.c:admin_parse_server_uri (the
#                         bracket-strip GATING surface).
#        /metrics         Prometheus metrics.
#        /rl/             a rate-limited dashboard mirror (brix_rate_limit_rule)
#                         so the IPv6 rate-limit-key path can be exercised.
#
# Mirrors directives from nginx_cluster_redir.conf, nginx_cluster_slots_redir.conf,
# nginx_shared.conf (dashboard) and test_phase23_admin_api.py (admin API) /
# test_phase25_ratelimit.py (rate limit).  The PRIMARY listener uses {PORT}; the
# two secondary ports are FIXED literals per the phase-36 port map.

worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid       {LOG_DIR}/nginx.pid;

events { worker_connections 128; }

stream {
    # (1) IPv6 manager-mode redirector — the kXR_locate/open redirect face.
    server {
        listen {BIND6_HOST}:{PORT};
        xrootd on;
        brix_auth none;
        brix_manager_mode on;
        brix_registry_slots 16;
        brix_access_log {LOG_DIR}/brix_access_ipv6_mgr.log;
    }

    # (2) IPv6 CMS server face (fixed secondary port 11242).
    server {
        listen [::1]:11242;
        brix_cms_server on;
    }
}

http {
    client_body_temp_path {TMP_DIR};
    proxy_temp_path        {TMP_DIR};
    fastcgi_temp_path      {TMP_DIR};
    uwsgi_temp_path        {TMP_DIR};
    scgi_temp_path         {TMP_DIR};
    access_log off;

    # Phase 25 rate-limit shared-memory zone (declared in http{}, referenced
    # per-location below).  Distinct from the Phase 20 brix_rate_limit.
    brix_rate_limit_zone zone=rl6:1m;

    # (3) IPv6 dashboard / admin API / metrics face (fixed secondary port 11247).
    server {
        listen [::1]:11247;

        # Dashboard + REST admin write API.  Admin writes are authorized by the
        # [::1]/128 CIDR allowlist — every test request originates from ::1, so
        # no secret file needs pre-seeding for the bracket-strip GATING surface.
        location /brix/ {
            brix_dashboard on;
            brix_dashboard_password "testpassword";
            # CIDR allowlist takes the bare network form (ngx_ptocidr), NOT the
            # bracketed listen literal: "::1/128", never "[::1]/128".
            brix_admin_allow ::1/128 127.0.0.1/32;
        }

        location /metrics {
            brix_metrics on;
        }

        # Rate-limited dashboard mirror: exercises the IPv6 rate-limit key path
        # (ratelimit_keys.c) for a client bucketed by its ::1 peer address.
        location /rl/brix/ {
            brix_dashboard on;
            brix_dashboard_password "testpassword";
            brix_admin_allow ::1/128 127.0.0.1/32;
            brix_rate_limit_rule zone=rl6 key=ip rate=100r/s burst=50 nodelay;
        }
    }
}
