worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid       {LOG_DIR}/nginx.pid;

events { worker_connections 32; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth             none;
        brix_manager_mode     on;
        # Dedicated real CMS server keeps the management connection open.
        # It has no matching data-server registration for /data/*, so locate
        # waits for brix_cms_locate_timeout and returns kXR_wait.
        brix_cms_manager      127.0.0.1:12128;
        brix_cms_locate_timeout 500ms;
    }
}
