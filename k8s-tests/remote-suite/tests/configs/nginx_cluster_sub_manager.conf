worker_processes 1;
error_log {LOG_DIR}/error.log debug;
pid       {LOG_DIR}/nginx.pid;

events { worker_connections 128; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_auth none;
        brix_manager_mode on;
    }
    server {
        listen {BIND_HOST}:{CMS_PORT};
        brix_cms_server on;
    }
    server {
        listen {BIND_HOST}:{SELF_REGISTER_PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_cms_manager {BIND_HOST}:{META_CMS_PORT};
        brix_cms_paths /;
        brix_cms_interval 5;
        brix_listen_port {PORT};
    }
}
