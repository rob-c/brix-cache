# Stub-auth upstream nginx: brix_upstream + token injection.
#
# Used by test_a_upstream_redirect.py::TestUpstreamAuth.  Identical in
# structure to nginx_upstream_auth.conf but reads {TOKEN_DIR}/stub_auth.jwt
# instead of {TOKEN_FILE} so the two server instances do not share a token
# file, preventing races between the stub-backend and real-xrootd tests.

worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid       {LOG_DIR}/nginx.pid;

events { worker_connections 128; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_upstream 127.0.0.1:{UPSTREAM_PORT};
        brix_upstream_token_file {TOKEN_DIR}/stub_auth.jwt;
    }
}
