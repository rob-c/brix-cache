worker_processes 1;
error_log {LOG_DIR}/error.log debug;

thread_pool default threads=4 max_queue=65536;
events { worker_connections 64; }

stream {
    server {
        listen {PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        # Same-host tests use root://localhost (see test_tpc_ssrf_policy defaults elsewhere).
        brix_tpc_allow_local on;
        brix_access_log {LOG_DIR}/brix_access.log;
    }
}
