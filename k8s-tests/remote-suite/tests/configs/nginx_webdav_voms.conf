worker_processes 1;
error_log {LOG_DIR}/error.log info;

events { worker_connections 64; }

http {
    access_log off;
    client_max_body_size 16m;
    client_body_buffer_size 4k;
    client_body_in_file_only clean;
    client_body_temp_path {TMP_DIR};
    proxy_temp_path       {TMP_DIR};
    fastcgi_temp_path     {TMP_DIR};
    uwsgi_temp_path       {TMP_DIR};
    scgi_temp_path        {TMP_DIR};

    # HTTPS WebDAV with vomsdir configured — Section 2.2 tests.
    # The test PKI produces standard proxy certs without VOMS attributes, so
    # brix_extract_voms_info() returns NGX_DECLINED on every request.
    # Tests verify: (a) GSI auth still succeeds when VOMS extraction is skipped,
    # (b) the server starts cleanly with vomsdir configured, and
    # (c) an untrusted/self-signed cert is still rejected (no auth bypass).
    server {
        listen {BIND_HOST}:{PORT} ssl;
        server_name localhost;

        ssl_certificate        {SERVER_CERT};
        ssl_certificate_key    {SERVER_KEY};
        ssl_client_certificate {CA_CERT};
        ssl_verify_client      on;
        ssl_verify_depth       10;

        brix_webdav_proxy_certs on;

        location / {
            brix_webdav              on;
            brix_webdav_storage_backend posix:{DATA_DIR};
            brix_webdav_cafile       {CA_CERT};
            brix_webdav_auth         required;
            brix_webdav_vomsdir      {VOMSDIR};
            brix_webdav_voms_cert_dir {CA_DIR};
        }
    }
}
