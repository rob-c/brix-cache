worker_processes 1;
error_log {LOG_DIR}/error.log debug;
pid       {LOG_DIR}/nginx.pid;

events { worker_connections 128; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_auth none;
        brix_manager_mode on;
        brix_registry_slots 3;
    }
    server {
        listen {BIND_HOST}:{CMS_PORT};
        brix_cms_server on;
    }
}

http {
    server {
        listen {BIND_HOST}:{METRICS_PORT};
        location /metrics {
            brix_metrics on;
        }
    }
}
