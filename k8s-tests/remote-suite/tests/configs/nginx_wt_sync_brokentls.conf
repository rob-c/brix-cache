worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid       {LOG_DIR}/nginx.pid;

thread_pool default threads=2 max_queue=65536;
events { worker_connections 16; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth          none;
        brix_allow_write   on;
        brix_write_through on;
        brix_wt_mode       sync;
        # Point at a dead port — roots:// origin unreachable, flush must fail
        brix_wt_origin     roots://127.0.0.1:19998;
    }
}
