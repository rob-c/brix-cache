worker_processes 1;
error_log {LOG_DIR}/error.log debug;
pid {LOG_DIR}/nginx.pid;
thread_pool default threads=4 max_queue=65536;

events { worker_connections 1024; }

stream {
    # Anonymous (upload_resume ON — the default; staged-write/resume posture).
    server {
        listen {ANON_PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        brix_recover_writes on;
        brix_upload_resume on;   # explicit: staged .xrdresume.*.part until close
        brix_read_compress on;   # phase-42 W4: opt-in inline read compression
        brix_write_compress on;  # phase-42 W5: opt-in inline write decompression
        brix_access_log {LOG_DIR}/brix_access_anon.log;
    }

    # Anonymous, upload_resume OFF — stock direct-to-disk write posture.  Shares
    # the SAME {DATA_DIR} as the resume-ON anon block so conformance suites that
    # inspect on-disk state out-of-band (pgwrite accept-then-correct, fsync
    # durability) can assert stock semantics here, while the resume FEATURE is
    # exercised on the resume-ON port and its dedicated instances.  Both on/off
    # configurations of upload_resume are thus covered by dedicated endpoints.
    server {
        listen {ANON_RESUME_OFF_PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        brix_recover_writes on;
        brix_upload_resume off;  # direct-to-final writes (no .part staging)
        brix_access_log {LOG_DIR}/brix_access_anon_resume_off.log;
    }

    # GSI / x509
    server {
        listen {GSI_PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth gsi;
        brix_allow_write on;
        brix_certificate     {SERVER_CERT};
        brix_certificate_key {SERVER_KEY};
        brix_trusted_ca      {CA_CERT};
        brix_access_log {LOG_DIR}/brix_access_gsi.log;
    }

    # GSI + in-protocol TLS
    server {
        listen {GSI_TLS_PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth gsi;
        brix_tls on;
        brix_allow_write on;
        brix_certificate     {SERVER_CERT};
        brix_certificate_key {SERVER_KEY};
        brix_trusted_ca      {CA_CERT};
        brix_access_log {LOG_DIR}/brix_access_gsi_tls.log;
    }

    # Token (JWT / WLCG)
    server {
        listen {TOKEN_PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth token;
        brix_allow_write on;
        brix_token_jwks     {TOKEN_DIR}/jwks.json;
        brix_token_issuer   "https://test.example.com";
        brix_token_audience "nginx-xrootd";
        brix_access_log {LOG_DIR}/brix_access_token.log;
    }
}

http {
    # B5: Structured access log using nginx built-in variables.
    # $remote_addr $request $status $body_bytes_sent $request_time give a
    # compact audit trail without custom log-string assembly in C code.
    log_format xrootd '$remote_addr - [$time_local] "$request" '
                      '$status $body_bytes_sent rt=${request_time}s '
                      'proto=$brix_protocol "$http_authorization"';

    log_format s3_audit '$remote_addr - - [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                        'reqid=$request_id';

    access_log            {LOG_DIR}/http_access.log xrootd;
    client_body_temp_path {TMP_DIR};
    proxy_temp_path       {TMP_DIR};
    fastcgi_temp_path     {TMP_DIR};
    uwsgi_temp_path       {TMP_DIR};
    scgi_temp_path        {TMP_DIR};

    # Phase 32 WS1: zero-copy file serving.  sendfile(2) gives cleartext S3/GET
    # kernel zero-copy; combined with kTLS (ssl_conf_command Options KTLS in the
    # TLS server blocks below) it becomes SSL_sendfile so encrypted WebDAV GET is
    # also zero-copy.  tcp_nopush coalesces the response header with the first
    # data segment.  output_buffers raises the file-read chunk for large GETs.
    sendfile        on;
    tcp_nopush      on;
    output_buffers  2 256k;

    # B7: MIME type mapping — WebDAV GET/HEAD and S3 GET/HEAD use
    # ngx_http_set_content_type(r) which looks up r->exten in this table.
    # Common HEP and scientific data formats:
    types {
        application/octet-stream    root fits;
        application/x-hdf5          h5 hdf5;
        application/xml             xml xsd;
        application/json            json;
        text/plain                  txt log tsv;
        text/csv                    csv;
        application/x-tar           tar;
        application/gzip            gz;
    }

    # B2: Rate limiting — add to http{} and reference in location blocks.
    # Prevents single clients from overwhelming the server.
    # limit_req_zone $binary_remote_addr zone=xrootd:10m rate=200r/s;

    # B3: IP-based access control — geo/map blocks define variables per source IP.
    # geo $allowed_ip { default 0; 192.168.0.0/16 1; 10.0.0.0/8 1; }
    # Then in location: if ($allowed_ip = 0) { return 403; }

    # B4: Proxy cache for GET responses (proxy-mode deployments).
    # proxy_cache_path {TMP_DIR}/cache levels=1:2 keys_zone=brix_cache:10m
    #                  max_size=1g inactive=60m use_temp_path=off;

    # B6: Upstream block for proxy-mode — multiple backends with passive health checks.
    # upstream brix_backends {
    #     server backend1.example.com:1094;
    #     server backend2.example.com:1094 backup;
    # }

    server {
        listen {METRICS_PORT};
        location /metrics {
            brix_metrics on;
        }
        # phase-47 W2: liveness/readiness probe for LB/Kubernetes.
        location = /healthz {
            brix_health on;
        }
        # B8: Basic nginx counters alongside full Prometheus metrics.
        # Requires --with-http_stub_status_module at configure time.
        # location /nginx_status { stub_status; }
    }

    server {
        listen {WEBDAV_PORT} ssl;
        server_name localhost;

        ssl_certificate     {SERVER_CERT};
        ssl_certificate_key {SERVER_KEY};

        # Phase 32 WS1: kernel TLS so the file-backed GET response is encrypted
        # in-kernel via SSL_sendfile (zero-copy).  Requires the `tls` kernel ULP
        # + OpenSSL 3 + an AES-GCM cipher; nginx falls back to read()+SSL_write
        # automatically if kTLS is unavailable.  Larger TLS records cut syscalls
        # on the fallback path.
        ssl_conf_command Options KTLS;
        ssl_buffer_size  64k;

        brix_webdav_proxy_certs on;

        ssl_verify_client   optional_no_ca;
        ssl_verify_depth    10;
        client_max_body_size 1g;

        access_log {LOG_DIR}/webdav_access.log;

        # Dashboard served over TLS so the session cookie is protected in transit.
        location /brix/ {
            brix_dashboard on;
            # Anonymous read-only view by default: the page loads with no login
            # and the JSON API serves a PII-redacted snapshot (client identities,
            # paths and IPs hidden). Operators click "Sign in" for full detail.
            brix_dashboard_anonymous on;
            brix_dashboard_password "testpassword";
            # Short thresholds so the throttled/stalled state tests observe the
            # transition in seconds instead of the 60s default.
            brix_dashboard_idle_threshold    1s;
            brix_dashboard_stalled_threshold 3s;
        }

        location / {
            root                  {DATA_DIR};
            dav_methods           DELETE MKCOL;

            brix_webdav         on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_cadir   {CA_DIR};
            brix_webdav_auth    optional;
            brix_allow_write on;

            brix_webdav_token_jwks     {TOKEN_DIR}/jwks.json;
            brix_webdav_token_issuer   "https://test.example.com";
            brix_webdav_token_audience "nginx-xrootd";
        }
    }


    # Dedicated dashboard portal (port 8445) — anonymous, browser-friendly.
    #
    # WHY A SEPARATE SERVER: the WebDAV servers above set `ssl_verify_client
    # optional_no_ca`, which makes nginx send a TLS CertificateRequest. Chrome
    # responds by popping up a "select a certificate" dialog — the "login" that
    # blocks the demo. `ssl_verify_client` is server-scoped (no per-location
    # override), so the only way to stop the prompt without disabling proxy-cert
    # auth on the WebDAV port is to serve the dashboard from its own TLS socket
    # that never requests a client cert. Anonymous read-only is on by default;
    # operators can still POST to /brix/login for the full (un-redacted) view.
    server {
        listen 8445 ssl;
        server_name localhost;

        ssl_certificate     {SERVER_CERT};
        ssl_certificate_key {SERVER_KEY};
        # NOTE: deliberately no ssl_verify_client here — the browser is never
        # asked for a client certificate, so no cert-selection dialog appears.

        access_log {LOG_DIR}/dashboard_access.log;

        location /brix/ {
            brix_dashboard on;
            brix_dashboard_anonymous on;
            brix_dashboard_password "testpassword";
            brix_dashboard_idle_threshold    1s;
            brix_dashboard_stalled_threshold 3s;
        }

        # Redirect the bare /brix (no trailing slash) to /brix/ so the
        # browser URL works either way instead of 404-ing through to a file root.
        location = /brix {
            return 301 /brix/;
        }
    }


    # HTTPS WebDAV with GSI/x509 proxy cert auth + TLS (port 8444)
    server {
        listen {WEBDAV_GSI_TLS_PORT} ssl;
        server_name localhost;

        ssl_certificate     {SERVER_CERT};
        ssl_certificate_key {SERVER_KEY};

        # Phase 32 WS1: kernel TLS (SSL_sendfile) — see WEBDAV_PORT block above.
        ssl_conf_command Options KTLS;
        ssl_buffer_size  64k;

        brix_webdav_proxy_certs on;

        ssl_verify_client   optional_no_ca;
        ssl_verify_depth    10;
        client_max_body_size 1g;

        access_log {LOG_DIR}/webdav_gsi_tls_access.log;

        location /brix/ {
            brix_dashboard on;
            # Anonymous read-only (PII-redacted) view by default; "Sign in" for full detail.
            brix_dashboard_anonymous on;
            brix_dashboard_password "testpassword";
            # Short thresholds so the throttled/stalled state tests observe the
            # transition in seconds instead of the 60s default.
            brix_dashboard_idle_threshold    1s;
            brix_dashboard_stalled_threshold 3s;
        }

        location / {
            root                  {DATA_DIR};
            dav_methods           DELETE MKCOL;

            brix_webdav         on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_cadir   {CA_DIR};
            brix_webdav_auth    required;
            brix_allow_write on;

            brix_webdav_token_jwks     {TOKEN_DIR}/jwks.json;
            brix_webdav_token_issuer   "https://test.example.com";
            brix_webdav_token_audience "nginx-xrootd";
        }
    }

    # Plain HTTP WebDAV (no TLS, anonymous)
    server {
        listen {HTTP_WEBDAV_PORT};
        server_name localhost;

        client_max_body_size 1g;
        access_log {LOG_DIR}/http_webdav_access.log;
        access_log {LOG_DIR}/http_access.log xrootd;

        location / {
            root                  {DATA_DIR};
            dav_methods           DELETE MKCOL;

            brix_webdav         on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_auth    optional;
            brix_webdav_cafile  {CA_CERT};
            brix_allow_write on;
            brix_webdav_cors_origin https://debug.example.test;
            brix_webdav_cors_credentials on;
            brix_webdav_cors_max_age 600;

            brix_webdav_token_jwks     {TOKEN_DIR}/jwks.json;
            brix_webdav_token_issuer   "https://test.example.com";
            brix_webdav_token_audience "nginx-xrootd";
            brix_webdav_macaroon_secret deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef;

            brix_webdav_tpc on;
            brix_webdav_tpc_cafile {CA_CERT};
        }
    }

    # S3-compatible object storage (anonymous, no SigV4 required)
    server {
        listen {S3_PORT};
        server_name localhost;

        client_max_body_size 1g;
        access_log {LOG_DIR}/s3_access.log s3_audit;
        access_log {LOG_DIR}/http_access.log xrootd;

        location / {
            brix_s3           on;
            brix_storage_backend posix:{DATA_DIR};
            brix_s3_bucket    testbucket;
            brix_allow_write on;
            brix_s3_max_keys  1000;
        }
    }
}
