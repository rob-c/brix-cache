# Dedicated nginx configuration for kXR_prepare staging command tests.
#
# Anonymous mode with brix_prepare_command configured to a shell script.
# Each test creates its own stage hook script; this template uses a placeholder
# that manage_test_servers.sh does NOT substitute (tests set it via env).

worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid       {LOG_DIR}/nginx.pid;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_allow_write on;
        # brix_prepare_command is set per-test via env override in manage_test_servers.sh
    }
}
