worker_processes 1;
error_log {LOG_DIR}/error.log debug;
pid       {LOG_DIR}/nginx.pid;

events { worker_connections 128; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        brix_cms_manager {BIND_HOST}:{CMS_PORT};
        brix_cms_paths {CMS_PATHS};
        brix_cms_interval 5;
        brix_listen_port {PORT};
    }
}
