# Phase 36 §7 — IPv6 WebDAV proxy backend origin (the upstream the proxy talks to).
#
# Plain HTTP WebDAV server listening on the IPv6 loopback [::1]. The point of
# this instance is to record the exact "Host:" header the proxy in front of it
# sends on each upstream request: the custom log_format below logs $http_host to
# host_access.log so the gating tests can assert the proxy bracketed the IPv6
# literal ("[::1]:11245") rather than emitting the bare, ambiguous "::1:11245".
# See src/protocols/webdav/proxy_pool.c / proxy_config.c (bracket-on-emit Host header).
#
# Pre-started by manage_test_servers.sh start-all via
#   start_dedicated_nginx "ipv6-upstream" "nginx_ipv6_upstream.conf" "{PORT}"
# DATA_DIR = ${TEST_ROOT}/data-ipv6-upstream  (settings.IPV6_UPSTREAM_DATA_ROOT)
# LOG_DIR  = ${TEST_ROOT}/dedicated/ipv6-upstream/logs

worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid       {LOG_DIR}/nginx.pid;

events { worker_connections 256; }

http {
    client_max_body_size 64m;
    client_body_temp_path {TMP_DIR};
    proxy_temp_path       {TMP_DIR};
    fastcgi_temp_path     {TMP_DIR};
    uwsgi_temp_path       {TMP_DIR};
    scgi_temp_path        {TMP_DIR};
    default_type application/octet-stream;

    # The load-bearing line: capture the inbound Host header verbatim so the
    # tests can read back exactly what the proxy sent us.
    log_format host_only '$request_method $request_uri host=$http_host';
    access_log {LOG_DIR}/host_access.log host_only;

    server {
        listen {BIND6_HOST}:{PORT};
        server_name localhost;

        location / {
            brix_webdav             on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_auth        none;
            brix_allow_write on;
        }
    }
}
