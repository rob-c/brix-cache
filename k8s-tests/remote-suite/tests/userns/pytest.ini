# Standalone pytest root for the user-namespace impersonation tests.
#
# These tests are deliberately independent of the main suite: they need
# unprivileged user namespaces + newuidmap + /etc/subuid, but NOT the nginx
# server fleet that tests/conftest.py provisions.  Having a pytest.ini here makes
# `pytest tests/userns/` resolve its rootdir to this directory, so the parent
# tests/conftest.py (and its start-all server bring-up) is NOT loaded.
#
# Run with:  pytest tests/userns/
[pytest]
testpaths = .
addopts = -ra
