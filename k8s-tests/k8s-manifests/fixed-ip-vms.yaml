apiVersion: v1
kind: Namespace
metadata:
  name: xrootd-fixed-ip
---
# Test Data ConfigMap (shared by all pods)
apiVersion: v1
kind: ConfigMap
metadata:
  name: test-data-script
  namespace: xrootd-fixed-ip
data:
  populate-data.sh: |
    #!/bin/sh
    mkdir -p /data/xrootd/test
    echo "Creating test data for $(hostname)..."
    dd if=/dev/urandom of=/data/xrootd/test/file_10M.dat bs=1M count=10
    echo "This is a test file on $(hostname)" > /data/xrootd/test/hello.txt
    ls -lh /data/xrootd/test
---
# 1. nginx-xrootd (VM-like Pod)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vm-nginx-xrootd
  namespace: xrootd-fixed-ip
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-xrootd
  template:
    metadata:
      labels:
        app: nginx-xrootd
    spec:
      initContainers:
        - name: data-populator
          image: almalinux:9
          command: ["/bin/sh", "/scripts/populate-data.sh"]
          volumeMounts:
            - name: data
              mountPath: /data/xrootd
            - name: scripts
              mountPath: /scripts
      containers:
        - name: nginx-xrootd
          image: nginx-xrootd-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 1094
            - containerPort: 8443
          volumeMounts:
            - name: data
              mountPath: /data/xrootd
      volumes:
        - name: data
          emptyDir: {}
        - name: scripts
          configMap:
            name: test-data-script
---
apiVersion: v1
kind: Service
metadata:
  name: svc-nginx-xrootd
  namespace: xrootd-fixed-ip
spec:
  clusterIP: 172.16.0.2  # Reserved 172.16.0.1 for kubernetes service
  ipFamilyPolicy: PreferDualStack
  ipFamilies:
    - IPv4
    - IPv6
  clusterIPs:
    - 172.16.0.2
    - fd00:172:16::2
  selector:
    app: nginx-xrootd
  ports:
    - name: xrootd
      port: 1094
    - name: webdav
      port: 8443
---
# 2. Official XRootD (VM-like Pod)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vm-official-xrootd
  namespace: xrootd-fixed-ip
spec:
  replicas: 1
  selector:
    matchLabels:
      app: official-xrootd
  template:
    metadata:
      labels:
        app: official-xrootd
    spec:
      initContainers:
        - name: data-populator
          image: almalinux:9
          command: ["/bin/sh", "/scripts/populate-data.sh"]
          volumeMounts:
            - name: data
              mountPath: /data/xrootd
            - name: scripts
              mountPath: /scripts
      containers:
        - name: official-xrootd
          image: xrootd-reference:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 1094
          volumeMounts:
            - name: data
              mountPath: /data/xrootd
      volumes:
        - name: data
          emptyDir: {}
        - name: scripts
          configMap:
            name: test-data-script
---
apiVersion: v1
kind: Service
metadata:
  name: svc-official-xrootd
  namespace: xrootd-fixed-ip
spec:
  clusterIP: 172.16.0.50
  ipFamilyPolicy: PreferDualStack
  ipFamilies:
    - IPv4
    - IPv6
  clusterIPs:
    - 172.16.0.50
    - fd00:172:16::50
  selector:
    app: official-xrootd
  ports:
    - name: xrootd
      port: 1094
---
# 3. Test Runner (VM-like Pod)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vm-test-runner
  namespace: xrootd-fixed-ip
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-runner
  template:
    metadata:
      labels:
        app: test-runner
    spec:
      containers:
        - name: test-runner
          image: nginx-xrootd-test-runner:latest
          imagePullPolicy: IfNotPresent
          command: ["sleep", "infinity"]
---
apiVersion: v1
kind: Service
metadata:
  name: svc-test-runner
  namespace: xrootd-fixed-ip
spec:
  clusterIP: 172.16.0.100
  ipFamilyPolicy: PreferDualStack
  ipFamilies:
    - IPv4
    - IPv6
  clusterIPs:
    - 172.16.0.100
    - fd00:172:16::100
  selector:
    app: test-runner
  ports:
    - name: dummy
      port: 80
