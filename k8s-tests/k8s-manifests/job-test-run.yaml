apiVersion: batch/v1
kind: Job
metadata:
  name: k8s-tests-run
  namespace: k8s-tests-dev
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-test-runner
    spec:
      containers:
        - name: test-runner
          image: nginx-xrootd-test-runner:latest
          command: ["python", "-m", "pytest", "-v", "--tb=short"]
          env:
            - name: TEST_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: AUTH_MODE
              value: "none"
      restartPolicy: Never
