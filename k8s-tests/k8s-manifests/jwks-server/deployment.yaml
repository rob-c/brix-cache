apiVersion: apps/v1
kind: Deployment
metadata:
  name: jwks-server
  namespace: xrootd-integration
  labels:
    app.kubernetes.io/name: jwks-server
    app.kubernetes.io/component: token-infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: jwks-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jwks-server
        app.kubernetes.io/component: token-infrastructure
    spec:
      containers:
        - name: nginx
          # Plain nginx serving a static JWKS JSON file — no external image needed.
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: jwks-data
              mountPath: /usr/share/nginx/html/jwks.json
              subPath: jwks.json
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
              readOnly: true
          readinessProbe:
            httpGet:
              path: /jwks.json
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"

      volumes:
        - name: jwks-data
          configMap:
            name: jwks-data
        - name: nginx-conf
          configMap:
            name: jwks-nginx-conf
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: jwks-nginx-conf
  namespace: xrootd-integration
data:
  nginx.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        location /jwks.json {
            add_header Content-Type application/json;
            add_header Cache-Control "no-store";
        }
        location / { return 404; }
    }
