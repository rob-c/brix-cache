# integration-job.yaml — one-shot Kubernetes Job that runs the full
# integration test suite against the xrootd-reference server.
#
# Deploy after launching the environment:
#   scripts/launch-xrootd-env.sh
#   kubectl apply -f k8s-manifests/integration-job.yaml
#
# Monitor:
#   kubectl wait job/xrootd-integration-tests -n xrootd-integration \
#       --for=condition=complete --timeout=600s
#   kubectl logs -l job-name=xrootd-integration-tests -n xrootd-integration
#
# The Job exits 0 on all tests passing, non-zero on any failure.
# JUnit XML is written to /tmp/xrd-test-results/ inside the container; copy
# it out with:
#   kubectl cp xrootd-integration/<pod-name>:/tmp/xrd-test-results/integration-tests.xml ./results.xml
---
apiVersion: batch/v1
kind: Job
metadata:
  name: xrootd-integration-tests
  namespace: xrootd-integration
  labels:
    app.kubernetes.io/name: xrootd-integration-tests
    app.kubernetes.io/component: test-runner
spec:
  # Never retry automatically — a failure is meaningful.
  backoffLimit: 0

  # Clean up the completed/failed pod after 1 hour so logs remain inspectable
  # but do not accumulate indefinitely.
  ttlSecondsAfterFinished: 3600

  template:
    metadata:
      labels:
        app.kubernetes.io/name: xrootd-integration-tests
        app.kubernetes.io/component: test-runner
        job-name: xrootd-integration-tests
    spec:
      restartPolicy: Never

      # ── Wait for xrootd-reference to accept TCP connections ─────────────────
      initContainers:
        - name: wait-for-server
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for xrootd-reference:1094…"
              until nc -zv xrootd-reference 1094; do
                echo "  not ready, retrying in 3s…"
                sleep 3
              done
              echo "xrootd-reference is ready."

        # When auth mode requires a token, also wait for the JWKS server.
        - name: wait-for-jwks
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              AUTH="${AUTH_MODE:-anonymous}"
              if [ "$AUTH" = "token" ] || [ "$AUTH" = "both" ]; then
                echo "Waiting for jwks-server:8080…"
                until nc -zv jwks-server 8080; do
                  echo "  not ready, retrying in 3s…"
                  sleep 3
                done
                echo "jwks-server is ready."
              else
                echo "Skipping JWKS wait (AUTH_MODE=${AUTH})."
              fi
          env:
            - name: AUTH_MODE
              valueFrom:
                configMapKeyRef:
                  name: xrootd-reference-config
                  key: auth_mode

      containers:
        - name: integration-tests
          image: xrootd-client:latest
          imagePullPolicy: IfNotPresent

          command: ["xrd-integration-tests"]

          env:
            - name: XROOTD_SERVER
              value: "xrootd-reference:1094"
            - name: AUTH_MODE
              valueFrom:
                configMapKeyRef:
                  name: xrootd-reference-config
                  key: auth_mode
            - name: CA_DIR
              value: /etc/grid-security/certificates
            - name: CLIENT_CERT
              value: /etc/grid-security/usercert.pem
            - name: CLIENT_KEY
              value: /etc/grid-security/userkey.pem
            - name: PROXY_FILE
              value: /tmp/x509up_u0
            - name: TOKEN_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: xrootd-reference-config
                  key: token_issuer
            - name: TOKEN_AUDIENCE
              valueFrom:
                configMapKeyRef:
                  name: xrootd-reference-config
                  key: token_audience
            - name: RESULTS_DIR
              value: /tmp/xrd-test-results
            - name: SKIP_LARGE
              value: "0"
            - name: VERBOSE
              value: "0"
            - name: TEST_TIMEOUT
              value: "120"

          volumeMounts:
            - name: pki-client
              mountPath: /etc/grid-security
              readOnly: true
            - name: pki-ca
              mountPath: /etc/grid-security/certificates
              readOnly: true
            - name: jwt-signing-key
              mountPath: /etc/xrootd-client
              readOnly: true
            - name: scratch
              mountPath: /tmp

          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"

      volumes:
        - name: pki-client
          secret:
            secretName: xrootd-client-pki
            defaultMode: 0400
        - name: pki-ca
          secret:
            secretName: xrootd-ca-bundle
            defaultMode: 0444
        - name: jwt-signing-key
          secret:
            secretName: xrootd-jwt-signing-key
            optional: true
            defaultMode: 0400
        - name: scratch
          emptyDir: {}
