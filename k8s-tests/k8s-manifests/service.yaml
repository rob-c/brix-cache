apiVersion: v1
kind: Service
metadata:
  name: xrootd-server-xrootd
  namespace: k8s-tests-dev
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: nginx-xrootd-server
  ports:
    - name: xrootd
      port: 1094
      targetPort: 1094
      nodePort: 31094
---
apiVersion: v1
kind: Service
metadata:
  name: xrootd-server-webdav-https
  namespace: k8s-tests-dev
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: nginx-xrootd-server
  ports:
    - name: webdav-https
      port: 8443
      targetPort: 8443
      nodePort: 38443
---
apiVersion: v1
kind: Service
metadata:
  name: xrootd-server-metrics
  namespace: k8s-tests-dev
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nginx-xrootd-server
  ports:
    - name: metrics
      port: 9100
      targetPort: 9100
