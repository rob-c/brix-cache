# nginx+xrootd traffic-mirror front — registry-lifecycle template for
# test_conformance_topologies.py. Serves the shared DATA_ROOT to the client and
# shadow-replays the read-path opcode set to the official xrootd (MIRROR_URL),
# logging any divergence.
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
# Test-provided: MIRROR_URL (host:port of the official xrootd daemon).
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 256; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
        brix_allow_write on;
        brix_stream_mirror_url {MIRROR_URL};
        brix_mirror_opcodes open read readv stat statx dirlist query;
        brix_mirror_log_diverge on;
    }
}
