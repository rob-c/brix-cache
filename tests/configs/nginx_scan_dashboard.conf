# Self-contained dashboard scan template for test_scan.py.
# Placeholders: {BASE_DIR} {BIND_HOST} {PORT} {OFF_PORT} {PASSWORD} {DATA_DIR}
worker_processes 1;
pid {BASE_DIR}/nginx.pid;
error_log {BASE_DIR}/error.log info;

events { worker_connections 64; }

http {
    access_log off;
    client_body_temp_path {BASE_DIR}/tmp;
    proxy_temp_path       {BASE_DIR}/tmp;
    fastcgi_temp_path     {BASE_DIR}/tmp;
    uwsgi_temp_path       {BASE_DIR}/tmp;
    scgi_temp_path        {BASE_DIR}/tmp;

    server {
        listen {BIND_HOST}:{PORT};
        location /brix {
            brix_dashboard on;
            brix_admin_rate_limit off;  # whole suite shares one client IP: default per-IP cap trips under xdist
            brix_dashboard_password "{PASSWORD}";
            brix_scan_root {DATA_DIR};
        }
    }

    server {
        listen {BIND_HOST}:{OFF_PORT};
        location /brix {
            brix_dashboard on;
            brix_admin_rate_limit off;  # whole suite shares one client IP: default per-IP cap trips under xdist
            brix_dashboard_password "{PASSWORD}";
        }
    }
}
