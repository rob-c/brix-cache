# Cleartext FTP gateway with a pinned passive-data-port range, for
# test_gridftp_pasv_range.py.  Same as nginx_gridftp_plain.conf but adds
# brix_gridftp_pasv_port_range so PASV/EPSV data listeners land only inside a
# firewall-openable window (the deployment knob for locked-down networks).
# {PASV_LO}/{PASV_HI} are injected by the test through template_values.
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 64; }
stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_gridftp on;
        brix_gridftp_export           {DATA_ROOT};
        brix_gridftp_allow_write      on;
        brix_gridftp_pasv_port_range  {PASV_LO} {PASV_HI};
    }
}
