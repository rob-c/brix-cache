# Self-contained multi-protocol diagnostics — registry-lifecycle template for
# test_xrddiag_multiproto.py. One nginx serving the same data over root (stream),
# WebDAV (http + https) and S3 (http) on separate ports.
# Launcher-provided: LOG_DIR PORT DATA_ROOT TMP_DIR.
# Test-provided (extra_ports): HTTP_PORT HTTPS_PORT S3_PORT.
# Test-provided: CERT KEY.
worker_processes 1;
daemon on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;

events { worker_connections 256; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
    }
}

http {
    access_log off;
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path       {TMP_DIR}/pt;
    fastcgi_temp_path     {TMP_DIR}/ft;
    uwsgi_temp_path       {TMP_DIR}/ut;
    scgi_temp_path        {TMP_DIR}/sct;

    server {
        listen 127.0.0.1:{HTTP_PORT};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_ROOT};
            brix_webdav_auth none;
        }
    }

    server {
        listen 127.0.0.1:{HTTPS_PORT} ssl;
        ssl_certificate {CERT};
        ssl_certificate_key {KEY};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_ROOT};
            brix_webdav_auth none;
        }
    }

    server {
        listen 127.0.0.1:{S3_PORT};
        location / {
            brix_s3 on;
            brix_storage_backend posix:{DATA_ROOT};
        }
    }
}
