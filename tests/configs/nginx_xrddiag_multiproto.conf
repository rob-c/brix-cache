# Self-contained multi-protocol diagnostics template for test_xrddiag_multiproto.py.
# Placeholders: {BASE_DIR} {BIND_HOST} {ROOT_PORT} {HTTP_PORT} {HTTPS_PORT}
#               {S3_PORT} {DATA_DIR} {CERT} {KEY}
worker_processes 1;
pid {BASE_DIR}/nginx.pid;
error_log {BASE_DIR}/error.log info;

events { worker_connections 256; }

stream {
    server {
        listen {BIND_HOST}:{ROOT_PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
    }
}

http {
    access_log off;
    client_body_temp_path {BASE_DIR}/cbt;
    proxy_temp_path       {BASE_DIR}/pt;
    fastcgi_temp_path     {BASE_DIR}/ft;
    uwsgi_temp_path       {BASE_DIR}/ut;
    scgi_temp_path        {BASE_DIR}/sct;

    server {
        listen {BIND_HOST}:{HTTP_PORT};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_auth none;
        }
    }

    server {
        listen {BIND_HOST}:{HTTPS_PORT} ssl;
        ssl_certificate {CERT};
        ssl_certificate_key {KEY};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_auth none;
        }
    }

    server {
        listen {BIND_HOST}:{S3_PORT};
        location / {
            brix_s3 on;
            brix_storage_backend posix:{DATA_DIR};
        }
    }
}
