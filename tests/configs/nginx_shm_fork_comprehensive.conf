worker_processes {WORKERS};
daemon on;
master_process on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
events { worker_connections 256; }

stream {
    access_log off;

    # gated zones declared at stream-main scope
    brix_kv_zone tcache 1m key=64 val=512;
    brix_rate_limit_zone zone=rlz:10m;

    # plain local origin: registers the unconditional stream zones
    # (legacy brix_frm* directives were removed 2026-06-30; tape staging is
    # now the tier/nearline backend, so no frm_index zone exists to register)
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
        brix_allow_write on;
        brix_session_slots 64;
        brix_registry_slots 64;
        brix_tpc_allow_local on;
        brix_tpc_key_ttl 60s;
        brix_prepare_command /bin/true;
        brix_rate_limit_rule zone=rlz key=ip rate=10000r/s burst=20000;
    }

    # manager/redirector role: registers the redir-collapse cache zone
    server {
        listen {BIND_HOST}:{MGR_PORT};
        brix_root on;
        brix_auth none;
        brix_manager_mode on;
        brix_collapse_redir on;
        brix_collapse_redir_ttl 5s;
        brix_redir_cache_slots 64;
    }
}

http {
    access_log off;
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path {TMP_DIR}/pt;
    fastcgi_temp_path {TMP_DIR}/ft;
    uwsgi_temp_path {TMP_DIR}/ut;
    scgi_temp_path {TMP_DIR}/st;

    server {
        listen {BIND_HOST}:{HTTP_PORT};

        location = /metrics { brix_metrics on; }

        location /dav/ {
            brix_webdav on;
            brix_storage_backend posix:{DATA_ROOT};
            brix_webdav_auth none;
            brix_allow_write on;
        }

        # NOTE: the dynamic WebDAV reverse-proxy (brix_webdav_proxy* and its
        # proxy_pool zone) was retired in the legacy-proxy cleanup and can no
        # longer be registered from config.
    }

    # S3 face on its own listener: one brix protocol per port is enforced.
    server {
        listen {BIND_HOST}:{S3_PORT};

        location /s3/ {
            brix_s3 on;
            brix_storage_backend posix:{DATA_ROOT};
            brix_s3_region us-east-1;
            brix_s3_access_key testkey;
            brix_s3_secret_key testsecret;
        }
    }
}
