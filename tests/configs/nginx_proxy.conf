# Dedicated nginx configuration for XRootD transparent proxy mode tests.
#
# Topology: nginx proxy (brix_tap_proxy on) → xrootd reference daemon backend.
# Anonymous auth, lazy upstream connect triggered by first post-login opcode.

worker_processes 1;
error_log {LOG_DIR}/error.log debug;
pid       {LOG_DIR}/nginx.pid;

events { worker_connections 256; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_auth none;
        brix_tap_proxy on;
        brix_tap_proxy_upstream {BIND_HOST}:{UPSTREAM_PORT};
        brix_tap_proxy_auth anonymous;
    }
}
