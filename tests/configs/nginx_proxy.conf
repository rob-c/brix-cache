# Dedicated nginx configuration for XRootD transparent proxy mode tests.
#
# Topology: nginx proxy (xrootd_proxy on) → xrootd reference daemon backend.
# Anonymous auth, lazy upstream connect triggered by first post-login opcode.

worker_processes 1;
error_log {LOG_DIR}/error.log debug;
pid       {LOG_DIR}/nginx.pid;

events { worker_connections 256; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        xrootd on;
        xrootd_auth none;
        xrootd_proxy on;
        xrootd_proxy_upstream {BIND_HOST}:{UPSTREAM_PORT};
    }
}
