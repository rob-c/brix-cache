# Startup checkpoint-recovery test server (registry lifecycle) for
# test_chkpoint_recover_export.py.  A throwaway anonymous root:// export whose
# WRITABILITY the test controls by chmod'ing {DATA_DIR} before start.
# Launcher-provided: LOG_DIR PORT.
# Test-provided via template_values: BIND_HOST DATA_DIR (must exist at parse time).
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 64; }
stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        brix_access_log {LOG_DIR}/access.log;
    }
}
