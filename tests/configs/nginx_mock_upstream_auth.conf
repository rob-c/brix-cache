# Mock-auth upstream nginx: xrootd_upstream + token injection.
#
# Used by test_a_upstream_redirect.py::TestUpstreamAuth.  Identical in
# structure to nginx_upstream_auth.conf but reads {TOKEN_DIR}/mock_auth.jwt
# instead of {TOKEN_FILE} (upstream.jwt) so the two server instances do not
# share a token file and tests can write mock tokens without racing the
# pre-started upstream-auth nginx at UPSTREAM_AUTH_NGINX_PORT.

worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid       {LOG_DIR}/nginx.pid;

events { worker_connections 128; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        xrootd on;
        xrootd_root {DATA_DIR};
        xrootd_upstream 127.0.0.1:{UPSTREAM_PORT};
        xrootd_upstream_token_file {TOKEN_DIR}/mock_auth.jwt;
    }
}
