# WLCG HTTP Tape REST API template for test_tape_rest.py (registry lifecycle
# harness).  Launcher-provided: LOG_DIR TMP_DIR PORT.  Test-provided:
# BIND_HOST EXPORT_DIR ONLINE_DIR CACHE_DIR STREAM_PORT QUEUE_PATH CONTROL_DIR.
# Env-provided: BRIX_FRM_STAGECMD.
#
# The Tape REST /stage endpoints enqueue into the process-wide durable
# stage-request registry, which is initialised ONLY by a stream server carrying
# brix_frm on + brix_frm_control_dir (the registry is a process singleton; the
# webdav handler reads brix_stage_registry_singleton()).  The stream server below
# exists solely to stand that singleton up — without it POST /stage answers 503
# "tape staging is not configured".
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
env BRIX_FRM_STAGECMD;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{STREAM_PORT};
        brix_root on;
        brix_storage_backend posix:{EXPORT_DIR};
        brix_auth none;
        brix_frm on;
        brix_frm_queue_path {QUEUE_PATH};
        brix_frm_control_dir {CONTROL_DIR};
    }
}

http {
    access_log off;
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path       {TMP_DIR}/pt;
    fastcgi_temp_path     {TMP_DIR}/ft;
    uwsgi_temp_path       {TMP_DIR}/ut;
    scgi_temp_path        {TMP_DIR}/st;

    server {
        listen {BIND_HOST}:{PORT};
        location / {
            brix_webdav on;
            brix_export {EXPORT_DIR};
            brix_storage_backend tape://exec{ONLINE_DIR};
            brix_cache_store posix:{CACHE_DIR};
            brix_webdav_auth none;
            brix_allow_write on;
            brix_webdav_tape_rest on;
        }
    }
}
