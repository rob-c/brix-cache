# Phase-28 red-team admin-secret config template for test_security_redteam.py.
# nginx -t only: proves brix_admin_secret hygiene (min length) and the
# brix_admin_proxy_allow directive parse.  SECRET is the admin-secret file path
# and EXTRA an optional extra directive line; both value names are kept
# brace-free in this comment so the substitution never expands them here.
# Rendered through the phase-81 registry (LifecycleHarness): the primary port,
# log dir and temp dir come from the launcher.
daemon on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/e.log info;
events { worker_connections 64; }
http {
  client_body_temp_path {TMP_DIR};
  proxy_temp_path {TMP_DIR};
  fastcgi_temp_path {TMP_DIR};
  uwsgi_temp_path {TMP_DIR};
  scgi_temp_path {TMP_DIR};
  server { listen 127.0.0.1:{PORT};
    location /brix/api/v1/admin/ {
      brix_dashboard on;
      brix_admin_secret {SECRET};
      {EXTRA}
    } } }
