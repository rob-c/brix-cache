# Self-provisioned xrootd conformance stream template for test_xrootd_conformance.py.
daemon off;
worker_processes 1;
pid {BASE_DIR}/n.pid;
error_log {BASE_DIR}/e.log info;

thread_pool default threads=2 max_queue=4096;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
    }
}
