# Self-provisioned xrootd conformance stream — registry-lifecycle template for
# test_xrootd_conformance.py. A minimal anon root:// data server over a private
# DATA_ROOT, exercised by a raw-wire client against the XRootD C++ reference.
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;

thread_pool default threads=2 max_queue=4096;

events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
        brix_allow_write on;
    }
}
