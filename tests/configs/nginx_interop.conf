# Dedicated fleet instance for the differential-conformance suite
# (test_conf_*.py via official_interop_lib). This is the "our server" half of the
# differential pair: our nginx-xrootd data server, anonymous + writable, exporting
# one POSIX tree over root://. The "off server" half is a STOCK xrootd started by
# the fleet on {DATA_DIR%our}-off (see start_extra_ref_anon "interop-off" in
# dedicated.sh). Both are seeded with a byte-identical deterministic tree by
# official_interop_lib.start_pair, which ATTACHES to these fixed ports instead of
# self-provisioning a server pair per module (the old design spun up ~2 servers
# per conf module per xdist worker -> port/fd exhaustion -> flaky comparison
# failures).
#
# IDENTITY NOTE: the fleet runs nginx workers as root (brix-test-nginx injects
# `user root;`) whereas the stock xrootd runs as `nobody` (-R, xrootd refuses
# superuser). brix derives the kXR stat readable/writable flags from
# geteuid()==st_uid owner-matching, so seeded (test-owned) files would report
# DIFFERENT flags on the two servers. official_interop_lib.start_pair compensates
# by harmonizing seeded-file permissions (owner triad mirrored into group+other),
# so root's owner-match and nobody's other-match agree.
#
# Placeholders substituted by tests/lib/pki.sh:substitute_config:
#   {PORT}      root:// stream port
#   {DATA_DIR}  export root (${TEST_ROOT}/data-interop-our)
#   {LOG_DIR}   per-instance log dir
worker_processes 1;
error_log {LOG_DIR}/error.log info;

thread_pool default threads=2 max_queue=256;
events { worker_connections 512; }   # -n8 conf tests open many concurrent conns

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        brix_access_log {LOG_DIR}/brix_access.log;
    }
}
