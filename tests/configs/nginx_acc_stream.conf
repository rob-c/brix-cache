# XrdAcc stream authdb template for test_acc.py.
# Placeholders: {BASE_DIR} {BIND_HOST} {PORT}
worker_processes 1;
error_log {BASE_DIR}/logs/error.log info;
pid {BASE_DIR}/nginx.pid;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{BASE_DIR}/data;
        brix_auth none;
        brix_allow_write on;
        brix_authdb_format xrdacc;
        brix_authdb {BASE_DIR}/authdb;
        brix_authdb_audit all;
        brix_access_log {BASE_DIR}/logs/access.log;
    }
}
