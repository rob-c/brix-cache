# WLCG x509 differential-conformance server — registry-lifecycle template for
# wlcg_conformance_fleet.ConformanceFleet. One long-lived davs (WebDAV-over-TLS)
# server per config-group in the matrix manifest; every group points at the same
# multi-hundred-CA trust store, and the credential's `group` selects which config
# (signing_policy / crl_mode / cadir-vs-cafile) evaluates it.
# Launcher-provided: LOG_DIR PORT DATA_ROOT TMP_DIR.
# Test-provided: CERT KEY SIGNING_POLICY CRL_MODE, plus the whole-line injections
#   CA_LINE  (brix_webdav_cadir <dir>;  OR  brix_webdav_cafile <bundle>;)
#   CRL_LINE (brix_webdav_crl <dir>;    OR  empty)
worker_processes 1;
daemon on;
master_process on;
error_log {LOG_DIR}/error.log crit;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 128; }
http {
    access_log off;
    client_body_temp_path {TMP_DIR}/client;
    proxy_temp_path {TMP_DIR}/proxy;
    fastcgi_temp_path {TMP_DIR}/fastcgi;
    uwsgi_temp_path {TMP_DIR}/uwsgi;
    scgi_temp_path {TMP_DIR}/scgi;
    server {
        listen {PORT} ssl;
        server_name localhost;
        ssl_certificate     {CERT};
        ssl_certificate_key {KEY};
        ssl_verify_client   optional_no_ca;
        ssl_verify_depth    12;
        brix_webdav_proxy_certs on;
        location / {
            brix_webdav          on;
            brix_storage_backend posix:{DATA_ROOT};
{CA_LINE}            brix_webdav_signing_policy {SIGNING_POLICY};
            brix_webdav_crl_mode {CRL_MODE};
{CRL_LINE}            brix_webdav_auth     required;
        }
    }
}
