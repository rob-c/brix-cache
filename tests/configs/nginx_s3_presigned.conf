worker_processes 1;
error_log {LOG_DIR}/error.log debug;

events { worker_connections 128; }

http {
    server {
        listen {PORT};
        access_log {LOG_DIR}/s3_access.log;

        location / {
            xrootd_s3             on;
            xrootd_s3_root        {DATA_DIR};
            xrootd_s3_bucket      testbucket;
            xrootd_s3_access_key  test-access-key;
            xrootd_s3_secret_key  test-secret-key;
            xrootd_s3_region      us-east-1;
            xrootd_s3_allow_write on;
        }
    }
}
