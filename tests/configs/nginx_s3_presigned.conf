worker_processes 1;
error_log {LOG_DIR}/error.log debug;

events { worker_connections 128; }

http {
    server {
        listen {PORT};
        access_log {LOG_DIR}/s3_access.log;

        location / {
            xrootd_s3             on;
            xrootd_s3_storage_backend posix:{DATA_DIR};
            xrootd_s3_bucket      testbucket;
            xrootd_s3_access_key  test-access-key;
            xrootd_s3_secret_key  test-secret-key;
            xrootd_s3_region      us-east-1;
            xrootd_s3_allow_write on;
            # phase-47 W6a: verify the per-chunk SigV4 signature on aws-chunked
            # streaming uploads (presigned GET/PUT tests send no streaming body,
            # so this only exercises the chunk-signature test below).
            xrootd_s3_verify_chunk_signatures on;
        }
    }
}
