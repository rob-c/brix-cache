# nginx_impersonate_gridmap_root.conf — host-root UNIX-impersonation (phase 40)
# root://-over-GSI (X.509) variant for test_impersonation_gridmap_root.py.
#
# The nginx MASTER runs as root so `brix_impersonation map` can spawn the
# privileged identity broker; the broker setfsuid()s per request to the real
# local account the authenticated GSI **DN** maps to via {GRIDMAP} (DN first,
# token sub second).  Workers run unprivileged (`user nobody`).  Only meaningful
# under a root test harness — see the module's skipif.
#
# Launcher-provided : PORT LOG_DIR
# Test-provided     : EXPORT (backend + broker confinement root), SOCK, GRIDMAP,
#                     CERT KEY CA (host cert / key / trusted-CA for the GSI
#                     handshake).
user nobody;
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 64; }

stream {
    brix_impersonation        map;
    brix_impersonation_socket {SOCK};
    brix_impersonation_export {EXPORT};
    brix_gridmap              {GRIDMAP};
    brix_idmap_min_uid        1000;

    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{EXPORT};
        brix_auth gsi;
        brix_allow_write on;
        brix_certificate     {CERT};
        brix_certificate_key {KEY};
        brix_trusted_ca      {CA};
    }
}
