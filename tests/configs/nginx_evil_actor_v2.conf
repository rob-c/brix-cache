# Self-contained config template for test_evil_actor_v2.py.
# Placeholders: {PREFIX} {DATA_DIR} {BIND_HOST} {ROOT_PORT} {METRICS_PORT}
#               {S3_PORT} {WEBDAV_PORT}
worker_processes 3;
daemon on;
master_process on;
pid {PREFIX}/logs/nginx.pid;
error_log {PREFIX}/logs/error.log info;
thread_pool aiopool threads=4 max_queue=8192;

events { worker_connections 1024; }

stream {
    server {
        listen {BIND_HOST}:{ROOT_PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        brix_thread_pool aiopool;
        brix_memory_budget 6m;
    }
}

http {
    access_log off;
    client_body_temp_path {PREFIX}/logs/cbt;
    proxy_temp_path       {PREFIX}/logs/pt;
    fastcgi_temp_path     {PREFIX}/logs/ft;
    uwsgi_temp_path       {PREFIX}/logs/ut;
    scgi_temp_path        {PREFIX}/logs/st;

    server {
        listen {BIND_HOST}:{METRICS_PORT};
        location = /metrics { brix_metrics on; }
    }

    server {
        listen {BIND_HOST}:{S3_PORT};
        location /s3b/ {
            brix_s3 on;
            brix_storage_backend posix:{DATA_DIR};
            brix_s3_bucket s3b;
            brix_s3_region us-east-1;
        }
    }

    server {
        listen {BIND_HOST}:{WEBDAV_PORT};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_auth none;
            brix_allow_write on;
        }
    }
}
