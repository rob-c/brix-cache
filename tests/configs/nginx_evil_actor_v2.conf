# Self-contained config template for test_evil_actor_v2.py.
# Rendered through the registry (LifecycleHarness); {PORT}/{DATA_ROOT}/{LOG_DIR}/
# {TMP_DIR} come from the launcher, {BIND_HOST} via the spec's template_values and
# {METRICS_PORT}/{S3_PORT}/{WEBDAV_PORT} via its extra_ports.
worker_processes 3;
daemon on;
master_process on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
thread_pool aiopool threads=4 max_queue=8192;

events { worker_connections 1024; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
        brix_allow_write on;
        brix_thread_pool aiopool;
        brix_memory_budget 6m;
    }
}

http {
    access_log off;
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path       {TMP_DIR}/pt;
    fastcgi_temp_path     {TMP_DIR}/ft;
    uwsgi_temp_path       {TMP_DIR}/ut;
    scgi_temp_path        {TMP_DIR}/st;

    server {
        listen {BIND_HOST}:{METRICS_PORT};
        location = /metrics { brix_metrics on; }
    }

    server {
        listen {BIND_HOST}:{S3_PORT};
        location /s3b/ {
            brix_s3 on;
            brix_storage_backend posix:{DATA_ROOT};
            brix_s3_bucket s3b;
            brix_s3_region us-east-1;
        }
    }

    server {
        listen {BIND_HOST}:{WEBDAV_PORT};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_ROOT};
            brix_webdav_auth none;
            brix_allow_write on;
        }
    }
}
