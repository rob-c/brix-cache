# Self-contained SRR endpoint template for test_srr_endpoint.py (registry
# lifecycle).  Launcher-provided: LOG_DIR PORT DATA_ROOT TMP_DIR.  Test-provided:
# BIND_HOST HOST.
error_log {LOG_DIR}/error.log error;
pid {LOG_DIR}/nginx.pid;
daemon on;
events { worker_connections 64; }

http {
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path       {TMP_DIR}/pt;
    fastcgi_temp_path     {TMP_DIR}/ft;
    uwsgi_temp_path       {TMP_DIR}/ut;
    scgi_temp_path        {TMP_DIR}/st;
    access_log off;

    server {
        listen {BIND_HOST}:{PORT};
        location = /.well-known/wlcg-storage-resource-reporting {
            brix_srr on;
            brix_srr_name "TEST-SE";
            brix_srr_quality production;
            brix_srr_version "3.5";
            brix_srr_share atlasdata {DATA_ROOT} atlas,cms;
            brix_srr_endpoint webdav davs https://{HOST}:8443/;
            brix_srr_endpoint root xroot root://{HOST}:1094/;
        }
        location = /not-srr {
            return 204;
        }
    }
}
