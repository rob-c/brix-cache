# Self-contained SRR endpoint template for test_srr_endpoint.py.
# Placeholders: {BASE_DIR} {BIND_HOST} {PORT} {DATA_DIR} {HOST}
error_log {BASE_DIR}/logs/error.log error;
pid {BASE_DIR}/logs/nginx.pid;

events { worker_connections 64; }

http {
    client_body_temp_path {BASE_DIR}/t;
    proxy_temp_path       {BASE_DIR}/t;
    fastcgi_temp_path     {BASE_DIR}/t;
    uwsgi_temp_path       {BASE_DIR}/t;
    scgi_temp_path        {BASE_DIR}/t;
    access_log off;

    server {
        listen {BIND_HOST}:{PORT};
        location = /.well-known/wlcg-storage-resource-reporting {
            brix_srr on;
            brix_srr_name "TEST-SE";
            brix_srr_quality production;
            brix_srr_version "3.5";
            brix_srr_share atlasdata {DATA_DIR} atlas,cms;
            brix_srr_endpoint webdav davs https://{HOST}:8443/;
            brix_srr_endpoint root xroot root://{HOST}:1094/;
        }
        location = /not-srr {
            return 204;
        }
    }
}

daemon off;
master_process off;
