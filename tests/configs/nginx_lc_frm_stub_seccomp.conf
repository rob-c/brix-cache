# nginx_lc_frm_stub_seccomp.conf — a tape/nearline (frm://stub) backend under
# strict `brix_seccomp enforce`, for test_seccomp_tape_stub.py.
#
# Proves that the DEFAULT tape/HSM adapter needs NO exec: the built-in POSIX
# "stub" MSS adapter (sd_frm_stub.c) does recall/migrate/purge as plain file
# copies (open/read/write/rename/unlink — all allowlisted), so a tape:// backend
# serves under `brix_seccomp enforce` with execve/execveat KILLED and WITHOUT
# brix_seccomp_allow_exec.  Only the external-HSM "exec" adapter (tape://exec +
# $BRIX_FRM_STAGECMD) fork+execs and needs allow_exec.
#
# Launcher-provided : PORT LOG_DIR ; Test-provided : STORAGE_BACKEND (frm://stub<tape>),
# CACHE_DIR (recall target).
user nobody;
daemon on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;

events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend {STORAGE_BACKEND};
        brix_cache_store     posix:{CACHE_DIR};
        brix_cache_export    /;
        # allow_exec off restores the strict anti-shell posture (execve/execveat
        # KILLED) — proving the stub adapter needs no exec at all:
        brix_seccomp         enforce;
        brix_seccomp_allow_exec off;
    }
}
