# Reference xrootd — XrdPss proxy bridge (rendered by refxrootd.sh:start_pss_bridge_ref).
# Forwards to an origin via XrdCl; capped at 4 scheduler threads here, with the
# XrdCl client pool additionally bounded via XRD_PARALLELEVTLOOP/XRD_WORKERTHREADS
# at launch (see start_pss_bridge_ref). Placeholders: {DATA_DIR} {ADMIN_DIR}
# {RUN_DIR} {PORT} {ORIGIN}
# NO `all.role` here — deliberately, matching the working reference daemons and
# xrootd_xrdhttp.conf (§6g.2). With no `all.manager`/cmsd in the fleet, `all.role
# server` puts xrootd in CLUSTERED mode and cms_Finder blocks forever on the olbd
# admin socket ("Waiting for cms path .../.olb/olbd.admin"); the instance binds
# its port (tcp readiness passes) but never serves — every request hangs. The
# XrdPss proxy role comes from ofs.osslib/pss.origin below, not all.role.
all.export /
oss.localroot {DATA_DIR}
all.adminpath {ADMIN_DIR}
all.pidpath {RUN_DIR}

xrd.port {PORT}
xrd.sched mint 2 maxt 4 avlt 2
xrd.trace off
ofs.osslib libXrdPss.so
pss.origin {ORIGIN}
pss.setopt DebugLevel 0
