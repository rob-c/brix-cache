# nginx_impersonate_gridmap_s3.conf — host-root UNIX-impersonation (phase 40),
# S3 gateway variant for test_impersonation_gridmap_root.py.
#
# The nginx master runs as root so `brix_impersonation map` can spawn the
# privileged identity broker; the broker setfsuid()s per request to the local
# account the authenticated **S3 SigV4 access key** (the identity subject) maps to
# via {GRIDMAP}. One broker per instance governs the http{} S3 server. Workers run
# unprivileged (`user nobody`). Only meaningful under a root test harness.
#
# Launcher-provided : PORT LOG_DIR TMP_DIR
# Test-provided     : EXPORT (backend + broker confinement root), SOCK, GRIDMAP,
#                     ACCESS_KEY (also the gridmap principal), SECRET_KEY, REGION,
#                     BUCKET.
user nobody;
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 128; }

stream {
    brix_impersonation        map;
    brix_impersonation_socket {SOCK};
    brix_impersonation_export {EXPORT};
    brix_gridmap              {GRIDMAP};
    brix_idmap_min_uid        1000;
}

http {
    access_log off;
    client_body_temp_path {TMP_DIR};
    proxy_temp_path        {TMP_DIR};
    fastcgi_temp_path      {TMP_DIR};
    uwsgi_temp_path        {TMP_DIR};
    scgi_temp_path         {TMP_DIR};
    client_max_body_size   64m;

    server {
        listen 127.0.0.1:{PORT};
        location / {
            brix_s3              on;
            brix_storage_backend posix:{EXPORT};
            brix_s3_bucket       {BUCKET};
            brix_s3_access_key   {ACCESS_KEY};
            brix_s3_secret_key   {SECRET_KEY};
            brix_s3_region       {REGION};
            brix_allow_write     on;
        }
    }
}
