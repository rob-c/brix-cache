# Read-cache node for test_cache_partial_fill.py (registry lifecycle).  Sits in
# front of a root:// origin (xroot) or a local posix/pblock backend and fills its
# cache store; the test inspects block residency via xrdcinfo.
# Launcher-provided: LOG_DIR PORT.
# Test-provided via template_values (dirs seeded under tmp_path, must exist at
# config-parse time): BIND_HOST CACHE_BACKEND CACHE_STORE, plus optional
# directive lines that default to "": CACHE_ALLOW_WRITE CACHE_EXPORT
# CACHE_SLICE_SIZE CACHE_MAX_OBJECT CACHE_DENY_PREFIX CACHE_INCLUDE_REGEX.
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
thread_pool default threads=2;
events { worker_connections 64; }
stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_auth none;
{CACHE_ALLOW_WRITE}{CACHE_EXPORT}        brix_storage_backend {CACHE_BACKEND};
        brix_cache_store posix:{CACHE_STORE};
        brix_cache_export /;
{CACHE_SLICE_SIZE}{CACHE_MAX_OBJECT}{CACHE_DENY_PREFIX}{CACHE_INCLUDE_REGEX}    }
}
