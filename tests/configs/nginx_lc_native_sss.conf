# Native SSS stream server template (registry lifecycle) for test_native_sss.py.
# Launcher-provided: LOG_DIR PORT.
# Test-provided: BIND_HOST DATA_DIR KEYTAB (keytab is an absolute path the test
# generates; it must exist at config-parse time).
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
daemon on;

events { worker_connections 256; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth sss;
        brix_sss_keytab {KEYTAB};
        brix_allow_write on;
    }
}
