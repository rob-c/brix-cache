# nginx_gsi_handshake_voms.conf — GSI server that extracts the VOMS attribute
# certificate and enforces `require_vo testvo` under /vodata: a proxy carrying
# the VO reaches the gated path, a plain proxy is refused.  Registry
# LifecycleHarness template.
#
# Launcher-provided : LOG_DIR PORT DATA_ROOT (the VO-gated data tree)
# Test-provided     : VOMSDIR VOMS_CERT_DIR, CERT KEY CA (must exist)
daemon on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;

events { worker_connections 64; }

stream {
    server {
        listen {PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth gsi;
        brix_vomsdir       {VOMSDIR};
        brix_voms_cert_dir {VOMS_CERT_DIR};
        brix_require_vo /vodata testvo;
        brix_certificate     {CERT};
        brix_certificate_key {KEY};
        brix_trusted_ca      {CA};
    }
}
