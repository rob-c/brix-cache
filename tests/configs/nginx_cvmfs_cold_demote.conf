# CVMFS F7 demote-on-evict stream template — registry lifecycle.
#
# For test_cvmfs_cold_tier.py::test_demote_on_evict_stream: a hot
# brix_cache_store + brix_cache_cold_store under tight high/low watermarks so
# the reaper DEMOTES LRU victims into the cold store before removing the hot
# copy.  The launcher injects {PORT} {LOG_DIR}; the test supplies {BIND_HOST}
# and {CACHE_DIR} {COLD_DIR} {HIGH_WM} {LOW_WM} — the cache/cold dirs live in
# the test's tmp_path because it plants the LRU victims and asserts on the cold
# store.  {LOG_DIR}/nginx.pid is the registry's stop pidfile — do not rename.
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
thread_pool default threads=2;
events { worker_connections 64; }
stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_auth none;
        brix_storage_backend root://127.0.0.1:1;
        brix_cache_store posix:{CACHE_DIR};
        brix_cache_cold_store posix:{COLD_DIR};
        brix_cache_export /;
        brix_cache_high_watermark {HIGH_WM}%;
        brix_cache_low_watermark {LOW_WM}%;
        brix_cache_reap_interval 1;
    }
}
