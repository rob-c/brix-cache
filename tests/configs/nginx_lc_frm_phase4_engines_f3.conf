# Registry lifecycle template for test_frm_phase4_engines.py :: f3 fixture
# (Phase 4 / F3 — residency-cmd oracle stage agent, stream-only).
# Launcher supplies: LOG_DIR PORT.  Test supplies: BIND_HOST DATA_DIR
# QUEUE_PATH COPY_CMD ORACLE_CMD.  FRM_* come from the process env.
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
env FRM_DATA_DIR;
env FRM_TAPE_DIR;
env FRM_LATENCY_MS;
env FRM_AUDIT_LOG;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_frm on;
        brix_frm_queue_path {QUEUE_PATH};
        brix_frm_copycmd {COPY_CMD};
        brix_frm_residency_cmd {ORACLE_CMD};
        brix_frm_stage_wait 1;
    }
}
