# Write-back (tape) async-flush / dead-origin server (registry lifecycle) for the
# test_xfer_wt_{journal,replay}.py suites.
#
# Composes the phase-64 write-STAGE tier over a DEAD remote origin so a root://
# write exercises the durable async write-back path:
#   * brix_stage_store (local posix) absorbs the client write immediately;
#   * brix_stage_flush async defers the store->origin flush to the stage engine;
#   * the origin (root://127.0.0.1:1) is unreachable, so every flush fails
#     transiently, leaving a durable kind=FLUSH / state=FAILED .req record.
# This async flush-mode gating is what confines the durable-journal behaviour to a
# write-back (tape) tier — a plain export with no stage tier flushes nothing.
#
# The durable journal is opt-in via $BRIX_STAGE_JOURNAL_DIR (env below); the worker
# reads it at init (src/core/config/process.c) and the restart reconcile replays it.
#
# Launcher-provided: LOG_DIR PORT.
# Test-provided via template_values (dirs seeded under tmp_path, must exist at
# config-parse time): BIND_HOST DATA_DIR STAGE_DIR JOURNAL_DIR.
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
thread_pool wtpool threads=2 max_queue=4096;
env BRIX_STAGE_JOURNAL_DIR={JOURNAL_DIR};

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_export {DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        brix_thread_pool wtpool;
        brix_storage_backend root://127.0.0.1:1;   # dead origin -> flush always fails
        brix_stage on;
        brix_stage_store posix:{STAGE_DIR};
        brix_stage_flush async;                     # write-back (tape) tier: defer + journal
    }
}
