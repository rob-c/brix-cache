# Staged root-upload test server (registry lifecycle) for
# test_shutdown_resume.py.  Uploads stage on {STAGE_DIR} (typically tmpfs, a
# different device) then commit to storage under {DATA_ROOT}.
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
# template_values: BIND_HOST STAGE_DIR.
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 256; }

thread_pool default threads=4 max_queue=65536;

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_export {DATA_ROOT};
        brix_auth none;
        brix_allow_write on;
        brix_stage_dir {STAGE_DIR};
    }
}
