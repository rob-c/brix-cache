# Dashboard config-redaction template for test_dashboard_config_anon.py
# (registry lifecycle).  Launcher-provided: LOG_DIR PORT TMP_DIR DATA_ROOT.
# Test-provided: BIND_HOST ROOT_PORT URL_CRED PASSWORD MACAROON_HEX SET_SECRET
# HEADER_SECRET.  Keep this header free of loose placeholder tokens: the rendered
# config is itself served by the redaction endpoint under test.
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
daemon on;

events { worker_connections 256; }

# planted URL credential (must be cred-stripped): https://creduser:{URL_CRED}@ex.com/p
stream {
    server {
        listen {BIND_HOST}:{ROOT_PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
        brix_allow_write on;
    }
}

http {
    access_log off;
    client_body_temp_path {TMP_DIR};
    proxy_temp_path       {TMP_DIR};
    fastcgi_temp_path     {TMP_DIR};
    uwsgi_temp_path       {TMP_DIR};
    scgi_temp_path        {TMP_DIR};

    server {
        listen {BIND_HOST}:{PORT};
        location /brix/ {
            brix_dashboard on;
            brix_admin_rate_limit off;  # whole suite shares one client IP: default per-IP cap trips under xdist
            brix_dashboard_password "{PASSWORD}";
            brix_dashboard_anonymous on;
        }
        location / {
            root {DATA_ROOT};
            brix_webdav on;
            brix_storage_backend posix:{DATA_ROOT};
            brix_webdav_auth none;
            brix_webdav_macaroon_secret {MACAROON_HEX};
            set $planted_leak "{SET_SECRET}";
            proxy_set_header X-Api-Key "{HEADER_SECRET}";
        }
    }
}
