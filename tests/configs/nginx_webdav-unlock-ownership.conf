worker_processes 1;
error_log {LOG_DIR}/error.log info;

events { worker_connections 64; }

# Dedicated WRITABLE WebDAV HTTP server for tests/test_webdav_unlock_ownership.py
# (LOCK/UNLOCK ownership boundary: the CRYPTO_memcmp lock-token comparison in
# src/webdav/lock.c that stops one client stealing another's lock).
# Pre-started by manage_test_servers.sh start-all so the test never spawns its
# own instance; cleartext http, auth none + xrootd_webdav_allow_write on,
# isolated data root data-webdav-unlock-ownership.  Locks are stored in user
# xattrs, so the data root must support them (the test probes for this).
http {
    access_log off;
    client_body_temp_path {TMP_DIR};
    proxy_temp_path       {TMP_DIR};
    fastcgi_temp_path     {TMP_DIR};
    uwsgi_temp_path       {TMP_DIR};
    scgi_temp_path        {TMP_DIR};

    server {
        listen 127.0.0.1:{PORT};
        server_name localhost;

        location / {
            xrootd_webdav             on;
            xrootd_webdav_storage_backend posix:{DATA_DIR};
            xrootd_webdav_auth        none;
            xrootd_webdav_allow_write on;
        }
    }
}
