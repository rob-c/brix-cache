# Phase-F FRM nearline-recall template for tests/test_frm_scratch.py.  Drives the
# frm:// storage backend (an MSS adapter -- exec or stub) composed with a posix
# cache store: an OFFLINE object is recalled into the online buffer by the adapter
# and served byte-exact through the cache tier.  STORAGE_BACKEND carries the whole
# frm://adapter/base directive value; CACHE_DIR is the required recall target.
# Both placeholder names are kept brace-free in this comment so the naive
# token substitution never expands them here.  Rendered through the phase-81
# registry (LifecycleHarness): the primary port and log dir come from the
# launcher, and the exec adapter's stage command is read from BRIX_FRM_STAGECMD
# in the master environment (set by the spec) via getenv at config time.
daemon on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
events { worker_connections 64; }
stream {
  server {
    listen 127.0.0.1:{PORT};
    brix_root on;
    brix_storage_backend {STORAGE_BACKEND};
    brix_cache_store posix:{CACHE_DIR};
    brix_cache_export /;
  }
}
