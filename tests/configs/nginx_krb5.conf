worker_processes 1;
error_log {LOG_DIR}/error.log info;

thread_pool default threads=2 max_queue=256;
events { worker_connections 64; }

# Kerberos 5 (krb5) auth tier — dedicated instance.
# The server validates the client AP-REQ against {KRB5_KEYTAB} for the principal
# {KRB5_PRINCIPAL} (advertised on the wire as &P=krb5,<principal>).  KRB5_CONFIG
# (the test realm + auth_to_local mapping) is supplied in the process environment
# by manage_test_servers.sh -> start_krb5_tier; the krb5 acceptor never contacts
# the KDC, it only reads the keytab + realm config.
stream {
    server {
        listen {PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth krb5;
        brix_allow_write on;
        brix_krb5_principal {KRB5_PRINCIPAL};
        brix_krb5_keytab    {KRB5_KEYTAB};
        brix_access_log {LOG_DIR}/brix_access_krb5.log;
    }
}
