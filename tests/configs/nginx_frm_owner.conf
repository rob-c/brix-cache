# FRM owner/tape REST template for test_frm_owner.py.
worker_processes 1;
error_log {BASE_DIR}/logs/error.log info;
pid {BASE_DIR}/logs/nginx.pid;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{STREAM_PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        brix_frm on;
        brix_frm_queue_path {QUEUE_PATH};
        brix_frm_stagecmd /bin/true;
    }
}

http {
    access_log off;
    client_body_temp_path {BASE_DIR}/t;
    proxy_temp_path {BASE_DIR}/t;
    fastcgi_temp_path {BASE_DIR}/t;
    uwsgi_temp_path {BASE_DIR}/t;
    scgi_temp_path {BASE_DIR}/t;
    server {
        listen {BIND_HOST}:{HTTP_PORT};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_auth required;
            brix_webdav_cadir {BASE_DIR}/cadir;
            brix_allow_write on;
            brix_webdav_tape_rest on;
            brix_webdav_token_jwks {JWKS_PATH};
            brix_webdav_token_issuer "{ISSUER}";
            brix_webdav_token_audience "{AUDIENCE}";
        }
    }
}

daemon off;
master_process off;
