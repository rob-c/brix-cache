# Phase-83 pblock-lab WebDAV (http) template — registry lifecycle.
#
# The atomic-publish front for the pblock-lab scenarios that need a
# `staged_commit` overwrite (versioning F11, per-block transforms F12/F13):
# test_pblock_lab_{versioning,xform}.py.  The launcher injects {PORT}
# {DATA_ROOT} {LOG_DIR} {TMP_DIR}; the test supplies {BIND_HOST}, {WORKERS},
# and {TAIL} (the backend `?tail` gate query, "" for gate-off).
# {LOG_DIR}/nginx.pid is the registry's stop pidfile — do not rename.
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
worker_processes {WORKERS};
events { worker_connections 64; }
http {
    client_body_temp_path {TMP_DIR};
    client_max_body_size 200m;
    server {
        listen {BIND_HOST}:{PORT};
        location / {
            dav_methods PUT DELETE MKCOL MOVE COPY;
            brix_webdav on;
            brix_export {DATA_ROOT};
            brix_webdav_auth none;
            brix_allow_write on;
            brix_storage_backend  pblock://{DATA_ROOT}{TAIL};
            brix_webdav_pblock_block_size 1m;
        }
    }
}
