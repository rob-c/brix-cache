# CMS data-node template for test_evil_paths.py TestCmsStateEvil: a root://
# stream node that registers with a mock CMS manager, so the suite can probe its
# kYR_state handler with escaping paths and assert the node never answers
# kYR_have for a file outside the export root.
# Rendered through the phase-81 registry (LifecycleHarness): the primary port
# and the log dir come from the launcher; the export is pinned to the shared
# session DATA_ROOT (where the evil symlinks are planted) and the mock manager's
# host:port rides the spec's CMS_MANAGER value.
daemon on;
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
events { worker_connections 64; }
stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_allow_write on;
        brix_cms_manager {CMS_MANAGER};
        brix_cms_interval 2;
    }
}
