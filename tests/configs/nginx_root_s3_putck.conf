# Outbound-commit-leg origin-enforced integrity (fault-hardening finding #12).
#
# One nginx hosts THREE planes so a single process models the whole
#   root:// node  ->  (corrupting network)  ->  S3 origin
# outbound-commit hop:
#
#   http{}    — a brix_s3 object store over a posix root (the ORIGIN the node
#               commits to). It VALIDATES x-amz-checksum-crc32 on PutObject and
#               rejects a mismatch with 400 BadDigest (protocols/s3/checksum.c),
#               so it is the co-hosted validating origin the knob targets.
#   stream{}  — TWO brix_root nodes whose storage backend is that S3 origin,
#               reached through the test's corrupting proxy on {CORRUPT_PORT}:
#                 :{PORT}      — backend "...?put_checksum=1"  (knob ON)
#                 :{PORT_OFF}  — backend without the option     (knob OFF)
#               A native pgwrite + close routes through the phase-70 whole-object
#               STAGED writer and commits as ONE signed PUT — the leg #12 hardens.
#
# The test's marker-targeting body corruptor sits on {CORRUPT_PORT} and forwards
# to the S3 plane on {S3_PORT}; it flips one BODY byte (SigV4 headers intact) so
# the knob-ON node's PUT is rejected (BadDigest) while the knob-OFF node's PUT is
# accepted and silently stores poison — the exact gap the knob closes.
#
# Two workers, deliberately (as nginx_root_s3_staged.conf): the native handler
# blocks on its outbound PUT to the co-hosted S3 plane at commit; a single worker
# would have none left to accept that inbound S3 connection — a self-deadlock.
#
# Launcher-provided: LOG_DIR TMP_DIR PORT (=knob-ON root://) DATA_ROOT.
# Test-provided via extra_ports: S3_PORT CORRUPT_PORT PORT_OFF.
# Test-provided via template_values (seeded under tmp_path, must exist at parse):
#   BIND_HOST S3_DIR S3_ACCESS_KEY S3_SECRET_KEY OFF_ROOT (knob-OFF export root —
#   distinct from {DATA_ROOT} so the two servers get separate registry entries).
worker_processes 2;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 64; }

http {
    access_log off;
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path       {TMP_DIR}/pt;
    fastcgi_temp_path     {TMP_DIR}/ft;
    uwsgi_temp_path       {TMP_DIR}/ut;
    scgi_temp_path        {TMP_DIR}/sct;

    server {
        listen {BIND_HOST}:{S3_PORT};
        client_max_body_size 128m;
        location / {
            brix_s3 on;
            brix_storage_backend posix:{S3_DIR};
            brix_s3_bucket testbucket;
            brix_s3_access_key {S3_ACCESS_KEY};
            brix_s3_secret_key {S3_SECRET_KEY};
            brix_s3_region us-east-1;
            brix_allow_write on;
        }
    }
}

stream {
    brix_credential s3cred {
        s3_access_key {S3_ACCESS_KEY};
        s3_secret_key {S3_SECRET_KEY};
        s3_region     us-east-1;
    }

    # Knob ON: every commit PUT carries a signed x-amz-checksum-crc32 → the origin
    # rejects a wire-corrupted body with 400 BadDigest.
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_export             {DATA_ROOT};
        brix_storage_backend    s3://{BIND_HOST}:{CORRUPT_PORT}/testbucket?put_checksum=1;
        brix_storage_credential s3cred;
        brix_auth none;
        brix_allow_write on;
        brix_upload_resume off;
    }

    # Knob OFF: SigV4 hard-codes UNSIGNED-PAYLOAD and no Content-MD5, so a
    # body-corrupted PUT is accepted (200) and poison is committed silently.
    # A DISTINCT export root is mandatory: the storage-backend registry is keyed
    # by the export's canonical root, so sharing {DATA_ROOT} with the knob-ON
    # server would collide on one entry and the last registration (this one,
    # put_checksum off) would silently win for both.
    server {
        listen {BIND_HOST}:{PORT_OFF};
        brix_root on;
        brix_export             {OFF_ROOT};
        brix_storage_backend    s3://{BIND_HOST}:{CORRUPT_PORT}/testbucket;
        brix_storage_credential s3cred;
        brix_auth none;
        brix_allow_write on;
        brix_upload_resume off;
    }
}
