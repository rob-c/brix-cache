# Anonymous root:// POSIX server with a configurable brix_readv_segment_size
# (registry lifecycle).  Shared by the readv segment/variable-block suites.
# Launcher-provided: LOG_DIR PORT.
# Test-provided: BIND_HOST DATA_DIR (seeded under tmp_path; must exist at
# config-parse time) READV_SEG (e.g. "16m", "1m").
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
daemon on;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_readv_segment_size {READV_SEG};
        brix_access_log {LOG_DIR}/access.log;
    }
}
