# Backend data server for test_proxy_large_read.py (registry lifecycle).
# Launcher-provided: LOG_DIR PORT DATA_ROOT.  Test-provided: BIND_HOST.
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
events { worker_connections 256; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
    }
}
