# Dedicated nginx configuration for authdb tests (AUTHDB_PORT).
#
# GSI authentication with xrootd_authdb enforcing user/VO/group/CIDR rules.
# VOMSdir and VOMS cert dir required for VO membership validation.

worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid       {LOG_DIR}/nginx.pid;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        xrootd on;
        xrootd_root {DATA_DIR};
        xrootd_auth gsi;
        xrootd_allow_write on;
        xrootd_certificate     {SERVER_CERT};
        xrootd_certificate_key {SERVER_KEY};
        xrootd_trusted_ca      {CA_CERT};
        xrootd_vomsdir         {VOMSDIR};
        xrootd_voms_cert_dir   {CA_DIR};
        xrootd_authdb          {AUTHDB_PATH};
    }
}
