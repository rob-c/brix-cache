# Dedicated nginx configuration for authdb tests (AUTHDB_PORT).
#
# GSI authentication with brix_authdb enforcing user/VO/group/CIDR rules.
# VOMSdir and VOMS cert dir required for VO membership validation.

worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid       {LOG_DIR}/nginx.pid;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        xrootd on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth gsi;
        brix_allow_write on;
        brix_certificate     {SERVER_CERT};
        brix_certificate_key {SERVER_KEY};
        brix_trusted_ca      {CA_CERT};
        brix_vomsdir         {VOMSDIR};
        brix_voms_cert_dir   {CA_DIR};
        brix_authdb          {DATA_DIR}/authdb;
    }
}
