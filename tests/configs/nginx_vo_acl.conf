worker_processes 1;
error_log {LOG_DIR}/error.log info;

thread_pool default threads=4 max_queue=65536;
events { worker_connections 64; }

stream {
    server {
        listen {PORT};
        xrootd on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth gsi;
        brix_allow_write on;
        brix_certificate     {SERVER_CERT};
        brix_certificate_key {SERVER_KEY};
        brix_trusted_ca      {CA_CERT};
        brix_vomsdir         {VOMSDIR};
        brix_voms_cert_dir   {CA_DIR};
        brix_require_vo /cms   cms;
        brix_require_vo /atlas atlas;
        brix_access_log {LOG_DIR}/brix_access.log;
    }
}
