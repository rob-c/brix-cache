# Token-authenticated stream server template for remote-doctor auth-suite tests.
# Placeholders: {BASE_DIR} {BIND_HOST} {PORT} {DATA_DIR} {JWKS_PATH} {ISSUER} {AUDIENCE}
worker_processes 1;
pid {BASE_DIR}/nginx.pid;
error_log {BASE_DIR}/error.log info;

events { worker_connections 256; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_allow_write on;
        brix_auth token;
        brix_token_jwks {JWKS_PATH};
        brix_token_issuer "{ISSUER}";
        brix_token_audience "{AUDIENCE}";
    }
}
