# Token-authenticated stream server — registry-lifecycle template for the
# remote-doctor auth-suite (forged/expired/scope) cases.
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
# Test-provided: JWKS_PATH ISSUER AUDIENCE.
worker_processes 1;
daemon on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;

events { worker_connections 256; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_allow_write on;
        brix_auth token;
        brix_token_jwks {JWKS_PATH};
        brix_token_issuer "{ISSUER}";
        brix_token_audience "{AUDIENCE}";
    }
}
