# Phase-36 §7.2.3 — WebDAV / XrdHttp over IPv6 (HTTP client).
#
# Dedicated IPv6-only instance started by manage_test_servers.sh via
#   start_dedicated_nginx "ipv6-webdav" "nginx_ipv6_webdav.conf" "${IPV6_WEBDAV_PORT}"
# substitute_config() fills {PORT}{DATA_DIR}{LOG_DIR}{TMP_DIR} (and the PKI/JWKS
# placeholders, unused here).  The primary listener binds the IPv6 loopback so
# plain-HTTP WebDAV/XrdHttp clients reach it at  http://[::1]:{PORT}/ .
#
# auth=none + allow_write on keeps the test surface focused on the IPv6
# request/response path (method coverage + PROPFIND href well-formedness), not
# on credential handling.  The HTTP layer (requests / http.client) brackets the
# [::1] literal natively, so no raw-wire client gymnastics are required here.

worker_processes 1;
thread_pool default threads=2 max_queue=256;
error_log {LOG_DIR}/error.log info;

events { worker_connections 128; }

http {
    access_log            {LOG_DIR}/ipv6_webdav_access.log;
    client_body_temp_path {TMP_DIR};
    proxy_temp_path       {TMP_DIR};
    fastcgi_temp_path     {TMP_DIR};
    uwsgi_temp_path       {TMP_DIR};
    scgi_temp_path        {TMP_DIR};

    sendfile        on;
    client_max_body_size 1g;

    server {
        # IPv6-only primary listener — clients connect to http://[::1]:{PORT}/
        listen [::1]:{PORT};
        server_name localhost;

        location / {
            root                  {DATA_DIR};
            dav_methods           DELETE MKCOL;

            brix_webdav         on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_auth    none;
            brix_allow_write on;
        }
    }
}
