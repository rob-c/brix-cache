# Credential-store default + ensure — config for test_credential_dir_default.py.
#
# One delegation server, identical to nginx_t4_delegation_handshake.conf's
# first server, except the brix_storage_credential_dir line is injected by the
# test: absent (exercise the /dev/shm/brix-creds default), an explicit path
# (exercise the create/warn paths), or "" (exercise the opt-out).
#
# Placeholders: BASE_DIR DELEG_PORT HOST_CERT HOST_KEY CA_CERT
#               CRED_DIR_DIRECTIVE
worker_processes 1;
pid {BASE_DIR}/nginx.pid;
error_log {BASE_DIR}/error.log info;

events { worker_connections 64; }

http {
    access_log {BASE_DIR}/access.log;
    client_body_temp_path {BASE_DIR}/tmp;

    server {
        listen 127.0.0.1:{DELEG_PORT} ssl;
        ssl_certificate        {HOST_CERT};
        ssl_certificate_key    {HOST_KEY};
        ssl_client_certificate {CA_CERT};
        ssl_verify_client      optional;
        ssl_verify_depth       10;
        brix_webdav_proxy_certs on;

        location /.well-known/brix-delegation {
            brix_webdav on;
            brix_export {BASE_DIR}/export;
            brix_allow_write on;
            brix_webdav_cafile {CA_CERT};
            brix_webdav_auth required;
            {CRED_DIR_DIRECTIVE}
            brix_delegation_endpoint on;
        }
    }
}
