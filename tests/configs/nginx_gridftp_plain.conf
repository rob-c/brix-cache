# Cleartext FTP gateway (no RFC 2228 GSI layer) for test_gridftp_verbs.py.
# A single-worker stream server running brix_gridftp with the security layer
# OFF, so a plain FTP client (Python ftplib) can drive the RFC 959 / RFC 3659 /
# GridFTP verb surface — MDTM, MLST, STAT, SYST, MODE, STRU, ALLO, REST, APPE,
# RNFR/RNTO, CKSM, EPSV, and active-mode PORT/EPRT — without a GSSAPI handshake.
# Rendered through the registry (LifecycleHarness): {PORT} and {LOG_DIR} come
# from the launcher, {DATA_ROOT} is the auto-created export tree, {BIND_HOST}
# from the spec.
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 64; }
stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_gridftp on;
        brix_gridftp_export      {DATA_ROOT};
        brix_gridftp_allow_write on;
    }
}
