# Self-contained WebDAV + S3 transfer template (registry lifecycle) for
# test_client_web_transfer.py.  One nginx hosting two http servers.
# Launcher-provided: LOG_DIR TMP_DIR PORT (=WebDAV) DATA_ROOT.
# Test-provided via extra_ports: S3_PORT.
# Test-provided via template_values (seeded under tmp_path, must exist at
# config-parse time): BIND_HOST WEBDAV_DIR S3_DIR S3_ACCESS_KEY S3_SECRET_KEY.
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
daemon on;

events { worker_connections 64; }

http {
    access_log off;
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path       {TMP_DIR}/pt;
    fastcgi_temp_path     {TMP_DIR}/ft;
    uwsgi_temp_path       {TMP_DIR}/ut;
    scgi_temp_path        {TMP_DIR}/sct;

    server {
        listen {BIND_HOST}:{PORT};
        client_max_body_size 64m;
        location / {
            brix_webdav on;
            brix_storage_backend posix:{WEBDAV_DIR};
            brix_webdav_auth none;
            brix_allow_write on;
        }
    }

    server {
        listen {BIND_HOST}:{S3_PORT};
        client_max_body_size 64m;
        location / {
            brix_s3 on;
            brix_storage_backend posix:{S3_DIR};
            brix_s3_bucket testbucket;
            brix_s3_access_key {S3_ACCESS_KEY};
            brix_s3_secret_key {S3_SECRET_KEY};
            brix_s3_region us-east-1;
            brix_allow_write on;
        }
    }
}
