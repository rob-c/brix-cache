# Evil-actor crash battery target: a 3-worker root:// server with an async
# thread pool (so pgread/readv/write offload and a hostile client can race the
# offloaded I/O against connection teardown), plus a metrics http plane.
# Rendered through the registry (LifecycleHarness); {PORT}/{DATA_ROOT}/{LOG_DIR}
# come from the launcher, {BIND_HOST}/{HTTP_PORT} via the spec.
worker_processes 3;
daemon on;
master_process on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
thread_pool aiopool threads=4 max_queue=4096;
events { worker_connections 1024; }
stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
        brix_allow_write on;
        brix_thread_pool aiopool;
        brix_memory_budget 8m;
    }
}
http {
    access_log off;
    server {
        listen {BIND_HOST}:{HTTP_PORT};
        location = /metrics { brix_metrics on; }
    }
}
