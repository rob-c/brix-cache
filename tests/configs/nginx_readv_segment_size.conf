# Readv segment-size server template for test_readv_segment_size.py.
# Placeholders: {USER_DIRECTIVE} {LOG_DIR} {PORT} {DATA_DIR}
worker_processes 1;
daemon off;
{USER_DIRECTIVE}
error_log {LOG_DIR}/error.log error;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 1024; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_readv_segment_size 16m;
        brix_access_log {LOG_DIR}/access.log;
    }
}
