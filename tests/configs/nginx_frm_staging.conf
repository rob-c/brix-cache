# FRM staging template for test_frm_staging.py.
worker_processes 1;
thread_pool frmpool threads=2;
error_log {BASE_DIR}/logs/error.log info;
pid {BASE_DIR}/logs/nginx.pid;
env FRM_DATA_DIR;
env FRM_TAPE_DIR;
env FRM_LATENCY_MS;
env FRM_AUDIT_LOG;
env FRM_FAIL_MODE;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_thread_pool frmpool;
        brix_frm on;
        brix_frm_queue_path {QUEUE_PATH};
        brix_frm_copycmd {COPY_CMD};
        brix_frm_copymax 4;
        brix_frm_stage_wait 1;
    }
}

daemon off;
master_process off;
