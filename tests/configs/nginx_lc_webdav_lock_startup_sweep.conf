# WebDAV lock startup-sweep template for test_webdav_lock_startup_sweep.py
# (registry lifecycle).  Launcher-provided: LOG_DIR PORT TMP_DIR.  Test-provided:
# BIND_HOST DATA_DIR SWEEP ("on"/"off").  DATA_DIR is the seeded export root and
# must exist at config-parse time.
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;

events { worker_connections 64; }

http {
    access_log off;
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path       {TMP_DIR}/pt;
    fastcgi_temp_path     {TMP_DIR}/ft;
    uwsgi_temp_path       {TMP_DIR}/ut;
    scgi_temp_path        {TMP_DIR}/st;

    server {
        listen {BIND_HOST}:{PORT};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_auth none;
            brix_webdav_lock_startup_sweep {SWEEP};
        }
    }
}
