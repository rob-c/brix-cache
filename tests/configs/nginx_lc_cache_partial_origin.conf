# Origin data server for test_cache_partial_fill.py (registry lifecycle).  A
# root:// export the xroot cache node fills slices from; a posix export or a
# pblock backend is selected by the test.
# Launcher-provided: LOG_DIR PORT.
# Test-provided via template_values (dirs seeded under tmp_path, must exist at
# config-parse time): BIND_HOST ORIGIN_STORAGE ORIGIN_ALLOW_WRITE (last defaults
# to "").
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 64; }
stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        {ORIGIN_STORAGE}
        brix_auth none;
{ORIGIN_ALLOW_WRITE}    }
}
