worker_processes 1;
error_log {LOG_DIR}/error_wt_async.log info;

thread_pool default threads=4 max_queue=65536;
events { worker_connections 64; }

stream {

    server {
        listen {BIND_HOST}:{PORT};
        xrootd on;
        xrootd_storage_backend posix:{DATA_DIR};
        xrootd_auth      none;
        xrootd_allow_write on;

        xrootd_write_through    on;
        xrootd_wt_mode          async;
        xrootd_wt_origin        localhost:11094;
    }
}
