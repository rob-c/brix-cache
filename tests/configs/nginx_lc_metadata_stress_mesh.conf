# Metadata-stress root:// redirector (registry lifecycle) for
# test_metadata_stress.py.  A manager_map redirector hammered with kXR_locate;
# it answers locate itself, so the advertised target need not be live.
# Launcher-provided: LOG_DIR PORT.
# Test-provided via template_values: BIND_HOST MGR_TARGET (advertised host:port)
#   RL_ZONE (optional `brix_rate_limit_zone ...;`, "" when unused)
#   RL_RULE (optional per-server `brix_rate_limit_rule ...;`, "" when unused).
worker_processes 1;
error_log {LOG_DIR}/error.log error;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 512; }
stream {
    {RL_ZONE}
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_manager_map /dir {MGR_TARGET};
        brix_manager_map / {MGR_TARGET};
        {RL_RULE}
    }
}
