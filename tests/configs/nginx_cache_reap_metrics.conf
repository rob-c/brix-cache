# Cache reaper + metrics template for test_cache_reap_metrics.py.
# Placeholders: {BASE_DIR} {LOG_DIR} {ROOT_DIR} {STATE_DIR} {STREAM_PORT} {METRICS_PORT}
daemon on;
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {BASE_DIR}/nginx.pid;

events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{STREAM_PORT};
        brix_root on;
        brix_export {ROOT_DIR};
        brix_auth none;
        brix_cache_state_root {STATE_DIR};
        brix_cache_dirty_max_age 1;
    }
}

http {
    access_log off;
    client_body_temp_path {BASE_DIR}/cbt;
    proxy_temp_path {BASE_DIR}/pt;
    fastcgi_temp_path {BASE_DIR}/ft;
    uwsgi_temp_path {BASE_DIR}/ut;
    scgi_temp_path {BASE_DIR}/st;

    server {
        listen 127.0.0.1:{METRICS_PORT};
        location /metrics { brix_metrics on; }
    }
}
