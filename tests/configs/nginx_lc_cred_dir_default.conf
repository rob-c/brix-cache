# Credential-store default + ensure — template for test_credential_dir_default.py
# (registry lifecycle).  Launcher-provided: LOG_DIR PORT TMP_DIR DATA_ROOT.
# Test-provided: HOST_CERT HOST_KEY CA_CERT CRED_DIR_DIRECTIVE.
#
# One delegation server; the brix_storage_credential_dir line is injected by the
# test via CRED_DIR_DIRECTIVE: absent (exercise the /dev/shm/brix-creds default),
# an explicit path (exercise the create/warn paths), or "" (exercise the opt-out).
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
daemon on;

events { worker_connections 64; }

http {
    access_log {LOG_DIR}/access.log;
    client_body_temp_path {TMP_DIR};

    server {
        listen 127.0.0.1:{PORT} ssl;
        ssl_certificate        {HOST_CERT};
        ssl_certificate_key    {HOST_KEY};
        ssl_client_certificate {CA_CERT};
        ssl_verify_client      optional;
        ssl_verify_depth       10;
        brix_webdav_proxy_certs on;

        location /.well-known/brix-delegation {
            brix_webdav on;
            brix_export {DATA_ROOT};
            brix_allow_write on;
            brix_webdav_cafile {CA_CERT};
            brix_webdav_auth required;
            {CRED_DIR_DIRECTIVE}
            brix_delegation_endpoint on;
        }
    }
}
