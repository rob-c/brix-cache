# nginx_impersonate_gridmap_webdav.conf — host-root UNIX-impersonation (phase 40)
# WebDAV/token variant for test_impersonation_gridmap_root.py.
#
# The nginx MASTER runs as root (that is the whole point of `brix_impersonation
# map`): it spawns the privileged identity broker, which setfsuid()s per request
# to the real local account the token subject maps to via {GRIDMAP}.  Workers run
# unprivileged (`user nobody`).  This config can therefore only be meaningfully
# exercised when the test harness itself runs as root — see the module's skipif.
#
# Launcher-provided : PORT LOG_DIR TMP_DIR
# Test-provided     : EXPORT (backend + broker confinement root, world-writable so
#                     mapped users can create), SOCK, GRIDMAP, JWKS, ISSUER,
#                     AUDIENCE, DEFAULT_USER_LINE (either
#                     `brix_idmap_default_user <acct>;` for squash mode or empty
#                     for fail-closed deny mode).
user nobody;
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 128; }

stream {
    # One identity broker per instance; it also governs the http{} webdav server.
    brix_impersonation        map;
    brix_impersonation_socket {SOCK};
    brix_impersonation_export {EXPORT};
    brix_gridmap              {GRIDMAP};
    brix_idmap_min_uid        1000;
{DEFAULT_USER_LINE}
}

http {
    access_log off;
    client_body_temp_path {TMP_DIR};
    proxy_temp_path        {TMP_DIR};
    fastcgi_temp_path      {TMP_DIR};
    uwsgi_temp_path        {TMP_DIR};
    scgi_temp_path         {TMP_DIR};
    client_max_body_size   64m;

    server {
        listen 127.0.0.1:{PORT};
        location / {
            brix_webdav              on;
            brix_storage_backend     posix:{EXPORT};
            brix_webdav_auth         required;
            brix_allow_write         on;
            brix_webdav_token_jwks     {JWKS};
            brix_webdav_token_issuer   "{ISSUER}";
            brix_webdav_token_audience "{AUDIENCE}";
        }
    }
}
