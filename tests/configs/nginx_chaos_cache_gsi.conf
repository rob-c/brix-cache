# Chaos mixed-auth mesh — anon front tier cache with X.509 UPSTREAM auth for
# test_chaos_mixed_auth.py.  Clients connect anonymously; the cache authenticates
# UPSTREAM to the GSI origin with a named VOMS-proxy credential (phase-64 tier
# grammar: the GSI origin is the storage backend, its credential a named
# brix_credential block, the local read cache a posix cache_store).
# Launcher-provided: PORT DATA_ROOT LOG_DIR.  Test-provided: BIND_HOST PROXY_PEM
# CA_DIR GSI_ORIGIN_PORT CACHE_DIR.
worker_processes 1;
daemon on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
thread_pool chaos_cache threads=2 max_queue=8192;
events { worker_connections 128; }
stream {
brix_credential chaosgsi { x509_proxy {PROXY_PEM}; ca_dir {CA_DIR}; }
server {
    listen {BIND_HOST}:{PORT};
    brix_root on;
    brix_export {DATA_ROOT};
    brix_auth none;
    brix_allow_write off;
    brix_thread_pool chaos_cache;
    brix_storage_backend root://{BIND_HOST}:{GSI_ORIGIN_PORT};
    brix_storage_credential chaosgsi;
    brix_cache_store posix:{CACHE_DIR};
    brix_cache_export /;
} }
