# SigV4 S3 auth oracle template for test_s3_auth_oracle.py.
# Placeholders: {BASE_DIR} {BIND_HOST} {PORT} {DATA_DIR} {BUCKET} {ACCESS_KEY} {SECRET_KEY} {REGION}
error_log {BASE_DIR}/logs/error.log error;
pid {BASE_DIR}/logs/nginx.pid;

events { worker_connections 64; }

http {
    client_body_temp_path {BASE_DIR}/t;
    proxy_temp_path {BASE_DIR}/t;
    fastcgi_temp_path {BASE_DIR}/t;
    uwsgi_temp_path {BASE_DIR}/t;
    scgi_temp_path {BASE_DIR}/t;
    access_log off;

    server {
        listen {BIND_HOST}:{PORT};
        location / {
            brix_s3 on;
            brix_storage_backend posix:{DATA_DIR};
            brix_s3_bucket {BUCKET};
            brix_s3_access_key {ACCESS_KEY};
            brix_s3_secret_key {SECRET_KEY};
            brix_s3_region {REGION};
            brix_allow_write on;
        }
    }
}

daemon off;
master_process off;
