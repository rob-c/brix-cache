# CMS *client* (data node) with the staging engine ON — registry-lifecycle
# template for test_cms_prepadd.py.  The node dials a Python manager peer which
# then forwards kYR_prepadd/kYR_prepdel; brix_frm_control_dir stands up the
# durable stage-request registry those ops admit into / delete from.
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
# Test-provided: MANAGER_PORT QUEUE_PATH CONTROL_DIR.
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
events { worker_connections 128; }
stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
        brix_allow_write on;
        brix_frm on;
        brix_frm_queue_path {QUEUE_PATH};
        brix_frm_control_dir {CONTROL_DIR};
        brix_frm_stagecmd /bin/true;
        brix_frm_stage_ttl 30s;
        brix_cms_manager 127.0.0.1:{MANAGER_PORT};
        brix_cms_paths /;
        brix_cms_interval 2;
        brix_listen_port {PORT};
    }
}
