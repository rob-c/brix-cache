# Self-contained ARC guard proxy template for test_arc_guard.py.
# Placeholders: {BASE_DIR} {BIND_HOST} {PORT} {AUDIT_LOG} {BACKEND_PORT}
worker_processes 1;
pid {BASE_DIR}/nginx.pid;
error_log {BASE_DIR}/error.log info;

events { worker_connections 64; }

http {
    access_log off;
    client_body_temp_path {BASE_DIR}/tmp;
    proxy_temp_path       {BASE_DIR}/tmp;
    fastcgi_temp_path     {BASE_DIR}/tmp;
    uwsgi_temp_path       {BASE_DIR}/tmp;
    scgi_temp_path        {BASE_DIR}/tmp;

    server {
        listen {BIND_HOST}:{PORT};
        location / {
            brix_guard on;
            brix_guard_profile arc;
            brix_guard_audit_log {AUDIT_LOG};
            proxy_pass http://{BIND_HOST}:{BACKEND_PORT};
        }
    }
}
