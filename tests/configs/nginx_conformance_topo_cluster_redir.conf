# CMS redirector front — registry-lifecycle template for
# test_conformance_topologies.py. A manager-mode server on the client port plus
# a CMS server the data node registers over.
# Launcher-provided: LOG_DIR PORT.
# Test-provided (extra_ports): CMS_PORT.
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 256; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_auth none;
        brix_manager_mode on;
    }
    server {
        listen 127.0.0.1:{CMS_PORT};
        brix_cms_server on;
    }
}
