# Phase-22 Step F — health-check cluster whose data server DEMANDS in-protocol
# TLS (brix_tls on -> kXR_gotoTLS at protocol stage).  The manager's probe
# behavior is steered by the MGR_TLS_KNOBS blob:
#   * brix_upstream_tls on + trusted CA  -> DEEP probe (TLS upgrade -> login -> ping)
#   * empty                              -> legacy shallow protocol-OK alive
#   * brix_upstream_tls on + WRONG CA    -> handshake/verify fails -> probe FAILS
# Launcher-provided: LOG_DIR TMP_DIR PORT DATA_ROOT.
# Test-provided: BIND_HOST HOST MGR_TLS_KNOBS CERT_FILE KEY_FILE CA_DIR.
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
events { worker_connections 64; }

stream {
    # Manager (redirector) with active health checks enabled.
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_auth none;
        brix_manager_mode on;
        brix_health_check on;
        brix_health_check_interval 2s;
        brix_health_check_timeout 3s;
{MGR_TLS_KNOBS}
    }
    # CMS server endpoint data servers register with (cleartext, unaffected).
    server {
        listen {BIND_HOST}:{CMS_PORT};
        brix_cms_server on;
    }
    # TLS-required data server that registers itself via loopback CMS.
    server {
        listen {BIND_HOST}:{DS_PORT};
        brix_root on;
        brix_auth none;
        brix_storage_backend posix:{DATA_ROOT};
        brix_tls on;
        brix_certificate {CERT_FILE};
        brix_certificate_key {KEY_FILE};
        brix_trusted_ca {CA_DIR};
        brix_cms_manager {HOST}:{CMS_PORT};
        brix_cms_paths /data;
        brix_cms_interval 2;
        brix_listen_port {DS_PORT};
    }
}

http {
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path {TMP_DIR}/pt;
    fastcgi_temp_path {TMP_DIR}/ft;
    uwsgi_temp_path {TMP_DIR}/ut;
    scgi_temp_path {TMP_DIR}/st;
    access_log off;

    server {
        listen {BIND_HOST}:{METRICS_PORT};
        location /metrics { brix_metrics on; }
    }
}
