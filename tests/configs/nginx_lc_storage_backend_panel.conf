# Storage backend observability template for test_storage_backend_panel.py
# (registry lifecycle).  Launcher-provided: LOG_DIR PORT TMP_DIR DATA_ROOT.
# Test-provided: BIND_HOST PASSWORD REMOTE_NS.  Keep secret-bearing placeholders
# out of comments; rendered configs may be exposed by dashboard/debug tooling.
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
daemon on;

events { worker_connections 256; }

http {
    access_log off;
    client_max_body_size 16m;
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path       {TMP_DIR}/pt;
    fastcgi_temp_path     {TMP_DIR}/ft;
    uwsgi_temp_path       {TMP_DIR}/ut;
    scgi_temp_path        {TMP_DIR}/st;

    server {
        listen {BIND_HOST}:{PORT};
        location /brix/ {
            brix_dashboard on;
            brix_admin_rate_limit off;  # whole suite shares one client IP: default per-IP cap trips under xdist
            brix_dashboard_password "{PASSWORD}";
            brix_dashboard_anonymous on;
        }
        location /metrics { brix_metrics on; }
        location / {
            brix_webdav on;
            brix_export {DATA_ROOT};
            brix_webdav_auth none;
            brix_allow_write on;
        }
        location /remote/ {
            brix_webdav on;
            brix_export {REMOTE_NS};
            brix_storage_backend root://127.0.0.1:1;
            brix_webdav_auth none;
        }
    }
}
