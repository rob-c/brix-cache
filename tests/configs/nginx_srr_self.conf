# Self-contained WLCG SRR endpoint template.
# Rendered through the phase-81 registry (LifecycleHarness): {PORT}, {LOG_DIR}
# and {DATA_ROOT} come from the launcher; {BIND_HOST} is supplied via the spec's
# template_values.
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;

events { worker_connections 64; }

http {
    access_log off;
    client_body_temp_path {LOG_DIR}/cbt;
    proxy_temp_path       {LOG_DIR}/pt;
    fastcgi_temp_path     {LOG_DIR}/ft;
    uwsgi_temp_path       {LOG_DIR}/ut;
    scgi_temp_path        {LOG_DIR}/sct;

    server {
        listen {BIND_HOST}:{PORT};
        location = /.well-known/wlcg-storage-resource-reporting {
            brix_srr on;
            brix_srr_name "TEST-SE";
            brix_srr_quality production;
            brix_srr_version "3.5";
            brix_srr_share atlasdata {DATA_ROOT} atlas,cms;
        }
    }
}
