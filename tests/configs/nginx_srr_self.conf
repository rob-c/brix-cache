# Self-contained WLCG SRR endpoint template.
# Placeholders: {BASE_DIR} {BIND_HOST} {PORT} {DATA_DIR}
worker_processes 1;
pid {BASE_DIR}/nginx.pid;
error_log {BASE_DIR}/error.log info;

events { worker_connections 64; }

http {
    access_log off;
    client_body_temp_path {BASE_DIR}/cbt;
    proxy_temp_path       {BASE_DIR}/pt;
    fastcgi_temp_path     {BASE_DIR}/ft;
    uwsgi_temp_path       {BASE_DIR}/ut;
    scgi_temp_path        {BASE_DIR}/sct;

    server {
        listen {BIND_HOST}:{PORT};
        location = /.well-known/wlcg-storage-resource-reporting {
            brix_srr on;
            brix_srr_name "TEST-SE";
            brix_srr_quality production;
            brix_srr_version "3.5";
            brix_srr_share atlasdata {DATA_DIR} atlas,cms;
        }
    }
}
