# FRM phase-4 directives template for test_frm_phase4.py (registry lifecycle).
# Launcher-provided: LOG_DIR PORT.  Test-provided: BIND_HOST METRICS_PORT
# DATA_DIR QUEUE_PATH.
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_frm on;
        brix_frm_queue_path {QUEUE_PATH};
        brix_frm_stagecmd /bin/true;
        brix_frm_max_per_source 2;
        brix_frm_residency_cmd /bin/true;
        brix_frm_migrate_copycmd /bin/true;
        brix_frm_purge_watermark 0.90 0.80;
        brix_frm_purge_interval 1s;
    }
}

http {
    access_log off;
    server {
        listen {BIND_HOST}:{METRICS_PORT};
        location = /metrics { brix_metrics on; }
    }
}
