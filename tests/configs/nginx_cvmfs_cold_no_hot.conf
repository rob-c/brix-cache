# CVMFS F7 config gate (negative) — registry lifecycle.
#
# A cold store WITHOUT a hot brix_cache_store must be refused at `nginx -t`
# (brix_cache_cold_store requires brix_cache_store).  Driven via
# lifecycle.expect_config_failure in test_cvmfs_cold_tier.py.  The launcher
# injects {PORT} {LOG_DIR}; the test supplies {BIND_HOST} and {COLD_DIR}.
daemon off;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 64; }
http {
    server {
        listen {BIND_HOST}:{PORT};
        location /cvmfs/ {
            brix_cvmfs on;
            brix_storage_backend "http://127.0.0.1:1";
            brix_cache_cold_store posix:{COLD_DIR};
        }
    }
}
