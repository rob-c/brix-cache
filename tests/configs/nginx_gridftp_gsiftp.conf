# gsiftp:// GridFTP gateway (GSI-secured control channel) for
# test_gridftp_gsiftp.py.  A single-worker stream server running brix_gridftp
# with the RFC 2228 security layer enabled (brix_gridftp_gsi on); the suite
# drives globus-url-copy through LIST/RETR/STOR over the wrapped control channel.
# Rendered through the registry (LifecycleHarness): {PORT} (the gsiftp port) and
# {LOG_DIR} come from the launcher, {DATA_ROOT} is the auto-created export tree;
# the PKI paths ({SERVER_CERT}, {SERVER_KEY}, {CA_DIR}) come from the spec so the
# same template renders both the trusting gateway and the empty-trust-store one
# used by the security-negative case.
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 64; }
stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_gridftp on;
        brix_gridftp_export     {DATA_ROOT};
        brix_gridftp_allow_write on;
        brix_gridftp_gsi        on;
        brix_gridftp_certificate     {SERVER_CERT};
        brix_gridftp_certificate_key {SERVER_KEY};
        brix_gridftp_trusted_ca      {CA_DIR};
    }
}
