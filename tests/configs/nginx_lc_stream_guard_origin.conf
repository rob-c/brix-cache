# Stream-guard origin template for test_stream_guard.py (registry lifecycle).
# Launcher-provided: LOG_DIR PORT.  Test-provided: BIND_HOST EXPORT_DIR (must
# exist at config-parse time — the test pre-creates and seeds it).
daemon on;
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_export {EXPORT_DIR};
        brix_auth none;
    }
}
