# Cache reaper + metrics template for test_cache_reap_metrics.py (registry
# lifecycle).  Launcher-provided: LOG_DIR PORT TMP_DIR.  Test-provided:
# BIND_HOST METRICS_PORT ROOT_DIR STATE_DIR (the export + cache-state roots
# must exist at config-parse time — the test seeds them under tmp_path).
daemon on;
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_export {ROOT_DIR};
        brix_auth none;
        brix_cache_state_root {STATE_DIR};
        brix_cache_dirty_max_age 1;
    }
}

http {
    access_log off;
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path       {TMP_DIR}/pt;
    fastcgi_temp_path     {TMP_DIR}/ft;
    uwsgi_temp_path       {TMP_DIR}/ut;
    scgi_temp_path        {TMP_DIR}/st;

    server {
        listen {BIND_HOST}:{METRICS_PORT};
        location /metrics { brix_metrics on; }
    }
}
