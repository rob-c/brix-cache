worker_processes 1;
error_log {LOG_DIR}/error.log info;

thread_pool default threads=4 max_queue=65536;
events { worker_connections 64; }

stream {
    server {
        listen {PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth token;
        brix_allow_write on;
        brix_token_config   {TOKEN_DIR}/scitokens.cfg;
        brix_access_log {LOG_DIR}/brix_access_registry.log;
    }
}
