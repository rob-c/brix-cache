# MU config-guard (stream/root) — registry-lifecycle template for
# test_mu_sidecar_config_guard.py. A cache/state/stage tree nested inside the
# export must be a deploy-blocking `nginx -t` error. The service-tree directive
# under test is injected via SVC_DIRECTIVES.
# Launcher-provided: LOG_DIR PORT.
# Test-provided: EXPORT SVC_DIRECTIVES.
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/e.log crit;
daemon on;
events { worker_connections 64; }
stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_export {EXPORT};
        brix_storage_backend posix:{EXPORT};
        brix_auth none;
        brix_allow_write on;
        {SVC_DIRECTIVES}
    }
}
