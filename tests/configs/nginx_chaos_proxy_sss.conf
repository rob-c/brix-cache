# Chaos mixed-auth mesh — anon front tap-proxy with SSS UPSTREAM auth for
# test_chaos_mixed_auth.py.  Clients connect anonymously; the proxy forwards to the
# SSS origin with an SSS credential built from KEYTAB.  Reused for both the
# correct-keytab route (proxy-sss) and the wrong-keytab negative route
# (proxy-sss-bad) — only KEYTAB differs.
# Launcher-provided: PORT LOG_DIR.  Test-provided: BIND_HOST KEYTAB SSS_ORIGIN_PORT.
worker_processes 1;
daemon on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
events { worker_connections 128; }
stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_auth none;
        brix_tap_proxy on;
        brix_tap_proxy_auth sss;
        brix_sss_keytab {KEYTAB};
        brix_tap_proxy_upstream {BIND_HOST}:{SSS_ORIGIN_PORT} sss;
    }
}
