# CMS *client* (data node) dialing a Python manager peer — registry-lifecycle
# template for test_cms_state_have_select.py. Serves an in-root file the peer can
# probe with kYR_state; a short cms_interval keeps the reconnect backoff small.
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
# Test-provided: MANAGER_PORT.
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
events { worker_connections 128; }
stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
        brix_allow_write on;
        brix_cms_manager 127.0.0.1:{MANAGER_PORT};
        brix_cms_paths /;
        brix_cms_interval 2;
        brix_listen_port {PORT};
    }
}
