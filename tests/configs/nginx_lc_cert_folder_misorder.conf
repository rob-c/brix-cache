# brix_client_certificate_folder ORDERING error case — the directive placed
# BEFORE ssl_certificate cannot resolve the hostcert issuer and must fail
# nginx -t with a message telling the admin to move it.  See
# test_client_certificate_folder.py.  Launcher-provided: LOG_DIR PORT
# TMP_DIR DATA_ROOT.  Test-provided: HOST_CERT HOST_KEY CERT_FOLDER.
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
daemon on;

events { worker_connections 64; }

http {
    access_log {LOG_DIR}/access.log;
    client_body_temp_path {TMP_DIR};

    server {
        listen 127.0.0.1:{PORT} ssl;
        brix_client_certificate_folder {CERT_FOLDER};
        ssl_certificate         {HOST_CERT};
        ssl_certificate_key     {HOST_KEY};
        ssl_verify_client       on;

        location / {
            return 204;
        }
    }
}
