# Chaos mixed-auth mesh — SSS origin data server for test_chaos_mixed_auth.py.
# Requires SSS on the wire; the proxy-sss front authenticates UPSTREAM to it from a
# shared keytab.  Launcher-provided: PORT DATA_ROOT LOG_DIR.  Test-provided: BIND_HOST
# KEYTAB.
worker_processes 1;
daemon on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
events { worker_connections 128; }
stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_export {DATA_ROOT};
        brix_auth sss;
        brix_sss_keytab {KEYTAB};
    }
}
