# Slice-cache directive validation template for test_slice_cache.py.
error_log {BASE_DIR}/logs/error.log;
pid {BASE_DIR}/logs/nginx.pid;

events {}

thread_pool default threads=2 max_queue=128;

stream {
    server {
        listen 21794;
        brix_root on;
        brix_export {ORIGIN_DIR};
        brix_auth none;
        brix_storage_backend root://{HOST}:1095;
        brix_cache_store posix:{CACHE_DIR};
        brix_cache_export /;
        brix_cache_slice_size {SLICE_SIZE};
    }
}
