# Slice-cache directive validation — registry-lifecycle template for
# test_slice_cache.py (nginx -t only; never bound). Exercises the
# brix_cache_slice_size tier directive's parse/validate rules.
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
# Test-provided: HOST CACHE_DIR SLICE_SIZE.
error_log {LOG_DIR}/error.log;
pid {LOG_DIR}/nginx.pid;

events {}

thread_pool default threads=2 max_queue=128;

stream {
    server {
        listen {PORT};
        brix_root on;
        brix_export {DATA_ROOT};
        brix_auth none;
        brix_storage_backend root://{HOST}:1095;
        brix_cache_store posix:{CACHE_DIR};
        brix_cache_export /;
        brix_cache_slice_size {SLICE_SIZE};
    }
}
