# Stage write-back hydration — template for test_stage_hydration.py (registry
# lifecycle).  Launcher-provided: LOG_DIR PORT.  Test-provided: ORIGIN_PORT
# ORIGIN_DATA GW_DATA STAGE_DIR.
#
# Two stream servers in one instance: a plain root:// ORIGIN export, and a
# GATEWAY composing the write-stage tier (sync flush) over that origin.  An
# update-open on the gateway must hydrate the stage copy from the origin before
# accepting random writes, so the sync flush at close reassembles the full
# object instead of truncating it to the written bytes.
#
# worker_processes 2: the gateway's inline hydration/flush connects back to the
# origin port served by this same nginx — a single worker blocked in the
# synchronous close could never accept that connection.
worker_processes 2;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
thread_pool hpool threads=2 max_queue=4096;

events { worker_connections 64; }

stream {
    server {                                    # the ORIGIN export
        listen 127.0.0.1:{ORIGIN_PORT};
        brix_root on;
        brix_export {ORIGIN_DATA};
        brix_auth none;
        brix_allow_write on;
        brix_thread_pool hpool;
    }

    server {                                    # the GATEWAY over the origin
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_export {GW_DATA};
        brix_auth none;
        brix_allow_write on;
        brix_thread_pool hpool;
        brix_storage_backend root://127.0.0.1:{ORIGIN_PORT};
        brix_stage on;
        brix_stage_store posix:{STAGE_DIR};
        brix_stage_flush sync;                  # close blocks until the origin has it
    }
}
