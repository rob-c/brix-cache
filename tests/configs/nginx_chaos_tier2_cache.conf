# Dedicated Chaos Mesh Tier2: read-through cache between Tier1 proxy and Tier3 storage.

worker_processes 1;
error_log {LOG_DIR}/error.log debug;
pid       {LOG_DIR}/nginx.pid;

thread_pool default threads=4 max_queue=65536;

events { worker_connections 512; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        xrootd on;
        xrootd_auth none;

        # Composable read-through cache: Tier3 storage (UPSTREAM_PORT) is the backend;
        # fills land in the local posix store; advertised logical root is "/".
        xrootd_storage_backend root://localhost:{UPSTREAM_PORT};
        xrootd_cache_store     posix:{CACHE_DIR};
        xrootd_cache_root      /;
    }
}
