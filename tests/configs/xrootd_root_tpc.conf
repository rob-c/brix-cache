# Reference xrootd — root:// TPC source/dest (rendered by refxrootd.sh:start_root_tpc_ref).
# Placeholders: {DATA_DIR} {ADMIN_DIR} {RUN_DIR} {PORT} {XRDCP_BIN}
all.role server
all.export /
oss.localroot {DATA_DIR}
all.adminpath {ADMIN_DIR}
all.pidpath {RUN_DIR}

xrd.port {PORT}
xrd.sched mint 2 maxt 4 avlt 2
xrd.trace off
# ttl <default> <max> (seconds): lengthen the TPC rendezvous-grant lifetime.
# Stock XRootD defaults are dflTTL=7s / maxTTL=15s (XrdOfsTPCConfig.hh), which is
# too short for this test fleet: the debug/TSan build plus the nginx destination's
# retry-poll open (TPC_OPEN_WAIT_RETRY_SEC) mean the destination's pull-open can
# land >15s after the source issues the single-use grant, so the source rejects
# it with "tpc authorization expired" ([3010]). A longer grant window lets the
# legitimate pull-open redeem the grant; it does not change what is being tested.
ofs.tpc ttl 300 600 streams 4 pgm {XRDCP_BIN} --server
