# nginx_hardening_http_seccomp.conf — HTTP-only (WebDAV, no stream block) server
# with `brix_seccomp enforce` in the location, for test_privilege_hardening_root.py.
#
# Proves the fix that makes WebDAV/S3/cvmfs (HTTP-only) workers seccomp-filtered:
# the `brix_seccomp` directive now works in the http context and the filter is
# installed from the WebDAV worker init (the stream init_process early-returns for
# an http-only config), so the worker comes up with Seccomp:2 and still serves.
#
# Launcher-provided : PORT LOG_DIR TMP_DIR ; Test-provided : EXPORT.
user nobody;
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 32; }

http {
    access_log off;
    client_body_temp_path {TMP_DIR};
    server {
        listen 127.0.0.1:{PORT};
        location / {
            brix_webdav          on;
            brix_webdav_auth     none;
            brix_allow_write     on;
            brix_storage_backend posix:{EXPORT};
            brix_seccomp         enforce;
        }
    }
}
