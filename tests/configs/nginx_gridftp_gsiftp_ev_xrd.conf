# gsiftp:// GridFTP gateway (GSI control channel, event engine) fronting an
# upstream *xrootd* storage server over root:// — the legacy gsiftp → xrootd
# gateway. The gsiftp client delegates its X.509 proxy on the control channel;
# the gateway forwards that proxy to the xroot backend so the upstream
# authenticates AS the user (per-request PASSTHROUGH by default).
#
# The named brix_credential block supplies the CA directory used to VERIFY the
# upstream host certificate; {CRED_MODE_LINE} injects an optional `mode` line
# (empty = default PASSTHROUGH forwarding, `mode select;` = pin the service
# identity and never forward the client proxy — the security-negative variant).
#
# Rendered through the registry: {PORT}/{LOG_DIR}/{DATA_ROOT} from the launcher,
# PKI paths ({SERVER_CERT}/{SERVER_KEY}/{CA_DIR}) and the upstream
# ({REF_HOST}:{REF_PORT}) from the spec.
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 64; }
stream {
    brix_credential gsixrd {
        ca_dir {CA_DIR};
        {CRED_MODE_LINE}
    }
    server {
        listen {BIND_HOST}:{PORT};
        brix_gridftp on;
        brix_gridftp_export     {DATA_ROOT};
        brix_gridftp_allow_write on;
        brix_gridftp_gsi        on;
        brix_gridftp_certificate     {SERVER_CERT};
        brix_gridftp_certificate_key {SERVER_KEY};
        brix_gridftp_trusted_ca      {CA_DIR};
        brix_gridftp_storage_backend    root://{REF_HOST}:{REF_PORT};
        brix_gridftp_storage_credential gsixrd;
    }
}
