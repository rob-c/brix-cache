# Reference xrootd — GSI data server (rendered by refxrootd.sh:write_gsi_ref_cfg).
# Placeholders: {PORT} {DATA_DIR} {ADMIN_DIR} {RUN_DIR} {SECLIB} {CA_DIR}
#               {SERVER_CERT} {SERVER_KEY}
xrd.port {PORT}
xrd.network nodnr
xrd.allow host *
oss.localroot {DATA_DIR}
all.export /
all.adminpath {ADMIN_DIR}
all.pidpath   {RUN_DIR}
xrd.sched mint 2 maxt 4 avlt 2
xrd.trace off
xrootd.seclib {SECLIB}
sec.protocol gsi -certdir:{CA_DIR} -cert:{SERVER_CERT} -key:{SERVER_KEY} -gridmap:none -gmapopt:10
sec.protbind * gsi
