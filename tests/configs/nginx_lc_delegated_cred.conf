# $brix_delegated_cred — template for test_delegated_cred.py (registry
# lifecycle).
# Launcher-provided: LOG_DIR PORT TMP_DIR DATA_ROOT.
# Test-provided: HOST_CERT HOST_KEY CA_CERT CRED_DIR.
#
# Fail-closed TLS front leg; the location has NO brix handler at all — the
# variable resolves from the TLS layer alone, echoing the verified client's
# delegated-credential path (empty = none), exactly how a credential-
# forwarding gateway consumes it via proxy_ssl_certificate.
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
daemon on;

events { worker_connections 64; }

http {
    access_log {LOG_DIR}/access.log;
    client_body_temp_path {TMP_DIR};

    server {
        listen 127.0.0.1:{PORT} ssl;
        ssl_certificate         {HOST_CERT};
        ssl_certificate_key     {HOST_KEY};
        ssl_client_certificate  {CA_CERT};
        ssl_verify_client       on;
        ssl_verify_depth        10;
        brix_webdav_proxy_certs on;

        brix_storage_credential_dir {CRED_DIR};

        location / {
            default_type text/plain;
            return 200 "$brix_delegated_cred";
        }
    }
}
