# Password-auth + pblock-backend template for test_pblock_pwd_multiuser.py:
# multi-account root:// access against a pblock export with catalog-internal
# ownership (BRIX_SD_CRED_IDENTITY) enforcement.
# Rendered through the phase-81 registry (LifecycleHarness): {PORT}, {LOG_DIR}
# and {DATA_ROOT} (the pblock export) come from the launcher; {PWD_FILE} via the
# spec's template_values.
daemon on;
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_export {DATA_ROOT};
        brix_storage_backend pblock;
        brix_pblock_block_size 1m;
        brix_auth pwd;
        brix_pwd_file {PWD_FILE};
        brix_allow_write on;
        brix_upload_resume off;
    }
}
