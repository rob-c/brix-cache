# Metadata-stress standalone root:// fileserver (registry lifecycle) for
# test_metadata_stress.py.  A throwaway anonymous root:// export used to hammer
# cheap/expensive metadata ops and assert clean load-shedding.
# Launcher-provided: LOG_DIR PORT.
# Test-provided via template_values: BIND_HOST DATA_DIR (must exist at parse time)
#   RL_ZONE (optional `brix_rate_limit_zone ...;`, "" when unused)
#   RL_RULE (optional per-server `brix_rate_limit_rule ...;`, "" when unused).
worker_processes 1;
error_log {LOG_DIR}/error.log error;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 512; }
stream {
    {RL_ZONE}
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        {RL_RULE}
    }
}
