# Self-contained WebDAV+TPC template exercising the RFC 8693 token-exchange
# credential-delegation directive surface (hardening item A-5).  A COPY carrying
# `Credential: token-exchange` + an `Authorization: Bearer <subject>` reaches
# tpc_cred_rfc8693_exchange, which stages the OAuth2 request body through the
# harmonized brix_cred_stage_write() facility — a 0600 file in the per-uid
# /dev/shm/brix-creds.<euid> tmpfs dir, never world-traversable /tmp — before
# fork/exec'ing curl to {TOKEN_ENDPOINT}.
#
# {TOKEN_ENDPOINT} is intentionally pointed at a dead loopback port by the test,
# so the exchange fails (502) AFTER staging: what the test asserts is that no
# credential temp file leaked into /tmp, i.e. A-5's confinement held.
#
# Launcher-provided: LOG_DIR TMP_DIR PORT.  Test-provided: BIND_HOST DATA_DIR
# (must exist at config-parse time) TOKEN_ENDPOINT.
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log warn;
daemon on;

events { worker_connections 64; }

http {
    access_log off;
    client_max_body_size 8m;
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path       {TMP_DIR}/pt;
    fastcgi_temp_path     {TMP_DIR}/ft;
    uwsgi_temp_path       {TMP_DIR}/ut;
    scgi_temp_path        {TMP_DIR}/st;

    server {
        listen {BIND_HOST}:{PORT};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_auth none;
            brix_allow_write on;
            brix_webdav_tpc on;
            # The transfer target and the token endpoint are both loopback in
            # this self-contained lab; permit that.
            brix_webdav_tpc_allow_local on;
            brix_webdav_tpc_timeout 5;
            # A-5 directive surface under test:
            brix_webdav_tpc_token_endpoint {TOKEN_ENDPOINT};
            brix_webdav_tpc_token_scope storage.read;
        }
    }
}
