worker_processes {WORKERS};
daemon on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log notice;
{THREAD_POOL_LINE}
events { worker_connections 1024; }
stream {
    server {
        listen {PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
    }
    server {
        listen {GSI_PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth gsi;
        brix_certificate     {CERT};
        brix_certificate_key {KEY};
        brix_trusted_ca      {CERT};
{GSI_KNOBS}    }
}
