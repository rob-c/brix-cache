# Phase-20 functional KV/rate-limit HTTP template for test_phase20_kv_shm.py:
# a WebDAV location with an IP rate limiter (1r/s burst=2) on the primary port
# and a metrics endpoint on the METRICS_PORT extra_port, proving the limiter
# sheds with 429 and that the KV Prometheus counters are exported.
# Rendered through the phase-81 registry (LifecycleHarness): the primary port,
# the log dir, the temp dir and the posix export come from the launcher;
# METRICS_PORT rides the spec's extra_ports.
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 64; }
http {
    client_body_temp_path {TMP_DIR};
    proxy_temp_path        {TMP_DIR};
    fastcgi_temp_path      {TMP_DIR};
    uwsgi_temp_path        {TMP_DIR};
    scgi_temp_path         {TMP_DIR};
    access_log off;

    brix_kv_zone h_rl 2m key=256 val=16;

    server {
        listen 127.0.0.1:{PORT};
        location / {
            brix_webdav      on;
            brix_storage_backend posix:{DATA_ROOT};
            brix_webdav_auth none;
            brix_rate_limit  zone=h_rl rate=1r/s burst=2 key=ip;
        }
    }
    server {
        listen 127.0.0.1:{METRICS_PORT};
        location /metrics { brix_metrics on; }
    }
}
