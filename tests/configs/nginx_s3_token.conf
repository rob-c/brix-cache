worker_processes 1;
thread_pool default threads=2 max_queue=256;
error_log {LOG_DIR}/error.log info;

events { worker_connections 128; }

http {
    client_body_temp_path {TMP_DIR};
    proxy_temp_path       {TMP_DIR};
    fastcgi_temp_path     {TMP_DIR};
    uwsgi_temp_path       {TMP_DIR};
    scgi_temp_path        {TMP_DIR};
    sendfile on;
    client_max_body_size 1g;

    # S3-compatible endpoint with enforcing WLCG bearer-token authentication.
    # brix_s3_token on makes the port enforcing: requests must carry a valid
    # Bearer JWT (storage.read:/ or storage.write:/ scope as required).
    # SigV4 and Bearer are mutually exclusive per request (INVARIANT §6).
    server {
        listen {PORT};
        server_name localhost;

        access_log {LOG_DIR}/s3_token_access.log;

        location / {
            brix_s3                  on;
            brix_storage_backend     posix:{DATA_DIR};
            brix_s3_bucket           testbucket;
            brix_allow_write         on;

            brix_s3_token            on;
            brix_s3_token_jwks       {TOKEN_DIR}/jwks.json;
            brix_s3_token_issuer     "{TOKEN_ISSUER}";
            brix_s3_token_audience   "{TOKEN_AUDIENCE}";
        }
    }
}
