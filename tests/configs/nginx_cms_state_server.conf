# CMS *server* (manager) accepting inbound data-node logins — registry-lifecycle
# template for test_cms_state_have_select.py. No allowlist, so any peer may dial in.
# Launcher-provided: LOG_DIR PORT.
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
events { worker_connections 128; }
stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_cms_server on;
        brix_cms_server_interval 60;
    }
}
