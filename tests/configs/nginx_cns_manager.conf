# Composite namespace manager template for test_cns.py.
# Placeholders: {LOG_DIR} {BIND_HOST} {MANAGER_PORT} {CMS_PORT}
worker_processes 1;
daemon off;
master_process off;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{MANAGER_PORT};
        brix_root on;
        brix_auth none;
        brix_manager_mode on;
        brix_cns collect;
    }

    server {
        listen {BIND_HOST}:{CMS_PORT};
        brix_cms_server on;
    }
}
