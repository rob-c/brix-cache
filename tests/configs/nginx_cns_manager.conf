# Composite name-space manager — registry-lifecycle template for test_cns.py.
# brix_manager_mode + brix_cns collect on the manager port, plus a CMS server
# on CMS_PORT that the data server links to and reports its inventory over.
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
# Test-provided (extra_ports): CMS_PORT.
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_auth none;
        brix_manager_mode on;
        brix_cns collect;
    }

    server {
        listen 127.0.0.1:{CMS_PORT};
        brix_cms_server on;
    }
}
