worker_processes 1;
error_log {LOG_DIR}/error.log notice;

thread_pool default threads=4 max_queue=65536;
events { worker_connections 64; }

stream {
    server {
        listen {PORT};
        xrootd on;
        xrootd_root {DATA_DIR};
        xrootd_auth token;
        xrootd_allow_write on;
        xrootd_token_jwks     {JWKS_FILE};
        xrootd_token_issuer   {TOKEN_ISSUER};
        xrootd_token_audience {TOKEN_AUDIENCE};
        xrootd_token_jwks_refresh_interval {REFRESH_INTERVAL_MS}ms;
        xrootd_access_log {LOG_DIR}/xrootd_access.log;
    }
}
