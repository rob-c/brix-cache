worker_processes 1;
error_log {LOG_DIR}/error.log notice;

thread_pool default threads=4 max_queue=65536;
events { worker_connections 64; }

stream {
    server {
        listen {PORT};
        xrootd on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth token;
        brix_allow_write on;
        brix_token_jwks     {JWKS_FILE};
        brix_token_issuer   {TOKEN_ISSUER};
        brix_token_audience {TOKEN_AUDIENCE};
        brix_token_jwks_refresh_interval {REFRESH_INTERVAL_MS}ms;
        brix_access_log {LOG_DIR}/brix_access.log;
    }
}
