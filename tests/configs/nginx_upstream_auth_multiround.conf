# Upstream auth multiround redirector template for test_upstream_auth_multiround.py.
# Rendered through the phase-81 registry (LifecycleHarness): {PORT}, {LOG_DIR} and
# {DATA_ROOT} come from the launcher; the stub-origin {UPSTREAM_PORT} and the
# forwarded {TOKEN_FILE} come via the spec's template_values.
daemon on;
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_upstream 127.0.0.1:{UPSTREAM_PORT};
        brix_upstream_token_file {TOKEN_FILE};
    }
}
