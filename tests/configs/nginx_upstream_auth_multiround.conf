# Upstream auth multiround redirector template for test_upstream_auth_multiround.py.
daemon off;
worker_processes 1;
error_log {BASE_DIR}/err.log info;
pid {BASE_DIR}/nginx.pid;

events { worker_connections 64; }

stream {
    server {
        listen {HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_upstream {HOST}:{UPSTREAM_PORT};
        brix_upstream_token_file {TOKEN_FILE};
    }
}
