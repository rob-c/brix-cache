# Cleartext FTP gateway with brix_gridftp_verify_write ON over the posix export
# (test_gridftp_verify_write.py). After each STOR the gateway re-reads the object
# through the storage driver and CRC-checks it against the bytes it wrote, failing
# the transfer (550) if the driver did not persist them faithfully. Rendered by
# the registry (LifecycleHarness): {PORT} {LOG_DIR} {DATA_ROOT} {BIND_HOST}.
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 64; }
stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_gridftp on;
        brix_gridftp_export       {DATA_ROOT};
        brix_gridftp_allow_write  on;
        brix_gridftp_verify_write on;
    }
}
