# WebDAV checksum-on-write template for test_checksum_on_write.py (registry lifecycle).
# Launcher-provided: LOG_DIR TMP_DIR DATA_ROOT PORT.
# Test-provided: BIND_HOST, EXTRA_DIRECTIVES (per-fixture checksum directives; may be empty).
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
daemon on;

events { worker_connections 64; }

http {
    client_body_temp_path {TMP_DIR};
    proxy_temp_path       {TMP_DIR};
    fastcgi_temp_path     {TMP_DIR};
    uwsgi_temp_path       {TMP_DIR};
    scgi_temp_path        {TMP_DIR};
    access_log off;

    server {
        listen {BIND_HOST}:{PORT};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_ROOT};
            brix_webdav_auth none;
            brix_allow_write on;
            {EXTRA_DIRECTIVES}
        }
    }
}
