# MU config-guard (WebDAV) — registry-lifecycle template for
# test_mu_sidecar_config_guard.py. A cache/stage tree nested inside the export
# must be a deploy-blocking `nginx -t` error. The service-tree directive under
# test is injected via SVC_DIRECTIVES.
# Launcher-provided: LOG_DIR PORT TMP_DIR.
# Test-provided: EXPORT CA SVC_DIRECTIVES.
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/e.log crit;
daemon on;
events { worker_connections 64; }
http {
    access_log off;
    client_body_temp_path {TMP_DIR};
    proxy_temp_path       {TMP_DIR};
    fastcgi_temp_path     {TMP_DIR};
    uwsgi_temp_path       {TMP_DIR};
    scgi_temp_path        {TMP_DIR};
    server {
        listen 127.0.0.1:{PORT};
        location / {
            brix_webdav on;
            brix_export {EXPORT};
            brix_storage_backend posix:{EXPORT};
            brix_webdav_auth required;
            brix_webdav_cafile {CA};
            brix_allow_write on;
            {SVC_DIRECTIVES}
        }
    }
}
