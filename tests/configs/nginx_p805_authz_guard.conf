# P80.5 remote-authz config guard template for test_p805_remote_authz_guard.py.
# A one-server stream config whose server body is injected wholesale via the
# spec's SERVER_BODY value; the test only ever runs nginx -t against it to
# assert brix_server_guard_remote_authz fires (or stays silent).
# Rendered through the phase-81 registry (LifecycleHarness): the primary port
# and the log dir come from the launcher.  Placeholder names are kept brace-free
# in this comment so the naive template substitution never expands them here.
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 16; }
stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_auth none;
{SERVER_BODY}
    }
}
