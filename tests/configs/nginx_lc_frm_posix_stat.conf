# Plain posix export for test_frm_staging.py's stat-semantics cases (lifecycle
# harness).  Proves the posix backend does NOT treat the legacy user.frm.residency
# xattr as a stat offline signal — residency is a storage-BACKEND property (the
# brix_vfs_residency seam), not a filesystem xattr.  No FRM directives: the live
# nearline-recall surface (frm://exec + cache) is exercised by the frm_recall
# fixture, not here.
# Launcher-provided: LOG_DIR PORT.  Test-provided: BIND_HOST DATA_DIR.
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
    }
}
