# CMS fast-settle data-node — registry-lifecycle template for test_cms_fast_settle.py.
# Points at a stand-in TCP "manager" (MANAGER_PORT) to measure cold-start settling.
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
# Test-provided: LOG_LEVEL MANAGER_PORT EXTRA_DIRECTIVES.
worker_processes 1;
daemon on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log {LOG_LEVEL};

events { worker_connections 256; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
        brix_cms_manager 127.0.0.1:{MANAGER_PORT};
{EXTRA_DIRECTIVES}    }
}
