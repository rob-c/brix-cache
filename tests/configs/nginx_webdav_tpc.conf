worker_processes 1;
thread_pool default threads=2 max_queue=256;
error_log {LOG_DIR}/error.log debug;

events { worker_connections 128; }

http {
    access_log            {LOG_DIR}/access.log;
    client_body_temp_path {TMP_DIR}/client_body;
    proxy_temp_path       {TMP_DIR}/proxy;
    fastcgi_temp_path     {TMP_DIR}/fastcgi;
    uwsgi_temp_path       {TMP_DIR}/uwsgi;
    scgi_temp_path        {TMP_DIR}/scgi;

    # Source (auth required) — also acts as push origin
    server {
        listen {SOURCE_REQUIRED_PORT} ssl;
        server_name localhost;
        ssl_certificate     {SERVER_CERT};
        ssl_certificate_key {SERVER_KEY};
        ssl_verify_client   optional_no_ca;
        ssl_verify_depth    10;
        brix_webdav_proxy_certs on;
        client_max_body_size 1g;
        location / {
            brix_webdav         on;
            brix_storage_backend posix:{SOURCE_REQUIRED_ROOT};
            brix_webdav_cafile  {CA_PEM};
            brix_webdav_auth    required;
            brix_allow_write on;
            brix_webdav_tpc on;
            # Same-host tests transfer to/from root://localhost; the TPC egress
            # SSRF guard rejects loopback/private targets unless allowed.
            brix_webdav_tpc_allow_local on;
            brix_webdav_tpc_cert {CLIENT_CERT};
            brix_webdav_tpc_key {CLIENT_KEY};
            brix_webdav_tpc_cafile {CA_PEM};
            brix_webdav_tpc_timeout 10;
        }
    }

    # Source (no auth) — also acts as push origin
    server {
        listen {SOURCE_OPEN_PORT} ssl;
        server_name localhost;
        ssl_certificate     {SERVER_CERT};
        ssl_certificate_key {SERVER_KEY};
        ssl_verify_client   optional_no_ca;
        ssl_verify_depth    10;
        brix_webdav_proxy_certs on;
        client_max_body_size 1g;
        location / {
            brix_webdav         on;
            brix_storage_backend posix:{SOURCE_OPEN_ROOT};
            brix_webdav_cafile  {CA_PEM};
            brix_webdav_auth    none;
            brix_allow_write on;
            brix_webdav_tpc on;
            # Same-host tests transfer to/from root://localhost; the TPC egress
            # SSRF guard rejects loopback/private targets unless allowed.
            brix_webdav_tpc_allow_local on;
            brix_webdav_tpc_cert {CLIENT_CERT};
            brix_webdav_tpc_key {CLIENT_KEY};
            brix_webdav_tpc_cafile {CA_PEM};
            brix_webdav_tpc_timeout 10;
        }
    }

    # Dest (TPC via CA file)
    server {
        listen {DEST_CAFILE_PORT} ssl;
        server_name localhost;
        ssl_certificate     {SERVER_CERT};
        ssl_certificate_key {SERVER_KEY};
        ssl_verify_client   optional_no_ca;
        ssl_verify_depth    10;
        brix_webdav_proxy_certs on;
        client_max_body_size 1g;
        location / {
            brix_webdav         on;
            brix_storage_backend posix:{DEST_CAFILE_ROOT};
            brix_webdav_cafile  {CA_PEM};
            brix_webdav_auth    required;
            brix_allow_write on;
            brix_webdav_tpc on;
            # Same-host tests transfer to/from root://localhost; the TPC egress
            # SSRF guard rejects loopback/private targets unless allowed.
            brix_webdav_tpc_allow_local on;
            brix_webdav_tpc_cert {CLIENT_CERT};
            brix_webdav_tpc_key {CLIENT_KEY};
            brix_webdav_tpc_cafile {CA_PEM};
            brix_webdav_tpc_timeout 10;
        }
    }

    # Dest (TPC via CA directory)
    server {
        listen {DEST_CADIR_PORT} ssl;
        server_name localhost;
        ssl_certificate     {SERVER_CERT};
        ssl_certificate_key {SERVER_KEY};
        ssl_verify_client   optional_no_ca;
        ssl_verify_depth    10;
        brix_webdav_proxy_certs on;
        client_max_body_size 1g;
        location / {
            brix_webdav         on;
            brix_storage_backend posix:{DEST_CADIR_ROOT};
            brix_webdav_cadir   {CA_DIR};
            brix_webdav_auth    required;
            brix_allow_write on;
            brix_webdav_tpc on;
            # Same-host tests transfer to/from root://localhost; the TPC egress
            # SSRF guard rejects loopback/private targets unless allowed.
            brix_webdav_tpc_allow_local on;
            brix_webdav_tpc_cert {CLIENT_CERT};
            brix_webdav_tpc_key {CLIENT_KEY};
            brix_webdav_tpc_cadir {CA_DIR};
            brix_webdav_tpc_timeout 10;
        }
    }

    # Dest (TPC without service cert)
    server {
        listen {DEST_NO_SERVICE_CERT_PORT} ssl;
        server_name localhost;
        ssl_certificate     {SERVER_CERT};
        ssl_certificate_key {SERVER_KEY};
        ssl_verify_client   optional_no_ca;
        ssl_verify_depth    10;
        brix_webdav_proxy_certs on;
        client_max_body_size 1g;
        location / {
            brix_webdav         on;
            brix_storage_backend posix:{DEST_NO_SERVICE_CERT_ROOT};
            brix_webdav_cafile  {CA_PEM};
            brix_webdav_auth    required;
            brix_allow_write on;
            brix_webdav_tpc on;
            brix_webdav_tpc_allow_local on;
            brix_webdav_tpc_cafile {CA_PEM};
            brix_webdav_tpc_timeout 10;
        }
    }

    # Dest (TPC disabled)
    server {
        listen {DEST_DISABLED_PORT} ssl;
        server_name localhost;
        ssl_certificate     {SERVER_CERT};
        ssl_certificate_key {SERVER_KEY};
        ssl_verify_client   optional_no_ca;
        ssl_verify_depth    10;
        brix_webdav_proxy_certs on;
        client_max_body_size 1g;
        location / {
            brix_webdav         on;
            brix_storage_backend posix:{DEST_DISABLED_ROOT};
            brix_webdav_cafile  {CA_PEM};
            brix_webdav_auth    required;
            brix_allow_write on;
            brix_webdav_tpc off;
        }
    }

    # Dest (read-only with TPC)
    server {
        listen {DEST_READONLY_PORT} ssl;
        server_name localhost;
        ssl_certificate     {SERVER_CERT};
        ssl_certificate_key {SERVER_KEY};
        ssl_verify_client   optional_no_ca;
        ssl_verify_depth    10;
        brix_webdav_proxy_certs on;
        client_max_body_size 1g;
        location / {
            brix_webdav         on;
            brix_storage_backend posix:{DEST_READONLY_ROOT};
            brix_webdav_cafile  {CA_PEM};
            brix_webdav_auth    required;
            brix_allow_write off;
            brix_webdav_tpc on;
            # Same-host tests transfer to/from root://localhost; the TPC egress
            # SSRF guard rejects loopback/private targets unless allowed.
            brix_webdav_tpc_allow_local on;
            brix_webdav_tpc_cert {CLIENT_CERT};
            brix_webdav_tpc_key {CLIENT_KEY};
            brix_webdav_tpc_cafile {CA_PEM};
            brix_webdav_tpc_timeout 10;
        }
    }
}
