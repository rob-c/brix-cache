error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
events { worker_connections 64; }

stream {
    # Shadow origin the primary replays mirrored requests to.
    server {
        listen {BIND_HOST}:{SHADOW_PORT};
        brix_root on;
        brix_storage_backend posix:{SHADOW_DATA};
        brix_auth none;
    }
    # Primary origin with stream mirroring enabled.
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
        brix_stream_mirror_url {HOST}:{SHADOW_PORT};
        brix_mirror_opcodes stat;
        brix_mirror_sample 100;
        brix_mirror_log_diverge on;
        brix_mirror_timeout 3s;
    }
}

http {
    access_log off;
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path {TMP_DIR}/pt;
    fastcgi_temp_path {TMP_DIR}/ft;
    uwsgi_temp_path {TMP_DIR}/ut;
    scgi_temp_path {TMP_DIR}/st;

    server {
        listen {BIND_HOST}:{METRICS_PORT};
        location /metrics { brix_metrics on; }
    }
}
