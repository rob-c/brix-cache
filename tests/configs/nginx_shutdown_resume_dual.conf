# Root/WebDAV resumable upload template for test_shutdown_resume.py.
# Placeholders: {BASE_DIR} {BIND_HOST} {ROOT_PORT} {HTTP_PORT} {DATA_DIR}
worker_processes 1;
pid {BASE_DIR}/nginx.pid;
error_log {BASE_DIR}/error.log info;

events { worker_connections 256; }

thread_pool default threads=4 max_queue=65536;

stream {
    server {
        listen {BIND_HOST}:{ROOT_PORT};
        brix_root on;
        brix_export {DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        brix_upload_resume on;
    }
}

http {
    access_log off;
    client_max_body_size 64m;
    client_body_temp_path {BASE_DIR}/body_tmp;
    proxy_temp_path {BASE_DIR}/proxy_tmp;
    fastcgi_temp_path {BASE_DIR}/fcgi_tmp;
    uwsgi_temp_path {BASE_DIR}/uwsgi_tmp;
    scgi_temp_path {BASE_DIR}/scgi_tmp;

    server {
        listen {BIND_HOST}:{HTTP_PORT};
        location / {
            brix_webdav on;
            brix_export {DATA_DIR};
            brix_webdav_auth none;
            brix_allow_write on;
            brix_webdav_upload_resume on;
        }
    }
}
