# Phase 36 §7 — IPv6 WebDAV proxy front (proxies to an IPv6 upstream origin).
#
# Listens on the IPv6 loopback [::1] and forwards every WebDAV request to the
# IPv6 backend origin (nginx_ipv6_upstream.conf, listening on [::1]:11245).
# This is the instance under test for the IPv6 bracket-on-emit fix in
# src/protocols/webdav/proxy_config.c (config-parse Host) and src/protocols/webdav/proxy_pool.c
# (request-time Host): the proxy must re-bracket the IPv6 literal so the
# upstream sees "Host: [::1]:11245", never the ambiguous bare "::1:11245".
#
# The upstream port (11245) is the fixed IPV6_UPSTREAM_PORT and is hardcoded
# here because xrootd_webdav_proxy_upstream takes a literal URL, not a {PORT}
# placeholder (only the PRIMARY listener is templated via start_dedicated_nginx).
#
# Pre-started by manage_test_servers.sh start-all via
#   start_dedicated_nginx "ipv6-proxy" "nginx_ipv6_proxy.conf" "{PORT}"
# DATA_DIR = ${TEST_ROOT}/data-ipv6-proxy  (settings.IPV6_PROXY_DATA_ROOT)
# LOG_DIR  = ${TEST_ROOT}/dedicated/ipv6-proxy/logs

worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid       {LOG_DIR}/nginx.pid;

events { worker_connections 256; }

http {
    client_max_body_size 64m;
    client_body_temp_path {TMP_DIR};
    proxy_temp_path       {TMP_DIR};
    fastcgi_temp_path     {TMP_DIR};
    uwsgi_temp_path       {TMP_DIR};
    scgi_temp_path        {TMP_DIR};
    default_type application/octet-stream;
    access_log {LOG_DIR}/proxy_access.log;

    server {
        listen {BIND6_HOST}:{PORT};
        server_name localhost;

        location / {
            xrootd_webdav                 on;
            xrootd_webdav_storage_backend posix:{DATA_DIR};
            xrootd_webdav_auth            none;
            xrootd_webdav_allow_write     on;
            # WebDAV reverse-proxy (xrootd_webdav_proxy/_upstream) retired in the
            # legacy-proxy cleanup; this node now serves its export directly. Its
            # test (test_ipv6_webdav_proxy.py) is module-skipped accordingly.
        }
    }
}
