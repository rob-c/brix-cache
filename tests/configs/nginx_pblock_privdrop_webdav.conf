# nginx_pblock_privdrop_webdav.conf — pblock storage backend behind a WebDAV
# gateway, deliberately launched with a ROOT worker (`user root;`) to exercise the
# pblock privilege-drop backstop for test_pblock_privilege_drop.py.
#
# pblock writes its blob files + SQLite catalog as the worker uid (it has no
# impersonation broker and never chowns). With `user root;` the worker would
# otherwise create every blob/dir/catalog.db owned by root — so the pblock driver
# permanently drops the worker to an unprivileged account (default "nobody",
# or the `user <acct>;` account when that is non-root) BEFORE creating any state.
# This config forces the root-worker case so the test can assert the on-disk data
# is owned by the dropped account and NEVER by root. Requires a root test harness.
#
# Launcher-provided : PORT LOG_DIR TMP_DIR
# Test-provided     : EXPORT (pblock backend root — permissions chosen per case:
#                     0777 for the write cases, root:0755 for the fail-closed case),
#                     BLOCK_SIZE (pblock stripe size, e.g. 1m to force multi-stripe).
user root;
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 64; }

http {
    access_log off;
    client_body_temp_path {TMP_DIR};
    proxy_temp_path        {TMP_DIR};
    fastcgi_temp_path      {TMP_DIR};
    uwsgi_temp_path        {TMP_DIR};
    scgi_temp_path         {TMP_DIR};
    client_max_body_size   64m;

    server {
        listen 127.0.0.1:{PORT};
        location / {
            brix_webdav              on;
            brix_webdav_auth         none;
            brix_allow_write         on;
            brix_storage_backend     pblock://{EXPORT};
            brix_webdav_pblock_block_size {BLOCK_SIZE};
        }
    }
}
