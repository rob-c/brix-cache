# Native TPC GSI outbound destination template for test_tpc_gsi_outbound.py.
daemon off;
worker_processes 1;
error_log {LOG_DIR}/nginx-err.log debug;
pid {BASE_DIR}/nginx.pid;

thread_pool default threads=4 max_queue=65536;

events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        brix_tpc_allow_local on;
        brix_tpc_allow_private on;
        brix_certificate {CERT_FILE};
        brix_certificate_key {KEY_FILE};
        brix_trusted_ca {CA_DIR};
        brix_access_log {LOG_DIR}/dst-access.log;
    }
}
