worker_processes {WORKERS};
daemon on;
master_process on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
events { worker_connections 256; }

stream {
    access_log off;
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
        brix_allow_write on;
    }
}

http {
    access_log off;
    server {
        listen {BIND_HOST}:{HTTP_PORT};
        location = /metrics { brix_metrics on; }
    }
}
