# WebDAV HTTP reorder harness template for resilience/run_http_reorder.py.
# Rendered through the phase-81 registry (LifecycleHarness): {PORT}, {LOG_DIR},
# {TMP_DIR} and {DATA_ROOT} come from the launcher.
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log error;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 512; }

http {
    access_log off;
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path {TMP_DIR}/pt;
    fastcgi_temp_path {TMP_DIR}/ft;
    uwsgi_temp_path {TMP_DIR}/ut;
    scgi_temp_path {TMP_DIR}/st;

    server {
        listen 127.0.0.1:{PORT};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_ROOT};
            brix_webdav_auth none;
            brix_allow_write on;
        }
    }
}
