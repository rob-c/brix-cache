# Self-contained root/WebDAV compare template for test_xrddiag_compare_davs.py.
# Placeholders: {BASE_DIR} {BIND_HOST} {ROOT_PORT} {OK_PORT} {BAD_PORT} {DATA_R} {DATA_B}
worker_processes 1;
pid {BASE_DIR}/nginx.pid;
error_log {BASE_DIR}/error.log info;

events { worker_connections 256; }

stream {
    server {
        listen {BIND_HOST}:{ROOT_PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_R};
        brix_auth none;
    }
}

http {
    access_log off;
    client_body_temp_path {BASE_DIR}/tmp;
    proxy_temp_path {BASE_DIR}/tmp;
    fastcgi_temp_path {BASE_DIR}/tmp;
    uwsgi_temp_path {BASE_DIR}/tmp;
    scgi_temp_path {BASE_DIR}/tmp;

    server {
        listen {BIND_HOST}:{OK_PORT};
        location / {
            root {DATA_R};
            brix_webdav on;
            brix_storage_backend posix:{DATA_R};
            brix_webdav_auth none;
        }
    }

    server {
        listen {BIND_HOST}:{BAD_PORT};
        location / {
            root {DATA_B};
            brix_webdav on;
            brix_storage_backend posix:{DATA_B};
            brix_webdav_auth none;
        }
    }
}
