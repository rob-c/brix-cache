# Self-contained root/WebDAV compare — registry-lifecycle template for
# test_xrddiag_compare_davs.py. A stream root:// server + a WebDAV location on
# the SAME data (the "match" plane) + a WebDAV location on DIFFERENT data (the
# "mismatch/404" plane).
# Launcher-provided: LOG_DIR PORT DATA_ROOT TMP_DIR.
# Test-provided (extra_ports): OK_PORT BAD_PORT.
# Test-provided: DATA_B.
worker_processes 1;
daemon on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;

events { worker_connections 256; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
    }
}

http {
    access_log off;
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path       {TMP_DIR}/pt;
    fastcgi_temp_path     {TMP_DIR}/ft;
    uwsgi_temp_path       {TMP_DIR}/ut;
    scgi_temp_path        {TMP_DIR}/sct;

    server {
        listen 127.0.0.1:{OK_PORT};
        location / {
            root {DATA_ROOT};
            brix_webdav on;
            brix_storage_backend posix:{DATA_ROOT};
            brix_webdav_auth none;
        }
    }

    server {
        listen 127.0.0.1:{BAD_PORT};
        location / {
            root {DATA_B};
            brix_webdav on;
            brix_storage_backend posix:{DATA_B};
            brix_webdav_auth none;
        }
    }
}
