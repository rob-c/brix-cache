# Dashboard file-browser template for test_dashboard_files.py (registry
# lifecycle).  Launcher-provided: LOG_DIR PORT TMP_DIR DATA_ROOT.  Test-provided:
# BIND_HOST OFF_PORT PASSWORD.  Keep secret-bearing placeholders out of
# comments; rendered configs may be exposed by dashboard/debug tooling.
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
daemon on;

events { worker_connections 64; }

http {
    access_log off;
    client_body_temp_path {TMP_DIR};
    proxy_temp_path       {TMP_DIR};
    fastcgi_temp_path     {TMP_DIR};
    uwsgi_temp_path       {TMP_DIR};
    scgi_temp_path        {TMP_DIR};

    server {
        listen {BIND_HOST}:{PORT};
        location /brix {
            brix_dashboard on;
            brix_admin_rate_limit off;  # whole suite shares one client IP: default per-IP cap trips under xdist
            brix_dashboard_password "{PASSWORD}";
            brix_dashboard_browse_root {DATA_ROOT};
        }
    }

    server {
        listen {BIND_HOST}:{OFF_PORT};
        location /brix {
            brix_dashboard on;
            brix_admin_rate_limit off;  # whole suite shares one client IP: default per-IP cap trips under xdist
            brix_dashboard_password "{PASSWORD}";
        }
    }
}
