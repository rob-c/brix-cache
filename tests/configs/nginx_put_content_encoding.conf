# Self-contained WebDAV/S3 content-encoding PUT template for test_put_content_encoding.py.
# Placeholders: {BASE_DIR} {BIND_HOST} {WEBDAV_PORT} {S3_PORT} {WEBDAV_DIR}
#               {S3_DIR} {BUCKET}
error_log {BASE_DIR}/logs/error.log error;
pid {BASE_DIR}/logs/nginx.pid;

events { worker_connections 64; }

http {
    client_body_temp_path {BASE_DIR}/t;
    proxy_temp_path       {BASE_DIR}/t;
    fastcgi_temp_path     {BASE_DIR}/t;
    uwsgi_temp_path       {BASE_DIR}/t;
    scgi_temp_path        {BASE_DIR}/t;
    access_log off;
    client_max_body_size 64m;

    server {
        listen {BIND_HOST}:{WEBDAV_PORT};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{WEBDAV_DIR};
            brix_webdav_auth none;
            brix_allow_write on;
        }
    }

    server {
        listen {BIND_HOST}:{S3_PORT};
        location / {
            brix_s3 on;
            brix_storage_backend posix:{S3_DIR};
            brix_s3_bucket {BUCKET};
            brix_allow_write on;
        }
    }
}

daemon off;
master_process off;
