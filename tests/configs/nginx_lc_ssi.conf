# Shared SSI stream template (registry lifecycle) for the SSI test suites.
# Launcher-provided: LOG_DIR PORT DATA_ROOT.  Test-provided: BIND_HOST and
# SSI_DIRECTIVES (the brix_ssi* lines to enable, empty for the disabled case).
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
daemon on;

events { worker_connections 128; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
        brix_allow_write on;
{SSI_DIRECTIVES}
    }
}
