# TLS source — registry-lifecycle template for test_tpc_tls.py. Requires
# in-protocol TLS (brix_tls on + a CA-signed host cert); the TPC destination
# upgrades the pull connection to TLS (kXR_gotoTLS) before reading.
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
# Test-provided: CERT_FILE KEY_FILE CA_DIR.
daemon on;
worker_processes 1;
error_log {LOG_DIR}/src-err.log info;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 64; }

stream {
    server {
        listen {PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
        brix_tls on;
        brix_certificate {CERT_FILE};
        brix_certificate_key {KEY_FILE};
        brix_trusted_ca {CA_DIR};
        brix_access_log {LOG_DIR}/src-acc.log;
    }
}
