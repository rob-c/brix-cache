error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
        brix_health_check on;
        brix_health_check_interval 15s;
        brix_health_check_timeout 4s;
        brix_health_check_threshold 2;
        brix_health_check_blacklist 45s;
        brix_health_check_type {HC_TYPE};
    }
}
