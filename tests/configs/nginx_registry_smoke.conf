worker_processes  1;
error_log  {LOG_DIR}/registry-smoke-error.log info;
pid        {LOG_DIR}/nginx.pid;

events {
    worker_connections 128;
}

stream {
    server {
        listen {PORT};
        brix_root on;
        brix_export {DATA_ROOT};
        brix_auth none;
        brix_allow_write on;
    }
}
