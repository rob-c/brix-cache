# Self-contained dashboard file-browser template for test_dashboard_files.py.
# Keep secret-bearing placeholders out of comments; rendered configs may be
# exposed by dashboard/debug tooling.
worker_processes 1;
pid {BASE_DIR}/nginx.pid;
error_log {BASE_DIR}/error.log info;

events { worker_connections 64; }

http {
    access_log off;
    client_body_temp_path {BASE_DIR}/tmp;
    proxy_temp_path       {BASE_DIR}/tmp;
    fastcgi_temp_path     {BASE_DIR}/tmp;
    uwsgi_temp_path       {BASE_DIR}/tmp;
    scgi_temp_path        {BASE_DIR}/tmp;

    server {
        listen {BIND_HOST}:{PORT};
        location /brix {
            brix_dashboard on;
            brix_dashboard_password "{PASSWORD}";
            brix_dashboard_browse_root {DATA_DIR};
        }
    }

    server {
        listen {BIND_HOST}:{OFF_PORT};
        location /brix {
            brix_dashboard on;
            brix_dashboard_password "{PASSWORD}";
        }
    }
}
