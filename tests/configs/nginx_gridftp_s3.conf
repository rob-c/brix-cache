# GridFTP gateway writing THROUGH an s3:// storage backend
# (test_gridftp_s3.py). One nginx hosts two planes:
#
#   http{}   — a brix_s3 endpoint over a posix root, the object store the
#              gateway talks to (bucket "testbucket").
#   stream{} — a brix_gridftp gateway whose storage backend is that s3 endpoint.
#              STOR/RETR/CKSM therefore travel VFS → sd_remote → SigV4 PUT/GET
#              against the http server above, proving the object-store path of
#              the unified brix_vfs_writer (staged multipart upload + read-back
#              verify) rather than the in-place POSIX/pblock path.
#
# The s3:// SigV4 keys reach sd_remote via a stream-scope brix_credential block
# named by brix_gridftp_storage_credential; the per-worker init_process replay
# (ftp_module.c) re-applies it after fork so the forked worker signs uploads.
#
# Launcher-provided: LOG_DIR TMP_DIR PORT (=gridftp) DATA_ROOT.
# Test-provided via extra_ports: S3_PORT.
# Test-provided via template_values (seeded under tmp_path, must exist at
# config-parse time): BIND_HOST S3_DIR S3_ACCESS_KEY S3_SECRET_KEY.
# TWO workers, deliberately: the GridFTP gateway handler is synchronous and the
# S3 transport (sd_remote → sd_s3) is a blocking request. With a single worker,
# the gateway blocking on its outbound SigV4 PUT to the co-hosted brix_s3 plane
# would leave no worker to accept that inbound S3 connection — a self-deadlock.
# A second worker services the S3 leg while the first is parked in the gateway.
worker_processes 2;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 64; }

http {
    access_log off;
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path       {TMP_DIR}/pt;
    fastcgi_temp_path     {TMP_DIR}/ft;
    uwsgi_temp_path       {TMP_DIR}/ut;
    scgi_temp_path        {TMP_DIR}/sct;

    server {
        listen {BIND_HOST}:{S3_PORT};
        client_max_body_size 128m;
        location / {
            brix_s3 on;
            brix_storage_backend posix:{S3_DIR};
            brix_s3_bucket testbucket;
            brix_s3_access_key {S3_ACCESS_KEY};
            brix_s3_secret_key {S3_SECRET_KEY};
            brix_s3_region us-east-1;
            brix_allow_write on;
        }
    }
}

stream {
    brix_credential s3cred {
        s3_access_key {S3_ACCESS_KEY};
        s3_secret_key {S3_SECRET_KEY};
        s3_region     us-east-1;
    }

    server {
        listen {BIND_HOST}:{PORT};
        brix_gridftp on;
        brix_gridftp_export             {DATA_ROOT};
        brix_gridftp_storage_backend    s3://{BIND_HOST}:{S3_PORT}/testbucket;
        brix_gridftp_storage_credential s3cred;
        brix_gridftp_allow_write        on;
        brix_gridftp_verify_write       on;
    }
}
