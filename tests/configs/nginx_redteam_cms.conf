# Phase-28 red-team CMS-registration-auth config template for
# test_security_redteam.py.  nginx -t only: proves brix_cms_server_allow CIDR
# validation and brix_cms_server_sss_keytab permission/format enforcement.  The
# EXTRA value carries the per-test directive lines (with any keytab path already
# substituted); its name is kept brace-free in this comment.
# Rendered through the phase-81 registry (LifecycleHarness): the primary port
# and log dir come from the launcher.
daemon on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/e.log info;
events { worker_connections 64; }
stream {
  server { listen 127.0.0.1:{PORT};
    brix_cms_server on;
    {EXTRA}
  } }
