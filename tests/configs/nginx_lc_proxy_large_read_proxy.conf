# Transparent proxy in front of the backend for test_proxy_large_read.py
# (registry lifecycle).  Launcher-provided: LOG_DIR PORT.  Test-provided:
# BIND_HOST BACKEND_PORT.
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
events { worker_connections 256; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_auth none;
        brix_tap_proxy on;
        brix_tap_proxy_upstream {BIND_HOST}:{BACKEND_PORT};
        brix_tap_proxy_auth anonymous;
    }
}
