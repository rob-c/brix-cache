# Dedicated fleet instance for the ZIP member-access tests (test_zip_member.py).
# Serves one export over three protocols with brix zip-member access enabled:
#   stream root://  {PORT}              (brix_zip_access)
#   WebDAV/HTTP     {HTTP_WEBDAV_PORT}  (brix_webdav_zip_access)
#   S3 REST         {S3_PORT}           (brix_s3_zip_access)
# Started once by start_all_dedicated (dedicated.sh) so no test spins up its own
# nginx; the test seeds a.zip into {DATA_DIR} and attaches to these ports.
worker_processes 1;
error_log {LOG_DIR}/error.log info;

thread_pool default threads=2 max_queue=256;
events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_zip_access on;
        brix_access_log {LOG_DIR}/brix_access.log;
    }
}

http {
    server {
        listen 127.0.0.1:{HTTP_WEBDAV_PORT};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_auth none;
            brix_webdav_zip_access on;
        }
    }
    server {
        listen 127.0.0.1:{S3_PORT};
        location / {
            brix_s3 on;
            brix_storage_backend posix:{DATA_DIR};
            brix_s3_bucket zipbucket;
            brix_s3_zip_access on;
        }
    }
}
