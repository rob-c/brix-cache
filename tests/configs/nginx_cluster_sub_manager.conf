worker_processes 1;
error_log {LOG_DIR}/error.log debug;
pid       {LOG_DIR}/nginx.pid;

events { worker_connections 128; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        xrootd on;
        xrootd_auth none;
        xrootd_manager_mode on;
    }
    server {
        listen {BIND_HOST}:{CMS_PORT};
        xrootd_cms_server on;
    }
    server {
        listen {BIND_HOST}:{SELF_REGISTER_PORT};
        xrootd on;
        xrootd_root /tmp;
        xrootd_auth none;
        xrootd_cms_manager {BIND_HOST}:{META_CMS_PORT};
        xrootd_cms_paths /;
        xrootd_cms_interval 5;
        xrootd_listen_port {PORT};
    }
}
