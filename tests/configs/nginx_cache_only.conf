worker_processes 1;
error_log {LOG_DIR}/error_cache_only.log info;

thread_pool default threads=4 max_queue=65536;
events { worker_connections 64; }

stream {

    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_auth      none;

        # Composable read-through cache: the anonymous nginx origin (11094) is the
        # storage backend; cache fills land in the local posix store; the advertised
        # logical root is "/" (Ganesha-style — cache_store physical, cache_root logical).
        brix_storage_backend  root://localhost:11094;
        brix_cache_store      posix:{CACHE_DIR};
        brix_cache_export       /;
    }
}
