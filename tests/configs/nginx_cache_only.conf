worker_processes 1;
error_log {LOG_DIR}/error_cache_only.log info;

thread_pool default threads=4 max_queue=65536;
events { worker_connections 64; }

stream {

    server {
        listen {BIND_HOST}:{PORT};
        xrootd on;
        xrootd_root      {DATA_DIR};
        xrootd_auth      none;

        xrootd_cache            on;
        xrootd_cache_root       {CACHE_DIR};
        xrootd_cache_origin     localhost:11094; # Shared anonymous instance as origin
    }
}
