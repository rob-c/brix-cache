# Dedicated nginx config for proxy with dead upstream (PROXY_DEAD_NGINX_PORT).
#
# Proxy mode pointing at a port where nothing listens — tests backend-unavailable behavior.

worker_processes 1;
thread_pool default threads=2 max_queue=256;
error_log {LOG_DIR}/error.log debug;
pid       {LOG_DIR}/nginx.pid;

events { worker_connections 256; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_auth none;
        brix_tap_proxy on;
        # Upstream port intentionally has nothing listening (PROXY_DEAD_UPSTREAM_PORT)
        brix_tap_proxy_upstream {BIND_HOST}:{UPSTREAM_PORT};
        brix_tap_proxy_auth anonymous;
    }
}
