# Self-contained config template for test_frm_phase1_http.py (registry lifecycle).
# Launcher-provided: LOG_DIR PORT TMP_DIR.
# Test-provided:     BIND_HOST DATA_DIR STREAM_PORT S3_PORT WEBDAV_PORT.
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{STREAM_PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
    }
}

http {
    access_log off;
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path       {TMP_DIR}/pt;
    fastcgi_temp_path     {TMP_DIR}/ft;
    uwsgi_temp_path       {TMP_DIR}/ut;
    scgi_temp_path        {TMP_DIR}/st;

    server {
        listen {BIND_HOST}:{PORT};
        location = /metrics { brix_metrics on; }
    }

    server {
        listen {BIND_HOST}:{S3_PORT};
        location /tapebucket/ {
            brix_s3 on;
            brix_storage_backend posix:{DATA_DIR};
            brix_s3_bucket tapebucket;
            brix_s3_region us-east-1;
        }
    }

    server {
        listen {BIND_HOST}:{WEBDAV_PORT};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_auth none;
        }
    }
}
