# Mirror front template for test_mirror_upstream.py.
worker_processes 1;
error_log {BASE_DIR}/logs/error.log info;
pid {BASE_DIR}/logs/nginx.pid;

events { worker_connections 128; }

stream {
    server {
        listen 0.0.0.0:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        brix_stream_mirror_url {UPSTREAM_HOST}:{UPSTREAM_PORT};
{EXTRA_DIRECTIVE}
        brix_mirror_log_diverge on;
    }
}
