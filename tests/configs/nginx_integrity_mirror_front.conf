# Mirror front for test_integrity_matrix.py TestMirrorTopology: a root:// storage
# server that transparently shadow-mirrors selected opcodes to a sink while the
# client reads/writes it — client integrity must be unaffected by the mirroring.
# Rendered through the registry (LifecycleHarness); {PORT}/{DATA_ROOT}/{LOG_DIR}
# come from the launcher, {MIRROR_SINK} (host:port of the running sink) via the spec.
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
events {}
stream {
    server {
        listen 0.0.0.0:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
        brix_allow_write on;
        brix_stream_mirror_url {MIRROR_SINK};
        brix_mirror_opcodes open read readv stat;
    }
}
