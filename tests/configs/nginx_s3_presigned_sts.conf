worker_processes 1;
thread_pool default threads=2 max_queue=256;
error_log {LOG_DIR}/error.log debug;

events { worker_connections 128; }

http {
    server {
        listen {PORT};
        access_log {LOG_DIR}/s3_access.log;

        location / {
            brix_s3             on;
            brix_storage_backend posix:{DATA_DIR};
            brix_s3_bucket      testbucket;
            brix_s3_access_key  test-access-key;
            brix_s3_secret_key  test-secret-key;
            brix_s3_region      us-east-1;
            brix_allow_write on;
            brix_s3_allow_unsigned_session_token on;
        }
    }
}
