# FRM materialize-to-scratch template for test_frm_scratch.py (registry
# lifecycle).  Launcher-provided: LOG_DIR PORT.  Test-provided: BIND_HOST
# DATA_DIR QUEUE_PATH COPY_CMD SCRATCH_DIRS (conditional per-test directives).
worker_processes 1;
thread_pool frmpool threads=2;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
env FRM_AUDIT_LOG;
env FRM_RECALL_TEXT;
env FRM_DATA_DIR;
env FRM_TAPE_DIR;
events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_thread_pool frmpool;
        brix_frm on;
        brix_frm_queue_path {QUEUE_PATH};
        brix_frm_copycmd {COPY_CMD};
        brix_frm_copymax 4;
        brix_frm_stage_wait 1;
{SCRATCH_DIRS}    }
}
