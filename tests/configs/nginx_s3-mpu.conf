worker_processes 1;
error_log {LOG_DIR}/error.log info;

events { worker_connections 128; }

# Dedicated WRITABLE S3 server for tests/test_s3_upload_part_copy_traversal.py
# (S3 UploadPartCopy confinement: a copy-source symlink/"../" must obey the same
# confined-resolver contract as every other op).  Pre-started by
# manage_test_servers.sh start-all so the test never spawns its own instance;
# anonymous (unauthenticated) S3 + xrootd_s3_allow_write on, isolated data root
# data-s3-mpu.  The test seeds legit.txt and an out-of-root symlink directly into
# that data root (it shares the local filesystem with this server).
http {
    client_body_temp_path {TMP_DIR};
    proxy_temp_path        {TMP_DIR};
    fastcgi_temp_path      {TMP_DIR};
    uwsgi_temp_path        {TMP_DIR};
    scgi_temp_path         {TMP_DIR};

    server {
        listen {PORT};
        access_log {LOG_DIR}/s3_access.log;

        location / {
            xrootd_s3             on;
            xrootd_s3_storage_backend posix:{DATA_DIR};
            xrootd_s3_bucket      testbucket;
            xrootd_s3_allow_write on;
        }
    }
}
