# MU root:// DIRECT (non-cache) GSI+authdb node — registry-lifecycle template for
# test_root_open_existence_oracle.py. A no-root check of the read-open existence-oracle
# fix (open_request.c): no brix_cache_store, so reads take the direct open path where the
# auth gate now runs BEFORE the existence probe — a denied principal gets kXR_NotAuthorized
# whether or not the path exists (no NotFound-vs-NotAuthorized oracle). Impersonation off
# (the auth gate is a worker-level wire decision).
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
# Test-provided: CERT KEY CA VOMSDIR CA_DIR AUTHDB.
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/direct_authz_error.log info;
thread_pool default threads=2 max_queue=256;
daemon on;
events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;

        brix_export           {DATA_ROOT};
        brix_storage_backend  posix:{DATA_ROOT};

        brix_auth gsi;
        brix_certificate     {CERT};
        brix_certificate_key {KEY};
        brix_trusted_ca      {CA};
        brix_vomsdir         {VOMSDIR};
        brix_voms_cert_dir   {CA_DIR};

        brix_authdb          {AUTHDB};

        brix_impersonation off;

        brix_allow_write on;
        brix_access_log {LOG_DIR}/direct_authz_access.log;
    }
}
