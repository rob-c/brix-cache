error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
events { worker_connections 64; }

stream {
    # Manager (redirector) with active health checks enabled.
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_auth none;
        brix_manager_mode on;
        brix_health_check on;
        brix_health_check_interval 2s;
        brix_health_check_timeout 3s;
    }
    # CMS server endpoint data servers register with.
    server {
        listen {BIND_HOST}:{CMS_PORT};
        brix_cms_server on;
    }
    # Live data server that registers itself via loopback CMS.
    server {
        listen {BIND_HOST}:{DS_PORT};
        brix_root on;
        brix_auth none;
        brix_storage_backend posix:{DATA_ROOT};
        brix_cms_manager {HOST}:{CMS_PORT};
        brix_cms_paths /data;
        brix_cms_interval 2;
        brix_listen_port {DS_PORT};
    }
}

http {
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path {TMP_DIR}/pt;
    fastcgi_temp_path {TMP_DIR}/ft;
    uwsgi_temp_path {TMP_DIR}/ut;
    scgi_temp_path {TMP_DIR}/st;
    access_log off;

    server {
        listen {BIND_HOST}:{METRICS_PORT};
        location /metrics { brix_metrics on; }
    }
}
