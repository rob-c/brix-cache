worker_processes 1;
error_log {LOG_DIR}/error.log info;

events { worker_connections 64; }

http {
    access_log off;
    client_max_body_size 16m;
    client_body_buffer_size 4k;
    client_body_in_file_only clean;
    client_body_temp_path {TMP_DIR};
    proxy_temp_path       {TMP_DIR};
    fastcgi_temp_path     {TMP_DIR};
    uwsgi_temp_path       {TMP_DIR};
    scgi_temp_path        {TMP_DIR};

    # Plain HTTP WebDAV with read-through cache — Section 3.1 tests.
    # Cache root is the "cache" sub-directory under DATA_DIR so tests can
    # pre-populate cache files independently from the origin files.
    server {
        listen {BIND_HOST}:{PORT};
        server_name localhost;

        location / {
            xrootd_webdav            on;
            xrootd_webdav_storage_backend posix:{DATA_DIR};
            xrootd_webdav_auth       none;
            xrootd_webdav_allow_write on;
            xrootd_webdav_cache_root {CACHE_DIR};
        }
    }
}
