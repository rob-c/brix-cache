worker_processes 1;
thread_pool default threads=2 max_queue=256;
error_log {LOG_DIR}/error.log info;

events { worker_connections 64; }

http {
    access_log off;
    client_max_body_size 16m;
    client_body_buffer_size 4k;
    client_body_in_file_only clean;
    client_body_temp_path {TMP_DIR};
    proxy_temp_path       {TMP_DIR};
    fastcgi_temp_path     {TMP_DIR};
    uwsgi_temp_path       {TMP_DIR};
    scgi_temp_path        {TMP_DIR};

    # Plain HTTP WebDAV with read-through cache — Section 3.1 tests.
    # Export root is {DATA_DIR}/origin and cache root is {DATA_DIR}/cache so
    # they are siblings: neither is beneath the other, satisfying the
    # brix_webdav_cache_root security check that rejects cache_root beneath
    # the export root (which would expose .cinfo/.meta sidecars).
    server {
        listen {BIND_HOST}:{PORT};
        server_name localhost;

        location / {
            brix_webdav            on;
            brix_storage_backend posix:{DATA_DIR}/origin;
            brix_webdav_auth       none;
            brix_allow_write on;
            brix_webdav_cache_root {CACHE_DIR};
        }
    }
}
