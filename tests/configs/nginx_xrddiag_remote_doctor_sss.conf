# SSS-authenticated stream server — registry-lifecycle template for the
# remote-doctor auth-suite (anon-access-denied) case.
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
# Test-provided: KEYTAB.
worker_processes 1;
daemon on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;

events { worker_connections 256; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth sss;
        brix_sss_keytab {KEYTAB};
    }
}
