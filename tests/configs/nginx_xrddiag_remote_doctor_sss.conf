# SSS-authenticated stream server template for remote-doctor auth-suite tests.
# Placeholders: {BASE_DIR} {BIND_HOST} {PORT} {DATA_DIR} {KEYTAB}
worker_processes 1;
pid {BASE_DIR}/nginx.pid;
error_log {BASE_DIR}/error.log info;

events { worker_connections 256; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth sss;
        brix_sss_keytab {KEYTAB};
    }
}
