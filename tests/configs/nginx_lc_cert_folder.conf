# brix_client_certificate_folder — template for
# test_client_certificate_folder.py (registry lifecycle).
# Launcher-provided: LOG_DIR PORT TMP_DIR DATA_ROOT.
# Test-provided: HOST_CERT HOST_KEY CERT_FOLDER.
#
# Fail-closed TLS front leg with NO ssl_client_certificate line at all:
# the directive auto-resolves the hostcert's issuer file out of the hashed
# CA directory (CERT_FOLDER) at parse time and feeds it to the stock
# machinery — the shape of a grid host that only ships
# /etc/grid-security/certificates.
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
daemon on;

events { worker_connections 64; }

http {
    access_log {LOG_DIR}/access.log;
    client_body_temp_path {TMP_DIR};

    server {
        listen 127.0.0.1:{PORT} ssl;
        ssl_certificate         {HOST_CERT};
        ssl_certificate_key     {HOST_KEY};
        brix_client_certificate_folder {CERT_FOLDER};
        ssl_verify_client       on;
        ssl_verify_depth        10;
        brix_webdav_proxy_certs on;

        location / {
            return 204;
        }
    }
}
