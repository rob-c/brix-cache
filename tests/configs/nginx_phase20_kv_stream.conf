# Phase-20 KV/rate-limit stream config-validation template for
# test_phase20_kv_shm.py.  The test only runs nginx -t against it to assert the
# brix_kv_zone / brix_token_cache / brix_auth_cache / brix_rate_limit directives
# parse (or are rejected with a clear message).  The top-level stream zone lines
# are injected via STREAM_ZONES and the per-server directives via SERVER_BODY;
# both value names are kept brace-free in this comment so the template
# substitution never expands them here.
# Rendered through the phase-81 registry (LifecycleHarness): the primary port,
# the log dir and the posix export come from the launcher.
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 64; }
stream {
{STREAM_ZONES}
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
{SERVER_BODY}
    }
}
