# FRM async recall template for test_frm_async.py (registry lifecycle harness).
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
env FRM_DATA_DIR;
env FRM_TAPE_DIR;
env FRM_LATENCY_MS;
env FRM_AUDIT_LOG;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_frm on;
        brix_frm_queue_path {QUEUE_PATH};
        brix_frm_copycmd {COPY_CMD};
        brix_frm_copymax 4;
        brix_frm_async_recall on;
        brix_frm_stage_ttl 30s;
    }
}

http {
    access_log off;
    server {
        listen {BIND_HOST}:{METRICS_PORT};
        location = /metrics { brix_metrics on; }
    }
}

daemon on;
