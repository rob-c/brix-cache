# Self-contained config template for _test_evil_actor_v3_helpers.py.
# Placeholders: {WORKERS} {PREFIX} {BIND_HOST} {ROOT_PORT} {ROOT_TLS_PORT}
#               {HTTPS_PORT} {METRICS_PORT} {DATA_DIR} {CERT} {KEY}
#               {FRM_BLOCK}
worker_processes {WORKERS};
daemon on;
master_process on;
pid {PREFIX}/logs/nginx.pid;
error_log {PREFIX}/logs/error.log info;
thread_pool aiopool threads=4 max_queue=8192;
env FRM_DATA_DIR; env FRM_TAPE_DIR; env FRM_LATENCY_MS; env FRM_AUDIT_LOG; env FRM_FAIL_MODE;

events { worker_connections 1024; }

stream {
    server {
        listen {BIND_HOST}:{ROOT_PORT} reuseport;
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        brix_thread_pool aiopool;
        brix_memory_budget 6m;
{FRM_BLOCK}    }
    server {
        listen {BIND_HOST}:{ROOT_TLS_PORT} reuseport;
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        brix_thread_pool aiopool;
        brix_memory_budget 6m;
        brix_tls on;
        brix_certificate {CERT};
        brix_certificate_key {KEY};
    }
}

http {
    access_log off;
    client_body_temp_path {PREFIX}/logs/cbt;
    proxy_temp_path       {PREFIX}/logs/pt;
    fastcgi_temp_path     {PREFIX}/logs/ft;
    uwsgi_temp_path       {PREFIX}/logs/ut;
    scgi_temp_path        {PREFIX}/logs/st;

    server {
        listen {BIND_HOST}:{HTTPS_PORT} ssl;
        ssl_certificate {CERT};
        ssl_certificate_key {KEY};
        location = /metrics { brix_metrics on; }
        location /s3b/ {
            brix_s3 on;
            brix_storage_backend posix:{DATA_DIR};
            brix_s3_bucket s3b;
            brix_s3_region us-east-1;
        }
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_auth none;
            brix_allow_write on;
        }
    }
    server {
        listen {BIND_HOST}:{METRICS_PORT};
        location = /metrics { brix_metrics on; }
    }
}
