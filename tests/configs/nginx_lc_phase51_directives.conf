# Phase-51 resilience directive-parse fixture (registry lifecycle) for
# test_phase51_resilience.py::test_new_stream_directives_parse.  Proves the new
# stream-side directives are accepted and merge cleanly under `nginx -t`; the
# listeners are parse-only (never bound), so literal ports are fine.
# Launcher-provided: LOG_DIR DATA_ROOT (auto-created before -t).
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 64; }
stream {
    server {
        listen 127.0.0.1:19951;
        brix_root on; brix_storage_backend posix:{DATA_ROOT}; brix_auth none;
        brix_gsi_max_inflight_handshakes 128;
    }
    server {
        listen 127.0.0.1:19952;
        brix_cms_server on;
        brix_cms_server_max_connections 1024;
        brix_cms_server_max_connections_per_ip 64;
    }
    server {
        listen 127.0.0.1:19953;
        brix_root on; brix_storage_backend posix:{DATA_ROOT}; brix_auth none;
        brix_manager_mode on;
    }
}
