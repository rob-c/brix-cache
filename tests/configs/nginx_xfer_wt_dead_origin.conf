# Self-contained write-through async config for test_xfer_wt_{journal,replay}.py.
# Placeholders: {BASE_DIR} {BIND_HOST} {PORT} {DATA_DIR} {QUEUE_PATH}
worker_processes 1;
error_log {BASE_DIR}/logs/error.log info;
pid {BASE_DIR}/logs/nginx.pid;
thread_pool wtpool threads=2 max_queue=4096;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_export {DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        brix_thread_pool wtpool;
        brix_write_through on;
        brix_wt_mode async;
        brix_wt_origin 127.0.0.1:1;        # dead origin -> flush always fails
        brix_frm on;
        brix_frm_queue_path {QUEUE_PATH};
    }
}

daemon off;
master_process off;
