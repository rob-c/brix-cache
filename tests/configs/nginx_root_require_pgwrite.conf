# Native root:// server exercising brix_require_pgwrite (fault-hardening #11).
#
# Two stream servers over the SAME posix export, differing only in the knob:
#   {PORT}     — brix_require_pgwrite on : a cleartext kXR_write/kXR_writev
#                carrying data is refused (kXR_Unsupported); only the per-page
#                CRC32c kXR_pgwrite path is accepted.
#   {OFF_PORT} — knob absent (default off): plain kXR_write is accepted, proving
#                the gate is genuinely opt-in.
#
# Plain posix backend (random-write, in-place): the gate lives at the protocol
# edge in brix_handle_write / brix_handle_writev, before any staged/in-place
# routing, so a simple export is the honest place to prove it.
#
# Launcher-provided: LOG_DIR TMP_DIR PORT DATA_ROOT.
# Test-provided via extra_ports: OFF_PORT.
# Test-provided via template_values: BIND_HOST.
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_export      {DATA_ROOT};
        brix_auth        none;
        brix_allow_write on;
        brix_require_pgwrite on;
    }

    server {
        listen {BIND_HOST}:{OFF_PORT};
        brix_root on;
        brix_export      {DATA_ROOT};
        brix_auth        none;
        brix_allow_write on;
        # brix_require_pgwrite deliberately omitted (default off).
    }
}
