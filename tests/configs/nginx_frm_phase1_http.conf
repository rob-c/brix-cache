# Self-contained config template for test_frm_phase1_http.py.
# Placeholders: {BASE_DIR} {DATA_DIR} {BIND_HOST} {STREAM_PORT} {HTTP_PORT}
#               {S3_PORT} {WEBDAV_PORT}
worker_processes 1;
error_log {BASE_DIR}/logs/error.log info;
pid {BASE_DIR}/logs/nginx.pid;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{STREAM_PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
    }
}

http {
    access_log off;
    client_body_temp_path {BASE_DIR}/logs/cbt;
    proxy_temp_path       {BASE_DIR}/logs/pt;
    fastcgi_temp_path     {BASE_DIR}/logs/ft;
    uwsgi_temp_path       {BASE_DIR}/logs/ut;
    scgi_temp_path        {BASE_DIR}/logs/st;

    server {
        listen {BIND_HOST}:{HTTP_PORT};
        location = /metrics { brix_metrics on; }
    }

    server {
        listen {BIND_HOST}:{S3_PORT};
        location /tapebucket/ {
            brix_s3 on;
            brix_storage_backend posix:{DATA_DIR};
            brix_s3_bucket tapebucket;
            brix_s3_region us-east-1;
        }
    }

    server {
        listen {BIND_HOST}:{WEBDAV_PORT};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_auth none;
        }
    }
}

daemon off;
master_process off;
