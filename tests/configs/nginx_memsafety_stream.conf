# Self-contained stream template for test_phase27_memsafety.py.
# Placeholders: {BASE_DIR} {BIND_HOST} {PORT} {DATA_DIR}
error_log {BASE_DIR}/logs/error.log info;
pid {BASE_DIR}/logs/nginx.pid;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
    }
}

daemon off;
master_process off;
