# Staged-upload reaper test server (registry lifecycle) for
# test_shutdown_resume.py.  The startup stage-out reaper recovers a stranded
# complete partial left in {STAGE_DIR} and commits it under {DATA_ROOT}.
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
# template_values: BIND_HOST STAGE_DIR.
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_export {DATA_ROOT};
        brix_auth none;
        brix_allow_write on;
        brix_stage_dir {STAGE_DIR};
    }
}
