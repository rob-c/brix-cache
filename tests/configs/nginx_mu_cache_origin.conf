# MU anonymous ORIGIN — registry-lifecycle template for test_mu_cache_serve_authz.py.
# The GSI+authdb cache node (nginx_mu_cache_node.conf) fills from this origin over
# root://; anonymous so no fill credential is needed. This lets the cache store a
# STANDALONE cached file (with .cinfo), exercising the real cache-HIT serve path.
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/origin_noimp_error.log info;
thread_pool default threads=2 max_queue=256;
daemon on;
events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_auth none;
        brix_storage_backend posix:{DATA_ROOT};
        brix_allow_write on;
        brix_access_log {LOG_DIR}/origin_noimp_access.log;
    }
}
