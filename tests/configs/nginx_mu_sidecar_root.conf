# MU root:// anon node — registry-lifecycle template for test_mu_sidecar_hidden.py.
# A no-root check that internal metadata/staging sidecars (.cinfo/.meta/.xrdcinfo,
# .commit, .xrd-tmp.*, .xrdresume.*) are never listed (kXR_dirlist) nor
# served/statted (kXR_open/kXR_stat) even when they sit inside the export
# namespace. Anonymous (no auth) — the hiding is protocol-level, not an
# authorization decision.
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
thread_pool default threads=2 max_queue=256;
error_log {LOG_DIR}/sidecar_root_error.log info;
daemon on;
events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_export           {DATA_ROOT};
        brix_storage_backend  posix:{DATA_ROOT};
        brix_auth none;
        brix_allow_write on;
        brix_access_log {LOG_DIR}/sidecar_root_access.log;
    }
}
