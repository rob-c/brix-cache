# Reference XrdHttp daemon — HTTP(S) + TPC (rendered by xrdhttp.sh:start_xrdhttp).
# Placeholders: {DATA_DIR} {ADMIN_DIR} {RUN_DIR} {ROOT_PORT} {SECLIB} {HTTP_PORT}
#               {HTTP_LIB} {SERVER_CERT} {SERVER_KEY} {CA_DIR} {TPC_LIB}
all.role server
all.export /
oss.localroot {DATA_DIR}
all.adminpath {ADMIN_DIR}
all.pidpath   {RUN_DIR}

xrd.port {ROOT_PORT}
xrd.sched mint 2 maxt 16 avlt 4
xrootd.seclib {SECLIB}
xrd.protocol XrdHttp:{HTTP_PORT} {HTTP_LIB}

http.cert {SERVER_CERT}
http.key  {SERVER_KEY}
http.cadir {CA_DIR}
http.desthttps yes
http.selfhttps2http no
http.exthandler xrdtpc {TPC_LIB}
tpc.timeout 10
# The whole test fleet runs on loopback (127.0.0.1 / localhost), so XrdHttpTPC's
# default SSRF guard ("connection to local/private addresses is forbidden")
# rejects every interop pull with HTTP 403.  The guard has two independent flags
# (allow_local for loopback/127.0.0.1, allow_private for RFC1918) and a 127.0.0.1
# source trips the LOCAL check — so permit BOTH for this local reference instance
# so the nginx<->XrdHttp TPC interop tests work.
tpc.allow local
tpc.allow private
