# Reference XrdHttp daemon — HTTP(S) + TPC (rendered by xrdhttp.sh:start_xrdhttp).
# Placeholders: {DATA_DIR} {ADMIN_DIR} {RUN_DIR} {ROOT_PORT} {SECLIB} {HTTP_PORT}
#               {HTTP_LIB} {SERVER_CERT} {SERVER_KEY} {CA_DIR} {TPC_LIB}
# NO `all.role` here — deliberately, matching the working reference daemons
# (xrootd_ref.conf et al).  This is a single un-clustered server: there is no
# `all.manager` and no cmsd anywhere in the fleet, so `all.role server` put xrootd
# in CLUSTERED mode and cms_Finder blocked forever on the olbd admin socket
# ("Waiting for cms path .../.olb/olbd.admin") — xrootd -b then never signalled
# ready and its parent hung on the daemonize pipe, wedging start-all at its last
# step.  Omitting the directive defaults to a standalone data server.
all.export /
oss.localroot {DATA_DIR}
all.adminpath {ADMIN_DIR}
all.pidpath   {RUN_DIR}

xrd.port {ROOT_PORT}
# Bigger pool than the plain-xroot reference daemons (which run mint 2 maxt 4):
# XrdHttp does not serve HTTP itself — it BRIDGES every request into the xroot
# layer (XrootdBridge: "... login as nobody"), so one in-flight HTTP GET occupies
# a scheduler thread on TOP of the listener/poller/signal threads.  At maxt 4 the
# pool is exhausted before the bridged request gets a thread: TLS completes, the
# GET is read, and the response never comes — the client hangs until it times out
# and the log shows only "login as nobody" / "disc". Verified by A/B on identical
# PKI: maxt 4 -> hang, maxt 64 -> HTTP 200 in ~37ms.
#
# Supersedes bff6bf92's `mint 2 maxt 16 avlt 4`, which independently raised the
# pool for the same starvation but was not paired with the all.role fix above —
# so it could not have been observed serving: cms_Finder wedged that config
# before any request reached the scheduler.  16 may well suffice; it is simply
# untested, and this value is the one measured end-to-end.
xrd.sched mint 8 maxt 64 avlt 16
xrootd.seclib {SECLIB}
xrd.protocol XrdHttp:{HTTP_PORT} {HTTP_LIB}

http.cert {SERVER_CERT}
http.key  {SERVER_KEY}
http.cadir {CA_DIR}
http.desthttps yes
http.selfhttps2http no
http.exthandler xrdtpc {TPC_LIB}
tpc.timeout 10
# The whole test fleet runs on loopback (127.0.0.1 / localhost), so XrdHttpTPC's
# default SSRF guard ("connection to local/private addresses is forbidden")
# rejects every interop pull with HTTP 403.  The guard has two independent flags
# (allow_local for loopback/127.0.0.1, allow_private for RFC1918) and a 127.0.0.1
# source trips the LOCAL check — so permit BOTH for this local reference instance
# so the nginx<->XrdHttp TPC interop tests work.
tpc.allow local
tpc.allow private
