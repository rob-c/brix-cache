# Slice-cache origin — registry-lifecycle template for test_slice_cache.py.
# Plain root:// data server holding the origin file the cache node pulls from.
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
daemon on;
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/origin.log info;

events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_export {DATA_ROOT};
        brix_auth none;
    }
}
