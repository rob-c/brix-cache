# Slice-cache origin template for test_slice_cache.py.
daemon off;
worker_processes 1;
pid {BASE_DIR}/logs/origin.pid;
error_log {BASE_DIR}/logs/origin.log info;

events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_export {DATA_DIR};
        brix_auth none;
    }
}
