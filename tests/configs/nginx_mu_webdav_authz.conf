# MU WebDAV native-authz verification — registry-lifecycle template for
# test_mu_webdav_authz.py. A no-root check of FIX 3 (WebDAV GET/HEAD/PROPFIND
# enforce native authdb + VO ACL, at parity with root://). GSI client cert, no
# impersonation (the access-phase gate is a worker-level decision).
# Launcher-provided: LOG_DIR PORT TMP_DIR DATA_ROOT.
# Test-provided: CERT KEY CA VOMSDIR CA_DIR AUTHDB.
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
thread_pool default threads=2 max_queue=256;
error_log {LOG_DIR}/webdav_authz_error.log info;
daemon on;
events { worker_connections 64; }
http {
    access_log off;
    client_body_temp_path {TMP_DIR};
    proxy_temp_path       {TMP_DIR};
    fastcgi_temp_path     {TMP_DIR};
    uwsgi_temp_path       {TMP_DIR};
    scgi_temp_path        {TMP_DIR};
    server {
        listen 127.0.0.1:{PORT} ssl;
        server_name localhost;
        ssl_certificate        {CERT};
        ssl_certificate_key    {KEY};
        ssl_client_certificate {CA};
        ssl_verify_client      optional_no_ca;   # REQUEST the client (proxy) cert
        ssl_verify_depth       10;
        brix_webdav_proxy_certs on;
        location / {
            brix_webdav              on;
            brix_storage_backend     posix:{DATA_ROOT};
            brix_webdav_auth         required;
            brix_webdav_cafile       {CA};
            brix_webdav_vomsdir      {VOMSDIR};
            brix_webdav_voms_cert_dir {CA_DIR};
            brix_webdav_authdb       {AUTHDB};
            brix_webdav_require_vo   /restricted cms;
            brix_allow_write on;
        }
    }
}
