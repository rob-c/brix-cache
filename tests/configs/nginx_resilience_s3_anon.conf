# Dedicated anonymous (no SigV4) S3 PutObject server for the resilience
# write-path fault-injection tests (tests/resilience/servers.py, NginxS3Anon).
# Rendered through the phase-81 registry (LifecycleHarness): {PORT}, {LOG_DIR},
# {TMP_DIR} and {DATA_ROOT} come from the launcher.
#
# This is the S3 analogue of nginx_resilience_webdav_anon.conf: it exposes the
# S3 object-PUT ingest gateway with no auth so a fault proxy spliced in front can
# corrupt the client->server body and we can prove what the gateway commits when
# the client asserts a Content-MD5.  Objects land under the `resilbucket` bucket.
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log error;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 1024; }

http {
    client_max_body_size 64m;
    client_body_temp_path {TMP_DIR};
    proxy_temp_path       {TMP_DIR};
    fastcgi_temp_path     {TMP_DIR};
    uwsgi_temp_path       {TMP_DIR};
    scgi_temp_path        {TMP_DIR};
    access_log off;

    server {
        listen 127.0.0.1:{PORT};
        location / {
            brix_s3              on;
            brix_storage_backend posix:{DATA_ROOT};
            brix_s3_bucket       resilbucket;
            brix_allow_write     on;
            brix_s3_max_keys     1000;
            {EXTRA_DIRECTIVES}
        }
    }
}
