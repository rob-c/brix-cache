# Dedicated Chaos Mesh Tier3 storage node.

worker_processes 1;
error_log {LOG_DIR}/error.log debug;
pid       {LOG_DIR}/nginx.pid;

events { worker_connections 512; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        xrootd on;
        xrootd_root {DATA_DIR};
        xrootd_auth none;
        xrootd_allow_write on;
    }
}
