# SigV4 S3 auth oracle template for test_s3_auth_oracle.py (registry lifecycle).
# Launcher-provided: LOG_DIR TMP_DIR PORT.
# Test-provided: BIND_HOST DATA_DIR BUCKET ACCESS_KEY SECRET_KEY REGION
# (DATA_DIR seeded under tmp_path; must exist at config-parse time).
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log error;
daemon on;

events { worker_connections 64; }

http {
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path {TMP_DIR}/pt;
    fastcgi_temp_path {TMP_DIR}/ft;
    uwsgi_temp_path {TMP_DIR}/ut;
    scgi_temp_path {TMP_DIR}/st;
    access_log off;

    server {
        listen {BIND_HOST}:{PORT};
        location / {
            brix_s3 on;
            brix_storage_backend posix:{DATA_DIR};
            brix_s3_bucket {BUCKET};
            brix_s3_access_key {ACCESS_KEY};
            brix_s3_secret_key {SECRET_KEY};
            brix_s3_region {REGION};
            brix_allow_write on;
        }
    }
}
