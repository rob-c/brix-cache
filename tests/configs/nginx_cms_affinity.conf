# CMS manager exercising Phase-89 W5 selection breadth for
# test_cms_affinity_multi.py.  Two root listeners share one process (and so one
# server registry + the process-wide affinity switch): the {PORT} block answers
# kXR_locate with a single affinity-sticky redirect; the {MULTI_PORT} block has
# brix_cms_locate_multi on and answers with the full live server set (kXR_ok).
# Python data-node peers register over the CMS wire on the dedicated
# {CMS_PORT} listener (brix_cms_server replaces the stream handler for its
# whole server block, so it needs its own port).
# Launcher-provided: LOG_DIR PORT DATA_ROOT.  Test-provided: MULTI_PORT CMS_PORT.
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
events { worker_connections 128; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on; brix_storage_backend posix:{DATA_ROOT}; brix_auth none;
        brix_manager_mode on;
        brix_cms_affinity on;
    }
    server {
        listen 127.0.0.1:{MULTI_PORT};
        brix_root on; brix_storage_backend posix:{DATA_ROOT}; brix_auth none;
        brix_manager_mode on;
        brix_cms_locate_multi on;
    }
    server {
        listen 127.0.0.1:{CMS_PORT};
        brix_cms_server on;
        brix_cms_server_interval 1;
    }
}
