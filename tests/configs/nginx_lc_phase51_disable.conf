# Phase-51 resilience disable-value parse fixture (registry lifecycle) for
# test_phase51_resilience.py::test_directive_disable_values_parse.  Proves the
# 0/off disable escapes parse too (back-compat); listeners are parse-only.
# Launcher-provided: LOG_DIR DATA_ROOT (auto-created before -t).
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 64; }
stream {
    server {
        listen 127.0.0.1:19954;
        brix_root on; brix_storage_backend posix:{DATA_ROOT}; brix_auth none;
        brix_gsi_max_inflight_handshakes 0;
    }
    server {
        listen 127.0.0.1:19955;
        brix_cms_server on;
        brix_cms_server_max_connections_per_ip 0;
    }
}
