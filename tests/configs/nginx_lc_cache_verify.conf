# Read-through cache node for test_cache_verify_require.py (registry lifecycle).
# Sits in front of a root:// xroot origin (optionally behind a fault proxy) and
# fills its cache store, with the fill-time integrity policy under test driven by
# the CACHE_VERIFY slot (a full `brix_cache_verify <mode>;` line, or "" for the
# default off).  This is the ONE knob the suite exercises — everything else
# mirrors the partial-cache node.
# Launcher-provided: LOG_DIR PORT.
# Test-provided via template_values: BIND_HOST CACHE_BACKEND CACHE_STORE
# CACHE_EXPORT CACHE_VERIFY.
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
thread_pool default threads=2;
events { worker_connections 64; }
stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_auth none;
{CACHE_EXPORT}        brix_storage_backend {CACHE_BACKEND};
        brix_cache_store posix:{CACHE_STORE};
        brix_cache_export /;
{CACHE_VERIFY}    }
}
