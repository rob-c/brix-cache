# nginx_lc_frm_exec_seccomp.conf — the FRM "exec" MSS adapter (a real HSM driven
# by $BRIX_FRM_STAGECMD) under `brix_seccomp enforce`, for test_seccomp_exec_frm.py.
#
# The exec adapter fork+execs the operator stage command for exists/recall/
# migrate/purge.  allow_exec DEFAULTS ON, so under enforce the stage command runs
# out of the box; "brix_seccomp_allow_exec off" opts into the strict anti-shell
# posture and KILLs execve.  This template's {ALLOW_EXEC_LINE} is either empty
# (default-on works-case) or "brix_seccomp_allow_exec off;" (killed-case), so one
# test drives both.
#
# Launcher-provided : PORT LOG_DIR
# Test-provided     : STORAGE_BACKEND (frm://exec<base>), CACHE_DIR, ALLOW_EXEC_LINE
#                     ; env BRIX_FRM_STAGECMD = the mock stage command.
user nobody;
daemon on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;

events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend {STORAGE_BACKEND};
        brix_cache_store     posix:{CACHE_DIR};
        brix_cache_export    /;
        brix_seccomp         enforce;
{ALLOW_EXEC_LINE}
    }
}
