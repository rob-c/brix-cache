# Dedicated root://+GSI stream server for the fault-injection / wire-loss
# resilience harness (tests/resilience/servers.py, NginxGsi).  Rendered through
# the phase-81 registry (LifecycleHarness): {PORT}, {LOG_DIR} and {DATA_ROOT}
# come from the launcher; the dedicated-PKI paths ({SERVER_CERT}, {SERVER_KEY},
# {CA_CERT}) come from the spec's template_values.
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log error;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 1024; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth gsi;
        brix_allow_write on;
        brix_certificate     {SERVER_CERT};
        brix_certificate_key {SERVER_KEY};
        brix_trusted_ca      {CA_CERT};
        brix_access_log {LOG_DIR}/brix_access_gsi.log;
    }
}
