# Throwaway XrdAcc stream template for test_acc_residual.py.
worker_processes 1;
error_log {BASE_DIR}/logs/error.log info;
pid {BASE_DIR}/nginx.pid;

events { worker_connections 64; }

stream {
    brix_kv_zone authz 1m key=32 val=8;

    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{BASE_DIR}/data;
        brix_auth none;
        brix_allow_write on;
        brix_authdb_format xrdacc;
        brix_authdb {AUTHDB_PATH};
        brix_authdb_audit all;
{EXTRA_DIRECTIVES}
        brix_access_log {BASE_DIR}/logs/access.log;
    }
}
