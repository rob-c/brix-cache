# nginx_gsi_handshake_root.conf — XrdSecgsi (x509-proxy) root:// server for the
# GSI handshake suite (test_gsi_handshake*.py), driven by the registry
# LifecycleHarness.
#
# Launcher-provided : LOG_DIR PORT DATA_ROOT
# Test-provided     :
#   CIPHERS_DIRECTIVE   — "" or `brix_gsi_ciphers "…";` (session-cipher WS-A case)
#   SIGNED_DH_DIRECTIVE — "" (unsigned DH) or `brix_gsi_signed_dh <auto|require>;`
#   CERT KEY CA         — host cert / key / trusted-CA (must exist at parse time)
#
# Covers every signed-DH policy (off/auto/require), the aes-256-only cipher
# server, and the RSA-4096 PKI variant — they differ only by the two directive
# slots and the cert/key/CA paths.
daemon on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;

events { worker_connections 64; }

stream {
    server {
        listen {PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth gsi;
{CIPHERS_DIRECTIVE}
        brix_allow_write on;
{SIGNED_DH_DIRECTIVE}
        brix_certificate     {CERT};
        brix_certificate_key {KEY};
        brix_trusted_ca      {CA};
    }
}
