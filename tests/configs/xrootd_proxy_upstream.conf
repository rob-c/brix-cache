# Dedicated xrootd config for proxy-mode upstream (PROXY_UPSTREAM_PORT).
#
# Minimal standalone xrootd daemon with data files seeded by manage_test_servers.sh.

-XrdSecurity gsi
-XrdSecGSI -lib /usr/lib/x86_64-linux-gnu/libXrdSecgsi.so
-XrdOssOSS /tmp/xrd-test/data-proxy
-XrdOssRoot /tmp/xrd-test/data-proxy
-XrdSecurityLevel 0
-XrdPort {PORT}
