# MU WebDAV WRITE node — registry-lifecycle template for test_mu_stage_modes.py.
# Launcher-provided: LOG_DIR PORT TMP_DIR DATA_ROOT.
# Test-provided: CERT KEY CA.
#
# A no-root check of staging temp-file modes (stage-private / publish-intended):
# GSI-authenticated writes, no authdb (so a GSI-authenticated PUT is permitted by
# allow_write), impersonation off, resume on. The staged temp is written 0600 (a
# peer mapped uid cannot read the in-progress upload); the committed object
# carries its client-intended mode (0644).
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
thread_pool default threads=2 max_queue=256;
error_log {LOG_DIR}/webdav_stage_error.log info;
daemon on;

events { worker_connections 64; }

http {
    access_log off;
    client_body_temp_path {TMP_DIR};
    proxy_temp_path       {TMP_DIR};
    fastcgi_temp_path     {TMP_DIR};
    uwsgi_temp_path       {TMP_DIR};
    scgi_temp_path        {TMP_DIR};

    server {
        listen 127.0.0.1:{PORT} ssl;
        server_name localhost;
        ssl_certificate        {CERT};
        ssl_certificate_key    {KEY};
        ssl_client_certificate {CA};
        ssl_verify_client      optional_no_ca;
        brix_webdav_proxy_certs on;

        location / {
            brix_webdav              on;
            brix_export              {DATA_ROOT};
            brix_storage_backend     posix:{DATA_ROOT};
            brix_webdav_auth         required;
            brix_webdav_cafile       {CA};
            brix_webdav_upload_resume on;
            brix_allow_write on;
        }
    }
}
