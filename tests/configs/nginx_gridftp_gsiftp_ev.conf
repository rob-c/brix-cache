# gsiftp:// GridFTP gateway (GSI-secured control channel) driven by the
# non-blocking STREAM event engine. The RFC 2228 AUTH GSSAPI / ADAT handshake, the
# wrapped control dialogue, and PROT P data-channel TLS all run under the nginx
# STREAM event loop. Rendered through the registry: {PORT}/{LOG_DIR} from the
# launcher, {DATA_ROOT} the export tree, PKI paths ({SERVER_CERT}, {SERVER_KEY},
# {CA_DIR}) from the spec.
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 64; }
stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_gridftp on;
        brix_gridftp_export     {DATA_ROOT};
        brix_gridftp_allow_write on;
        brix_gridftp_gsi        on;
        brix_gridftp_certificate     {SERVER_CERT};
        brix_gridftp_certificate_key {SERVER_KEY};
        brix_gridftp_trusted_ca      {CA_DIR};
    }
}
