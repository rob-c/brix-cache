# XrdAcc HTTP location wrapper template for test_acc.py (registry lifecycle).
# Launcher-provided: LOG_DIR TMP_DIR PORT.  Test-provided: BIND_HOST DATA_DIR
# AUTHDB_PATH LOCATION_BLOCK (data dir + authdb seeded under tmp_path; must
# exist at config-parse time).
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
daemon on;

events { worker_connections 64; }

http {
    access_log off;
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path {TMP_DIR}/pt;
    fastcgi_temp_path {TMP_DIR}/ft;
    uwsgi_temp_path {TMP_DIR}/ut;
    scgi_temp_path {TMP_DIR}/st;

    server {
        listen {BIND_HOST}:{PORT};
        location / {
{LOCATION_BLOCK}
            brix_authdb_format xrdacc;
            brix_authdb {AUTHDB_PATH};
            brix_authdb_audit all;
        }
    }
}
