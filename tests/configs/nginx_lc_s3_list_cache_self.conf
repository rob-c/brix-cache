# Self-contained S3 list-cache template for test_s3_list_cache.py (registry lifecycle).
# Launcher-provided: LOG_DIR TMP_DIR PORT.
# Test-provided: BIND_HOST DATA_DIR (seeded under tmp_path; must exist at
# config-parse time) BUCKET TTL_SECONDS.
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log warn;
daemon on;

events { worker_connections 64; }

http {
    access_log off;

    server {
        listen {BIND_HOST}:{PORT};
        location / {
            brix_s3 on;
            brix_storage_backend posix:{DATA_DIR};
            brix_s3_bucket {BUCKET};
            brix_allow_write on;
            brix_s3_max_keys 1000;
            brix_s3_list_cache on;
            brix_s3_list_cache_ttl {TTL_SECONDS}s;
        }
    }
}
