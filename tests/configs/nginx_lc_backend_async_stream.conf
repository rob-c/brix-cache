# Throwaway root:// stream template (registry lifecycle) for
# test_backend_async_root.py / test_backend_async_reboot.py.
#
# Exercises the durable async backend-op queue (brix_backend_async): namespace
# mutations (RM/RMDIR) are enqueued + journalled + parked, then flushed in bulk.
#
# Launcher-provided: LOG_DIR PORT.  Test-provided: BIND_HOST DATA_DIR ALLOW_WRITE
# ASYNC BATCH WAIT JOURNAL_DIR (data seeded under tmp_path; DATA_DIR + JOURNAL_DIR
# must exist at parse time).
#
# The durable queue is opt-in via $BRIX_STAGE_JOURNAL_DIR — nginx sanitises the
# worker environment, so it MUST be handed through with the main-context `env`
# directive below (a process-level env var never reaches the worker).
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
env BRIX_STAGE_JOURNAL_DIR={JOURNAL_DIR};
daemon on;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write {ALLOW_WRITE};
        brix_backend_async {ASYNC};
        brix_backend_async_batch {BATCH};
        brix_backend_async_wait {WAIT};
        brix_access_log {LOG_DIR}/access.log;
    }
}
