# Phase-28 red-team per-principal concurrency-limit config template for
# test_security_redteam.py.  nginx -t only: proves brix_concurrency_limit
# requires limit= and rejects an undeclared zone.  CA is a (dummy) WebDAV cafile
# path and EXTRA the per-test directive line; both names are kept brace-free in
# this comment so the substitution never expands them here.
# Rendered through the phase-81 registry (LifecycleHarness): the primary port,
# log dir, temp dir and posix export come from the launcher.
daemon on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/e.log info;
events { worker_connections 64; }
http {
  client_body_temp_path {TMP_DIR};
  proxy_temp_path {TMP_DIR};
  fastcgi_temp_path {TMP_DIR};
  uwsgi_temp_path {TMP_DIR};
  scgi_temp_path {TMP_DIR};
  brix_rate_limit_zone zone=conc:1m;
  server { listen 127.0.0.1:{PORT};
    location / { brix_webdav on; brix_storage_backend posix:{DATA_ROOT};
      brix_webdav_auth optional; brix_webdav_cafile {CA};
      {EXTRA} } } }
