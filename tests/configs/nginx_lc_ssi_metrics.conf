# SSI stream + http /metrics template (registry lifecycle) for test_ssi_metrics.py.
# Launcher-provided: LOG_DIR TMP_DIR PORT DATA_ROOT METRICS_PORT.
# Test-provided: BIND_HOST.
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
daemon on;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
        brix_allow_write on;
        brix_ssi on;
        brix_ssi_service cta;
    }
}

http {
    access_log off;
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path {TMP_DIR}/pt;
    fastcgi_temp_path {TMP_DIR}/ft;
    uwsgi_temp_path {TMP_DIR}/ut;
    scgi_temp_path {TMP_DIR}/st;

    server {
        listen 127.0.0.1:{METRICS_PORT};
        location /metrics { brix_metrics on; }
    }
}
