# GSI TPC delegation destination — registry-lifecycle template for
# test_tpc_delegation.py. brix_tpc_delegate on + signed-DH: captures the
# delegating client's X.509 proxy and pulls the source AS THE USER.
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
# Test-provided: CERT_FILE KEY_FILE CA_FILE.
daemon on;
worker_processes 1;
error_log {LOG_DIR}/dst-err.log info;
pid {LOG_DIR}/nginx.pid;

thread_pool default threads=4 max_queue=65536;

events { worker_connections 64; }

stream {
    server {
        listen {PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth gsi;
        brix_allow_write on;
        brix_tpc_allow_local on;
        brix_tpc_allow_private on;
        brix_tpc_delegate on;
        brix_gsi_signed_dh require;
        brix_certificate {CERT_FILE};
        brix_certificate_key {KEY_FILE};
        brix_trusted_ca {CA_FILE};
        brix_access_log {LOG_DIR}/dst-acc.log;
    }
}
