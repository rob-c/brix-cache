# GSI TPC delegation destination template for test_tpc_delegation.py.
daemon off;
worker_processes 1;
error_log {BASE_DIR}/dst-err.log info;
pid {BASE_DIR}/dst.pid;

thread_pool default threads=4 max_queue=65536;

events { worker_connections 64; }

stream {
    server {
        listen {PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth gsi;
        brix_allow_write on;
        brix_tpc_allow_local on;
        brix_tpc_allow_private on;
        brix_tpc_delegate on;
        brix_gsi_signed_dh require;
        brix_certificate {CERT_FILE};
        brix_certificate_key {KEY_FILE};
        brix_trusted_ca {CA_FILE};
        brix_access_log {BASE_DIR}/dst-acc.log;
    }
}
