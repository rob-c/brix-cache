# Dedicated anonymous (brix_auth none) root:// stream server for the resilience
# data-plane tests (tests/resilience/servers.py, NginxAnon).  Rendered through
# the phase-81 registry (LifecycleHarness): {PORT}, {LOG_DIR} and {DATA_ROOT}
# come from the launcher.
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log error;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 1024; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
        brix_allow_write on;
        brix_access_log {LOG_DIR}/brix_access_anon.log;
    }
}
