# roots:// TLS read harness template for resilience/asan_tls_read_harness.py.
worker_processes 1;
daemon off;
error_log {ERROR_LOG} info;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 2048; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        brix_tls on;
        brix_certificate {CERT_FILE};
        brix_certificate_key {KEY_FILE};
        brix_pipeline_depth {PIPELINE_DEPTH};
    }
}
