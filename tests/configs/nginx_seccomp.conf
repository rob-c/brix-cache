# D-3 seccomp integration template — our nginx-xrootd data server exporting one
# POSIX tree over root://, anonymous + writable, with the per-worker seccomp-BPF
# syscall filter armed at {SECCOMP_MODE} (off|audit|enforce). Used by
# tests/test_seccomp_enforce.py to prove the SHIPPED allowlist is complete enough
# for a real worker to serve live kXR traffic (open/stat/read/write) with the
# filter loaded, and that the enforce/audit NOTICE reaches the error log.
#
# Launcher-provided: LOG_DIR PORT DATA_ROOT. Test-provided: SECCOMP_MODE.
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log notice;   # notice: capture the filter-active line
pid {LOG_DIR}/nginx.pid;

thread_pool default threads=2 max_queue=256;
events { worker_connections 512; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
        brix_allow_write on;
        brix_seccomp {SECCOMP_MODE};
        brix_access_log {LOG_DIR}/brix_access.log;
    }
}
