worker_processes 1;
error_log {LOG_DIR}/error.log info;

thread_pool default threads=2 max_queue=4096;
events { worker_connections 64; }

# Dedicated READ-ONLY HTTP server pair for tests/test_readonly_http_endpoint.py.
# Both server blocks OMIT allow_write so it defaults off (read-only is the point):
# the WebDAV write-gate (src/protocols/webdav/access.c) and S3 write-gate (src/protocols/s3/handler.c)
# must reject every mutating method (PUT/DELETE/MKCOL/MOVE/COPY) with 403 while
# reads keep serving the seeded content.  Pre-started by manage_test_servers.sh
# start-all over the isolated data root data-readonly-http; the test seeds files
# into that root and never spawns its own instance.
http {
    client_body_temp_path {TMP_DIR};
    default_type application/octet-stream;

    # WebDAV, read-only (allow_write omitted -> defaults off)
    server {
        listen {PORT};
        location / {
            xrootd_webdav        on;
            xrootd_webdav_storage_backend posix:{DATA_DIR};
            xrootd_webdav_auth   optional;
            xrootd_webdav_cafile {CA_CERT};
        }
    }

    # S3, read-only (allow_write omitted -> defaults off)
    server {
        listen {S3_PORT};
        location / {
            xrootd_s3        on;
            xrootd_s3_storage_backend posix:{DATA_DIR};
            xrootd_s3_bucket testbucket;
        }
    }
}
