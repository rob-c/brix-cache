# Network-fault stream template for test_netfault_stream.py (registry
# lifecycle).  Launcher-provided: LOG_DIR PORT.  Test-provided: BIND_HOST
# DATA_DIR HANDSHAKE_TIMEOUT_MS READ_TIMEOUT_MS SEND_TIMEOUT_MS.  DATA_DIR must
# exist at config-parse time (the test seeds it under tmp_path).
daemon on;
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 256; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_handshake_timeout {HANDSHAKE_TIMEOUT_MS}ms;
        brix_read_timeout {READ_TIMEOUT_MS}ms;
        brix_send_timeout {SEND_TIMEOUT_MS}ms;
        brix_tcp_keepalive on;
        brix_tcp_user_timeout 30s;
    }
}
