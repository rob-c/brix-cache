# Dedicated nginx for CMS heartbeat tests.
# Connects to a mock CMS manager on {CMS_PORT}; the test fixture starts
# the mock after nginx is up and waits for the LOGIN reconnect.

worker_processes 1;
error_log {LOG_DIR}/error.log debug;
pid       {LOG_DIR}/nginx.pid;
thread_pool default threads=4 max_queue=65536;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        xrootd on;
        xrootd_root {DATA_DIR};
        xrootd_auth none;
        xrootd_allow_write on;
        xrootd_cms_manager 127.0.0.1:{CMS_PORT};
        xrootd_cms_paths /data;
        xrootd_cms_interval 2;
        xrootd_listen_port {PORT};
    }
}
