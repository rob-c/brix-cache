# Dedicated nginx for CMS heartbeat tests.
# Connects to the pre-started CMS manager on {CMS_PORT}.

worker_processes 1;
error_log {LOG_DIR}/error.log debug;
pid       {LOG_DIR}/nginx.pid;
thread_pool default threads=2 max_queue=256;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        brix_cms_manager 127.0.0.1:{CMS_PORT};
        brix_cms_paths /data;
        brix_cms_interval 2;
        brix_listen_port {PORT};
    }
}
