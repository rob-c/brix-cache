# Slice-cache cache node — registry-lifecycle template for test_slice_cache.py.
# 1 MiB slice mode in front of the origin; DATA_ROOT is the (empty) cache-node
# export, CACHE_DIR the sparse slice store (sibling of the export).
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
# Test-provided: ORIGIN_PORT CACHE_DIR.
daemon on;
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/cache.log info;

thread_pool default threads=4 max_queue=4096;

events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_export {DATA_ROOT};
        brix_auth none;
        brix_storage_backend root://127.0.0.1:{ORIGIN_PORT};
        brix_cache_store posix:{CACHE_DIR};
        brix_cache_export /;
        brix_cache_slice_size 1m;
    }
}
