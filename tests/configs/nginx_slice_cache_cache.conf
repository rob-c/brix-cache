# Slice-cache cache template for test_slice_cache.py.
daemon off;
worker_processes 1;
pid {BASE_DIR}/logs/cache.pid;
error_log {BASE_DIR}/logs/cache.log info;

thread_pool default threads=4 max_queue=4096;

events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_export {EXPORT_DIR};
        brix_auth none;
        brix_storage_backend root://127.0.0.1:{ORIGIN_PORT};
        brix_cache_store posix:{CACHE_DIR};
        brix_cache_export /;
        brix_cache_slice_size 1m;
    }
}
