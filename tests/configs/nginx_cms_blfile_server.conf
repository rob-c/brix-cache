# CMS manager with a file-driven blacklist (Phase-89 W6′) — registry-lifecycle
# template for test_cms_blacklist_file.py.  Stream: the CMS server under test
# (1s ping interval so the blacklist-file poll runs fast).  Http: the dashboard
# cluster snapshot (anonymous) + admin API (bearer secret) used to observe
# `draining` and to attempt an undrain that the file must win over.
# Launcher-provided: LOG_DIR PORT DATA_ROOT TMP_DIR.
# Test-provided: BLACKLIST_FILE HTTP_PORT SECRET_FILE.
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
events { worker_connections 128; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on; brix_storage_backend posix:{DATA_ROOT}; brix_auth none;
        brix_manager_mode on;
        brix_cms_server on;
        brix_cms_server_interval 1;
        brix_cms_blacklist_file {BLACKLIST_FILE};
    }
}

http {
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path {TMP_DIR}/pt;
    fastcgi_temp_path {TMP_DIR}/ft;
    uwsgi_temp_path {TMP_DIR}/ut;
    scgi_temp_path {TMP_DIR}/st;
    access_log off;

    server {
        listen 127.0.0.1:{HTTP_PORT};
        location /brix/ {
            brix_dashboard on;
            brix_admin_rate_limit off;  # single shared client IP under xdist
            brix_dashboard_password "pw";
            brix_dashboard_anonymous on;
            brix_admin_secret {SECRET_FILE};
        }
    }
}
