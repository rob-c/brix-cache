# Self-contained config template for test_frm_queue.py (registry lifecycle).
# Launcher-provided: LOG_DIR PORT.  Test-provided: BIND_HOST DATA_DIR QUEUE_PATH
# CONTROL_DIR.  brix_frm_control_dir is what initialises the process-wide durable
# stage-request registry (<CONTROL_DIR>/stage_requests.dat) that kXR_prepare
# enqueues into and kXR_QPrep reads back — without it the singleton is NULL and a
# staged reqid is never durable.
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_frm on;
        brix_frm_queue_path {QUEUE_PATH};
        brix_frm_control_dir {CONTROL_DIR};
        brix_frm_max_inflight 128;
    }
}
