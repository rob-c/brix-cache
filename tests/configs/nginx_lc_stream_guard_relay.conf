# Stream-guard transparent-relay template for test_stream_guard.py (registry
# lifecycle).  Launcher-provided: LOG_DIR PORT.  Test-provided: BIND_HOST
# ORIGIN_PORT GUARD_DIRECTIVE (either "brix_guard_stream on;" or empty).
daemon on;
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_transparent_proxy {BIND_HOST}:{ORIGIN_PORT};
        {GUARD_DIRECTIVE}
    }
}
