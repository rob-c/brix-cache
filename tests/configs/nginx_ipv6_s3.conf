worker_processes 1;
error_log {LOG_DIR}/error.log info;

events { worker_connections 128; }

# --------------------------------------------------------------------------
# Phase-36 §7.2.5 — S3 object storage over IPv6 (anonymous HTTP client).
#
# Dedicated WRITABLE S3 server bound to the IPv6 loopback ([::1]) and pre-started
# by manage_test_servers.sh start-all as the "ipv6-s3" instance
# (start_dedicated_nginx "ipv6-s3" "nginx_ipv6_s3.conf" "${IPV6_S3_PORT}").
#
# Exercised by tests/test_ipv6_s3.py.  Anonymous (no SigV4 required) S3 over
# plain HTTP — the IPv6 client tests target http://[::1]:{PORT}.  The isolated
# data root data-ipv6-s3 is the bucket root; objects land directly under it.
#
# PRIMARY listener uses the {PORT} placeholder, filled by substitute_config.
# The IPv6 bracket form is mandatory: nginx will not parse a bare ::1:port.
# --------------------------------------------------------------------------
http {
    client_body_temp_path {TMP_DIR};
    proxy_temp_path        {TMP_DIR};
    fastcgi_temp_path      {TMP_DIR};
    uwsgi_temp_path        {TMP_DIR};
    scgi_temp_path         {TMP_DIR};

    client_max_body_size 1g;

    server {
        listen [::1]:{PORT};
        server_name localhost;

        access_log {LOG_DIR}/s3_access.log;

        location / {
            brix_s3             on;
            brix_storage_backend posix:{DATA_DIR};
            brix_s3_bucket      testbucket;
            brix_allow_write on;
            brix_s3_max_keys    1000;
        }
    }
}
