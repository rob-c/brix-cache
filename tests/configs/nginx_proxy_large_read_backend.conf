# Backend stream server template for test_proxy_large_read.py.
# Placeholders: {BASE_DIR} {PORT} {DATA_DIR}
worker_processes 1;
daemon on;
pid {BASE_DIR}/be.pid;
error_log {BASE_DIR}/be.log info;

events { worker_connections 256; }

stream {
    server {
        listen {PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
    }
}
