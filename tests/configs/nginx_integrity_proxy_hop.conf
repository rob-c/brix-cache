# Transparent proxy hop for test_integrity_matrix.py TestProxyChainQueries.
# One pure-nginx hop that forwards every request to an upstream (the storage
# origin or the previous hop); chaining two of these proves byte-exact data and
# full query forwarding through a one- and two-hop nginx mesh.  Rendered through
# the registry (LifecycleHarness); {PORT}/{LOG_DIR} come from the launcher,
# {UPSTREAM} (host:port of the upstream to forward to) via the spec.
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
events {}
stream {
    server {
        listen 0.0.0.0:{PORT};
        brix_root on;
        brix_auth none;
        brix_tap_proxy on;
        brix_tap_proxy_upstream {UPSTREAM};
        brix_tap_proxy_auth anonymous;
    }
}
