# Drop-in byte-for-byte parity front (registry lifecycle) for
# test_dropin_byte_for_byte.py.  An anonymous root:// export over the SAME
# shared data root the reference /usr/bin/xrootd serves, so the identical raw
# root:// request can be issued to each and the wire responses compared
# byte-for-byte.
# Launcher-provided: LOG_DIR PORT.
# Test-provided via template_values: BIND_HOST DATA_DIR (the shared data root,
# must exist at parse time).
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 64; }
stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        brix_access_log {LOG_DIR}/access.log;
    }
}
