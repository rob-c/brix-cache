# Dedicated nginx configuration for data-server in cluster tests.
#
# Standalone XRootD server that registers with the redirector's CMS port via
# xrootd_cms_manager. Advertises export paths and sends periodic heartbeat/
# availability frames to the redirector.

worker_processes 1;
error_log {LOG_DIR}/error.log debug;
pid       {LOG_DIR}/nginx.pid;

events { worker_connections 128; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        xrootd on;
        xrootd_storage_backend posix:{DATA_DIR};
        xrootd_auth none;
        xrootd_cms_manager {BIND_HOST}:{CMS_PORT};
        xrootd_cms_paths /;
        xrootd_cms_interval 5;
        xrootd_listen_port {PORT};
    }
}
