# nginx_gsi_handshake_sigver.conf — GSI server at security level `intense`, so
# most opcodes must carry a valid kXR_sigver signature derived from the GSI
# session key (signing_key = SHA-256 of the DH secret).  Registry
# LifecycleHarness template.
#
# Launcher-provided : LOG_DIR PORT DATA_ROOT
# Test-provided     : CERT KEY CA (host cert / key / trusted-CA, must exist)
daemon on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;

events { worker_connections 64; }

stream {
    server {
        listen {PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth gsi;
        brix_allow_write on;
        brix_security_level intense;
        brix_certificate     {CERT};
        brix_certificate_key {KEY};
        brix_trusted_ca      {CA};
    }
}
