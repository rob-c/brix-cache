# Minimal nginx proving a T4 (GridSite two-step) delegated credential is
# COMPLETE — regression config for test_delegation_t4_credential.py.
#
# Two servers, nothing else:
#   delegation server — clients authenticate with their grid credential and
#     deposit a delegated proxy via the GridSite two-step endpoint
#     (GET .../request -> CSR, client signs, PUT .../<id>).  The assembled
#     credential is stored in the credential dir as x5h-<sha256(DN)>.pem.
#   verifier server — requires a client certificate chaining to the grid CA
#     (RFC 3820 proxies allowed).  A TLS handshake here succeeds only if the
#     presented credential includes its PRIVATE KEY; the response body echoes
#     the authenticated DN.
#
# Placeholders: BASE_DIR DELEG_PORT VERIFY_PORT HOST_CERT HOST_KEY CA_CERT
#               CRED_DIR
worker_processes 1;
pid {BASE_DIR}/nginx.pid;
error_log {BASE_DIR}/error.log info;

events { worker_connections 64; }

http {
    access_log {BASE_DIR}/access.log;
    client_body_temp_path {BASE_DIR}/tmp;

    server {
        listen 127.0.0.1:{DELEG_PORT} ssl;
        ssl_certificate        {HOST_CERT};
        ssl_certificate_key    {HOST_KEY};
        ssl_client_certificate {CA_CERT};
        ssl_verify_client      optional;
        ssl_verify_depth       10;
        brix_webdav_proxy_certs on;

        location /.well-known/brix-delegation {
            brix_webdav on;
            brix_export {BASE_DIR}/export;
            brix_allow_write on;
            brix_webdav_cafile {CA_CERT};
            brix_webdav_auth required;
            brix_storage_credential_dir {CRED_DIR};
            brix_delegation_endpoint on;
        }
    }

    server {
        listen 127.0.0.1:{VERIFY_PORT} ssl;
        ssl_certificate        {HOST_CERT};
        ssl_certificate_key    {HOST_KEY};
        ssl_client_certificate {CA_CERT};
        ssl_verify_client      on;
        ssl_verify_depth       10;
        brix_webdav_proxy_certs on;

        location / {
            return 200 "dn=$ssl_client_s_dn_legacy\n";
        }
    }
}
