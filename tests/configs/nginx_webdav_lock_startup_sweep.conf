# WebDAV lock startup sweep template for test_webdav_lock_startup_sweep.py.
# Placeholders: {BASE_DIR} {SWEEP} {PORT} {DATA_DIR}
worker_processes 1;
error_log {BASE_DIR}/logs/error_{SWEEP}.log info;
pid {BASE_DIR}/nginx_{SWEEP}.pid;

events { worker_connections 64; }

http {
    access_log off;

    server {
        listen {PORT};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_auth none;
            brix_webdav_lock_startup_sweep {SWEEP};
        }
    }
}
