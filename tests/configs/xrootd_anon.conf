# Reference xrootd — anonymous backend for upstream/proxy tests
# (rendered by refxrootd.sh:write_anon_ref_cfg; used for every upstream-* backend
# and proxy-upstream). Capped at 4 scheduler threads (auxiliary code-path server).
# Placeholders: {PORT} {DATA_DIR} {ADMIN_DIR} {RUN_DIR}
xrd.port {PORT}
oss.localroot {DATA_DIR}
all.export /
all.adminpath {ADMIN_DIR}
all.pidpath   {RUN_DIR}
xrd.sched mint 2 maxt 4 avlt 2
xrd.trace off
