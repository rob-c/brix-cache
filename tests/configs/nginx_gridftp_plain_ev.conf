# Cleartext FTP gateway driven by the non-blocking STREAM event engine — the
# whole RFC 959 control dialogue and the stream-mode data transfers (PASV/PORT +
# RETR/STOR/LIST) run under the nginx STREAM event loop. Rendered through the
# registry (LifecycleHarness): {PORT}/{LOG_DIR} from the launcher, {DATA_ROOT}
# the export tree, {BIND_HOST} from the spec.
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 64; }
stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_gridftp on;
        brix_gridftp_export      {DATA_ROOT};
        brix_gridftp_allow_write on;
    }
}
