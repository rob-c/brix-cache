worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid       {LOG_DIR}/nginx.pid;

events { worker_connections 32; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        xrootd on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth           token;
        brix_token_jwks     {JWKS_FILE};
        brix_token_issuer   {TOKEN_ISSUER};
        brix_token_audience {TOKEN_AUDIENCE};
        brix_allow_write    off;
    }
}
