# XRootD transparent-proxy protocol-edge front for
# _test_proxy_protocol_edges_helpers.py.  A single-worker stream server running
# brix_tap_proxy pointed at an in-process Python protocol stub; the suite drives
# crafted/edge wire sequences (kXR_wait chains, redirect hop caps, streamed
# kXR_oksofar, mid-stream waits, handle-map saturation) through the relay.
# Rendered through the registry (LifecycleHarness): {PORT} is the proxy front and
# {LOG_DIR} come from the launcher; {BIND_HOST}, {HOST}, {UPSTREAM_PORT} and the
# optional {EXTRA} server-block directive come from the spec.
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 256; }
stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_auth none;
        brix_tap_proxy on;
        brix_tap_proxy_upstream {HOST}:{UPSTREAM_PORT};
        brix_tap_proxy_auth anonymous;
{EXTRA}    }
}
