global
    log /dev/null local0
    maxconn 512
    daemon

defaults
    mode tcp
    timeout connect 2s
    timeout client  60s
    timeout server  60s
    retries         3
    option          redispatch

frontend xrootd_frontend
    bind {BIND_HOST}:{PORT}
    default_backend xrootd_backends

backend xrootd_backends
    balance roundrobin
    option tcp-check
    server nginx1 {MAP_A_HOST}:{MAP_A_PORT} check inter 500ms
    server nginx2 {MAP_B_HOST}:{MAP_B_PORT} check inter 500ms
