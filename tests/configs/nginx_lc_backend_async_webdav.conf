# WebDAV template for the durable async backend-op queue
# (test_backend_async_webdav.py, registry lifecycle). DELETE and fresh-
# destination MOVE requests are enqueued on the per-worker coalescing queue and
# the HTTP request is PARKED until the batch flushes; the real 204/201/409/500
# is rendered on the wake. Anonymous auth + write, single worker.
#
# GOTCHA: nginx rebuilds the worker environment (ngx_set_environment), so a
# process-level $BRIX_STAGE_JOURNAL_DIR never reaches the worker — the durable
# journal dir MUST be handed through with a main-context `env` directive (same
# pattern as configs/nginx_lc_backend_async_s3.conf). Without it the queue
# degrades to memory-only and crash-replay cannot work.
#
# Launcher-provided: LOG_DIR TMP_DIR PORT. Test-provided: BIND_HOST DATA_DIR
# ALLOW_WRITE ASYNC BATCH WAIT JOURNAL_DIR.
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log warn;
env BRIX_STAGE_JOURNAL_DIR={JOURNAL_DIR};
daemon on;

events { worker_connections 64; }

http {
    access_log off;
    client_max_body_size 32m;
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path       {TMP_DIR}/pt;
    fastcgi_temp_path     {TMP_DIR}/ft;
    uwsgi_temp_path       {TMP_DIR}/ut;
    scgi_temp_path        {TMP_DIR}/st;

    server {
        listen {BIND_HOST}:{PORT};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_auth none;
            brix_allow_write {ALLOW_WRITE};
            brix_backend_async {ASYNC};
            brix_backend_async_batch {BATCH};
            brix_backend_async_wait {WAIT};
        }
    }
}
