# brix_proxy_ssl_capath misuse template — the directive in a location with
# NO https proxy_pass must be a fatal config error (postconfiguration check),
# never a silent no-op that "protects" nothing.
# Launcher-provided: LOG_DIR PORT TMP_DIR DATA_ROOT.
# Test-provided: CAPATH.
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
daemon on;

events { worker_connections 64; }

http {
    access_log {LOG_DIR}/access.log;
    client_body_temp_path {TMP_DIR};

    server {
        listen 127.0.0.1:{PORT};

        location / {
            brix_proxy_ssl_capath {CAPATH};
            return 204;
        }
    }
}
