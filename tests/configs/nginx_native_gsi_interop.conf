# Native GSI interop server template for test_native_gsi_interop.py.
daemon off;
error_log {BASE_DIR}/logs/{TAG}.error.log info;

events { worker_connections 64; }

stream {
    server {
        listen {PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth gsi;
{SIGNED_DH_DIRECTIVE}
        brix_certificate     {CERT_FILE};
        brix_certificate_key {KEY_FILE};
        brix_trusted_ca      {CA_DIR};
    }
}
