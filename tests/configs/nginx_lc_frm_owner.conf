# FRM owner/tape REST template for test_frm_owner.py (registry lifecycle harness).
# Launcher-provided: LOG_DIR PORT TMP_DIR.  Test-provided: BIND_HOST DATA_DIR
# QUEUE_PATH CONTROL_DIR CADIR JWKS_PATH ISSUER AUDIENCE; extra_ports supplies
# HTTP_PORT.  brix_frm_control_dir stands up the process-wide stage-request
# registry the Tape REST /stage endpoints enqueue into and whose per-request
# owner the delete/cancel ownership check enforces.
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        brix_frm on;
        brix_frm_queue_path {QUEUE_PATH};
        brix_frm_control_dir {CONTROL_DIR};
        brix_frm_stagecmd /bin/true;
    }
}

http {
    access_log off;
    client_body_temp_path {TMP_DIR};
    proxy_temp_path {TMP_DIR};
    fastcgi_temp_path {TMP_DIR};
    uwsgi_temp_path {TMP_DIR};
    scgi_temp_path {TMP_DIR};
    server {
        listen {BIND_HOST}:{HTTP_PORT};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_auth required;
            brix_webdav_cadir {CADIR};
            brix_allow_write on;
            brix_webdav_tape_rest on;
            brix_webdav_token_jwks {JWKS_PATH};
            brix_webdav_token_issuer "{ISSUER}";
            brix_webdav_token_audience "{AUDIENCE}";
        }
    }
}
