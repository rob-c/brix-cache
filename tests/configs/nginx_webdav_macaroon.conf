# Self-contained WebDAV macaroon template for macaroon request/negative tests.
# Placeholders: {BASE_DIR} {BIND_HOST} {PORT} {DATA_DIR} {SECRET_HEX}
error_log {BASE_DIR}/logs/error.log info;
pid {BASE_DIR}/logs/nginx.pid;

events { worker_connections 64; }

http {
    client_body_temp_path {BASE_DIR}/t;
    proxy_temp_path       {BASE_DIR}/t;
    fastcgi_temp_path     {BASE_DIR}/t;
    uwsgi_temp_path       {BASE_DIR}/t;
    scgi_temp_path        {BASE_DIR}/t;
    access_log off;

    server {
        listen {BIND_HOST}:{PORT};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_auth required;
            brix_webdav_cadir {BASE_DIR}/cadir;
            brix_allow_write on;
            brix_webdav_macaroon_secret {SECRET_HEX};
        }
    }
}

daemon off;
master_process off;
