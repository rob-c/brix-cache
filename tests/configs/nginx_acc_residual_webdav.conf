# Throwaway XrdAcc WebDAV refresh template for test_acc_residual.py.
# Placeholders: {BASE_DIR} {BIND_HOST} {PORT} {AUTHDB_PATH}
worker_processes 1;
error_log {BASE_DIR}/logs/error.log info;
pid {BASE_DIR}/nginx.pid;

events { worker_connections 64; }

http {
    access_log off;
    client_body_temp_path {BASE_DIR}/tmp/cbt;
    proxy_temp_path {BASE_DIR}/tmp/pt;
    fastcgi_temp_path {BASE_DIR}/tmp/ft;
    uwsgi_temp_path {BASE_DIR}/tmp/ut;
    scgi_temp_path {BASE_DIR}/tmp/st;

    server {
        listen {BIND_HOST}:{PORT};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{BASE_DIR}/data;
            brix_webdav_auth none;
            brix_allow_write on;
            brix_authdb_format xrdacc;
            brix_authdb {AUTHDB_PATH};
            brix_authdb_audit all;
            brix_authdb_refresh 1;
        }
    }
}
