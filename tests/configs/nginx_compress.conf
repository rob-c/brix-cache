worker_processes 1;
error_log {LOG_DIR}/error.log info;

thread_pool default threads=2 max_queue=256;
events { worker_connections 64; }

# Dedicated COMPRESSION fleet instance. One export served over two plain-HTTP
# server blocks, both with phase-42 outbound GET compression enabled
# (brix_compress on) and anonymous writes (brix_allow_write on):
#   WebDAV   {PORT}      -> test_compression_outbound.py
#                          test_compression_negotiation_gaps.py
#   S3 REST  {S3_PORT}   -> test_compression_s3_outbound.py
#                          test_compression_s3_chunked_codec.py
# Started once by start_all_dedicated (dedicated.sh) so no test spins up its own
# nginx; a fixed-port self-start collides across xdist workers. The tests PUT and
# GET their own uuid-named objects (no seeding required) and attach to these
# ports. The http-level types{} block gives the negotiation deny-list test a
# stable extension->MIME map (.gz/.jpg are incompressible; .txt/.bin compress).
http {
    client_body_temp_path {TMP_DIR};
    default_type          application/octet-stream;
    client_max_body_size  256m;
    access_log            off;

    types {
        text/plain               txt;
        application/octet-stream bin;
        application/gzip         gz;
        image/jpeg               jpg;
    }

    # WebDAV surface (outbound compression + inbound decode + negotiation gaps).
    server {
        listen {PORT};
        server_name localhost;
        location / {
            brix_webdav          on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_auth     none;
            brix_allow_write     on;
            brix_compress        on;
        }
    }

    # S3 REST surface (outbound compression + aws-chunked inner-codec guard).
    server {
        listen {S3_PORT};
        server_name localhost;
        location / {
            brix_s3              on;
            brix_storage_backend posix:{DATA_DIR};
            brix_s3_bucket       testbucket;
            brix_allow_write     on;
            brix_compress        on;
        }
    }
}
