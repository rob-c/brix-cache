# "Off server" half of the differential-conformance pair — the STOCK XRootD
# reference data server, driven by the registry LifecycleHarness (kind="xrootd").
# Anonymous, writable, exporting one POSIX tree over root:// as the differential
# oracle for official_interop_lib. Launched as the invoking (non-root) user, so
# no `-R nobody` drop is needed and file-owner stat flags match our nginx half.
# Launcher-provided (xrootd kind): PORT DATA_ROOT ADMIN_DIR.
xrd.port {PORT}
all.export /
oss.localroot {DATA_ROOT}
all.adminpath {ADMIN_DIR}
all.pidpath {ADMIN_DIR}
xrootd.async off
