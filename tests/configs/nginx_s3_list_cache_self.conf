# Self-contained S3 list-cache template for test_s3_list_cache.py.
# Placeholders: {BASE_DIR} {LOG_DIR} {PORT} {DATA_DIR} {BUCKET} {TTL_SECONDS}
worker_processes 1;
daemon off;
pid {BASE_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log warn;

events { worker_connections 64; }

http {
    access_log off;

    server {
        listen {PORT};
        location / {
            brix_s3 on;
            brix_storage_backend posix:{DATA_DIR};
            brix_s3_bucket {BUCKET};
            brix_allow_write on;
            brix_s3_max_keys 1000;
            brix_s3_list_cache on;
            brix_s3_list_cache_ttl {TTL_SECONDS}s;
        }
    }
}
