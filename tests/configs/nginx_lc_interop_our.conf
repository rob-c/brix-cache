# "Our server" half of the differential-conformance pair — registry-lifecycle
# template for official_interop_lib.start_pair(). Our nginx-xrootd data server,
# anonymous + writable, exporting one POSIX tree over root://. The "off server"
# half is a STOCK xrootd started by the same in-process LifecycleHarness from the
# xrootd_interop_anon.cfg template. Both are seeded with a byte-identical
# deterministic tree by start_pair().
#
# Non-root note: under the in-process harness both servers run as the invoking
# user (not root/nobody), so both stat as the file owner and the kXR
# readable/writable flags already agree without permission harmonisation.
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;

thread_pool default threads=2 max_queue=256;
events { worker_connections 512; }   # -n8 conf tests open many concurrent conns

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
        brix_allow_write on;
        brix_access_log {LOG_DIR}/brix_access.log;
    }
}
