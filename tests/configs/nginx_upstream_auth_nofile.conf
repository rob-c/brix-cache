worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid       {LOG_DIR}/nginx.pid;

events { worker_connections 128; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        xrootd on;
        xrootd_storage_backend posix:{DATA_DIR};
        xrootd_upstream 127.0.0.1:{UPSTREAM_PORT};
        # No xrootd_upstream_token_file — upstream kXR_authmore causes abort (kXR_error)
    }
}
