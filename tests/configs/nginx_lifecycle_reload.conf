worker_processes 2;
daemon on;
master_process on;
error_log {LOG_DIR}/error.log notice;
pid {LOG_DIR}/nginx.pid;
# Bound the drain window: old workers serve new connections with the OLD
# per-worker config until they exit, so a low shutdown timeout keeps the
# "new connection honours new directive" convergence fast and deterministic.
worker_shutdown_timeout 3s;
events { worker_connections 64; }
stream {
    server {
        listen {STREAM_PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
        brix_allow_write {ALLOW_WRITE};
        brix_session_slots {SESSION_SLOTS};
        brix_access_log {LOG_DIR}/brix_access.log;
    }
}
http {
    access_log off;
    client_body_temp_path {TMP_DIR}/client;
    proxy_temp_path {TMP_DIR}/proxy;
    fastcgi_temp_path {TMP_DIR}/fastcgi;
    uwsgi_temp_path {TMP_DIR}/uwsgi;
    scgi_temp_path {TMP_DIR}/scgi;
    server {
        listen {PORT};
        location = /healthz { brix_health on; }
        location /metrics  { brix_metrics {METRICS}; }
    }
}
