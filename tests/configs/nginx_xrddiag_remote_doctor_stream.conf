# Anonymous stream server template for active remote-doctor diagnosis.
# Placeholders: {BASE_DIR} {BIND_HOST} {PORT} {DATA_DIR} {ALLOW_WRITE_LINE}
worker_processes 1;
pid {BASE_DIR}/nginx.pid;
error_log {BASE_DIR}/error.log info;

events { worker_connections 256; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
{ALLOW_WRITE_LINE}    }
}
