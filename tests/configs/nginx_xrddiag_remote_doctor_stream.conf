# Anonymous stream server — registry-lifecycle template for active
# remote-doctor diagnosis (writable vs read-only export).
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
# Test-provided: ALLOW_WRITE_LINE (either "brix_allow_write on;" or empty).
worker_processes 1;
daemon on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;

events { worker_connections 256; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
        {ALLOW_WRITE_LINE}
    }
}
