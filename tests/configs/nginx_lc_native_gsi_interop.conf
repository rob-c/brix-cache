# Native GSI interop server template (registry lifecycle) for
# test_native_gsi_interop.py.  Launcher-provided: LOG_DIR PORT.
# Test-provided: DATA_DIR SIGNED_DH_DIRECTIVE CERT_FILE KEY_FILE CA_DIR
# (all absolute; cert/key/CA must exist at config-parse time).
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
daemon on;

events { worker_connections 64; }

stream {
    server {
        listen {PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth gsi;
{SIGNED_DH_DIRECTIVE}
        brix_certificate     {CERT_FILE};
        brix_certificate_key {KEY_FILE};
        brix_trusted_ca      {CA_DIR};
    }
}
