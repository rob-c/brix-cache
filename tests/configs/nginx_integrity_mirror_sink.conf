# Mirror sink (shadow-traffic destination) for test_integrity_matrix.py
# TestMirrorTopology.  A plain root:// storage server that receives the front's
# mirrored opcodes; the client never talks to it directly.  Rendered through the
# registry (LifecycleHarness); {PORT}/{DATA_ROOT}/{LOG_DIR} come from the launcher.
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
events {}
stream {
    server {
        listen 0.0.0.0:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
        brix_allow_write on;
    }
}
