# Phase-40 impersonation config-validation template for
# tests/userns/test_impersonate_config.py.  nginx -t only: proves the
# brix_impersonation mode surface (off / single / map) and its per-mode
# validation (single needs a user, map needs a root master, bogus lists the
# valid tokens).  STREAM_BODY carries the per-test directive lines; its name is
# kept brace-free in this comment so the substitution never expands it here.
# Rendered through the phase-81 registry (LifecycleHarness): the primary port,
# log dir and posix export come from the launcher.
daemon on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
events { worker_connections 64; }
stream {
  server {
    listen 127.0.0.1:{PORT};
    brix_root on;
    brix_storage_backend posix:{DATA_ROOT};
{STREAM_BODY}
  }
}
