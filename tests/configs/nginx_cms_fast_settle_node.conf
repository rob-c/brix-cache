# CMS fast-settle data-node template for test_cms_fast_settle.py.
worker_processes 1;
daemon on;
pid {BASE_DIR}/logs/nginx.pid;
error_log {BASE_DIR}/logs/error.log {LOG_LEVEL};

events { worker_connections 256; }

stream {
    server {
        listen {PORT};
        brix_root on;
        brix_storage_backend posix:{BASE_DIR}/data;
        brix_auth none;
        brix_cms_manager 127.0.0.1:{MANAGER_PORT};
{EXTRA_DIRECTIVES}    }
}
