# CMS manager exercising Phase-89 W8 rm/rmdir holder fan-out for
# test_cms_fanout_rm.py.  The {PORT} root listener is a manager with
# brix_cms_fanout on: a client kXR_rm/kXR_rmdir on a path with >=2 registered
# holders is forwarded to EVERY holder over the CMS plane and answered from
# the reply-aggregation window instead of a single-node redirect.  Python
# data-node peers register over the CMS wire on {CMS_PORT} (brix_cms_server
# replaces the stream handler for its whole server block, so it needs its own
# port).  The window is short so tests settle fast.
# Launcher-provided: LOG_DIR PORT DATA_ROOT.  Test-provided: CMS_PORT.
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
events { worker_connections 128; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on; brix_storage_backend posix:{DATA_ROOT}; brix_auth none;
        brix_manager_mode on;
        brix_cms_fanout on;
        brix_cms_fanout_window 600ms;
    }
    server {
        listen 127.0.0.1:{CMS_PORT};
        brix_cms_server on;
        brix_cms_server_interval 1;
    }
}
