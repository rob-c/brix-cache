# CMS manager with the Phase-89 W3 dynamic-location plane on: kXR_locate
# misses fan kYR_state out to registered nodes and park the client for the
# first kYR_have.  Template for test_cms_locate_have.py — Python data-node
# peers log in over the CMS wire on the dedicated CMS listener (brix_cms_server
# replaces the stream handler for its whole server block, so it needs its own
# port) while raw XRootD clients drive kXR_locate on the root listener.
# Launcher-provided: LOG_DIR PORT DATA_ROOT.  Test-provided: CMS_PORT WINDOW_MS.
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
events { worker_connections 128; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on; brix_storage_backend posix:{DATA_ROOT}; brix_auth none;
        brix_manager_mode on;
        brix_cms_locate_window {WINDOW_MS}ms;
        brix_cms_state_fanout 4;
    }
    server {
        listen 127.0.0.1:{CMS_PORT};
        brix_cms_server on;
        brix_cms_server_interval 1;
    }
}
