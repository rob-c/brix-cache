# nginx_worker_deescalate_root.conf — worker privilege de-escalation, for
# test_worker_deescalation_root.py.
#
# nginx is launched by root and `user root;` keeps the worker root-capable, so the
# pre-auth credential parsers would run as uid 0.  brix_imp_worker_deescalate()
# force-drops the worker at init to the confined {WORKER_USER_LINE} account (or
# "nobody" + a warning when the line is empty), fail-closed if that account is
# missing/invalid.  Only /proc/<worker>/status is inspected, so no request is driven.
#
# Launcher-provided : PORT LOG_DIR ; Test-provided : BACKEND_DIR, CACHE_DIR,
#                     WORKER_USER_LINE ("brix_worker_user <acct>;" or empty).
user root;
daemon on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;

events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{BACKEND_DIR};
        brix_cache_store     posix:{CACHE_DIR};
        brix_cache_export    /;
{WORKER_USER_LINE}
    }
}
