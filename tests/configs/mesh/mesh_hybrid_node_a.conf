worker_processes 1;
error_log {ERR} debug;
pid {PID};
thread_pool default threads=2 max_queue=256;
events { worker_connections 128; }
stream {
    server { listen {BIND_HOST}:{DATA_PORT}; brix_root on; brix_auth none; brix_manager_mode on; }
    server { listen {BIND_HOST}:{CMS_PORT}; brix_cms_server on; }
}
http {
    access_log off;
    client_body_temp_path {TMPBASE}/cbt;
    proxy_temp_path {TMPBASE}/pt;
    fastcgi_temp_path {TMPBASE}/ft;
    uwsgi_temp_path {TMPBASE}/ut;
    scgi_temp_path {TMPBASE}/st;
    client_max_body_size 1g;
    server {
        listen {BIND_HOST}:{PORT_A_S3};
        location / {
            proxy_pass http://{BIND_HOST}:{S3_FRONT_UPSTREAM};
            proxy_http_version 1.1;
            proxy_request_buffering off;
        }
    }
    server {
        listen {BIND_HOST}:{PORT_A_DAV} ssl;
        server_name localhost;
        ssl_certificate {CERT};
        ssl_certificate_key {KEY};
        location / {
            brix_webdav on; brix_storage_backend posix:{TMPBASE};
            brix_webdav_auth none; brix_allow_write on;
        }
    }
}
