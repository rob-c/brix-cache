worker_processes 1;
error_log {ERR} info;
pid {PID};
thread_pool default threads=2 max_queue=256;
events { worker_connections 128; }
stream {
    server { listen {BIND_HOST}:{DATA_PORT}; brix_root on; brix_auth none; brix_manager_mode on; }
    server { listen {BIND_HOST}:{CMS_PORT}; brix_cms_server on; }
}
