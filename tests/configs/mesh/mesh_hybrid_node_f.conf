worker_processes 1;
error_log {ERR} debug;
pid {PID};
thread_pool default threads=2 max_queue=256;
events { worker_connections 128; }
stream {
    server {
        listen {BIND_HOST}:{DATA_PORT};
        brix_root on; brix_storage_backend posix:{ROOT}; brix_auth none;
        brix_allow_write on;
        brix_cms_manager {CMS_MGR}; brix_cms_paths {PATHS};
        brix_cms_interval 2; brix_listen_port {DATA_PORT};
        brix_http_handoff {BIND_HOST}:{PORT_F_DAV_HTTP};
    }
}
http {
    access_log off;
    client_body_temp_path {TMPBASE}/cbt;
    proxy_temp_path {TMPBASE}/pt;
    fastcgi_temp_path {TMPBASE}/ft;
    uwsgi_temp_path {TMPBASE}/ut;
    scgi_temp_path {TMPBASE}/st;
    client_max_body_size 1g;
    server {
        listen {BIND_HOST}:{PORT_F_S3};
        location / {
            brix_s3 on; brix_storage_backend posix:{ROOT}{EXPORT};
            brix_s3_bucket {S3_BUCKET}; brix_allow_write on;
            brix_s3_max_keys 1000;
        }
    }
    server {
        listen {BIND_HOST}:{PORT_F_DAV} ssl;
        server_name localhost;
        ssl_certificate {CERT};
        ssl_certificate_key {KEY};
        location / {
            brix_webdav on; brix_storage_backend posix:{ROOT};
            brix_webdav_auth none; brix_allow_write on;
        }
    }
    server {
        listen {BIND_HOST}:{PORT_F_DAV_HTTP};
        server_name localhost;
        location / {
            brix_webdav on; brix_storage_backend posix:{ROOT};
            brix_webdav_auth none; brix_allow_write on;
        }
    }
}
