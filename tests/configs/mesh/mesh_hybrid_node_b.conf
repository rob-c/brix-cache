worker_processes 1;
error_log {ERR} debug;
pid {PID};
thread_pool default threads=2 max_queue=256;
events { worker_connections 128; }
stream {
    server {
        listen {BIND_HOST}:{DATA_PORT};
        brix_root on; brix_auth none;
        brix_allow_write on;
        brix_tap_proxy on;
        brix_tap_proxy_upstream {BIND_HOST}:{UPSTREAM};
        brix_tap_proxy_auth anonymous;
        brix_cms_manager {CMS_MGR}; brix_cms_paths {PATHS};
        brix_cms_interval 2; brix_listen_port {DATA_PORT};
    }
}
http {
    access_log off;
    client_body_temp_path {TMPBASE}/cbt;
    proxy_temp_path {TMPBASE}/pt;
    fastcgi_temp_path {TMPBASE}/ft;
    uwsgi_temp_path {TMPBASE}/ut;
    scgi_temp_path {TMPBASE}/st;
    client_max_body_size 1g;
    server {
        listen {BIND_HOST}:{PORT_B_S3};
        location / {
            proxy_pass http://{BIND_HOST}:{S3_UPSTREAM};
            proxy_http_version 1.1;
            proxy_request_buffering off;
        }
    }
    server {
        listen {BIND_HOST}:{PORT_B_DAV} ssl;
        server_name localhost;
        ssl_certificate {CERT};
        ssl_certificate_key {KEY};
        location / {
            brix_webdav on; brix_storage_backend posix:{TMPBASE};
            brix_webdav_auth none; brix_allow_write on;
        }
    }
}
