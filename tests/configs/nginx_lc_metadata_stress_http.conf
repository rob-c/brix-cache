# Metadata-stress WebDAV fileserver (registry lifecycle) for
# test_metadata_stress.py.  A throwaway anonymous WebDAV export used to hammer
# PROPFIND and assert clean 429 load-shedding.
# Launcher-provided: LOG_DIR PORT TMP_DIR.
# Test-provided via template_values: BIND_HOST DATA_DIR (must exist at parse time)
#   RL_ZONE (optional `brix_rate_limit_zone ...;`, "" when unused)
#   RL_RULE (optional per-location `brix_rate_limit_rule ...;`, "" when unused).
worker_processes 1;
error_log {LOG_DIR}/error.log error;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 512; }
http {
    client_body_temp_path {TMP_DIR}/t; proxy_temp_path {TMP_DIR}/t;
    fastcgi_temp_path {TMP_DIR}/t; uwsgi_temp_path {TMP_DIR}/t;
    scgi_temp_path {TMP_DIR}/t; access_log off;
    {RL_ZONE}
    server {
        listen {BIND_HOST}:{PORT};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_auth none;
            {RL_RULE}
        }
    }
}
