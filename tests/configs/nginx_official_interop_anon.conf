# Anonymous stream server template for official_interop_lib.py.
daemon off;
worker_processes 1;
pid {BASE_DIR}/our.pid;
error_log {BASE_DIR}/our-err.log info;

thread_pool default threads=2 max_queue=4096;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        brix_access_log {BASE_DIR}/our-access.log;
    }
}
