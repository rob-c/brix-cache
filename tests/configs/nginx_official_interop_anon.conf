# Anonymous stream server template for official_interop_lib.py (start_our_server).
# Rendered through the phase-81 registry (LifecycleHarness): {PORT}, {LOG_DIR}
# and {DATA_ROOT} come from the launcher; {BIND_HOST} is supplied via the spec's
# template_values.  A SINGLE worker is intentional — the deep-tree special-file
# suite relies on it to detect a wedged worker (FIFO/special-file open DoS).
daemon on;
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;

thread_pool default threads=2 max_queue=4096;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
        brix_allow_write on;
        brix_access_log {LOG_DIR}/access.log;
    }
}
