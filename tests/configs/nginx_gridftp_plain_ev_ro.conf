# Read-only cleartext FTP gateway on the event engine.  Identical to
# nginx_gridftp_plain_ev.conf but WITHOUT brix_gridftp_allow_write, so the write
# gate (INVARIANT 3) refuses STOR/APPE with 550 before any data channel opens.
# Rendered through the registry (LifecycleHarness): {PORT}/{LOG_DIR} from the
# launcher, {DATA_ROOT} the export tree, {BIND_HOST} from the spec.
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 64; }
stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_gridftp on;
        brix_gridftp_export {DATA_ROOT};
    }
}
