# Batched stream access-log template for test_access_log_batch.py (registry
# lifecycle).  Launcher-provided: LOG_DIR PORT.  Test-provided: BIND_HOST
# DATA_DIR (seeded under tmp_path; must exist at config-parse time).  The
# access log is emitted next to error.log so the test reads it at
# {ep.prefix}/logs/access.log.
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
daemon on;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_access_log {LOG_DIR}/access.log;
    }
}
