# MU root:// cache node — registry-lifecycle template for test_mu_cache_serve_authz.py.
# Impersonation OFF, GSI auth ON. A no-root verification of the cache-transparency FIX
# (open_cache.c): the authorization gate runs at the WORKER level (before any setfsuid),
# so a denied principal must be refused a cache HIT without a privileged fleet.
#
# Enforcing tier = authdb GROUP rule ("g cms / rl") with NO brix_require_vo — exactly a
# tier the old VO-ACL-only cache path skipped. GSI+VOMS works over plain root://.
# Launcher-provided: LOG_DIR PORT.
# Test-provided: ORIGIN_PORT CACHE_DIR CERT KEY CA VOMSDIR CA_DIR AUTHDB.
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/cache_noimp_error.log info;
thread_pool default threads=2 max_queue=256;
daemon on;
events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;

        # Remote origin (anonymous) — so the cache stores a STANDALONE file and the
        # cache-HIT serve path (open_cache.c) is genuinely exercised.
        brix_storage_backend  root://127.0.0.1:{ORIGIN_PORT};
        brix_cache_store      posix:{CACHE_DIR};
        brix_cache_export     /;
        brix_cache_state_root {CACHE_DIR};

        brix_auth gsi;
        brix_certificate     {CERT};
        brix_certificate_key {KEY};
        brix_trusted_ca      {CA};
        brix_vomsdir         {VOMSDIR};
        brix_voms_cert_dir   {CA_DIR};

        # authdb is the enforcing tier; deliberately NO brix_require_vo so the old
        # cache path's VO check was a no-op that skipped straight to serving.
        brix_authdb          {AUTHDB};

        brix_impersonation off;

        brix_allow_write on;
        brix_access_log {LOG_DIR}/cache_noimp_access.log;
    }
}
