# nginx_gsi_handshake_webdav.conf — HTTPS WebDAV requiring x509 proxy client-cert
# auth (brix_webdav_proxy_certs): PROPFIND/GET/PUT/COPY/MOVE/… with a proxy, and
# the matching rejections (no cert / untrusted CA / expired).  Registry
# LifecycleHarness template.
#
# Launcher-provided : LOG_DIR PORT DATA_ROOT (served tree)
# Test-provided     : CERT KEY (host cert/key), CADIR (trusted-CA dir)
daemon on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;

events { worker_connections 64; }

http {
    server {
        listen {PORT} ssl;
        ssl_certificate     {CERT};
        ssl_certificate_key {KEY};
        ssl_verify_client   optional_no_ca;
        ssl_verify_depth    10;
        brix_webdav_proxy_certs on;
        client_max_body_size 64m;
        location / {
            root               {DATA_ROOT};
            brix_webdav      on;
            brix_storage_backend posix:{DATA_ROOT};
            brix_webdav_cadir {CADIR};
            brix_webdav_auth required;
            brix_allow_write on;
        }
    }
}
