# Root/WebDAV resumable-upload test server (registry lifecycle) for
# test_shutdown_resume.py.  A throwaway anonymous root:// (stream) + WebDAV
# (http) export whose workers are reloaded / hard-killed mid-transfer.
# Launcher-provided: LOG_DIR PORT DATA_ROOT TMP_DIR.
# extra_ports: HTTP_PORT.   template_values: BIND_HOST.
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 256; }

thread_pool default threads=4 max_queue=65536;

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_export {DATA_ROOT};
        brix_auth none;
        brix_allow_write on;
        brix_upload_resume on;
    }
}

http {
    access_log off;
    client_max_body_size 64m;
    client_body_temp_path {TMP_DIR}/body_tmp;
    proxy_temp_path {TMP_DIR}/proxy_tmp;
    fastcgi_temp_path {TMP_DIR}/fcgi_tmp;
    uwsgi_temp_path {TMP_DIR}/uwsgi_tmp;
    scgi_temp_path {TMP_DIR}/scgi_tmp;

    server {
        listen {BIND_HOST}:{HTTP_PORT};
        location / {
            brix_webdav on;
            brix_export {DATA_ROOT};
            brix_webdav_auth none;
            brix_allow_write on;
            brix_webdav_upload_resume on;
        }
    }
}
