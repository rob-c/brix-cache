# Self-contained S3 template with brix_verify_write ON for test_s3_verify_write.py
# (registry lifecycle).  After every whole-object PUT the writer re-reads the
# committed object through the storage driver and CRC-compares it against the
# bytes it wrote, failing the request if the driver did not persist them
# faithfully.  A small client_body_buffer_size forces larger bodies to spool to a
# temp file so the writer's fd-ingest (write_fd) path is exercised too.
# Launcher-provided: LOG_DIR TMP_DIR PORT.  Test-provided: BIND_HOST DATA_DIR
# (seeded under tmp_path; must exist at config-parse time) BUCKET.
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log warn;
daemon on;

events { worker_connections 64; }

http {
    access_log off;
    client_max_body_size 32m;
    client_body_buffer_size 1k;
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path       {TMP_DIR}/pt;
    fastcgi_temp_path     {TMP_DIR}/ft;
    uwsgi_temp_path       {TMP_DIR}/ut;
    scgi_temp_path        {TMP_DIR}/st;

    server {
        listen {BIND_HOST}:{PORT};
        location / {
            brix_s3 on;
            brix_storage_backend posix:{DATA_DIR};
            brix_s3_bucket {BUCKET};
            brix_allow_write on;
            brix_verify_write on;
        }
    }
}
