# nginx_hardening_root_webdav.conf — minimal `user root;` WebDAV/posix server with
# impersonation OFF, for test_privilege_hardening_root.py.
#
# Used to prove item 1: even in the DEFAULT posture (no impersonation, no seccomp
# directive), a worker that runs as root has ALL capabilities shed and
# NO_NEW_PRIVS set at worker init — closing the old gap where the worker cap-drop
# only ran in `brix_impersonation map` mode. Requires a root test harness.
#
# Launcher-provided : PORT LOG_DIR TMP_DIR ; Test-provided : EXPORT.
user root;
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 32; }

http {
    access_log off;
    client_body_temp_path {TMP_DIR};
    server {
        listen 127.0.0.1:{PORT};
        location / {
            brix_webdav          on;
            brix_webdav_auth     none;
            brix_allow_write     on;
            brix_storage_backend posix:{EXPORT};
        }
    }
}
