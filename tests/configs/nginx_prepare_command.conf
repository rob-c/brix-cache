worker_processes 1;
thread_pool default threads=2 max_queue=256;
error_log {LOG_DIR}/error.log info;
pid       {LOG_DIR}/nginx.pid;

events { worker_connections 128; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_allow_write on;
        brix_prepare_command {STAGE_CMD};
    }
}
