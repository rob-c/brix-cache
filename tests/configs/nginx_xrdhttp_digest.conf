worker_processes 1;
error_log {LOG_DIR}/error.log info;

events { worker_connections 128; }

# Dedicated cleartext (no-TLS) HTTP WebDAV server for
# tests/test_xrdhttp_wait_retry_digest_range.py.  A single worker over an
# isolated, writable data root (data-xrdhttp-digest) with a deliberately tight
# per-IP request-rate rule (rate=2r/s burst=2) so the throttle path
# (src/net/ratelimit/ratelimit_http.c) can be driven deterministically: the first
# couple of requests pass, then the server emits HTTP 429 + Retry-After.  The
# suite drives RFC-3230 Want-Digest, RFC-7233 byte ranges, multipart/byteranges,
# HEAD/GET parity and a PUT/GET round-trip against this one instance.  Pre-started
# by manage_test_servers.sh start-all; the test seeds range_digest.bin into the
# data root and never spawns its own nginx.
http {
    client_body_temp_path {TMP_DIR};
    default_type application/octet-stream;
    access_log off;
    client_max_body_size 64m;

    xrootd_rate_limit_zone zone=xhw:4m;

    server {
        listen {PORT};
        location / {
            xrootd_webdav             on;
            xrootd_webdav_storage_backend posix:{DATA_DIR};
            xrootd_webdav_auth        none;
            xrootd_webdav_allow_write on;
            xrootd_rate_limit_rule zone=xhw key=ip rate=2r/s burst=2;
        }
    }
}
