# MU WebDAV CACHE server — cache ON (read cache). Origin is the WebDAV DIRECT server.
worker_processes 2;
error_log {LOG_DIR}/webdav_cache_error.log info;
events { worker_connections 128; }
http {
    access_log off;
    client_body_temp_path {TMP_DIR};
    proxy_temp_path       {TMP_DIR};
    fastcgi_temp_path     {TMP_DIR};
    uwsgi_temp_path       {TMP_DIR};
    scgi_temp_path        {TMP_DIR};
    server {
        listen {BIND_HOST}:{WEBDAV_CACHE_PORT} ssl;
        server_name localhost;
        ssl_certificate        {CERT};
        ssl_certificate_key    {KEY};
        ssl_client_certificate {CA};
        brix_webdav_proxy_certs on;
        location / {
            brix_webdav              on;
            brix_storage_backend     posix:{DATA_DIR};
            brix_webdav_cache_root   {CACHE_DIR};
            brix_webdav_auth         required;
            brix_webdav_cafile       {CA};
            brix_webdav_vomsdir      {VOMSDIR};
            brix_webdav_voms_cert_dir {CA_DIR};
            brix_webdav_token_jwks     {JWKS};
            brix_webdav_token_issuer   "https://test.example.com";
            brix_webdav_token_audience "nginx-xrootd";
            brix_authdb              {AUTHDB};
            brix_allow_write on;
        }
    }
}
