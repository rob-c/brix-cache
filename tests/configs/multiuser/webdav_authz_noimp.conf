# MU WebDAV native-authz verification — a no-root check of FIX 3 (WebDAV GET/HEAD/PROPFIND
# now enforce native authdb + VO ACL, at parity with root://). GSI client cert, no
# impersonation (the access-phase gate is a worker-level decision). authdb "g cms /" + VO ACL
# "require_vo /cms cms" admit only VO=cms; a VO=atlas reader is refused a GET with 403.
worker_processes 1;
error_log {LOG_DIR}/webdav_authz_error.log info;
events { worker_connections 64; }
http {
    access_log off;
    client_body_temp_path {TMP_DIR};
    proxy_temp_path       {TMP_DIR};
    fastcgi_temp_path     {TMP_DIR};
    uwsgi_temp_path       {TMP_DIR};
    scgi_temp_path        {TMP_DIR};
    server {
        listen {BIND_HOST}:{WEBDAV_AUTHZ_PORT} ssl;
        server_name localhost;
        ssl_certificate        {CERT};
        ssl_certificate_key    {KEY};
        ssl_client_certificate {CA};
        ssl_verify_client      optional_no_ca;   # REQUEST the client (proxy) cert
        ssl_verify_depth       10;
        brix_webdav_proxy_certs on;
        location / {
            brix_webdav              on;
            brix_storage_backend     posix:{DATA_DIR};
            brix_webdav_auth         required;
            brix_webdav_cafile       {CA};
            brix_webdav_vomsdir      {VOMSDIR};
            brix_webdav_voms_cert_dir {CA_DIR};
            brix_webdav_authdb       {AUTHDB};
            brix_webdav_require_vo   /restricted cms;
            brix_allow_write on;
        }
    }
}
