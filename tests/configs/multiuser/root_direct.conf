# MU root:// DIRECT server — cache OFF. The authoritative oracle: every read/stat runs the
# full three-tier authorization gate (authdb -> VO ACL -> token scope) with no cache path.
worker_processes 2;
error_log {LOG_DIR}/root_direct_error.log info;
thread_pool default threads=4 max_queue=65536;
events { worker_connections 128; }

stream {
    server {
        listen {BIND_HOST}:{ROOT_DIRECT_PORT};
        brix_root on;

        # Serve the real export directly (no cache).
        brix_export           {DATA_DIR};
        brix_storage_backend  posix:{DATA_DIR};

        # Accept a GSI (VOMS) proxy OR a WLCG bearer token.
        brix_auth both;
        brix_certificate     {CERT};
        brix_certificate_key {KEY};
        brix_trusted_ca      {CA_DIR};
        brix_vomsdir         {VOMSDIR};
        brix_voms_cert_dir   {CA_DIR};
        brix_token_jwks      {JWKS};
        brix_token_issuer    "https://test.example.com";
        brix_token_audience  "nginx-xrootd";

        # Authorization sources (all consistent, rendered by policy.render_policy).
        brix_authdb          {AUTHDB};
        brix_require_vo /cms   cms;
        brix_require_vo /atlas atlas;

        # Impersonation (real setfsuid as the mapped account; needs a privileged fleet).
        brix_impersonation        map;
        brix_gridmap              {GRIDMAP};
        brix_impersonation_export {DATA_DIR};
        brix_impersonation_socket {LOG_DIR}/imp_root_direct.sock;
        brix_idmap_min_uid        1000;

        brix_allow_write on;
        brix_access_log {LOG_DIR}/root_direct_access.log;
    }
}
