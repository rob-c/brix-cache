# MU S3 CACHE server — cache ON. Origin is the S3 DIRECT server. See s3_direct.conf for the
# single-key limitation that F5/F9 surface.
worker_processes 2;
error_log {LOG_DIR}/s3_cache_error.log info;
events { worker_connections 128; }
http {
    access_log off;
    client_body_temp_path {TMP_DIR};
    proxy_temp_path       {TMP_DIR};
    fastcgi_temp_path     {TMP_DIR};
    uwsgi_temp_path       {TMP_DIR};
    scgi_temp_path        {TMP_DIR};
    server {
        listen {BIND_HOST}:{S3_CACHE_PORT};
        server_name localhost;
        location / {
            brix_s3              on;
            brix_storage_backend posix:{DATA_DIR};
            brix_s3_cache_root   {CACHE_DIR};
            brix_s3_bucket       cms;
            brix_s3_access_key   {S3_SVC_KEY};
            brix_s3_secret_key   {S3_SVC_SECRET};
            brix_s3_region       us-east-1;
            brix_allow_write on;
        }
    }
}
