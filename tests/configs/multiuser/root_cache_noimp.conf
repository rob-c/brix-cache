# MU root:// cache server — impersonation OFF, GSI auth ON. A no-root verification of the
# cache-transparency FIX (open_cache.c): the authorization gate runs at the WORKER level
# (before any setfsuid), so a denied principal must be refused a cache HIT without a
# privileged fleet.
#
# Enforcing tier = authdb GROUP rule ("g cms /prot rl") with NO brix_require_vo. This is
# EXACTLY a tier the old VO-ACL-only cache path skipped: with empty vo_rules the old
# brix_check_vo_acl_identity() passed every principal and never consulted authdb, so a
# VO=atlas proxy was served cached /prot bytes. The fixed full gate runs authdb, so only a
# VO=cms proxy is admitted. GSI+VOMS works over plain root:// (no ztn/TLS needed).
worker_processes 1;
daemon on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/cache_noimp_error.log info;
thread_pool default threads=2 max_queue=256;
events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;

        # Remote origin (anonymous) — so the cache stores a STANDALONE file and the
        # cache-HIT serve path (open_cache.c) is genuinely exercised.
        brix_storage_backend  root://{BIND_HOST}:{ORIGIN_NOIMP_PORT};
        brix_cache_store      posix:{CACHE_DIR};
        brix_cache_export     /;
        brix_cache_state_root {CACHE_DIR};

        brix_auth gsi;
        brix_certificate     {CERT};
        brix_certificate_key {KEY};
        brix_trusted_ca      {CA};
        brix_vomsdir         {VOMSDIR};
        brix_voms_cert_dir   {CA_DIR};

        # authdb is the enforcing tier; deliberately NO brix_require_vo so the old
        # cache path's VO check was a no-op that skipped straight to serving.
        brix_authdb          {AUTHDB};

        brix_impersonation off;

        brix_allow_write on;
        brix_access_log {LOG_DIR}/cache_noimp_access.log;
    }
}
