# MU cvmfs:// CACHE server — public content cache (NOT an enforcing protocol; spec D3/§4).
# F2 asserts that credentials are ignored and no privilege is inferred; this server serves
# anonymously by design.
worker_processes 2;
error_log {LOG_DIR}/cvmfs_cache_error.log info;
events { worker_connections 128; }
http {
    access_log off;
    client_body_temp_path {TMP_DIR};
    proxy_temp_path       {TMP_DIR};
    fastcgi_temp_path     {TMP_DIR};
    uwsgi_temp_path       {TMP_DIR};
    scgi_temp_path        {TMP_DIR};
    server {
        listen {BIND_HOST}:{CVMFS_CACHE_PORT} ssl;
        server_name localhost;
        ssl_certificate     {CERT};
        ssl_certificate_key {KEY};
        location / {
            brix_webdav          on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_cache_root {CACHE_DIR};
            brix_webdav_auth     none;
        }
    }
}
