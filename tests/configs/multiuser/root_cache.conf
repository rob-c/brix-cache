# MU root:// CACHE server — cache ON (read cache + stage). Origin is the DIRECT server.
# Under test: does the cached-serve path re-authorize identically to the direct oracle?
worker_processes 2;
error_log {LOG_DIR}/root_cache_error.log info;
thread_pool default threads=4 max_queue=65536;
events { worker_connections 128; }

stream {
    server {
        listen {BIND_HOST}:{ROOT_CACHE_PORT};
        brix_root on;

        # Read-through cache: origin = the DIRECT server; store bytes under CACHE_DIR.
        brix_storage_backend  root://{BIND_HOST}:{ROOT_DIRECT_PORT};
        brix_cache_store      posix:{CACHE_DIR};
        brix_cache_export     /;
        brix_cache_state_root {CACHE_DIR};

        brix_auth both;
        brix_certificate     {CERT};
        brix_certificate_key {KEY};
        brix_trusted_ca      {CA_DIR};
        brix_vomsdir         {VOMSDIR};
        brix_voms_cert_dir   {CA_DIR};
        brix_token_jwks      {JWKS};
        brix_token_issuer    "https://test.example.com";
        brix_token_audience  "nginx-xrootd";

        brix_authdb          {AUTHDB};
        brix_require_vo /cms   cms;
        brix_require_vo /atlas atlas;

        brix_impersonation        map;
        brix_gridmap              {GRIDMAP};
        brix_impersonation_export {CACHE_DIR};
        brix_impersonation_socket {LOG_DIR}/imp_root_cache.sock;
        brix_idmap_min_uid        1000;

        brix_allow_write on;
        brix_access_log {LOG_DIR}/root_cache_access.log;
    }
}
