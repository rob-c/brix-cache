# MU S3 DIRECT server — cache OFF (authoritative oracle for S3 REST).
# NOTE: brix_s3 supports a SINGLE access-key/secret pair, so per-user S3 identity via
# distinct keys is not expressible here — that limitation IS the F9/F5 finding (S3
# authorizes on one SigV4 identity and never consults WLCG token scope). The suite uses
# the service key; S3 cells surface the scope-parity gap.
worker_processes 2;
error_log {LOG_DIR}/s3_direct_error.log info;
events { worker_connections 128; }
http {
    access_log off;
    client_body_temp_path {TMP_DIR};
    proxy_temp_path       {TMP_DIR};
    fastcgi_temp_path     {TMP_DIR};
    uwsgi_temp_path       {TMP_DIR};
    scgi_temp_path        {TMP_DIR};
    server {
        listen {BIND_HOST}:{S3_DIRECT_PORT};
        server_name localhost;
        location / {
            brix_s3              on;
            brix_storage_backend posix:{DATA_DIR};
            brix_s3_bucket       cms;
            brix_s3_access_key   {S3_SVC_KEY};
            brix_s3_secret_key   {S3_SVC_SECRET};
            brix_s3_region       us-east-1;
            brix_allow_write on;
        }
    }
}
