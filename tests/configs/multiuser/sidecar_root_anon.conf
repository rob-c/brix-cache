# MU root:// anon node — a no-root check that internal metadata/staging sidecars
# (.cinfo/.meta/.xrdcinfo, .commit, .xrd-tmp.*, .xrdresume.*) are never listed
# (kXR_dirlist) nor served/statted (kXR_open/kXR_stat) even when they sit inside
# the export namespace. Anonymous (no auth) — the hiding is protocol-level, not
# an authorization decision.
worker_processes 1;
error_log {LOG_DIR}/sidecar_root_error.log info;
events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{SIDECAR_ROOT_PORT};
        brix_root on;
        brix_export           {DATA_DIR};
        brix_storage_backend  posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        brix_access_log {LOG_DIR}/sidecar_root_access.log;
    }
}
