# MU anonymous ORIGIN for the no-root cache-HIT verification. The GSI+authdb cache server
# (root_cache_noimp.conf) fills from this origin over root://; anonymous so no fill
# credential is needed. This lets the cache store a STANDALONE cached file (with .cinfo),
# exercising the real cache-HIT serve path — the path the fix protects.
worker_processes 1;
daemon on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/origin_noimp_error.log info;
thread_pool default threads=2 max_queue=256;
events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_auth none;
        brix_storage_backend posix:{DATA_DIR};
        brix_allow_write on;
        brix_access_log {LOG_DIR}/origin_noimp_access.log;
    }
}
