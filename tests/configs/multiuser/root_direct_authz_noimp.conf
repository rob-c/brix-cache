# MU root:// DIRECT (non-cache) GSI+authdb node — a no-root check of the read-open existence
# oracle fix (open_request.c). No brix_cache_store, so reads take the direct open path where
# the auth gate now runs BEFORE the existence probe: a denied principal gets kXR_NotAuthorized
# whether or not the path exists (no NotFound-vs-NotAuthorized oracle). Impersonation off (the
# auth gate is a worker-level wire decision).
worker_processes 1;
error_log {LOG_DIR}/direct_authz_error.log info;
thread_pool default threads=4 max_queue=65536;
events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{DIRECT_AUTHZ_PORT};
        brix_root on;

        brix_export           {DATA_DIR};
        brix_storage_backend  posix:{DATA_DIR};

        brix_auth gsi;
        brix_certificate     {CERT};
        brix_certificate_key {KEY};
        brix_trusted_ca      {CA};
        brix_vomsdir         {VOMSDIR};
        brix_voms_cert_dir   {CA_DIR};

        brix_authdb          {AUTHDB};

        brix_impersonation off;

        brix_allow_write on;
        brix_access_log {LOG_DIR}/direct_authz_access.log;
    }
}
