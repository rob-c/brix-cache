# Staged root upload template for test_shutdown_resume.py.
# Placeholders: {BASE_DIR} {BIND_HOST} {PORT} {DATA_DIR} {STAGE_DIR}
worker_processes 1;
pid {BASE_DIR}/nginx.pid;
error_log {BASE_DIR}/error.log info;

events { worker_connections 256; }

thread_pool default threads=4 max_queue=65536;

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_export {DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        brix_stage_dir {STAGE_DIR};
    }
}
