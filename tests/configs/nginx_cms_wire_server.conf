# CMS *server* (manager) whose frame parser is probed directly — registry-
# lifecycle template for test_cms_wire_pup_conformance.py (header sizing,
# oversize-frame rejection, recv-boundary fragmentation, Plane-A liveness).
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
events { worker_connections 128; }
stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on; brix_storage_backend posix:{DATA_ROOT}; brix_auth none;
        brix_manager_mode on;
        brix_cms_server on;
        brix_cms_server_interval 60;
    }
}
