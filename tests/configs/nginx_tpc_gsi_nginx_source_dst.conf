# nginx TPC GSI destination — registry-lifecycle template for
# test_tpc_gsi_nginx_source.py. Native TPC dest; GSI-auths outbound to the
# nginx source with its own proxy (CERT_FILE=KEY_FILE=destproxy.pem).
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
# Test-provided: CERT_FILE KEY_FILE CA_DIR.
daemon on;
worker_processes 1;
error_log {LOG_DIR}/dst-err.log info;
pid {LOG_DIR}/nginx.pid;

thread_pool default threads=4 max_queue=65536;

events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
        brix_allow_write on;
        brix_tpc_allow_local on;
        brix_tpc_allow_private on;
        brix_certificate {CERT_FILE};
        brix_certificate_key {KEY_FILE};
        brix_trusted_ca {CA_DIR};
        brix_access_log {LOG_DIR}/dst-acc.log;
    }
}
