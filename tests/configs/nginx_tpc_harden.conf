# Native TPC pull-leg integrity (fault-hardening finding #13).
#
# The native XRootD third-party-copy PULL (destination opens a remote source and
# streams it in) had ZERO end-to-end verification: its only in-band EOF signal is
# a zero-byte kXR_read reply — forgeable by a truncating middlebox — with no size
# check and no checksum, so a STOPPED/TRUNCATED pull committed as COMPLETE, and a
# byte flipped on the source->dest hop was written verbatim.
#
# One nginx hosts TWO brix_root planes; each acts as BOTH a TPC destination and
# (self-)source, so a single process models the whole
#   xrdcp --tpc only  root://SOURCE//src  ->  root://DEST//dst
# rendezvous.  The test splices a kXR-response-aware proxy onto the DEST's pull
# connection (tpc.src points at the proxy, which forwards to this same server) and
# either forges an early EOF (truncation) or flips one body byte (corruption):
#
#   :{PORT}      brix_tpc_verify_checksum on   (knob ON)  — pull-leg checksum
#                                                            verify + always-on
#                                                            source-size gate
#   :{PORT_OFF}  brix_tpc_verify_checksum off  (knob OFF) — size gate only
#
# The source-size completion gate is ALWAYS on (a mismatch is unambiguous
# truncation), so truncation is refused on both planes; brix_tpc_verify_checksum
# adds the opt-in post-copy source-vs-destination adler32 compare that catches a
# length-preserving in-flight corruption.
#
# A DISTINCT export root per plane ({ON_ROOT} vs {OFF_ROOT}): the storage-backend
# registry is keyed by the export's canonical root, so sharing one root would let
# the two server blocks collide on a single entry (last registration wins).
#
# Launcher-provided: LOG_DIR PORT (=knob-ON plane).
# Test-provided via extra_ports:     PORT_OFF.
# Test-provided via template_values: BIND_HOST ON_ROOT OFF_ROOT (both export roots
#   are test-controlled so the test knows each plane's on-disk path; must exist at
#   parse for the posix backend).
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;

thread_pool default threads=4 max_queue=256;
events { worker_connections 64; }

stream {
    # Knob ON: after a size-verified pull, kXR_query(kXR_Qcksum) the source and
    # recompute adler32 over the destination — a mismatch fails the copy closed.
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend    posix:{ON_ROOT};
        brix_auth none;
        brix_allow_write on;
        brix_tpc_allow_local on;
        brix_tpc_require_source_size on;
        brix_tpc_verify_checksum on;
        brix_access_log {LOG_DIR}/brix_access_on.log;
    }

    # Knob OFF: the always-on source-size gate still refuses a truncated pull, but
    # a length-preserving corruption is NOT checked — it commits as complete.
    server {
        listen {BIND_HOST}:{PORT_OFF};
        brix_root on;
        brix_storage_backend    posix:{OFF_ROOT};
        brix_auth none;
        brix_allow_write on;
        brix_tpc_allow_local on;
        brix_tpc_verify_checksum off;
        brix_access_log {LOG_DIR}/brix_access_off.log;
    }
}
