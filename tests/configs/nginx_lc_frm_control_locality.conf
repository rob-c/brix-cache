# Residency-locality template for test_frm_control_locality.py (registry
# lifecycle harness).  Rewritten 2026-07-18 onto the live tape://exec MSS surface
# that replaced the removed control-dir xattr-stub model: residency is driven by
# the exec adapter (online buffer <BASE>/.online/<key> -> ONLINE; the `exists`
# verb -> NEARLINE; neither -> ABSENT/NONE) and reported through the WLCG Tape
# REST POST /api/v1/archiveinfo mapping.  Http-only; the stage command is read
# from BRIX_FRM_STAGECMD in the master environment.
#
# Launcher-provided: LOG_DIR TMP_DIR PORT.  Test-provided: BIND_HOST BASE_DIR
# EXPORT_DIR CACHE_DIR.  Env-provided: BRIX_FRM_STAGECMD.
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
env BRIX_FRM_STAGECMD;

events { worker_connections 64; }

http {
    access_log off;
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path {TMP_DIR}/pt;
    fastcgi_temp_path {TMP_DIR}/ft;
    uwsgi_temp_path {TMP_DIR}/ut;
    scgi_temp_path {TMP_DIR}/st;
    server {
        listen {BIND_HOST}:{PORT};
        location / {
            brix_webdav on;
            brix_export {EXPORT_DIR};
            brix_storage_backend tape://exec{BASE_DIR};
            brix_cache_store posix:{CACHE_DIR};
            brix_webdav_auth none;
            brix_allow_write on;
            brix_webdav_tape_rest on;
        }
    }
}
