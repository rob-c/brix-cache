# Self-contained multi-front-door guard template for test_guard_endpoints.py.
# Placeholders: {BASE_DIR} {BIND_HOST} {DAV_PORT} {S3_PORT} {OPS_PORT}
#               {XRD_PORT} {CMS_PORT} {DAV_AUDIT} {S3_AUDIT} {OPS_AUDIT}
#               {DAV_ROOT} {S3_ROOT} {XRD_ROOT}
worker_processes 1;
error_log {BASE_DIR}/logs/error.log info;
pid {BASE_DIR}/nginx.pid;

events { worker_connections 128; }

http {
    access_log off;
    client_body_temp_path {BASE_DIR}/tmp;
    proxy_temp_path       {BASE_DIR}/tmp;
    fastcgi_temp_path     {BASE_DIR}/tmp;
    uwsgi_temp_path       {BASE_DIR}/tmp;
    scgi_temp_path        {BASE_DIR}/tmp;

    server {
        listen {BIND_HOST}:{DAV_PORT};
        location / {
            brix_guard on;
            brix_guard_profile xrdhttp;
            brix_guard_audit_log {DAV_AUDIT};
            brix_webdav on;
            brix_storage_backend posix:{DAV_ROOT};
            brix_webdav_auth none;
            brix_allow_write on;
        }
    }

    server {
        listen {BIND_HOST}:{S3_PORT};
        location / {
            brix_guard on;
            brix_guard_profile xrdhttp;
            brix_guard_audit_log {S3_AUDIT};
            brix_s3 on;
            brix_storage_backend posix:{S3_ROOT};
            brix_s3_access_key GUARDTESTKEY;
            brix_s3_secret_key guard-test-secret;
        }
    }

    server {
        listen {BIND_HOST}:{OPS_PORT};
        brix_guard on;
        brix_guard_audit_log {OPS_AUDIT};
        location = /metrics { brix_metrics on; }
    }
}

stream {
    server {
        listen {BIND_HOST}:{XRD_PORT};
        brix_root on;
        brix_export {XRD_ROOT};
        brix_auth none;
    }
    server {
        listen {BIND_HOST}:{CMS_PORT};
        brix_cms_server on;
    }
}
