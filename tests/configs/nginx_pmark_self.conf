# SciTags pmark WebDAV template for test_pmark.py.
events { worker_connections 64; }

http {
    access_log off;

    server {
        listen {BIND_HOST}:{PORT};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_auth none;
            brix_pmark on;
            brix_pmark_http_plain on;
            brix_pmark_firefly_dest {FIREFLY_HOST}:{FIREFLY_PORT};
{EXTRA_LOCATION}
        }
    }
}
