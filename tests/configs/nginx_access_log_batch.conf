# Batched stream access-log template for test_access_log_batch.py.
# Placeholders: {LOG_DIR} {BIND_HOST} {PORT} {DATA_DIR} {ACCESS_LOG}
error_log {LOG_DIR}/error.log info;
pid       {LOG_DIR}/nginx.pid;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_access_log {ACCESS_LOG};
    }
}
