# Self-contained config template for test_xfer_resume_sweep.py (registry
# lifecycle).  Launcher-provided: LOG_DIR PORT DATA_ROOT.  Test-provided:
# BIND_HOST STAGE_DIR.
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
env BRIX_UPLOAD_RESUME_TTL;
events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_export {DATA_ROOT};
        brix_auth none;
        brix_allow_write on;
        brix_stage_dir {STAGE_DIR};
    }
}
