# Self-contained config template for test_xfer_resume_sweep.py.
# Placeholders: {BASE_DIR} {BIND_HOST} {PORT} {DATA_DIR} {STAGE_DIR}
worker_processes 1;
error_log {BASE_DIR}/logs/error.log info;
pid {BASE_DIR}/logs/nginx.pid;
env BRIX_UPLOAD_RESUME_TTL;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_export {DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        brix_stage_dir {STAGE_DIR};
    }
}

daemon off;
master_process off;
