# brix_proxy_ssl_capath — template for test_proxy_ssl_capath.py (registry
# lifecycle).
# Launcher-provided: LOG_DIR PORT TMP_DIR DATA_ROOT.
# Test-provided: HOST_CERT HOST_KEY CAPATH BACKEND_PORT.
#
# Two servers: a TLS backend (the "storage element") and a cleartext front
# whose proxy back leg verifies the backend with proxy_ssl_verify on — fed
# ONLY by the hashed CA directory (CAPATH), no proxy_ssl_trusted_certificate
# line anywhere.  The shape of a grid gateway whose host ships only
# /etc/grid-security/certificates.
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
daemon on;

events { worker_connections 64; }

http {
    access_log {LOG_DIR}/access.log;
    client_body_temp_path {TMP_DIR};

    # Backend: TLS "storage element" the front leg must verify.
    server {
        listen 127.0.0.1:{BACKEND_PORT} ssl;
        ssl_certificate     {HOST_CERT};
        ssl_certificate_key {HOST_KEY};

        location / {
            return 204;
        }
    }

    # Front: cleartext in, verified TLS out.
    server {
        listen 127.0.0.1:{PORT};

        location / {
            proxy_pass https://127.0.0.1:{BACKEND_PORT};
            proxy_ssl_verify on;
            # nginx's upstream name check is DNS-only (X509_check_host):
            # match the backend cert's DNS SAN, not the connect IP.
            proxy_ssl_name localhost;
            brix_proxy_ssl_capath {CAPATH};
        }
    }
}
