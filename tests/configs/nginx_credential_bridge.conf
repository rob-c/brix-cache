# Credential Translation Bridge: GSI client → nginx(GSI auth) → token-only backend
#
# This is Section 4C of the comprehensive testing roadmap.
# Nginx acts as a migration shim for legacy experiments:
#   1. It terminates the inbound GSI proxy certificate (brix_auth gsi).
#   2. It injects a WLCG Bearer Token read from TOKEN_FILE when connecting
#      to the upstream (brix_upstream_token_file).
#   3. The upstream (NGINX_TOKEN_PORT) sees only Bearer auth — never a proxy cert.
#
# The TOKEN_FILE must contain a valid JWT signed by the same issuer/JWKS that
# NGINX_TOKEN_PORT trusts.  manage_test_servers.sh writes this file during setup.

worker_processes 1;
thread_pool default threads=2 max_queue=256;
error_log {LOG_DIR}/error.log debug;
pid       {LOG_DIR}/nginx.pid;

events { worker_connections 128; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_auth gsi;
        brix_certificate     {SERVER_CERT};
        brix_certificate_key {SERVER_KEY};
        brix_trusted_ca      {CA_CERT};
        brix_tap_proxy on;
        brix_tap_proxy_auth forward;
        brix_tap_proxy_upstream {BIND_HOST}:{UPSTREAM_PORT};
        brix_upstream_token_file {TOKEN_FILE};
    }
}
