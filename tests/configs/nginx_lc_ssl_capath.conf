# brix_ssl_client_capath — template for test_ssl_client_capath.py (registry
# lifecycle).  Launcher-provided: LOG_DIR PORT TMP_DIR DATA_ROOT.
# Test-provided: HOST_CERT HOST_KEY ADVERT_CA CAPATH.
#
# Fail-closed TLS front leg with NO brix location handler — the grid-gateway
# shape: ssl_verify_client on, ssl_client_certificate pointing at a CA file
# that does NOT sign the test clients (it only satisfies nginx's mandatory
# file directive and feeds the advertised-CA list), and the REAL trust coming
# from the hashed CA directory injected via CAPATH.
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
daemon on;

events { worker_connections 64; }

http {
    access_log {LOG_DIR}/access.log;
    client_body_temp_path {TMP_DIR};

    server {
        listen 127.0.0.1:{PORT} ssl;
        ssl_certificate         {HOST_CERT};
        ssl_certificate_key     {HOST_KEY};
        ssl_client_certificate  {ADVERT_CA};
        ssl_verify_client       on;
        ssl_verify_depth        10;
        brix_webdav_proxy_certs on;
        brix_ssl_client_capath  {CAPATH};

        location / {
            return 204;
        }
    }
}
