# Self-contained password-auth template for test_pwd_auth.py.
# Placeholders: {LOG_DIR} {PID_FILE} {PORT} {DATA_DIR} {PWD_FILE}
daemon off;
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {PID_FILE};

events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth pwd;
        brix_pwd_file {PWD_FILE};
        brix_allow_write on;
    }
}
