# Dedicated nginx config for upstream wait backend (12121).
#
# Manager-mode with no registered data servers — returns kXR_wait on locate/open.
# Also serves as the CMS server listener on 12121's companion port.

worker_processes 1;
error_log {LOG_DIR}/error.log debug;
pid       {LOG_DIR}/nginx.pid;

events { worker_connections 64; }

stream {
    # Main upstream port — manager_mode with no DS registered → kXR_wait
    server {
        listen {BIND_HOST}:{PORT};
        xrootd on;
        xrootd_manager_mode on;
        # Real CMS server at 12128 accepts the management connection but has no
        # matching /data registration, so locate reaches the CMS timeout path.
        xrootd_cms_manager 127.0.0.1:12128;
        xrootd_cms_locate_timeout 500ms;
    }
}
