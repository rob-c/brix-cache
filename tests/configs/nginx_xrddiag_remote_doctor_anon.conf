# Anonymous stream server template for test_xrddiag_remote_doctor.py.
# Placeholders: {BASE_DIR} {LISTEN_LINES} {DATA_DIR}
worker_processes 1;
pid {BASE_DIR}/nginx.pid;
error_log {BASE_DIR}/error.log info;

events { worker_connections 256; }

stream {
    server {
{LISTEN_LINES}
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
    }
}
