# Anonymous stream server — registry-lifecycle template for
# test_xrddiag_remote_doctor.py. Binds v4 (and ::1 on the same port when the
# host has IPv6 loopback) so the v4/v6-asymmetry detector can be exercised.
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
# Test-provided: V6_LISTEN (either a "listen [::1]:<port>;" line or empty).
worker_processes 1;
daemon on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;

events { worker_connections 256; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        {V6_LISTEN}
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
    }
}
