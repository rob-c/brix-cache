# Self-contained storage backend observability template for test_storage_backend_panel.py.
# Keep secret-bearing placeholders out of comments; rendered configs may be
# exposed by dashboard/debug tooling.
worker_processes 1;
pid {BASE_DIR}/nginx.pid;
error_log {BASE_DIR}/error.log info;

events { worker_connections 256; }

http {
    access_log off;
    client_max_body_size 16m;
    client_body_temp_path {BASE_DIR}/tmp/cbt;
    proxy_temp_path       {BASE_DIR}/tmp/pt;
    fastcgi_temp_path     {BASE_DIR}/tmp/ft;
    uwsgi_temp_path       {BASE_DIR}/tmp/ut;
    scgi_temp_path        {BASE_DIR}/tmp/st;

    server {
        listen {BIND_HOST}:{PORT};
        location /brix/ {
            brix_dashboard on;
            brix_admin_rate_limit off;  # whole suite shares one client IP: default per-IP cap trips under xdist
            brix_dashboard_password "{PASSWORD}";
            brix_dashboard_anonymous on;
        }
        location /metrics { brix_metrics on; }
        location / {
            brix_webdav on;
            brix_export {DATA_DIR};
            brix_webdav_auth none;
            brix_allow_write on;
        }
        location /remote/ {
            brix_webdav on;
            brix_export {REMOTE_NS};
            brix_storage_backend root://127.0.0.1:1;
            brix_webdav_auth none;
        }
    }
}
