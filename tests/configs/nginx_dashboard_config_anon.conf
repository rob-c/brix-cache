# Self-contained dashboard config-redaction template for test_dashboard_config_anon.py.
# Keep this header free of placeholder tokens: the rendered config is itself
# served by the redaction endpoint under test, and several values are planted
# secrets.
worker_processes 1;
pid {BASE_DIR}/nginx.pid;
error_log {BASE_DIR}/error.log info;

events { worker_connections 256; }

# planted URL credential (must be cred-stripped): https://creduser:{URL_CRED}@ex.com/p
stream {
    server {
        listen {BIND_HOST}:{ROOT_PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
    }
}

http {
    access_log off;
    client_body_temp_path {BASE_DIR}/tmp;
    proxy_temp_path       {BASE_DIR}/tmp;
    fastcgi_temp_path     {BASE_DIR}/tmp;
    uwsgi_temp_path       {BASE_DIR}/tmp;
    scgi_temp_path        {BASE_DIR}/tmp;

    server {
        listen {BIND_HOST}:{HTTP_PORT};
        location /brix/ {
            brix_dashboard on;
            brix_dashboard_password "{PASSWORD}";
            brix_dashboard_anonymous on;
        }
        location / {
            root {DATA_DIR};
            brix_webdav on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_auth none;
            brix_webdav_macaroon_secret {MACAROON_HEX};
            set $planted_leak "{SET_SECRET}";
            proxy_set_header X-Api-Key "{HEADER_SECRET}";
        }
    }
}
