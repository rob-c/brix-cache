# Self-contained XrdDig WebDAV template for test_dig.py.
# Placeholders: {BASE_DIR} {BIND_HOST} {PORT} {DATA_DIR} {JWKS_PATH}
#               {ISSUER} {AUDIENCE} {DIG_DIRECTIVES}
error_log {BASE_DIR}/logs/error.log info;
pid {BASE_DIR}/logs/nginx.pid;

events { worker_connections 64; }

http {
    client_body_temp_path {BASE_DIR}/t;
    proxy_temp_path       {BASE_DIR}/t;
    fastcgi_temp_path     {BASE_DIR}/t;
    uwsgi_temp_path       {BASE_DIR}/t;
    scgi_temp_path        {BASE_DIR}/t;
    access_log off;

    server {
        listen {BIND_HOST}:{PORT};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_auth optional;
            brix_webdav_cadir {BASE_DIR}/cadir;
            brix_allow_write on;
            brix_webdav_token_jwks {JWKS_PATH};
            brix_webdav_token_issuer {ISSUER};
            brix_webdav_token_audience {AUDIENCE};
            {DIG_DIRECTIVES}
        }
    }
}

daemon off;
master_process off;
