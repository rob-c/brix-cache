# Self-contained XrdDig WebDAV template for test_dig.py (registry lifecycle).
# Launcher-provided: LOG_DIR PORT DATA_ROOT TMP_DIR.  Test-provided: BIND_HOST
# CADIR JWKS_PATH ISSUER AUDIENCE DIG_DIRECTIVES.
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
events { worker_connections 64; }

http {
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path       {TMP_DIR}/pt;
    fastcgi_temp_path     {TMP_DIR}/ft;
    uwsgi_temp_path       {TMP_DIR}/ut;
    scgi_temp_path        {TMP_DIR}/st;
    access_log off;

    server {
        listen {BIND_HOST}:{PORT};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_ROOT};
            brix_webdav_auth optional;
            brix_webdav_cadir {CADIR};
            brix_allow_write on;
            brix_webdav_token_jwks {JWKS_PATH};
            brix_webdav_token_issuer {ISSUER};
            brix_webdav_token_audience {AUDIENCE};
            {DIG_DIRECTIVES}
        }
    }
}
