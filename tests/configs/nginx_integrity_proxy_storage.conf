# Storage origin for test_integrity_matrix.py TestProxyChainQueries pure-nginx
# proxy chain (storage <- proxy hop1 <- proxy hop2).  A root:// data server that
# DOES compute checksums, so the chain can prove byte-exact data and full query
# forwarding through every nginx hop.  Rendered through the registry
# (LifecycleHarness); {PORT}/{DATA_ROOT}/{LOG_DIR} come from the launcher.
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
events {}
stream {
    server {
        listen 0.0.0.0:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
        brix_allow_write on;
    }
}
