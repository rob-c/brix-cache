# CMS data node dialing a (silent) Python manager peer with a short read timeout —
# registry-lifecycle template for test_cms_resilience.py client read-liveness tests.
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
# Test-provided: MANAGER_PORT.
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
events { worker_connections 128; }
stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on; brix_storage_backend posix:{DATA_ROOT}; brix_auth none;
        brix_listen_port {PORT};
        brix_cms_manager 127.0.0.1:{MANAGER_PORT};
        brix_cms_paths /;
        brix_cms_interval 1;
        brix_cms_read_timeout 3s;
    }
}
