# Chaos mixed-auth mesh — GSI (X.509) origin data server for test_chaos_mixed_auth.py.
# Requires GSI on the wire; the cache-gsi front authenticates UPSTREAM to it with a
# VOMS proxy.  Launcher-provided: PORT DATA_ROOT LOG_DIR.  Test-provided: BIND_HOST
# SERVER_CERT SERVER_KEY TRUSTED_CA.
worker_processes 1;
daemon on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
events { worker_connections 128; }
stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_export {DATA_ROOT};
        brix_auth gsi;
        brix_certificate     {SERVER_CERT};
        brix_certificate_key {SERVER_KEY};
        brix_trusted_ca      {TRUSTED_CA};
    }
}
