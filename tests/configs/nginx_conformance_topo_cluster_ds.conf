# CMS data server — registry-lifecycle template for
# test_conformance_topologies.py. Serves the shared DATA_ROOT and registers "/"
# with the redirector's CMS server.
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
# Test-provided: CMS_MANAGER (host:port of the redirector's CMS server).
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 256; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
        brix_allow_write on;
        brix_cms_manager {CMS_MANAGER};
        brix_cms_paths /;
        brix_cms_interval 2;
        brix_listen_port {PORT};
    }
}
