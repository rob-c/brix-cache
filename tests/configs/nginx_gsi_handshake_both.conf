# nginx_gsi_handshake_both.conf — `brix_auth both`: the server advertises BOTH a
# token (ztn) and a GSI protocol in the multi-protocol `&P=ztn…&P=gsi…` login
# block; the GSI client must still pick gsi and authenticate.  Registry
# LifecycleHarness template.  The token side is unused by the GSI client (an
# empty JWKS is enough to configure it).
#
# Launcher-provided : LOG_DIR PORT DATA_ROOT
# Test-provided     : JWKS (empty keyset file), CERT KEY CA (must exist)
daemon on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;

events { worker_connections 64; }

stream {
    server {
        listen {PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth both;
        brix_allow_write on;
        brix_token_jwks     {JWKS};
        brix_token_issuer   "https://test.example.com";
        brix_token_audience "nginx-xrootd";
        brix_certificate     {CERT};
        brix_certificate_key {KEY};
        brix_trusted_ca      {CA};
    }
}
