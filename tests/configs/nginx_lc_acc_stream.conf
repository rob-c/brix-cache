# XrdAcc stream authdb template for test_acc.py (registry lifecycle).
# Launcher-provided: LOG_DIR PORT.  Test-provided: BIND_HOST DATA_DIR AUTHDB_PATH
# (data dir + authdb seeded under tmp_path; must exist at config-parse time).
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
daemon on;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        brix_authdb_format xrdacc;
        brix_authdb {AUTHDB_PATH};
        brix_authdb_audit all;
        brix_access_log {LOG_DIR}/access.log;
    }
}
