worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid       {LOG_DIR}/nginx.pid;

events { worker_connections 128; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_upstream 127.0.0.1:{UPSTREAM_PORT};
        # brix_upstream_tls is deliberately OFF (default) — upstream may signal kXR_gotoTLS but nginx must abort
    }
}
