# SSI config-directive test template for test_ssi_config.py.
daemon off;
worker_processes 1;
pid {BASE_DIR}/ssi.pid;
error_log {BASE_DIR}/err.log info;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        brix_ssi on;
{EXTRA_SSI}
    }
}
