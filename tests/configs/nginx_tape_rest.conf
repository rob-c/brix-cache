# Self-contained config template for test_tape_rest.py.
# Placeholders: {BASE_DIR} {STAGECMD} {BIND_HOST} {HTTP_PORT} {EXPORT_DIR}
#               {ONLINE_DIR} {CACHE_DIR}
worker_processes 1;
error_log {BASE_DIR}/logs/error.log info;
pid {BASE_DIR}/logs/nginx.pid;
env BRIX_FRM_STAGECMD={STAGECMD};

events { worker_connections 64; }

http {
    access_log off;
    client_body_temp_path {BASE_DIR}/logs/cbt;
    proxy_temp_path       {BASE_DIR}/logs/pt;
    fastcgi_temp_path     {BASE_DIR}/logs/ft;
    uwsgi_temp_path       {BASE_DIR}/logs/ut;
    scgi_temp_path        {BASE_DIR}/logs/st;

    server {
        listen {BIND_HOST}:{HTTP_PORT};
        location / {
            brix_webdav on;
            brix_export {EXPORT_DIR};
            brix_storage_backend tape://exec{ONLINE_DIR};
            brix_cache_store posix:{CACHE_DIR};
            brix_webdav_auth none;
            brix_allow_write on;
            brix_webdav_tape_rest on;
        }
    }
}

daemon off;
master_process off;
