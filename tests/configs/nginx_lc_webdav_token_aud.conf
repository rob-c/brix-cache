# WebDAV token-audience server (registry lifecycle) for the JWT token suites.
# Launcher-provided: LOG_DIR TMP_DIR PORT.
# Test-provided via template_values (dirs seeded under tmp_path, must exist at
# config-parse time): BIND_HOST DATA_DIR CADIR JWKS_PATH ISSUER AUDIENCE.
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log error;
daemon on;

events { worker_connections 64; }

http {
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path       {TMP_DIR}/pt;
    fastcgi_temp_path     {TMP_DIR}/ft;
    uwsgi_temp_path       {TMP_DIR}/ut;
    scgi_temp_path        {TMP_DIR}/st;
    access_log off;

    server {
        listen {BIND_HOST}:{PORT};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_auth required;
            brix_webdav_cadir {CADIR};
            brix_allow_write on;
            brix_webdav_token_jwks {JWKS_PATH};
            brix_webdav_token_issuer "{ISSUER}";
            brix_webdav_token_audience "{AUDIENCE}";
        }
    }
}
