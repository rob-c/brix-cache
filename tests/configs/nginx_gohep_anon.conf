# Anonymous go-hep interop data role — registry-lifecycle template for
# test_gohep_interop.py. Serves anon root:// data (also used as the redirector's
# backing data server). Per-instance LOG_DIR keeps the anon/ds roles distinct.
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
daemon on;
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;

thread_pool default threads=2 max_queue=4096;

events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
    }
}
