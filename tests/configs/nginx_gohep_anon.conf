# Anonymous go-hep interop role template for test_gohep_interop.py.
daemon off;
worker_processes 1;
pid {BASE_DIR}/{ROLE}.pid;
error_log {BASE_DIR}/{ROLE}.log info;

thread_pool default threads=2 max_queue=4096;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
    }
}
