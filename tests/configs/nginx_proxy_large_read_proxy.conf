# Proxy stream server template for test_proxy_large_read.py.
# Placeholders: {BASE_DIR} {PORT} {BACKEND_PORT}
worker_processes 1;
daemon on;
pid {BASE_DIR}/px.pid;
error_log {BASE_DIR}/px.log info;

events { worker_connections 256; }

stream {
    server {
        listen {PORT};
        brix_root on;
        brix_auth none;
        brix_tap_proxy on;
        brix_tap_proxy_upstream 127.0.0.1:{BACKEND_PORT};
        brix_tap_proxy_auth anonymous;
    }
}
