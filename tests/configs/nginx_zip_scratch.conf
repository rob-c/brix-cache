# Self-contained zip scratch template for test_zip_scratch.py (registry
# lifecycle).  Launcher-provided: LOG_DIR PORT DATA_ROOT.  Test-provided:
# BIND_HOST ZIP_DIRECTIVES.
error_log {LOG_DIR}/err.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
        brix_zip_access on;
        {ZIP_DIRECTIVES}
    }
}
