# Self-contained zip scratch template for test_zip_scratch.py.
# Placeholders: {BASE_DIR} {LOG_DIR} {PORT} {DATA_DIR} {ZIP_DIRECTIVES}
daemon off;
worker_processes 1;
error_log {LOG_DIR}/err.log info;
pid {BASE_DIR}/nginx.pid;

events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_zip_access on;
        {ZIP_DIRECTIVES}
    }
}
