# Self-contained S3/WebDAV/root CRC64 template for test_crc64.py.
# Placeholders: {BASE_DIR} {BIND_HOST} {ROOT_PORT} {S3_PORT} {WEBDAV_PORT}
#               {DATA_DIR}
worker_processes 1;
pid {BASE_DIR}/logs/nginx.pid;
error_log {BASE_DIR}/logs/error.log error;

events { worker_connections 128; }

stream {
    server {
        listen {BIND_HOST}:{ROOT_PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
    }
}

http {
    access_log off;
    client_body_temp_path {BASE_DIR}/t;
    proxy_temp_path       {BASE_DIR}/t;
    fastcgi_temp_path     {BASE_DIR}/t;
    uwsgi_temp_path       {BASE_DIR}/t;
    scgi_temp_path        {BASE_DIR}/t;

    server {
        listen {BIND_HOST}:{S3_PORT};
        location / {
            brix_s3 on;
            brix_storage_backend posix:{DATA_DIR};
            brix_s3_bucket testbucket;
            brix_allow_write on;
        }
    }

    server {
        listen {BIND_HOST}:{WEBDAV_PORT};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_auth none;
            brix_allow_write on;
        }
    }
}
