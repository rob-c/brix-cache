# CMS data node (serves root:// AND dials a Python manager peer) — registry-
# lifecycle template for test_cms_wire_pup_conformance.py. brix_cms_manager makes
# the worker open a persistent CMS connection and emit LOGIN + periodic LOAD;
# brix_cms_interval 2 keeps the heartbeat tight. brix_listen_port is advertised
# as dPort in the LOGIN frame.
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
# Test-provided: MANAGER_PORT.
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
events { worker_connections 128; }
stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on; brix_storage_backend posix:{DATA_ROOT}; brix_auth none;
        brix_allow_write on;
        brix_listen_port {PORT};
        brix_cms_manager 127.0.0.1:{MANAGER_PORT};
        brix_cms_paths /;
        brix_cms_interval 2;
    }
}
