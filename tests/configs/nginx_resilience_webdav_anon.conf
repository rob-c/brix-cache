# Dedicated anonymous (brix_webdav_auth none) WebDAV/HTTP PUT server for the
# resilience write-path fault-injection tests (tests/resilience/servers.py,
# NginxWebdavAnon).  Rendered through the phase-81 registry (LifecycleHarness):
# {PORT}, {LOG_DIR}, {TMP_DIR} and {DATA_ROOT} come from the launcher.
#
# This is the write-direction analogue of nginx_resilience_anon.conf: it exposes
# the WebDAV PUT ingest gateway with no auth so a fault proxy spliced in front can
# corrupt the client->server body and we can prove what the gateway commits.
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log error;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 1024; }

http {
    client_max_body_size 64m;
    client_body_temp_path {TMP_DIR};
    proxy_temp_path       {TMP_DIR};
    fastcgi_temp_path     {TMP_DIR};
    uwsgi_temp_path       {TMP_DIR};
    scgi_temp_path        {TMP_DIR};
    access_log off;

    server {
        listen 127.0.0.1:{PORT};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_ROOT};
            brix_webdav_auth none;
            brix_allow_write on;
            {EXTRA_DIRECTIVES}
        }
    }
}
