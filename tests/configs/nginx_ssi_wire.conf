# SSI wire-conformance stream template for test_ssi_wire.py.
worker_processes 1;
error_log {BASE_DIR}/logs/error.log info;
pid {BASE_DIR}/logs/nginx.pid;

events { worker_connections 128; }

stream {
    server {
        listen 0.0.0.0:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        brix_ssi on;
        brix_ssi_service cta;
    }
}
