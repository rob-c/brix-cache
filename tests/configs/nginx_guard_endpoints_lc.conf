# Multi-front-door guard template for test_guard_endpoints.py (registry
# lifecycle).  Launcher-provided: LOG_DIR TMP_DIR.  Test-provided: BIND_HOST
# DAV_PORT S3_PORT OPS_PORT XRD_PORT CMS_PORT DAV_AUDIT S3_AUDIT OPS_AUDIT
# DAV_ROOT S3_ROOT XRD_ROOT.
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;

events { worker_connections 128; }

http {
    access_log off;
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path       {TMP_DIR}/pt;
    fastcgi_temp_path     {TMP_DIR}/ft;
    uwsgi_temp_path       {TMP_DIR}/ut;
    scgi_temp_path        {TMP_DIR}/st;

    server {
        listen {BIND_HOST}:{DAV_PORT};
        location / {
            brix_guard on;
            brix_guard_profile xrdhttp;
            brix_guard_audit_log {DAV_AUDIT};
            brix_webdav on;
            brix_storage_backend posix:{DAV_ROOT};
            brix_webdav_auth none;
            brix_allow_write on;
        }
    }

    server {
        listen {BIND_HOST}:{S3_PORT};
        location / {
            brix_guard on;
            brix_guard_profile xrdhttp;
            brix_guard_audit_log {S3_AUDIT};
            brix_s3 on;
            brix_storage_backend posix:{S3_ROOT};
            brix_s3_access_key GUARDTESTKEY;
            brix_s3_secret_key guard-test-secret;
        }
    }

    server {
        listen {BIND_HOST}:{OPS_PORT};
        brix_guard on;
        brix_guard_audit_log {OPS_AUDIT};
        location = /metrics { brix_metrics on; }
    }
}

stream {
    server {
        listen {BIND_HOST}:{XRD_PORT};
        brix_root on;
        brix_export {XRD_ROOT};
        brix_auth none;
    }
    server {
        listen {BIND_HOST}:{CMS_PORT};
        brix_cms_server on;
    }
}
