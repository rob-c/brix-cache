worker_processes 1;
error_log {LOG_DIR}/error.log info;

events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        xrootd on;
        xrootd_auth         none;
        # Static path mapping with no live CMS — auto-advertises kXR_attrVirtRdr.
        xrootd_manager_map  / 127.0.0.1:{UPSTREAM_PORT};
    }
}
