# nginx GSI source template for test_tpc_gsi_nginx_source.py.
daemon off;
user root;
worker_processes 1;
error_log {BASE_DIR}/src-err.log info;
pid {BASE_DIR}/src.pid;

events { worker_connections 64; }

stream {
    server {
        listen {PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth gsi;
        brix_certificate {CERT_FILE};
        brix_certificate_key {KEY_FILE};
        brix_trusted_ca {CA_DIR};
        brix_access_log {BASE_DIR}/src-acc.log;
    }
}
