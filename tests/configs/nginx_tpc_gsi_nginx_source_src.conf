# nginx GSI source — registry-lifecycle template for test_tpc_gsi_nginx_source.py.
# brix_auth gsi: the pulling dest must present a CA-signed proxy to read.
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
# Test-provided: CERT_FILE KEY_FILE CA_DIR.
daemon on;
worker_processes 1;
error_log {LOG_DIR}/src-err.log info;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 64; }

stream {
    server {
        listen {PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth gsi;
        brix_certificate {CERT_FILE};
        brix_certificate_key {KEY_FILE};
        brix_trusted_ca {CA_DIR};
        brix_access_log {LOG_DIR}/src-acc.log;
    }
}
