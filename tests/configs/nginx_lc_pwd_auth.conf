# Self-contained password-auth template for test_pwd_auth.py (LifecycleHarness).
# Placeholders: {LOG_DIR} {PORT} {DATA_DIR} {PWD_FILE}
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
daemon on;

events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth pwd;
        brix_pwd_file {PWD_FILE};
        brix_allow_write on;
    }
}
