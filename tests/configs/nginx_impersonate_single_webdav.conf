# nginx_impersonate_single_webdav.conf — `brix_impersonation single` (a "similar
# local account mapping" to the grid-mapfile map mode) for
# test_impersonation_gridmap_root.py.
#
# In `single` mode every authenticated identity squashes to ONE fixed local
# account and any grid-mapfile is ignored. There is no privileged broker; the
# on-disk owner is simply the nginx worker account, so the `user <acct>;` directive
# and brix_impersonation_user name the same account. This test launches as root
# (master), drops the worker to {SINGLE_USER}, and asserts that two different token
# subjects both land files owned by {SINGLE_USER}.
#
# Launcher-provided : PORT LOG_DIR TMP_DIR
# Test-provided     : EXPORT, JWKS, ISSUER, AUDIENCE, SINGLE_USER.
user {SINGLE_USER};
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 128; }

stream {
    brix_impersonation      single;
    brix_impersonation_user {SINGLE_USER};
}

http {
    access_log off;
    client_body_temp_path {TMP_DIR};
    proxy_temp_path        {TMP_DIR};
    fastcgi_temp_path      {TMP_DIR};
    uwsgi_temp_path        {TMP_DIR};
    scgi_temp_path         {TMP_DIR};
    client_max_body_size   64m;

    server {
        listen 127.0.0.1:{PORT};
        location / {
            brix_webdav              on;
            brix_storage_backend     posix:{EXPORT};
            brix_webdav_auth         required;
            brix_allow_write         on;
            brix_webdav_token_jwks     {JWKS};
            brix_webdav_token_issuer   "{ISSUER}";
            brix_webdav_token_audience "{AUDIENCE}";
        }
    }
}
