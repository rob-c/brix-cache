# Self-contained S3/WebDAV/root CRC64 template for test_crc64.py (registry
# lifecycle).  Launcher-provided: LOG_DIR TMP_DIR PORT (the root:// listener).
# Extra ports: S3_PORT WEBDAV_PORT.  Test-provided: BIND_HOST DATA_DIR (seeded
# under tmp_path; must exist at config-parse time).
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
daemon on;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
    }
}

http {
    access_log off;
    client_body_temp_path {TMP_DIR};
    proxy_temp_path       {TMP_DIR};
    fastcgi_temp_path     {TMP_DIR};
    uwsgi_temp_path       {TMP_DIR};
    scgi_temp_path        {TMP_DIR};

    server {
        listen {BIND_HOST}:{S3_PORT};
        location / {
            brix_s3 on;
            brix_storage_backend posix:{DATA_DIR};
            brix_s3_bucket testbucket;
            brix_allow_write on;
        }
    }

    server {
        listen {BIND_HOST}:{WEBDAV_PORT};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_auth none;
            brix_allow_write on;
        }
    }
}
