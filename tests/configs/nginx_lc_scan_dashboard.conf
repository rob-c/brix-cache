# Storage-scan dashboard template for test_scan.py (registry lifecycle).
# Launcher-provided: LOG_DIR PORT TMP_DIR.  Test-provided: BIND_HOST OFF_PORT
# PASSWORD DATA_DIR.  DATA_DIR (the scan_root) must exist at config-parse time,
# so the test seeds the tree and passes an absolute path; a secret one level up
# is outside the scan_root.
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
daemon on;

events { worker_connections 64; }

http {
    access_log off;
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path       {TMP_DIR}/pt;
    fastcgi_temp_path     {TMP_DIR}/ft;
    uwsgi_temp_path       {TMP_DIR}/ut;
    scgi_temp_path        {TMP_DIR}/st;

    server {
        listen {BIND_HOST}:{PORT};
        location /brix {
            brix_dashboard on;
            brix_dashboard_password "{PASSWORD}";
            brix_scan_root {DATA_DIR};
        }
    }

    server {
        listen {BIND_HOST}:{OFF_PORT};
        location /brix {
            brix_dashboard on;
            brix_dashboard_password "{PASSWORD}";
        }
    }
}
