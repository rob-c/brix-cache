worker_processes 1;
thread_pool default threads=2 max_queue=256;
error_log {LOG_DIR}/error.log info;

events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_auth         none;
        brix_supervisor   on;
        brix_manager_mode on;
    }
}
