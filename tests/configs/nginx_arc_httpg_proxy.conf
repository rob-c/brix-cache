# httpg front proxy for an upstream ARC-CE with TRUE per-user credential
# delegation — template for test_arc_httpg_proxy.py.
#
# Front leg:  TLS with RFC 3820 proxy-certificate client verification,
#             FAIL-CLOSED: `ssl_verify_client on` means a client that presents
#             no certificate, or one that does not chain to the grid CA, is
#             rejected by nginx itself and never reaches the ARC-CE.
#             `brix_webdav_proxy_certs on` sets X509_V_FLAG_ALLOW_PROXY_CERTS on
#             the listener's SSL_CTX — without it stock nginx answers every
#             proxy-authenticated request with 400 ("proxy certificates not
#             allowed"), even under `ssl_verify_client optional_no_ca`.
# Delegation: users deposit their own short-lived proxy (T8 upload form of
#             `brix_delegation_endpoint`) over an EEC-authenticated httpg
#             connection; the chain is PKIX-verified and DN-matched before it
#             is stored in `brix_storage_credential_dir` as
#             x5h-<sha256(DN)[:32]>.pem.
# Back leg:   the map below selects the DELEGATED credential of the verified
#             front-leg identity for proxy_ssl_certificate (variables
#             supported since nginx 1.21).  No static fallback: an identity
#             that has not delegated — or no identity at all — reaches the
#             ARC-CE without any credential and is refused there.
# Guard:      brix_guard classifies bad actors at ACCESS phase (junk paths get
#             a 444 connection drop) and audits at LOG phase.
#             `Host $http_host` keeps A-REX session hrefs on the front URL.
#
# Placeholders: BASE_DIR FRONT_PORT BACKEND_PORT HOST_CERT HOST_KEY CA_CERT
#               CRED_DIR AUDIT_LOG CRED_MAP_ENTRIES (multi-line map body)
worker_processes 1;
pid {BASE_DIR}/nginx.pid;
error_log {BASE_DIR}/error.log info;

events { worker_connections 64; }

http {
    access_log {BASE_DIR}/access.log;
    client_body_temp_path {BASE_DIR}/tmp;
    proxy_temp_path       {BASE_DIR}/tmp;
    fastcgi_temp_path     {BASE_DIR}/tmp;
    uwsgi_temp_path       {BASE_DIR}/tmp;
    scgi_temp_path        {BASE_DIR}/tmp;

    # Verified front-leg identity (proxy leaf DN, oneline form) -> that
    # user's delegated credential.  Default "" = no upstream credential.
    map $ssl_client_s_dn_legacy $arc_cred {
        default "";
{CRED_MAP_ENTRIES}
    }

    server {
        listen 127.0.0.1:{FRONT_PORT} ssl;
        ssl_certificate        {HOST_CERT};
        ssl_certificate_key    {HOST_KEY};
        ssl_client_certificate {CA_CERT};
        ssl_verify_client      on;
        ssl_verify_depth       10;
        brix_webdav_proxy_certs on;
        client_max_body_size   256m;

        location /.well-known/brix-delegation {
            brix_webdav on;
            brix_export {BASE_DIR}/export;
            brix_allow_write on;
            brix_webdav_cafile {CA_CERT};
            brix_webdav_auth required;
            brix_storage_credential_dir {CRED_DIR};
            brix_delegation_endpoint on;
        }

        location / {
            brix_guard on;
            brix_guard_profile arc;
            brix_guard_audit_log {AUDIT_LOG};

            proxy_pass https://127.0.0.1:{BACKEND_PORT};
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_ssl_certificate         $arc_cred;
            proxy_ssl_certificate_key     $arc_cred;
            proxy_ssl_trusted_certificate {CA_CERT};
            proxy_ssl_verify on;
            proxy_ssl_name localhost;
            proxy_ssl_server_name on;
        }
    }
}
