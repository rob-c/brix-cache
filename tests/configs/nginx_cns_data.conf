# Composite namespace data-server template for test_cns.py.
# Placeholders: {LOG_DIR} {BIND_HOST} {DATA_PORT} {DATA_DIR} {CMS_PORT}
worker_processes 1;
daemon off;
master_process off;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{DATA_PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        brix_cns emit;
        brix_cms_manager {BIND_HOST}:{CMS_PORT};
        brix_cms_paths /;
        brix_cms_interval 1;
        brix_listen_port {DATA_PORT};
    }
}
