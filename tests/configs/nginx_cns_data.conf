# Composite name-space data server — registry-lifecycle template for test_cns.py.
# brix_cns emit + CMS-linked to the manager: on a client write+close it reports
# the file to the manager, which then answers a stat from its CNS inventory.
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
# Test-provided: CMS_PORT.
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
        brix_allow_write on;
        brix_cns emit;
        brix_cms_manager 127.0.0.1:{CMS_PORT};
        brix_cms_paths /;
        brix_cms_interval 1;
        brix_listen_port {PORT};
    }
}
