# Generic self-contained anonymous root:// POSIX server template.
# Rendered through the phase-81 registry (LifecycleHarness): {PORT}, {LOG_DIR}
# and {DATA_ROOT} (the auto-created export tree) come from the launcher;
# {BIND_HOST} and {WORKER_CONNECTIONS} are supplied via the spec's template_values.
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;

events { worker_connections {WORKER_CONNECTIONS}; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
        brix_allow_write on;
    }
}
