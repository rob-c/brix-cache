# Generic self-contained anonymous root:// POSIX server template.
# Placeholders: {BASE_DIR} {BIND_HOST} {PORT} {DATA_DIR} {WORKER_CONNECTIONS}
worker_processes 1;
pid {BASE_DIR}/nginx.pid;
error_log {BASE_DIR}/error.log info;

events { worker_connections {WORKER_CONNECTIONS}; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
    }
}
