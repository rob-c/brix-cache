# go-hep redirector — registry-lifecycle template for test_gohep_interop.py.
# Static manager_map redirector: '/' (and children) redirect to the ds data
# server, exercising the stat/dirlist child-redirect fixes (bugs #2/#3).
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
# Test-provided: DATA_PORT.
daemon on;
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;

thread_pool default threads=2 max_queue=4096;

events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_manager_mode on;
        brix_manager_map / 127.0.0.1:{DATA_PORT};
        brix_auth none;
    }
}
