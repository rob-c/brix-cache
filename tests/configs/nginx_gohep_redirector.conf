# go-hep redirector template for test_gohep_interop.py.
daemon off;
worker_processes 1;
pid {BASE_DIR}/rdr.pid;
error_log {BASE_DIR}/rdr.log info;

thread_pool default threads=2 max_queue=4096;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_manager_mode on;
        brix_manager_map / {BIND_HOST}:{DATA_PORT};
        brix_auth none;
    }
}
