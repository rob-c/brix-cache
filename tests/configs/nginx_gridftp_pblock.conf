# Cleartext FTP gateway backed by the pblock block store (test_gridftp_pblock.py).
# Identical control surface to nginx_gridftp_plain.conf, but the export's storage
# plane is pblock rather than posix: brix_gridftp_storage_backend registers the
# choice for {DATA_ROOT}, and every ftp_vfs_ctx() on that root resolves to the
# pblock driver (sqlite catalog created lazily under the export). Rendered by the
# registry (LifecycleHarness): {PORT} {LOG_DIR} {DATA_ROOT} {BIND_HOST}.
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 64; }
stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_gridftp on;
        brix_gridftp_export          {DATA_ROOT};
        brix_gridftp_storage_backend pblock;
        brix_gridftp_allow_write     on;
    }
}
