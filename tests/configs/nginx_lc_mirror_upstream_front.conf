# Mirror-front test server (registry lifecycle) for test_mirror_upstream.py.
# An nginx traffic-mirror front in front of an official xrootd upstream.
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
# Test-provided via template_values: UPSTREAM_HOST UPSTREAM_PORT (the already-
# running upstream xrootd) and EXTRA_DIRECTIVE (optional opcode-selection line).
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 64; }
stream {
    server {
        listen 0.0.0.0:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth none;
        brix_allow_write on;
        brix_stream_mirror_url {UPSTREAM_HOST}:{UPSTREAM_PORT};
{EXTRA_DIRECTIVE}
        brix_mirror_log_diverge on;
    }
}
