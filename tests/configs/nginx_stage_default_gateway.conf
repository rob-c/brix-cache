# Default gateway write-staging — template for test_stage_default_gateway.py
# (registry lifecycle, nginx -t only).  Launcher-provided: LOG_DIR PORT TMP_DIR
# DATA_ROOT.  Test-provided: BACKEND ALLOW_WRITE STAGE_DIRECTIVES.
#
# One WebDAV gateway location forwarding to a whole-object remote BACKEND.
# The stage directives are injected by the test via STAGE_DIRECTIVES: absent
# (exercise the /tmp/staging default + banner), "brix_stage off;" (the
# opt-out), or "brix_stage on;" (the still-fatal on-without-store regression).
user root;
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
daemon on;

events { worker_connections 64; }

http {
    access_log {LOG_DIR}/access.log;
    client_body_temp_path {TMP_DIR};

    server {
        listen 127.0.0.1:{PORT};

        location /dav/ {
            brix_webdav on;
            brix_export {DATA_ROOT};
            brix_allow_write {ALLOW_WRITE};
            brix_webdav_auth none;
            brix_storage_backend {BACKEND};
            {STAGE_DIRECTIVES}
        }
    }
}
