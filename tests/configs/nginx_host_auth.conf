# Self-contained host-auth template for test_host_auth.py (registry lifecycle).
# Launcher-provided: LOG_DIR PORT DATA_ROOT.  Test-provided: BIND_HOST ALLOWLIST.
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth host;
        brix_host_allow {ALLOWLIST};
    }
}
