# Self-contained host-auth template for test_host_auth.py.
# Placeholders: {LOG_DIR} {PID_FILE} {PORT} {DATA_DIR} {ALLOWLIST}
daemon off;
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {PID_FILE};

events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth host;
        brix_host_allow {ALLOWLIST};
    }
}
