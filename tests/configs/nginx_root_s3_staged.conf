# Native root:// server writing THROUGH an s3:// storage backend
# (test_pgwrite_staged_sync_gate.py).  One nginx hosts two planes:
#
#   http{}   — a brix_s3 endpoint over a posix root: the object store the
#              root:// node commits to (bucket "testbucket").
#   stream{} — a brix_root server whose storage backend is that s3 endpoint.
#              An s3:// backend (sd_remote) advertises NO BRIX_SD_CAP_RANDOM_WRITE
#              and has no .pwrite, so a WRITE open routes through the phase-70
#              whole-object STAGED writer: kXR_write/pgwrite APPEND to the staged
#              handle and kXR_sync/close COMMIT the whole object as one PUT.  This
#              is the exact path the pgwrite CSE close/sync gate must cover.
#
# Two workers, deliberately (as nginx_gridftp_s3.conf): the native handler blocks
# on its outbound SigV4 PUT to the co-hosted brix_s3 plane at commit; with a
# single worker there would be no worker left to accept that inbound S3
# connection — a self-deadlock.  A second worker services the S3 leg.
#
# Launcher-provided: LOG_DIR TMP_DIR PORT (=root://) DATA_ROOT.
# Test-provided via extra_ports: S3_PORT.
# Test-provided via template_values (seeded under tmp_path, must exist at parse):
#   BIND_HOST S3_DIR S3_ACCESS_KEY S3_SECRET_KEY.
worker_processes 2;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 64; }

http {
    access_log off;
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path       {TMP_DIR}/pt;
    fastcgi_temp_path     {TMP_DIR}/ft;
    uwsgi_temp_path       {TMP_DIR}/ut;
    scgi_temp_path        {TMP_DIR}/sct;

    server {
        listen {BIND_HOST}:{S3_PORT};
        client_max_body_size 128m;
        location / {
            brix_s3 on;
            brix_storage_backend posix:{S3_DIR};
            brix_s3_bucket testbucket;
            brix_s3_access_key {S3_ACCESS_KEY};
            brix_s3_secret_key {S3_SECRET_KEY};
            brix_s3_region us-east-1;
            brix_allow_write on;
        }
    }
}

stream {
    brix_credential s3cred {
        s3_access_key {S3_ACCESS_KEY};
        s3_secret_key {S3_SECRET_KEY};
        s3_region     us-east-1;
    }

    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_export             {DATA_ROOT};
        brix_storage_backend    s3://{BIND_HOST}:{S3_PORT}/testbucket;
        brix_storage_credential s3cred;
        brix_auth none;
        brix_allow_write on;
        brix_upload_resume off;
    }
}
