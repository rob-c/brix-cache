worker_processes 1;
error_log {LOG_DIR}/error.log info;

thread_pool default threads=4 max_queue=65536;
events { worker_connections 64; }

# Phase 36 §7.2.1: root:// XRootD stream over IPv6.
# The PRIMARY (and only) listener binds the IPv6 loopback in bracket form
# (listen [::1]:{PORT};) so raw-wire clients connect to ("::1", IPV6_STREAM_PORT).
# Anonymous auth + writes enabled so the wire suite can exercise the full
# open/read/write/stat/dirlist/locate path without credentials.  The locate
# response is emitted from c->local_sockaddr (AF_INET6) and MUST bracket the
# address as "[::1]:<port>" (src/read/locate.c) — the IPv6-locate regression.
stream {
    server {
        listen [::1]:{PORT};
        xrootd on;
        xrootd_root {DATA_DIR};
        xrootd_auth none;
        xrootd_allow_write on;
        xrootd_access_log {LOG_DIR}/xrootd_access_ipv6.log;
    }
}
