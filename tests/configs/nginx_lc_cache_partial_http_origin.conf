# HTTP static data origin for test_cache_partial_fill.py (registry lifecycle).
# A plain nginx file server the http:// cache node fills whole-file from; the
# test seeds files directly into the doc root ({DATA_ROOT}, auto-created by the
# launcher) and reads them back THROUGH the cache node.
# Launcher-provided: LOG_DIR PORT DATA_ROOT.
# Test-provided via template_values: BIND_HOST.
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 64; }
http {
    access_log off;
    default_type application/octet-stream;
    server {
        listen {BIND_HOST}:{PORT};
        location / {
            root {DATA_ROOT};
        }
    }
}
