# nginx_gsi_handshake_tls.conf — GSI auth followed by an in-protocol TLS upgrade
# (kXR_ableTLS): the client authenticates with GSI, then upgrades the channel to
# TLS (roots://).  Registry LifecycleHarness template.
#
# Launcher-provided : LOG_DIR PORT DATA_ROOT
# Test-provided     : CERT KEY CA (host cert / key / trusted-CA, must exist)
daemon on;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;

events { worker_connections 64; }

stream {
    server {
        listen {PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth gsi;
        brix_allow_write on;
        brix_tls on;
        brix_certificate     {CERT};
        brix_certificate_key {KEY};
        brix_trusted_ca      {CA};
    }
}
