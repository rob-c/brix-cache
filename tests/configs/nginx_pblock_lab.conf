# Phase-83 pblock-lab stream (root://) template — registry lifecycle.
#
# One committed, collectable source for the stream-front pblock-lab servers
# (test_pblock_lab_{anomaly,dedup,locks,nearline,csi,quota,snapshot,audit}.py).
# The launcher injects {PORT} {DATA_ROOT} {LOG_DIR}; the test supplies
# {BIND_HOST}, {WORKERS}, and {TAIL} — the backend `?tail` gate query
# (e.g. "?lab=1", "?snap=1", "?audit=1"), empty "" for a gate-off production
# export.  {LOG_DIR}/nginx.pid is the registry's stop pidfile — do not rename.
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
worker_processes {WORKERS};
events { worker_connections 64; }
stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_export {DATA_ROOT};
        brix_auth none;
        brix_allow_write on;
        brix_upload_resume off;
        brix_storage_backend  pblock://{DATA_ROOT}{TAIL};
        brix_pblock_block_size 1m;
        brix_access_log {LOG_DIR}/access.log;
    }
}
