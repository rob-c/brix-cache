# SSI stream + metrics template for test_ssi_metrics.py.
# Placeholders: {BASE_DIR} {STREAM_PORT} {METRICS_PORT} {DATA_DIR}
daemon on;
worker_processes 1;
error_log {BASE_DIR}/error.log info;
pid {BASE_DIR}/nginx.pid;

events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{STREAM_PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        brix_ssi on;
        brix_ssi_service cta;
    }
}

http {
    access_log off;
    client_body_temp_path {BASE_DIR}/cbt;
    proxy_temp_path {BASE_DIR}/pt;
    fastcgi_temp_path {BASE_DIR}/ft;
    uwsgi_temp_path {BASE_DIR}/ut;
    scgi_temp_path {BASE_DIR}/st;

    server {
        listen 127.0.0.1:{METRICS_PORT};
        location /metrics { brix_metrics on; }
    }
}
