worker_processes 1;
error_log {LOG_DIR}/error.log debug;

thread_pool default threads=2 max_queue=256;
events { worker_connections 64; }

stream {
    server {
        listen {PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth gsi;
        brix_allow_write on;
        brix_certificate     {SERVER_CERT};
        brix_certificate_key {SERVER_KEY};
        brix_trusted_ca      {CA_CERT};
        brix_crl             {CRL_PATH};
        brix_crl_reload      {CRL_RELOAD_INTERVAL};
        brix_access_log {LOG_DIR}/brix_access.log;
    }
}

http {
    access_log            {LOG_DIR}/http_access.log;
    client_body_temp_path {TMP_DIR};
    proxy_temp_path       {TMP_DIR};
    fastcgi_temp_path     {TMP_DIR};
    uwsgi_temp_path       {TMP_DIR};
    scgi_temp_path        {TMP_DIR};

    server {
        listen 127.0.0.1:{HTTP_STUB_PORT} ssl;
        server_name localhost;
        ssl_certificate     {SERVER_CERT};
        ssl_certificate_key {SERVER_KEY};
    }
}
