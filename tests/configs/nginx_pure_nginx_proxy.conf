# Pure nginx→nginx proxy: xrdcp → nginx(proxy) → nginx(data, PROXY_NGINX_PORT)
#
# This is Scenario 3 of the proxy interoperability matrix (Section 3A.3).
# Both the proxy and the data roles are served by nginx-xrootd instances.
# The proxy forwards all XRootD traffic to the data nginx using the transparent
# proxy mode; no credentials are added or stripped.

worker_processes 1;
error_log {LOG_DIR}/error.log debug;
pid       {LOG_DIR}/nginx.pid;

events { worker_connections 128; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        xrootd on;
        xrootd_auth none;
        xrootd_tap_proxy on;
        xrootd_tap_proxy_upstream {BIND_HOST}:{UPSTREAM_PORT};
        xrootd_tap_proxy_auth anonymous;
    }
}
