# ARC guard proxy template for test_arc_guard.py (registry lifecycle).
# Launcher-provided: LOG_DIR PORT TMP_DIR.  Test-provided: BIND_HOST AUDIT_LOG
# BACKEND_PORT.
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
daemon on;
events { worker_connections 64; }

http {
    access_log off;
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path       {TMP_DIR}/pt;
    fastcgi_temp_path     {TMP_DIR}/ft;
    uwsgi_temp_path       {TMP_DIR}/ut;
    scgi_temp_path        {TMP_DIR}/st;

    server {
        listen {BIND_HOST}:{PORT};
        location / {
            brix_guard on;
            brix_guard_profile arc;
            brix_guard_audit_log {AUDIT_LOG};
            proxy_pass http://{BIND_HOST}:{BACKEND_PORT};
        }
    }
}
