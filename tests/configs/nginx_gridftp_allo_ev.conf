# Cleartext FTP gateway (STREAM event engine) for the ALLO/stream-mode truncation
# tests — identical to nginx_gridftp_plain_ev.conf but with an {EXTRA_DIRECTIVES}
# slot so the test can render one server with brix_gridftp_require_allo_size on
# and another (control) with it off/default.  {PORT}/{LOG_DIR}/{DATA_ROOT} come
# from the launcher, {BIND_HOST}/{EXTRA_DIRECTIVES} from the spec.
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 64; }
stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_gridftp on;
        brix_gridftp_export      {DATA_ROOT};
        brix_gridftp_allow_write on;
        {EXTRA_DIRECTIVES}
    }
}
