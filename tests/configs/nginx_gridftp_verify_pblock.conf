# Cleartext FTP gateway with brix_gridftp_verify_write ON over the pblock block
# store (test_gridftp_verify_write.py). The write-verify read-back runs through
# the pblock driver (brix_cksum_u32_obj over the catalog's blocks), so it proves
# the backend-agnostic path: a STOR is only acknowledged (226) once the object
# reads back byte-for-byte from the block store. Rendered by the registry
# (LifecycleHarness): {PORT} {LOG_DIR} {DATA_ROOT} {BIND_HOST}.
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
events { worker_connections 64; }
stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_gridftp on;
        brix_gridftp_export          {DATA_ROOT};
        brix_gridftp_storage_backend pblock;
        brix_gridftp_allow_write     on;
        brix_gridftp_verify_write    on;
    }
}
