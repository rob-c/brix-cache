# Self-contained WebDAV/S3 transfer template for test_client_web_transfer.py.
# Placeholders: {BASE_DIR} {BIND_HOST} {WEBDAV_PORT} {S3_PORT} {WEBDAV_DIR}
#               {S3_DIR} {S3_ACCESS_KEY} {S3_SECRET_KEY}
worker_processes 1;
pid {BASE_DIR}/nginx.pid;
error_log {BASE_DIR}/error.log info;

events { worker_connections 64; }

http {
    access_log off;
    client_body_temp_path {BASE_DIR}/cbt;
    proxy_temp_path       {BASE_DIR}/pt;
    fastcgi_temp_path     {BASE_DIR}/ft;
    uwsgi_temp_path       {BASE_DIR}/ut;
    scgi_temp_path        {BASE_DIR}/sct;

    server {
        listen {BIND_HOST}:{WEBDAV_PORT};
        client_max_body_size 64m;
        location / {
            brix_webdav on;
            brix_storage_backend posix:{WEBDAV_DIR};
            brix_webdav_auth none;
            brix_allow_write on;
        }
    }

    server {
        listen {BIND_HOST}:{S3_PORT};
        client_max_body_size 64m;
        location / {
            brix_s3 on;
            brix_storage_backend posix:{S3_DIR};
            brix_s3_bucket testbucket;
            brix_s3_access_key {S3_ACCESS_KEY};
            brix_s3_secret_key {S3_SECRET_KEY};
            brix_s3_region us-east-1;
            brix_allow_write on;
        }
    }
}
