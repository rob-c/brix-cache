# Native krb5 stream root:// server template (registry lifecycle).
# For test_native_krb5.py.  Launcher-provided: LOG_DIR PORT.
# Test-provided: BIND_HOST DATA_DIR PRINCIPAL KEYTAB (data seeded + keytab/KDC
# profile generated under tmp_path; both must exist at config-parse time).
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
daemon on;

events { worker_connections 256; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth krb5;
        brix_krb5_principal {PRINCIPAL};
        brix_krb5_keytab {KEYTAB};
        brix_allow_write on;
    }
}
