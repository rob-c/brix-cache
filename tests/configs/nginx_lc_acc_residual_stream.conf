# Throwaway XrdAcc stream template (registry lifecycle) for test_acc_residual.py.
# Launcher-provided: LOG_DIR TMP_DIR PORT.  Test-provided: BIND_HOST DATA_DIR
# AUTHDB_PATH EXTRA_DIRECTIVES (data + authdb seeded under tmp_path; both must
# exist at config-parse time).
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
daemon on;

events { worker_connections 64; }

stream {
    brix_kv_zone authz 1m key=32 val=8;

    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
        brix_allow_write on;
        brix_authdb_format xrdacc;
        brix_authdb {AUTHDB_PATH};
        brix_authdb_audit all;
{EXTRA_DIRECTIVES}
        brix_access_log {LOG_DIR}/access.log;
    }
}
