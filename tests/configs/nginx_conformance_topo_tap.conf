# Transparent tap-proxy front — registry-lifecycle template for
# test_conformance_topologies.py. Used for both the single-hop "proxy" topology
# and each hop of the stacked "mesh" topology (the only difference is UPSTREAM).
# Launcher-provided: LOG_DIR PORT.
# Test-provided: UPSTREAM (host:port of the next hop / the shared DATA_ROOT nginx).
worker_processes 1;
daemon on;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 256; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_auth none;
        brix_tap_proxy on;
        brix_tap_proxy_upstream {UPSTREAM};
        brix_tap_proxy_auth anonymous;
    }
}
