# Multi-protocol password-auth template for test_pwd_auth_multiproto.py.
# One POSIX export served over root:// (stream pwd auth), http:// and
# https://+WebDAV (HTTP Basic against the same pwd db).
# Rendered through the phase-81 registry (LifecycleHarness): {PORT} (root://),
# {LOG_DIR}, {TMP_DIR} and {DATA_ROOT} come from the launcher; {HTTP_PORT} /
# {HTTPS_PORT} from extra_ports; {PWD_FILE} / {SERVER_CERT} / {SERVER_KEY} via
# the spec's template_values.
daemon on;
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;

events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_ROOT};
        brix_auth pwd;
        brix_pwd_file {PWD_FILE};
        brix_allow_write on;
    }
}

http {
    access_log off;
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path       {TMP_DIR}/pt;
    fastcgi_temp_path     {TMP_DIR}/ft;
    uwsgi_temp_path       {TMP_DIR}/ut;
    scgi_temp_path        {TMP_DIR}/sct;

    server {
        listen 127.0.0.1:{HTTP_PORT};
        client_max_body_size 64m;
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_ROOT};
            brix_webdav_auth required;
            brix_webdav_pwd_file {PWD_FILE};
            brix_allow_write on;
        }
    }

    server {
        listen 127.0.0.1:{HTTPS_PORT} ssl;
        client_max_body_size 64m;
        ssl_certificate     {SERVER_CERT};
        ssl_certificate_key {SERVER_KEY};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_ROOT};
            brix_webdav_auth required;
            brix_webdav_pwd_file {PWD_FILE};
            brix_allow_write on;
        }
    }
}
