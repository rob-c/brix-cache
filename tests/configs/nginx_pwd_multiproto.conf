# Multi-protocol password-auth template for test_pwd_auth_multiproto.py.
# One POSIX export served over root:// (stream pwd auth), http:// and
# https://+WebDAV (HTTP Basic against the same pwd db).
# Placeholders: {LOG_DIR} {PID_FILE} {BASE_DIR} {ROOT_PORT} {HTTP_PORT}
#               {HTTPS_PORT} {DATA_DIR} {PWD_FILE} {SERVER_CERT} {SERVER_KEY}
daemon off;
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {PID_FILE};

events { worker_connections 64; }

stream {
    server {
        listen 127.0.0.1:{ROOT_PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth pwd;
        brix_pwd_file {PWD_FILE};
        brix_allow_write on;
    }
}

http {
    access_log off;
    client_body_temp_path {BASE_DIR}/cbt;
    proxy_temp_path       {BASE_DIR}/pt;
    fastcgi_temp_path     {BASE_DIR}/ft;
    uwsgi_temp_path       {BASE_DIR}/ut;
    scgi_temp_path        {BASE_DIR}/sct;

    server {
        listen 127.0.0.1:{HTTP_PORT};
        client_max_body_size 64m;
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_auth required;
            brix_webdav_pwd_file {PWD_FILE};
            brix_allow_write on;
        }
    }

    server {
        listen 127.0.0.1:{HTTPS_PORT} ssl;
        client_max_body_size 64m;
        ssl_certificate     {SERVER_CERT};
        ssl_certificate_key {SERVER_KEY};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_auth required;
            brix_webdav_pwd_file {PWD_FILE};
            brix_allow_write on;
        }
    }
}
