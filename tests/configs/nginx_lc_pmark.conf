# SciTags pmark WebDAV server (registry lifecycle) for test_pmark.py.
# Body copied from nginx_pmark_self.conf with the registry lifecycle header.
# Launcher-provided: LOG_DIR TMP_DIR PORT.
# Test-provided via template_values (data dir seeded under tmp_path, must exist
# at config-parse time): BIND_HOST DATA_DIR FIREFLY_HOST FIREFLY_PORT
# EXTRA_LOCATION (per-test pmark directives).
worker_processes 1;
pid {LOG_DIR}/nginx.pid;
error_log {LOG_DIR}/error.log info;
daemon on;

events { worker_connections 64; }

http {
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path       {TMP_DIR}/pt;
    fastcgi_temp_path     {TMP_DIR}/ft;
    uwsgi_temp_path       {TMP_DIR}/ut;
    scgi_temp_path        {TMP_DIR}/st;
    access_log off;

    server {
        listen {BIND_HOST}:{PORT};
        location / {
            brix_webdav on;
            brix_storage_backend posix:{DATA_DIR};
            brix_webdav_auth none;
            brix_pmark on;
            brix_pmark_http_plain on;
            brix_pmark_firefly_dest {FIREFLY_HOST}:{FIREFLY_PORT};
{EXTRA_LOCATION}
        }
    }
}
