worker_processes 1;
error_log {LOG_DIR}/error.log info;

thread_pool default threads=4 max_queue=65536;
events { worker_connections 64; }

stream {
    server {
        listen {PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth token;
        brix_allow_write on;
        brix_token_jwks     {TOKEN_DIR}/jwks_multi.json;
        brix_token_issuer   "https://test.example.com";
        brix_token_audience "nginx-xrootd";
        brix_access_log {LOG_DIR}/brix_access_multikey.log;
    }
}
