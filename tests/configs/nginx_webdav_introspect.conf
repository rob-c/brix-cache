error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;
events { worker_connections 64; }

http {
    client_body_temp_path {TMP_DIR}/cbt;
    proxy_temp_path {TMP_DIR}/pt;
    fastcgi_temp_path {TMP_DIR}/ft;
    uwsgi_temp_path {TMP_DIR}/ut;
    scgi_temp_path {TMP_DIR}/st;
    access_log off;

    server {
        listen {BIND_HOST}:{PORT};
        location = /_introspect {
            internal;
            proxy_method      POST;
            proxy_set_header  Content-Type application/x-www-form-urlencoded;
            proxy_set_body    "token=$arg_token";
            proxy_pass        http://{HOST}:{IDP_PORT}/introspect;
        }
        location / {
            root {DATA_ROOT};
            brix_webdav on;
            brix_storage_backend posix:{DATA_ROOT};
            brix_webdav_auth none;
            brix_webdav_token_introspect_loc /_introspect;
            brix_webdav_token_introspect_fail_open off;
        }
    }
}
