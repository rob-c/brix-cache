# Memory-safety stream template for test_phase27_memsafety.py (registry
# lifecycle).  Launcher-provided: LOG_DIR PORT.  Test-provided: BIND_HOST
# DATA_DIR (seeded under tmp_path; must exist at config-parse time).
worker_processes 1;
error_log {LOG_DIR}/error.log info;
pid {LOG_DIR}/nginx.pid;
daemon on;

events { worker_connections 64; }

stream {
    server {
        listen {BIND_HOST}:{PORT};
        brix_root on;
        brix_storage_backend posix:{DATA_DIR};
        brix_auth none;
    }
}
