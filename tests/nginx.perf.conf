# nginx.perf.conf — performance-tuned nginx config for load testing
#
# Differences from the development nginx.conf:
#   • worker_processes auto   (uses all CPU cores)
#   • worker_connections 4096
#   • thread_pool threads=32  (more I/O threads for parallel reads/writes)
#   • reuseport on listeners  (spread accepts across worker processes)
#   • error_log at 'warn' (not debug) to eliminate logging bottleneck
#   • client_max_body_size 4g for large write load tests
#   • keepalive_timeout 75 for WebDAV to amortise TLS handshakes
#   • ssl_buffer_size 1m     (fewer SSL_write calls per GiB; bulk-transfer optimised)
#   • ssl_session_cache/tickets at http block level (shared across all vhosts)
#   • http2 on; in WebDAV vhost (nginx 1.25+ syntax; ALPN; curl --http2 will use it)
#   • port 12796 — root:// over nginx stream TLS (transport-layer TLS, auth none)
#
# TLS protocol notes:
#   OpenSSL 3.0 on RHEL 9 disables TLSv1.0 and TLSv1.1 at the library level;
#   TLSv1.2 + TLSv1.3 is the maximum available on this platform.
#   TLSv1.3 ciphers are always AEAD (controlled by OpenSSL, not ssl_ciphers).
#   ssl_ciphers applies to TLSv1.2; the list here picks ECDHE+AESGCM only.
#
# Start:  nginx -c $(pwd)/tests/nginx.perf.conf -p /tmp/xrd-perf-test
# Stop:   nginx -c $(pwd)/tests/nginx.perf.conf -p /tmp/xrd-perf-test -s quit

worker_processes auto;
worker_rlimit_nofile 65536;
error_log /tmp/xrd-perf-test/logs/error.log warn;
pid       /tmp/xrd-perf-test/logs/nginx.pid;

# Each worker process gets this many I/O threads.
# With worker_processes auto (20 here), total thread capacity = 20 * 64 = 1280.
# Sized to match the max concurrent pread/pwrite requests per worker at peak load.
thread_pool default threads=64 max_queue=65536;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

stream {
    # Anonymous XRootD — baseline / no-auth overhead
    server {
        listen 12793 reuseport;
        xrootd on;
        xrootd_storage_backend posix:/tmp/xrd-load/data;
        xrootd_auth none;
        xrootd_allow_write on;
        xrootd_access_log off;
    }

    # XRootD + GSI (application-layer auth, cleartext data stream)
    server {
        listen 12795 reuseport;
        xrootd on;
        xrootd_storage_backend posix:/tmp/xrd-load/data;
        xrootd_auth gsi;
        xrootd_allow_write on;
        xrootd_certificate     /tmp/xrd-load/pki/server/hostcert.pem;
        xrootd_certificate_key /tmp/xrd-load/pki/server/hostkey.pem;
        xrootd_trusted_ca      /tmp/xrd-load/pki/ca/ca.pem;
        xrootd_tls on;
        xrootd_access_log off;
    }

    # XRootD + TLS (transport-layer TLS via nginx stream SSL, auth none)
    # Connect with:  roots://localhost:12796   (note the 's')
    # Env:           X509_CERT_DIR=/tmp/xrd-load/pki/ca
    server {
        listen 12796 ssl reuseport;
        xrootd on;
        xrootd_storage_backend posix:/tmp/xrd-load/data;
        xrootd_auth none;
        xrootd_allow_write on;
        xrootd_access_log off;

        ssl_certificate     /tmp/xrd-load/pki/server/hostcert.pem;
        ssl_certificate_key /tmp/xrd-load/pki/server/hostkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:XRDTLS:50m;
        ssl_session_timeout 1d;
    }

    # XRootD + GSI + stream TLS (roots:// scheme, auth gsi)
    # Connect with:  roots://localhost:12797   X509_USER_PROXY=<proxy>
    server {
        listen 12797 ssl reuseport;
        xrootd on;
        xrootd_storage_backend posix:/tmp/xrd-load/data;
        xrootd_auth gsi;
        xrootd_allow_write on;
        xrootd_certificate     /tmp/xrd-load/pki/server/hostcert.pem;
        xrootd_certificate_key /tmp/xrd-load/pki/server/hostkey.pem;
        xrootd_trusted_ca      /tmp/xrd-load/pki/ca/ca.pem;
        xrootd_access_log off;

        ssl_certificate     /tmp/xrd-load/pki/server/hostcert.pem;
        ssl_certificate_key /tmp/xrd-load/pki/server/hostkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:XRDTLS:50m;
        ssl_session_timeout 1d;
    }

    # XRootD + Bearer token
    server {
        listen 12799 reuseport;
        xrootd on;
        xrootd_storage_backend posix:/tmp/xrd-load/data;
        xrootd_auth token;
        xrootd_allow_write on;
        xrootd_token_jwks     /tmp/xrd-load/tokens/jwks.json;
        xrootd_token_issuer   "https://test.example.com";
        xrootd_token_audience "nginx-xrootd";
        xrootd_access_log off;
    }
}

http {
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 75;

    # Shared TLS session cache across all HTTPS vhosts.
    ssl_session_cache    shared:SSL:50m;
    ssl_session_timeout  1d;
    ssl_session_tickets  on;

    # 128 KiB SSL write buffer: L2-cache-friendly (L2 is typically >=256 KB/core).
    # Matches output_buffers chunk size so each pread result fills exactly one
    # SSL write call.  Default 16 KiB gives 1 TLS record per call; 128 KiB
    # gives 8 records per call — enough batching without busting the cache.
    ssl_buffer_size      128k;

    client_body_temp_path /tmp/xrd-perf-test/tmp;
    proxy_temp_path       /tmp/xrd-perf-test/tmp;
    fastcgi_temp_path     /tmp/xrd-perf-test/tmp;
    uwsgi_temp_path       /tmp/xrd-perf-test/tmp;
    scgi_temp_path        /tmp/xrd-perf-test/tmp;

    access_log off;

    # Prometheus metrics
    server {
        listen 12790 reuseport;
        location /metrics {
            xrootd_metrics on;
        }
    }

    # WebDAV over HTTPS — GSI + Bearer token
    # HTTP/2 enabled; clients that send ALPN "h2" (e.g. curl --http2) get HTTP/2.
    server {
        listen 12792 ssl reuseport;
        server_name localhost;

        ssl_certificate     /tmp/xrd-load/pki/server/hostcert.pem;
        ssl_certificate_key /tmp/xrd-load/pki/server/hostkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        # TLSv1.2: ECDHE key exchange + AES-GCM AEAD only.
        # TLSv1.3: OpenSSL always uses AES-256-GCM / AES-128-GCM / ChaCha20.
        ssl_ciphers         ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Phase 32 WS1 (kernel TLS) DISABLED on this host.
        #   ssl_conf_command Options KTLS;
        # The WebDAV/S3 GET serve path is ALREADY file-backed (b->in_file=1 in
        # compat/http_file_response.c), so on a kernel with working TLS-TX offload
        # `Options KTLS` would let nginx SSL_sendfile() the file zero-copy.  But on
        # this WSL2 kernel (6.18.6-WSL2) kTLS TX is broken: enabling it makes the
        # encrypted GET abort mid-SSL_sendfile (HTTP 000, 0 bytes).  Without it,
        # userspace TLS serves the same file-backed buffer via read()+SSL_write at
        # ~1620 MiB/s — already faster than XrdHttp.  Re-enable only on a kernel
        # where kTLS TX is verified working.

        xrootd_webdav_proxy_certs on;
        ssl_verify_client   optional_no_ca;
        ssl_verify_depth    10;

        # Large uploads for write load tests
        client_max_body_size 4g;
        client_body_timeout  300s;
        send_timeout         300s;

        location / {
            xrootd_webdav         on;
            xrootd_webdav_storage_backend    posix:/tmp/xrd-load/data;
            xrootd_webdav_cadir   /tmp/xrd-load/pki/ca;
            xrootd_webdav_auth    optional;
            xrootd_webdav_allow_write on;

            # Match output_buffers to ssl_buffer_size so each pread() fills
            # exactly one TLS write buffer: 128 KiB chunk → SSL_write(128 KiB)
            # (8 TLS records per call) instead of SSL_write(32 KiB) with default.
            # 128 KiB is L2-cache-friendly; TLB cost = 32 entries/conn.
            output_buffers 1 128k;

            xrootd_webdav_token_jwks     /tmp/xrd-load/tokens/jwks.json;
            xrootd_webdav_token_issuer   "https://test.example.com";
            xrootd_webdav_token_audience "nginx-xrootd";
        }
    }

    # S3 REST — anonymous (no access key configured → unauthenticated reads).
    # Cleartext HTTP on 12798 for an apples-to-apples data-plane read benchmark
    # (root:// anon and S3 anon are both cleartext; there is no native-xrootd S3
    # counterpart, so the load test reports S3 for nginx only).
    server {
        listen 12798 reuseport;
        server_name localhost;

        client_max_body_size 4g;
        client_body_timeout  300s;
        send_timeout         300s;

        location / {
            xrootd_s3        on;
            xrootd_s3_storage_backend   posix:/tmp/xrd-load/data;
            xrootd_s3_bucket perfbucket;
            xrootd_s3_allow_write on;
            output_buffers 1 128k;
        }
    }
}
