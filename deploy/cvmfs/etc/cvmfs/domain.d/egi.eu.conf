# Stratum-1 set as published by the stock cvmfs-config-default package
# (plain KEY=value for CVMFS-brix; @fqrn@ expands to the repository name).
CVMFS_SERVER_URL="http://cvmfs-egi.gridpp.rl.ac.uk:8000/cvmfs/@fqrn@;http://klei.nikhef.nl:8000/cvmfs/@fqrn@;http://cvmfsrepo.lcg.triumf.ca:8000/cvmfs/@fqrn@;http://cvmfs-stratum-one.ihep.ac.cn:8000/cvmfs/@fqrn@"

# Key chain with the public signing keys for the egi.eu domain.
CVMFS_KEYS_DIR=/etc/cvmfs/keys/egi.eu
