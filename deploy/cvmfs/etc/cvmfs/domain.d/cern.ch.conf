# cern.ch.conf — cern.ch domain defaults shipped by brix-cvmfs-config.
# Do not edit here: create /etc/cvmfs/domain.d/cern.ch.local instead.
#
# Stratum-1 set as published by the stock cvmfs-config-default package
# (plain KEY=value for CVMFS-brix; @fqrn@ expands to the repository name).
CVMFS_SERVER_URL="http://cvmfs-stratum-one.cern.ch/cvmfs/@fqrn@;http://cernvmfs.gridpp.rl.ac.uk/cvmfs/@fqrn@;http://cvmfs-s1bnl.opensciencegrid.org/cvmfs/@fqrn@;http://cvmfs-s1fnal.opensciencegrid.org/cvmfs/@fqrn@"

# Key chain with the public signing keys for the cern.ch domain. The directory
# is used as a whole: every *.pub is a candidate master key.
CVMFS_KEYS_DIR=/etc/cvmfs/keys/cern.ch
