# 60-brix.conf — defaults shipped by brix-cvmfs-config for CVMFS-brix
# (brixMount cvmfs / brixMount autofs).
#
# Do not edit this file: it is replaced on package upgrade. Put site overrides
# in /etc/cvmfs/default.local, per-domain overrides in
# /etc/cvmfs/domain.d/<domain>.local and per-repository ones in
# /etc/cvmfs/config.d/<fqrn>.local — the cascade reads them after this file.
#
# CVMFS-brix reads plain KEY=value lines (last assignment wins); shell syntax
# in stock cvmfs config files is tolerated but not evaluated.

# No site proxy by default; point this at your squid farm when you have one,
# e.g.  CVMFS_HTTP_PROXY="http://squid-a:3128|http://squid-b:3128;DIRECT"
CVMFS_HTTP_PROXY=DIRECT

# Per-repository cache quota in MB (stock cvmfs client default).
CVMFS_QUOTA_LIMIT=4000

# Network behaviour (seconds / attempts).
CVMFS_TIMEOUT=5
CVMFS_TIMEOUT_DIRECT=10
CVMFS_MAX_RETRIES=2
