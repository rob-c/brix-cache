# fail2ban filter — nginx xrootd guard audit log, signal=proxyabuse lines.
# The CVMFS forward-proxy was handed an absolute-form target it refused: a
# non-allowlisted upstream authority, a non-http(s) scheme, or a malformed
# target port. A healthy CVMFS client only ever names its site's Stratum-1s,
# so this is an open-proxy / SSRF probe reaching for an arbitrary remote.
# The attempted upstream authority (host[:port]) rides the path field.
# Line format (src/net/guard/guard_audit.c — the fail2ban contract):
#   <iso8601> ip=<addr> proto=cvmfs signal=proxyabuse op=read path="<authority>" status=<n>
[Definition]
failregex = ^\S+ ip=<HOST> proto=\S+ signal=proxyabuse\b
ignoreregex =
datepattern = ^%%Y-%%m-%%dT%%H:%%M:%%S
