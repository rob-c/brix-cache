# fail2ban filter — nginx xrootd guard audit log, signal=notroot lines.
# A client that is NOT speaking the kXR protocol (TLS ClientHello, HTTP
# scanner, SSH bannergrab, raw junk) opened a connection on a root:// port.
# The wire guess rides the path field (tls-clienthello/http-request/…).
# Line format (src/net/guard/guard_audit.c — the fail2ban contract):
#   <iso8601> ip=<addr> proto=root signal=notroot op=handshake path="<wire>" status=0
[Definition]
failregex = ^\S+ ip=<HOST> proto=\S+ signal=notroot\b
ignoreregex =
datepattern = ^%%Y-%%m-%%dT%%H:%%M:%%S
