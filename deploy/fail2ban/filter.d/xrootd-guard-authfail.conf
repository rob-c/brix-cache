# fail2ban filter — nginx xrootd/ARC guard audit log, signal=authfail lines.
# Line format (src/net/guard/guard_audit.c — the fail2ban contract):
#   <iso8601> ip=<addr> proto=<p> signal=authfail op=<op> path="<path>" status=<n>
[Definition]
failregex = ^\S+ ip=<HOST> proto=\S+ signal=authfail\b
ignoreregex =
datepattern = ^%%Y-%%m-%%dT%%H:%%M:%%S
