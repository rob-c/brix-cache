# fail2ban filter — nginx xrootd guard audit log, signal=cvmfs_tamper lines.
# A CVMFS cache fill FAILED integrity verification: the staged bytes did not
# hash to their content-addressed name, or the repository manifest/whitelist
# signature chain did not verify against the configured master key. Content
# in a healthy CVMFS repository can never do this — the origin (or a MITM on
# the path to it) served tampered or corrupted data. The HOST in these lines
# is the ORIGIN authority that answered the fill, not a client: fills are
# detached and request-coalesced, so the origin is the actor to cut off.
# Line format (src/net/guard/guard_audit.c — the fail2ban contract):
#   <iso8601> ip=<origin> proto=cvmfs signal=cvmfs_tamper op=read path="<key>" status=<n>
[Definition]
failregex = ^\S+ ip=<HOST> proto=\S+ signal=cvmfs_tamper\b
ignoreregex =
datepattern = ^%%Y-%%m-%%dT%%H:%%M:%%S
