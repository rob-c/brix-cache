# fail2ban jails for the nginx xrootd/ARC bad-actor guard (phase-65).
#
# logpath = the brix_guard_audit_log file configured on the guarded
# locations. Thresholds: a single signature hit is a scanner (instant ban);
# grammar violations nearly as strong; notfound/authfail are weak per-request
# signals banned only as storms/streaks.

[xrootd-guard-signature]
enabled  = true
filter   = xrootd-guard-signature
logpath  = /var/log/brix-guard-audit.log
maxretry = 1
findtime = 600
bantime  = 86400
banaction = nftables-multiport

[xrootd-guard-grammar]
enabled  = true
filter   = xrootd-guard-grammar
logpath  = /var/log/brix-guard-audit.log
maxretry = 2
findtime = 600
bantime  = 43200
banaction = nftables-multiport

[xrootd-guard-notfound]
enabled  = true
filter   = xrootd-guard-notfound
logpath  = /var/log/brix-guard-audit.log
maxretry = 20
findtime = 60
bantime  = 3600
banaction = nftables-multiport

[xrootd-guard-authfail]
enabled  = true
filter   = xrootd-guard-authfail
logpath  = /var/log/brix-guard-audit.log
maxretry = 5
findtime = 120
bantime  = 7200
banaction = nftables-multiport

# A non-root client on a root:// port never has a legitimate reason to be
# there (root:///roots:// both open with the cleartext kXR handshake). One
# hit is a scanner or misdirected probe -> instant ban, like a signature.
[xrootd-guard-notroot]
enabled  = true
filter   = xrootd-guard-notroot
logpath  = /var/log/brix-guard-audit.log
maxretry = 1
findtime = 600
bantime  = 86400
banaction = nftables-multiport

# A CVMFS forward-proxy request naming a non-allowlisted (or wrong-scheme /
# malformed) upstream is an open-proxy / SSRF probe — the client is trying to
# reach an arbitrary remote through the site cache. Stronger than a 404 storm
# but not instant-ban: a maxretry of 3 lets a human debugging with curl make a
# mistake or two while cutting off a probe well below scanner rates.
[xrootd-guard-proxyabuse]
enabled  = true
filter   = xrootd-guard-proxyabuse
logpath  = /var/log/brix-guard-audit.log
maxretry = 3
findtime = 600
bantime  = 43200
banaction = nftables-multiport

# phase-68: CVMFS protocol rejects (nginx ERROR log, not the guard audit log).
# A healthy CVMFS client never sends a rejectable URL, but a human with curl
# during debugging shouldn't get instabanned — 20/min is drastically above
# accidental and drastically below scanner rates.
[nginx-xrootd-cvmfs]
enabled  = true
port     = 3128,8443
filter   = nginx-xrootd-cvmfs
logpath  = /var/log/nginx-xrootd/error.log
maxretry = 20
findtime = 60
bantime  = 600
banaction = nftables-multiport

# phase-85 F2: a CVMFS fill that fails content verification is never an
# accident — CAS names are self-certifying and signature chains don't
# bit-rot into "almost valid". The banned HOST is the ORIGIN that served
# the bad bytes (fills are detached; there is no client to blame), so one
# verified tamper cuts that origin out of the failover set immediately.
[xrootd-guard-cvmfs_tamper]
enabled  = true
filter   = xrootd-guard-cvmfs_tamper
logpath  = /var/log/brix-guard-audit.log
maxretry = 1
findtime = 600
bantime  = 86400
banaction = nftables-multiport
