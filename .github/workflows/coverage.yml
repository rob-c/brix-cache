# gcov/lcov line-coverage report for src/ and client/ (QUALITY_ROADMAP §2.3/§3.4).
#
# REPORT-ONLY (continue-on-error) by design. Per the hyper-hardening B-1 lesson,
# a numeric gate must not be flipped to blocking before a reviewed baseline
# exists: this lane builds the gcov-instrumented module, runs the fast fleet tier
# against it, and publishes the lcov html + total line rate as an artifact. Once
# the number is observed to be stable on the runner, set COVERAGE_MIN (below) to
# a floor a few points under it and drop continue-on-error to make it enforcing —
# the same graduation path fanalyzer.yml/codechecker.yml document.
#
# The fast tier boots the test fleet (self-provisioned PKI); a meaningful figure
# needs that to run. If the fleet cannot boot on the runner the job still uploads
# whatever counters accumulated rather than failing the build.
name: coverage
on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 1'   # Mondays 05:00, after fanalyzer (03:00) + codechecker (04:00)
jobs:
  coverage:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install build + coverage deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential lcov \
            libssl-dev zlib1g-dev libpcre3-dev libpcre2-dev \
            libcurl4-openssl-dev libsqlite3-dev libkrb5-dev \
            libjansson-dev libxml2-dev librados-dev
          pip install --user pytest pytest-xdist pytest-timeout
      - name: Fetch nginx source
        run: curl -fsSL https://nginx.org/download/nginx-1.28.3.tar.gz | tar -xz -C /tmp
      - name: Build instrumented module, run suite, capture coverage
        env:
          NGINX_SRC: /tmp/nginx-1.28.3
          PYTHONPATH: tests
          # COVERAGE_MIN: 85   # ← uncomment to enforce a floor once a baseline is set
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          tools/ci/coverage.py 2>&1 | tee /tmp/coverage-report.txt
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            /tmp/coverage-report.txt
            coverage/coverage.info
            coverage/html
