# Weekly GCC -fanalyzer ratchet (use-after-free / leak / NULL-deref findings
# vs tools/ci/fanalyzer_baseline.txt). NON-BLOCKING: the baseline was
# generated with the local dev GCC; ubuntu-latest's GCC reports a different
# set. First run (2026-07-07, 632 files analyzed) showed 3 findings absent
# from the local baseline: fd-leak in core/compat/subprocess.c and two
# NULL-derefs (ngx_log.h, fs/vfs/vfs_staged.c) — triage before trusting or
# promoting this gate. Local runs against the dev build remain the
# authoritative gate — see tools/ci/README.md. Never --regen from CI output.
name: fanalyzer
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'
jobs:
  fanalyzer:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential \
            libssl-dev zlib1g-dev libpcre3-dev libpcre2-dev \
            libcurl4-openssl-dev libsqlite3-dev libkrb5-dev \
            libjansson-dev libxml2-dev librados-dev
      - name: Fetch and configure nginx with the module
        run: |
          curl -fsSL https://nginx.org/download/nginx-1.28.3.tar.gz | tar -xz -C /tmp
          cd /tmp/nginx-1.28.3
          ./configure --with-stream --with-stream_ssl_module \
            --with-http_ssl_module --with-http_dav_module --with-threads \
            --add-module="$GITHUB_WORKSPACE"
      - name: Run analyzer ratchet
        run: NGX_BUILD=/tmp/nginx-1.28.3 tools/ci/run_fanalyzer.sh 2>&1 | tee /tmp/fanalyzer-report.txt
      - name: Upload findings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fanalyzer-report
          path: /tmp/fanalyzer-report.txt
