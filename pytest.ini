[pytest]
# Default per-test timeout in seconds.  Override per-test with
# @pytest.mark.timeout(N) or per-module via pytestmark.
# Keeps the suite from hanging on a stalled nginx connection.
timeout = 30
# `signal` (SIGALRM) turns a timeout into a CLEAN test failure in the worker's
# main thread and lets the worker keep running the next test.  `thread` instead
# calls os._exit() on expiry, which kills the whole xdist worker ("node down —
# replacing crashed worker") and forces a rerun of its remaining tests — the
# rerun then collides on fixed ports left behind by the killed worker.  The one
# case `thread` guarded against — a wedged XrdCl C++ poller swallowing SIGALRM —
# no longer lives in the pytest interpreter: every pyxrootd/XrdCl call is
# confined to the out-of-process worker (_xrdcl_worker.py / _xrdcl_proxy.py),
# which the parent kills on its own wall-clock timeout.  So `signal` is both
# safe and strictly more stable here.
timeout_method = signal
addopts = -v
filterwarnings =
	ignore:Unverified HTTPS request is being made to host.*:urllib3.exceptions.InsecureRequestWarning
pythonpath = tests
markers =
	slow: marks tests as slow (deselect with -m "not slow"); the <5min PR gate (run_suite.sh --pr) runs "not slow", run_suite.sh --nightly runs the slow set
	large: marks tests that require large files or datasets
	e2e: end-to-end tests requiring all servers running
	requires_local_server: tests that require a locally running server fleet
	serial: tests that must not run in parallel
	privileged: multi-user impersonation tests needing root + real accounts (run via tests/run_multiuser_authz.sh under sudo); auto-marked serial so the parallel fast lane skips them
	leak: cross-user cache-leak conformance tests (the leak ledger); privileged, auto-marked serial
	netfault: network-fault resilience tests (stalls, partial reads, drops, packet loss); run serially in their own lane
	tokenconf: WLCG token conformance suite (manifest-parametrized)
	optin: phase-81 command-script live scenarios; run by default, skipped only when the matching PHASE81_RUN_* env knob is set to "0"
	x509conf: WLCG x509 / CA-directory conformance suite (signing_policy, proxy, CRL, CA-dir)
	selinux: RPM SELinux policy verification (root + SELinux host + -selinux subpackage; self-skips elsewhere)
