[pytest]
# Default per-test timeout in seconds.  Override per-test with
# @pytest.mark.timeout(N) or per-module via pytestmark.
# Keeps the suite from hanging on a stalled nginx connection.
timeout = 30
timeout_method = thread
addopts = -v
filterwarnings =
	ignore:Unverified HTTPS request is being made to host.*:urllib3.exceptions.InsecureRequestWarning
pythonpath = tests
markers =
	slow: marks tests as slow (deselect with -m "not slow")
	large: marks tests that require large files or datasets
	e2e: end-to-end tests requiring all servers running
	requires_local_server: tests that require a locally running server fleet
	serial: tests that must not run in parallel
